body:
  text: 兩朝綱目備要卷六寧宗慶元六年庚申春正月己亥皇子坦生八月壬寅薨追封邠王謚曰冲温二月戊辰降徳音以皇子生故也降諸路雜犯死罪以下囚釋杖以下己巳雨土閏月丁未亦如之戊寅上太上皇帝玉牒聖政日厯㑹要宰相京鏜等上之上率羣臣恭上於夀康宫乙酉雪閏二月庚寅京鏜為左丞相謝深甫為右丞相何澹知樞密院事兼參知政事乙巳留正致仕復少保觀文殿大學士辛亥吳曦建節曦璘之孫挺之子也以殿前都指揮使為昭信軍節度使理前宰執舉状為職司以待執政之子弟焉祖宗時執政子弟皆得任内外清望官但不為臺諫兩省耳自蔡京父子共政秦熺繼之由是典制大壞孝宗惡焉淳熈八年八月始詔見任宰執臺諫子孫並與宫觀嶽廟理為資考至是又詔許用前宰執舉状為職司云三月甲子朱熹卒先是庚申熹臟腑㣲利邑宰張揆来見有餽熹卻之謂知縣若寛得百姓一分即某受一分之賜盖揆藉時相之勢凶燄可畏百姓甚苦之故熹有是言辛酉改大學章句誠意一章此熹絶筆也是日午刻暴下自此不復出書院矣壬戌臟腑尤急癸亥諸生入問疾熹起坐談論為學功夫顧謂蔡沈曰某與先丈病證一同决不起疾沈答先人病兩月餘日先生方苦臟腑然老人氣體易虗不可不急治療諸生退夜分令蔡沈檢巢氏病源醫生劉擇之云待制脉絶已三日矣只是精神定把得如此分明是夜五鼔令蔡沈至卧内熹坐於床沈侍立熹以手挽沈衣令坐若有欲言而不言者乆之命移寝中堂黎明諸生復入問疾熹索紙筆及取至伸紙握筆堅謹如平時然已不能運少頃置筆就枕誤觸巾目蔡沈使正之揮婦女無得近諸生揖而退熹上下其視方瞳烱然徐徐開合氣息漸㣲良久恬然而逝是日大風㧞木洪水頽山哲人之萎豈小變哉諸生近者奔赴逺者相與為位而哭禁錮雖嚴有所不避也十月壬申𦵏於建陽縣唐石里之大林谷黄幹主䘮禮蔡沈主䘮役時偽黨禁嚴太守則韓侂胄之黨傅伯夀也然㑹葬者亦㡬千人先是正言施康年言四方偽徒期以一日聚於信上欲送偽師朱熹之葬臣聞偽師徃在浙東則浙東之徒盛在湖南則湖南之徒盛毎夜三鼔聚於一室偽師身據髙坐口出異言或更相問答或轉相辨難或吟哦怪書如道家步虗之聲或幽黙端坐如釋氏入定之状至於遇夜則入至曉則㪚又如奸人事魔之教觀其文則對偶偏枯亦如道家之科儀語言險怪亦如釋氏之語録雜之以魔書之詭秘倡之以魔法之和同今熹身已歿其徒不忘生則畫像以事之歿則設位以祭之容有此事然㑹聚之間必無美意若非妄談世人之短長則是謬議時政之得失望令守臣約束仍具已施行申尚書省從之門人范念徳為鑄錢司主管官沿檄檢視坑場因便道㑹葬率同門之士訣祭於墓隅其詞曰天之生賢盖亦不數儲精孕靈及河維嶽厥惟孔艱是以殊邈先生之生黃河其清先生之亡維嶽其頽不知何年復此胚胎徒役紛集窀穸告期山哀浦思風慘雲悲臨穴一慟萬古長辭念徳歸未至鄱陽有旨鐫官罷任盖臺察劾其離次㑹葬云先生平居惓惓無一念不在於國聞時政之得失則戚然有不豫之色語及國勢之未振則感慨以至泣下然謹難進之禮則一官之拜必抗章而力辭厲易退之節則一語不合必奉身而亟去其事君也不貶道以求售其愛民也不狥俗以茍安故其與世動輙齟齬自筮仕以至屬纊五十年間厯事四朝仕於外者僅九考立於朝者四十日道之難行也如此然紹道統立人極為萬世宗師則不以用舍為加損也自先生沒其道愈久而愈彰其學愈久而愈盛亦可見此理之在人心未嘗冺也辛未幸聚景園車駕從夀成惠慈皇太后同幸夏四月辛亥鄧友龍請毋用偽黨案慶元黨禁友龍之請在五年四月友龍時為監都進奏院請明詔大臣用舍從違謹所决擇友龍尋除察官十一月乙亥殿中御史陳讜請明詔大臣於進擬人才之初審其邪正而毋事乎繳駮十二月甲午議者又言令奸偽之徒呼嘯朋侣以圖報復當戒其漸望自今回心向道者姑與外祠使知小懲大戒之福其長惡弗悛負固不服者必重寘典憲投之荒逺庻㡬咸知懲創宿道向方案乙亥甲午二事慶元黨禁亦在五年嘉泰元年二月己亥議者又言偽學之徒餘孽未能盡革願於聼言用人之際防㣲杜漸初置資善堂小學教授以命國博蕭逵時東宫纔封衛國公未正名故也舊制資善堂稱翊善若皇孫則為皇太子宫小學教授至是參用之逵字景伯淳熈十四年廷試第四人慶元四年冬除太學博士眀年遷國子又明年春兼實録院檢討官遂為學官之選數月除秘書郎不數年累遷至禮部尚書云五月旱丙辰决中外繫囚除茶鹽賞錢癸亥避殿减膳置寛恤局丙寅詔大理三衙臨安府及諸路闕雨州縣釋杖以下囚戊辰詔求言旱故也詔侍從兩省卿監郎官館職疏陳闕失及當今急務詔曰朕寅奉慈訓猥以眇身託於士民之上夙夜慄慄不遑康寧惟徳菲薄暗於大道下不能治育羣生上以干隂陽之和乃夏序失中閏月不雨大田既坼嘉糓将槁元元何辜咎實在朕意者政事有所虧刑法失其當歟賦役煩重而烝庻之失業者衆歟不然何致沴之深也朕即位以来荷天右序頻嵗中熟民僅小康儲偫未裕儻遇饑歉将奚以相䘏夫徳之不修既召譴告又不深迹厥由力圖消弭其謂百姓何已詔在位陳朕過失與時政之繆又惟部使者守令朕所頼以協宣徳澤者也今或務行苛細縱長吏奸獄訟不平寃者無所赴愬所以傷害和氣咎益甚焉繼自今其悉意畢心亟為民慮凡弊事可除便利可興者條具来上朕将親覽擇其至當而推行之布告中外使咸知朕恐懼修省之意壬申雨丁丑詔看詳封事三省樞宻院擇其可行者以聞六月乙酉朔日有食之丁亥夀仁太上皇后崩案本紀在戊子治䘮於慈儀殿謚曰慈懿皇后權攅於臨安南山之修吉寺壬辰趙善義吳旰使金善義以户部郎中為賀生辰使旰以都官郎中為告哀使善義還至雍邱因與金人爭下車子處忽謂金人曰爾方為蒙古部落所擾何暇與我較莫待要南朝舉兵夾攻耶其下共調䕶之金人乃止翌日伴使謂趙曰昨日國信尚書所言某等歸上頭莫湏奏過否趙皇恐以醉為辭且謝之事聞趙遂坐奉使生事免官旰之使也善義未還金人以南使驟来疑偵其國中事吳至盱眙未即納隂遣人至臨安伺之得其實而歸乃遣使来迓故吳留盱眙者五十有五日云吳入境與趙遇於塗兩使分道而過各不相聞但私以片紙徃来而已戊申許及之罷以母䘮去位秋七月丁夘陳自强簽書樞宻院事自强慶元二年夏以選人入都欲求諸州學官闕見執政皆不遂其所居逆旅主人善拂茶自强一日見其出問所之曰某為儀同擊茶月給十千日三徃府中每徃擊茶一甌而已餘無事也自强太息曰我嘗權儀同先生主人曰官人求闕不遂盍見儀同乎自强曰吾貧旅費垂盡聞見儀同所費不少安能辦之主人曰俟語次試為拈出旬餘無耗一日自强方悶坐有直省官持呼召来者約来日午後至府相見自强莫知所謂比至則侍從官以次畢集謁入傳令先召陳侂胄命設褥於堂上鄉之再拜次召侍從官同坐從官踧踖莫敢居上者侂胄徐曰陳先生老儒沉沒可念坐客唯唯明日連章薦其才遂除太學録未踰年遷博士數月轉國子又數月為秘書郎入館半嵗除右正言右諫議大夫御史中丞入臺半月餘遂秉政自選人至樞府首尾四年云八月庚寅赦天下以聖安夀仁太上皇帝違豫故也辛夘太上皇帝崩崩於夀康宫年五十四孝宗之䘮趙汝愚當國始令羣臣服白凉衫皂帶以治事逮終䘮乃止論者以為是及光宗之䘮禮部侍郎陳宗召復請百官以日易月禫除畢服紫衫皂帶以治事從之乙未日中有黒子丁酉京鏜薨賜諡文穆既而其子沆請避家諱改文忠於是言者以為楊億巨儒既諡曰文議者欲加一忠字竟不之與夫欲加一字猶且不可况諡以二字又欲極美乎望敇攸司自今議諡務當其實其或不然當准古法以選舉不實論若定諡已下其子孫請再更易者以違制論從之其後察官倪思復以為言鏜乃改諡莊定自南渡以来宰執堂饌每員日給一千休兵後五倍其數盖取萬錢之義也舊例日為豐饌羣公一舉筯則皆為皂𨽻所有京鏜當國始議以為不當暴殄天物乃損其數人用二千三百餘悉折見錢於是日具小飱數日然後設一盛饌每執政一忌日堂厨激賞庫臨安府殿前步軍轉運司各送齋僧錢五十千節序及非時生料亦如之淳熈中鏜以檢正報謝北朝因爭撤樂孝宗嘉之遂除侍從㑹趙汝愚自蜀召還上諭大臣除鏜四川帥汝愚聞之謂人曰鏜望輕資淺豈可當此方面由是兩人有隙汝愚得政鏜時為刑部尚書亟納交於侂胄繼擢執政自是為侂胄謀主鏜與劉徳秀在侂胄之門最為兇險侂胄未顯時惟二人與之深交及用事侂胄所為暴虐皆二人教之云九月己未雷辛未合祭天地於明堂紹熈五年明堂孝宗未卒哭時趙汝愚朝獻景靈宫嗣秀王伯圭朝饗太廟而上獨祀明堂是年光宗之䘮甫踰月而當行大禮乃命右丞相謝深甫欵天興之祠嗣濮王不儔攝宗廟之祭盖用紹熈禮云案本紀己巳命謝深甫朝獻景靈宫庚午命嗣濮王不璺朝饗太廟與此異赦天下丙子吕祖泰决配案慶元黨禁祖泰上書在五年九月而宋史本傳祖泰因周必大降少保致仕憤之乃上書請誅侂胄事在嘉泰元年與此異惟侂胄傳係六年與此同是月十一日甲子進士吕祖泰投匭上書論韓侂胄其言畧曰道與學自古所恃以為國也丞相汝愚今之有大勲勞者也立偽學之禁逐汝愚之黨是将空陛下之國而陛下不知悟耶陳自强何人也徒以侂胄童孺之師而躐致禁從陛下舊學之臣若龜年等今安在哉蘓師旦平江之吏胥周筠案周筠宋史祖泰傳作周均誤韓氏之厮役人共知之今師旦以潜邸隨龍周筠以皇后親屬俱至大官不知陛下在潜邸時果識所謂蘓師旦者乎椒房之親果有厮役之周筠者乎其妄自尊大而卑陵朝廷一至於此也願陛下亟誅侂胄及蘇師旦周筠而罷逐陳自强之徒故大臣在者獨周必大可用宜以代其任不然事将不測書出中外大駭侂胄雖怒甚重違人心㑹方行明堂禮故未及問辛未禮成肆大𤯝後五日乃批旨云吕祖泰挾私上書語言狂妄送連州拘管於是右諫議大夫程松殿中侍御史陳讜皆言祖泰有當誅之罪今縱不殺猶宜杖脊黥面竄之逺方是日得旨令臨安府從杖一百真决免刺面配欽州牢城收管祖泰字泰然元祐户部尚書公孺之五世孫也寓居無錫縣案宋史本傳云夷簡五世孫寓常之宜興性䟽逹尚氣義既得罪士大夫勞之者無悔色侂胄猶憐之祖泰始自分必死獨兾以身悟朝廷就逮不懼京尹趙善堅受侂胄計為好語誘之曰誰教汝亦有共為章者乎汝苐言之吾且寛汝祖泰笑曰何問之愚也吾固自知必死而可受教於人且與人議乎善堅曰汝病風䘮心邪祖泰曰以吾觀之若今之附韓氏得美官者乃病風䘮心爾廷中聞之悚然有歎息者嘉泰三年十月庚子得旨許自便祖泰不敢歸投身襄郢間案本傳但言祖泰既貶道出潭州侂胄使人跡其所在乃匿襄郢間不載自便之詔盖史文有誤又四年侂胄死史丞相得政下欽婺州求祖泰所在欲官之㑹祖泰自江陵歸乃詔改正過名特補上州文學嘉定元年七月辛丑也俄改廸功郎監潭州南嶽廟四年丁内艱無以葬来中都謀於諸公間遇寒疾數日死其年四十九冬十月丙戌以韓侂胄為太傅以永崇陵成也癸巳初以年勞减舉主時費士寅為左選侍郎請厯十五考以上無贓私罪犯者聼免職司舉主一員從之辛丑雨土十一月辛夘亦如之十一月癸丑朔宗室與愿更名除福州觀察使改名曮令資善堂授書己未皇后韓氏崩謚曰恭淑權櫕於南山之廣教寺癸亥皇子増生十二月癸未朔薨追封郢王謚冲美案本紀謚沖英疑此有誤丙寅上大行太上皇帝諡曰憲仁聖哲慈孝皇帝廟號光宗東北地震十二月乙酉日中有黒子乙巳乃滅辛夘權櫕光宗於永崇陵永佑之權櫕也宰相秦檜不欲行乃命信安孟王忠厚以樞宻使為之及營思陵備置五使遂命右相周必太掩攅宫從所請也時右相王淮以母老惡凶事故不欲行然陵成而王卒罷永阜之役既命左相留正未𦵏而正逐右相趙汝愚亦不欲行乃以少傅保寧軍節度使郭師禹為總䕶使而命叅知政事余端禮持節導梓宫既葬師禹封永寧郡王汝愚遂得罪及是永崇陵将復土右相謝深甫亦不行乃命韓侂胄焉山陵非宰相䕶送遂為故事癸夘祔光宗於太廟太廟自仁宗以来皆祀七世崇寧初蔡京秉政始取王肅説謂二祧在七世之外乃建九廟奉翼祖宣祖咸歸本室焉然王莽已營九廟唐明皇又用之非始於蔡京也紹興中徽宗祔廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗與欽宗同為一世亦不祧由是淳熈末年太廟祀九世十二室及阜陵復土趙汝愚為政遂祧僖宣二祖而祔孝宗時朱熹在經筵獨以九廟為正汝愚不從熹之議遂格及光宗祔廟復不祧又祀九世矣詔改明年元上繼統趙汝愚為相鋭意慶厯元祐故事故改慶元慶元盡六年而上皇及太后繼崩中宫去世二王子不育朝廷嫌之因改明年為嘉泰云乙巳蠲臨安府紹興府民賦縁攅宫役者己酉吳曦為太尉是冬括關外營田租不果關外舊有營田嵗收租十餘萬斛其田半為吳郭田諸家所據租入甚輕計司知之而不敢問慶元末司農少卿江隂王寧總領四川財賦有隆州州學教授江原張鈞嘗仕利路獻䇿於寧以為營田租可増寧用其説是冬分遣官屬八人按行諸郡所遣官知其不可僅畧増之時新金州簽判眉州人元鼎者分括鳳州遂盡集屬邑之民糾决升降連數月不已太尉郭杲時為興州帥寧杲舊同寮相厚善至是寧欲核其軍中缺員将佐杲不肯互奏於朝朝廷用杲言由此兩人有隙及寧括營田杲尤不以為是有武臣守鳳州者杲親黨也知其情即諭營田之家啖元鼎以利寧命元鼎近邉三十里毋得増括元鼎匿之營田户數自詣元鼎請其榜以示人元鼎不與時日将午元鼎卧未出營田户數百譟於庭曰我曹拘此近半年而若猶未起事何時而可集耶即突入執元鼎毆之探其囊得金錢虎皮觧鹽等物又啟其從吏之槖所得物半之即斥元鼎立庭下授之紙使具所得主名元鼎辭伏衆擁元鼎詣郡守守即白利州西路安撫司云總所營田官邉民驚擾欲為變本州已撫定乞遣兵彈壓杲因出榜招諭且以聞寧聞之即以元鼎屬吏利州安撫司屬官張櫽者潁昌人與寧善宻以杲劾䟽告寧寧得書謂人曰郭帥與寧善何得至此不閲月有詔除寧直徽猷閣湖北轉運副使寧始信其言先是興州摧鋒踏白二軍戍黒谷者騎士月給芻錢甚厚寧議損之是秋戍卒張威等百餘人亡入黒谷為盗有奔北境者北帥械其二十七人還都統司杲戮之而不敢奏寧遂坐免命未下而杲卒於是以太尉吳曦代為帥而以杲姪倪領殿巖盖明年八月云按吳曦代郭杲及郭倪領殿帥亦明年事而先叙於此是嵗取撥封樁庫錢數百萬緡慶元後每封樁庫取撥錢輙數十萬緡銀亦數萬兩黄金亦數千兩盖以為奉神事親之費云是年六月撥封樁庫錢一百萬緡修奉太上皇后攅宫七月撥二十萬緡入内藏八月撥錢十五萬緡并銀二萬兩充秋季供奉太皇太后使用又撥金二千五百兩銀二萬兩充明堂使用又撥一百萬緡修奉太上皇帝攅宫一季之間所撥金銀錢計直二百五十萬緡盖多非泛支用故爾常年則不及此數焉賑諸州水旱建寧府徽嚴衢婺饒信南劍州水建康府常潤揚楚通泰和州江隂軍旱賑之
