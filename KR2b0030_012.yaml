body:
  text: 兩朝綱目備要卷十二寧宗嘉定二年己巳春正月庚子詔條陳節用事令內外有司條陳丁巳樓鑰參知政事章良能同知樞密院事宇文紹節簽書樞密院事庚申詔舉監司郡守侍從兩省臺諫各舉治行尤異者二三人二月庚午黎州蠻蓄卜寇邊蓄卜又犯艮溪寨案宋史作良溪寨官軍與戰敗焉先一日軍正程伯雄引兵至安靜寨翊旦羌賊自聖婆城下引兵二千過河後軍統領王光世自前寨遣兵援之衆寡不敵皆為羌兵掩殺後二日壬申伯雄遣大兵千餘人拒敵西義勇陳于山下禁軍義勇次之土丁義勇陳于河濵布陳甫畢羌人已逼箭鑿皆無所施賊先攻西義勇將官鞠忠引衆走陳遂亂禁軍義勇悉為所圍將軍曹適戰死賊乘勢逐官軍至寨下兵丁死者八十餘人後二日羌賊乃歸制置司聞之復遣興元府右軍凖備將劉信將移屯兵三百往援合前後所遣義勇西兵凡九百命成都府總管武功大夫馮興統之而賊去逺矣四月戊寅光世以所部四百還成都府五月癸丑張師古以義勇還六月癸亥馮興劉信以移屯及西兵次第各歸七月制置司對移趙公㡯通判崇慶府十月丙子復遣本路兵馬鈐轄傅諤往黎州捍禦節制諸軍時安觀文丙新除制置大使乃以便宜命其子直祕閣通判眉州癸仲權黎州兼節制軍馬壬午詔訪稱提楮幣之策詔會子折閲日甚侍從兩省以下各條上所見三月己酉詔民以減會子之價籍沒家財者有司立還之丁亥罷法科試經義復六場舊法戊子大風是月熒惑入太微垣犯左執法三月丙申雨雹庚申恤流民命浙西及沿江諸州給流民病者藥夏四月蝗乙丑詔諸路監司督州縣捕之戊辰汰濠州忠義人歸農案民兵之汰汝廬濠三州不止濠州也自開禧用師而淮襄之間忠義民兵有名籍于官者甚衆合錢米計之嵗用約有六十緡而養一兵其視正軍之費無幾矣嘉定再和首議汰遣先是邱崈為江淮制置大使已汰雄淮軍五六萬然民兵未盡去也何淡繼之次第散遣至是淡言本司近放散廬濠州忠義二萬五百八十六人各令歸業雖所費為錢三十二萬七千餘緡米六千餘石而每嵗却省錢二百十三萬餘緡米一十一萬三千餘石人人望闕謝恩歡呼而去有田之人預於江南經營牛種其無田者多入城市開張店業此乃本司幹辦公事徐翦體國任事之力望賜推賞詔翦特遷一官權知濠州其年六月辛邜京湖制置使李大性亦言昨有創招軍額團結忠義休兵之後依舊支請縻費廪給已分委官屬前往放散開落計二萬六千二百一十三人詔獎諭未幾沿淮盜賊剽劫滋起言者謂此皆前日放散之人則所謂歡呼而去者殆樂而去為盜耳請罷翦攝郡追所遷官七月癸巳從之是時所在揀汰民兵既無所歸後多散而為盜於是命每郡擇其豪首一人授以兵官使之彈壓由是其黨帖然江淮川蜀諸司所措置皆莫之及也辛未詔條眀堂冗費詔有司條上都城疫先是三月壬戌出內庫錢十萬緡為行在貧民棺槥費至是甲申又賜行在諸軍死者棺錢戊子賜楊震仲諡曰節愍案本紀震仲之諡曰節毅五月丙申史彌逺起復右丞相旱丁酉詔諸路監司決繫囚劾守令之貪殘者戊戌羅日願謀為變磔於市羅日願者江西人開禧用兵以䇿干韓托胄借補至訓武郎充忠義軍統制托胄既誅其黨閩人劉鐸為浙西提刑司檢法官坐口語送大理其詞頗連日願朝廷恐其枝蔓不復治第流鐸於湖南日願不自安且鬱鬱不得志寓居臨安之沙皮巷交結惡少是年春二月熒惑入太微垣犯左執法日願謂主宫庭及大臣有咎遂與殿前司中軍訓練官楊眀及其徒徐濟趙珉等合謀以收黑風洞為名聚衆為變約候史丞相過江日令步軍司前軍揀汰軍校張興等藏匿亡命千人於舟中俟百官迎謁於浙江亭舉火為號三路簇刀併上盡殺宰執侍從臺諫諸人然後以兵擁三衙軍直水門突入大內殺內侍王俞張延慶等四人劫請上御殿降詔賞軍以日願為樞密使濟為參知政事濟士族珉歸正人俞大閹延慶內侍也楊眀者在御前伴射主率伴射官為內應而樞密院效用士皇甫威臨安府府學生黃萬頃班直王麟御龍骨朵直戴顯等各為日願糾合徒衆部分已定有守闕進勇副尉景德常者普州人以䇿干京湖宣撫司奏補副尉至是在臨安三月丙申日願令濟珉邀德常共泛西湖至胭脂嶺以所議告之且許事成以為戶部尚書兼知臨安府既而濟中悔遣同謀臨安府學生黃君疇告其事不能逹進武校尉殿前司選鋒軍訓練官黃沖知日願所謀欲殺之而未果德常乃投匭上變黃由時知紹興府亦言其事下大理議者欲掩覆其事於告變元狀不復付出侍御史陳晦連疏論之獄成五月戊戌夜詔日願凌遲處斬珉興威萬頃麟顯並斬罷役人李澤進勇副尉侯顯忠有蔭人陳儷僧劉洪現百姓葛仲亮進義副尉殿前司訓練官程鋭並坐知情不告各決重杖處死己亥刑於市庚子詔濟君疇沖各貸死濟配瓊州君疇循州沖廣州臨安府學生范仲夔坐知情不告配新州日願弟千二南恩州當直人唐佐容州自濟以下並杖脊刺配土牢日願妻張杖脊送封州土牢編管日願男蘇僧以年幼免決刺送吉陽軍收管右相時方辭起復又别奏待罪具言陛下昨誅鉏元惡臣獲密贊英斷故其餘黨切齒執政雷孝友等亦以能薄望輕不足鎮服姦慝上章引咎皆優詔答之乙亥詔德常補武德郎賜錢三千緡白金五百兩同告人賈昻補武翼郎賜錢二千緡白金三百兩以昻為臨安府兵馬鈐轄德常為浙西路兵馬都監自餘或有詿誤誘脅人未發覺到官更不追究令尚書省降黃榜曉諭時武安軍承宣使殿前副都指揮使趙淳已病是月十二日以憂死遂以福州觀察使步軍副都指揮使夏震為威武軍承宣使代掌殿巖四年六月有武臣陳大節吳仲哲者言日願為托胄報仇非大丈夫樞密院使臣白彥通聞而告之大節坐編管泉州仲哲編管建寧府云庚子詔舉監司郡守侍從兩省臺諌各舉有政績才望者二人以補郎官之闕蝗辛丑命州縣捕之乙邜釋大理三衙臨安府兩浙州縣杖以下囚除茶鹽賞錢癸丑詔以戶口為殿最詔兩淮荆襄守令以戶口多寡為殿最甲寅拘回舊會案食貨志是年以會子數多稱提無䇿十一界除已收換尚有一千三百餘萬貫十二十三界除燒毁尚有一萬二百餘萬貫此云眀年春苐十界方滿與史異眀年春第十界會子當滿朝廷先期命刑部尚書曾㬇等置局拘換於是與其寮奏言第十一界會子為三千六百三十二萬六千二百三十六貫八百文乞以鬻爵及出賣沒官田等諸色名件拘回舊會許之所謂名件凡九一曰打奪案奪當作套據志乳香每套一貫六百文乳香錢約一百六十萬餘緡二曰出賣諸路沒官田價錢約一百二十二萬餘緡三曰出賣告敕綾紙補帖一千四百道計價錢四百四十萬緡四曰左右選轉官循資告九百四十道共約計價錢三百三十萬餘緡五曰封贈冠帔敕告六百道計價錢二十八萬緡六曰紫衣師號帖三百道計價錢三萬緡案宋志是時詔發度牒七千道每道為錢千貫七曰副尉減年公據三百道計價錢六萬緡八曰拘催諸路已降未賣告敕錢兩項計一千四百一十萬餘緡九曰臣僚奏薦綾紙錢未見數後又禁銅錢毋出都城於是行在會子每千為錢七百諸路州縣才得其半云朝廷知其壅積遂盡廢十一十二兩界而以十四界新會收之九月癸丑命吏部郎官劉爚等審定中外所陳會子利害上于朝旱己未詔羣臣上封事庚申禱于天地宗廟社稷六月癸亥命浙西諸州諭民種麻豆毋督其租詔臺省及諸路監司速決滯獄乙酉復禱於天地宗廟社稷己丑命江西福建二廣豐稔諸州糴運以給行在仍償其費七月癸巳命有司舉行寬恤之政五條乙未詔凶荒州縣七嵗以下聽異姓收養著為令己亥蠲信陽軍荆門軍漢陽軍民賦壬寅命兩淮轉運司給諸州民麥種癸卯募民以賑飢免役六月辛卯汰新軍及忠義人歸農語附見四月戊辰下秋八月甲子行鐵錢於沿江八州聼兩淮諸州民行使乙丑安丙為四川制置大使罷宣撫司開禧末江淮用兵起邱崈守金陵留鑰崈嘗以簽樞督視軍馬於是趙淳已為江淮制置乃沿故事命崈為大使崈召以何淡代之淡始兼江東安撫俄申命兼大使如崈例已而罷四川宣撫又以安丙為制置大使兼知興元朝議以丙恩數視執政故加大字先是程松趙雄皆以前宰執知成都止為制置使趙彥逾得執政恩例亦然今創加大字蓋用淡例也舊例四川制置大使及制置使結銜皆在知府事上比安公降告其結銜乃在下亦非典故初程松既遁歸繳還宣撫制置二印朝廷以一皮筒遞付楊輔時安丙為宣撫副使以副使印嘗為吳曦所用慊之激賞庫有吳璘宣撫使印乃取用焉及輔改除制置使而宣撫印寄收成都官庫丙檄取之輔答以貴司自有副使印乃止至是丙改除制置大使檄吳獵留制置印自用而以大使印送於丙於是二司行事紛然獵審於朝有旨制置司事務併歸大使司宣撫司事務歸安撫司獵對曰諸公獨不能為吾數月地邪乃更稱四川安撫使及黃疇若入境獵又携制置使印至嘉定然後以送疇若其後言者劾獵狠愎慢令蓋指此耳沔州自誅曦後王喜王鉞薛九齡皆以宣撫司便宜之命為都統制是秋王大才始以荆鄂都統制改除入蜀大才過漢中自以嘗權招撫使不欲與大使講階墀之禮安大使不從大才憾焉後因何九齡事大才以悖語至大使司詳具嘉定七年正月夲條下甲戌册皇太子丁丑皇太子謁太廟議者以太子名懤字逺被甲申又更名詢案本紀太子更名在戊寅自太子侍立而宰輔大臣並兼師傅賔客蓋用天禧間故事己卯黎州蠻寇邊丙戌賑兩淮飢民出米十萬石九月辛丑合祭天地於眀堂赦天下丙午增太學內舍生十員冬十月丁亥補京湖廂禁軍案本紀補廂軍在丁卯命制置使司募逃卒及放散忠義人以補其闕蓋以放散人聚而為盜故也己丑減房廊白地錢公私並裁減十之三如淳熙故事十一月辛卯朔張林等謀作亂不克林為沔州統制謀亂事覺貸死除名廣州羈管甲午修浙西水利詔監司募飢民為之乙未雪以嵗飢罷宴是月郴州黑風洞寇李元礪作亂元礪有衆數萬連破吉郴諸縣詔遣荆鄂江池大軍討之丙辰徐邦憲罷免知臨安府是冬京尹復用士人徐邦憲時都城米價踴貴楮幣不通乞丐之人有羣攫餅餌于傳法寺前者陳侍御晦等全臺上章論守臣區處無䇿邦憲亟丐免章四上詔免兼知臨安府而命趙師􅋷以兵部尚書代之蓋邦憲尹京亦才五十四日也師􅋷時以雜學士居吳門方具辭免學士蔡行之當草答詔奏言師􅋷之為人與其行事衆耳目素具也四典京邑非臣所知不允必有褒語臣無詞以草遂止居數日命復下乃出行之外祠而留直院元剛草答詔焉師􅋷燕王宫宗子也曾祖嘉國公令晙與蘇黃諸人遊父伯驌少有寵於德夀宫出入中禁待以家人禮乾道末將命出疆淳熙中擢為部使者積官和州防禦使提舉佑神觀師􅋷第進士頗有吏才纍更繁劇遭論罷自慶元迄於嘉定之初四典京邑皆以材選然多不過踰年近或數月輒復罷去臨安以宦者為承受府尹反奉之又事干宫禁非與北司深交則不能得其要領故必健吏乃克為之李夀翁嘗白大臣無所用乎承受而勢不得行蓋積習已久非一朝所能革矣十二月壬戌賜李顯忠諡曰忠襄甲子官軍與黎州蠻戰大敗四川制置大使司統領官董照等渡河與彌羌戰先是大使司命照與統領官傅順正將李實以飛虎軍二百戍雅州安大使之子節制癸仲將至黎預檄本州令備船筏乾餱為深入之計至則遣實往安靜相視山川形勢以為蓄卜之碉去大渡河甫三十里入之易耳飛虎軍皆選士自謂無不一當十者故鋭欲渡先旬日節制至軍大犒士衆命照統飛虎軍實統禁軍及沿河諸寨土丁合千三百人以昧爽涉河分為三部山髙箐深路險雪積蠻又於髙山要害之處起立石堋以俟官軍官軍或為所壓既而蠻大呼突出官軍驚潰逃入山谷蠻縱獵狗而隨之盡為所掩西兵被縛者六七十人土丁又倍之日暮照先遁歸實為蠻所圍數日乃得脫繼而禁兵土丁亦有竄歸者節制復還黎州照留守安靜吳獵時已罷制置猶未行乃揭榜黎州戒以不得輕舉傷國威重獵嘗已薦公㡯故其敗事不以聞會大旱詔近臣條闕政許成子時為禮部侍郎因論黎州守臣撫御失當而按劾不加務存大體無怪乎上干隂陽之和如此其極也疏入公㡯降二官放罷朝廷方議擇守會聞大使司已遣官節制乃亟命朝奉郎通判成都府何德彥知黎州節制軍馬用金字牌遞遣行其年十二月甲申也於是節制自舊寨歸留統領官傅順董照軍正程伯雄在後寨捍敵己巳賜朱熹諡曰文太常博士章徠初議諡曰文忠考功郎中劉彌正覆諡議曰諡古也復諡非古也諡法曰諡生於行者也茍當於行一字足矣奚復哉其議略曰六經聖人載道之文也孔氏沒獨子思孟軻氏述遺言以持世斯文以是未墜漢儒於經始采掇以資文墨涉隋唐間河汾講學已不造聖賢閫域最後韓愈氏出其文近道蓋孔氏之道賴子思孟軻氏而眀子思孟軻之死此道幾熄及本朝而又眀濂溪橫渠二程子發其微程氏之徒闡其光至公而聖道燦然矣初太常議以文忠諡公按公在朝廷之日無幾正主庇民之學鬱而不施而著書立言之功大暢於後合文與忠諡公似是而非也有功於斯文簡矣而實也本朝歐蘇不得諡文而得之者乃楊大年王介甫介甫經學不得為醇其事業亦有可恨大年政復文士耳文乎文乎豈是之謂乎世評韓愈為文人非也原道曰軻之死不得其傳斯言也程子取之公晚為韓文考異一書豈其心亦有合與請以韓子之諡諡公從之乃諡曰文乙亥詔諸州毋糴職田租是嵗諸路旱蝗揚楚衡郴吉州南安軍盜起關外諸將私役諸軍關外諸軍多為諸將私役其間軍士有因食貧而為手技者則又拘而使之否則計日而責其工直以故士日益貧家子欽是嵗知金州遇嵗杪有軍士夜揭民居之楮鏹者為廂巡所縛子欽怪而問之曰某粗能抄紙本將日責抄紙若干張未嘗給其直也計無所從出故至是耳子欽憐而釋之金州惟西門一軍頗富蓋其壁壘在崇岡之上家有荒田始鋤之以植菜久而知其利也則更之以粟麥歷年既久墾植益勤遂以足食乃知屯田誠為大利要在使其樂為之耳嘉定三年庚午春正月甲辰詔招諭羣盜詔曰朕以眇躬君臨方夏眀有未燭德有未孚頃緣姦臣妄開邊釁科役繁重人不聊生旱蝗頻仍吏不加恤使吾赤子皆轉徙而無依而彼姦民因誘脅以為暴靜言致寇敢昧責躬近而淮楚兩郡之間逺則江湖數邑之地生齒遭其蹂躪室廬致於毁焚惕若興懷為之旰食今禁旅揚威而並進鄉豪戮力以爭先震疊無前蕩平有日言念脅從之衆豈皆好亂之氓與其假息以偷生孰若轉禍而為福今則宏開禁網誕布寬書推豫不殺之仁畀爾更生之路儻復舊業即為良民尚惟郡縣字人之官共宣朝廷惠下之澤亟蘇民瘼庸副朕心其楚衡郴吉州南安等處盜賊惟捕渠魁外其餘脅從並行原貸許以自新詔戒監司守令詔曰嵗比旱蝗民食不登捐瘠流亡良可哀痛朕蠲租發廩日夕惴惴惟恐賑恤弗及亦冀在位有以分朕之憂而監司守令鹵莽具文未副朕志其能按察而無拘攣歟撫字而無刻剝歟不然何吾民不安業而忍為盜賊之歸也繼自今以體國為心以舉職為能旌褒選擢朕不汝靳其或緣姦作邪營私自豐俾上德壅於下下怨叢於上厥有常憲斯言不渝毋忽丙午雨土癸丑雷二月辛酉黎州蠻復寇邉羌人自艮溪寨下用皮船渡河攻相嶺寨統領官董照引所部兵百餘由寨後突出禦之賊登堡子城照又逐之賊自旦至晚不得食走之河岸衆已疲矣西漢地土丁知賊飢困欲馳下勦之照恐分其功戒土丁毋得進會日暮照移泊薑地寨夜羌人秉燭過船若將遁者而滅炬載兵以來詰朝再戰賊兵數倍照不能支賊乃拔兵而去後五日丙寅新守何德彥至州視事安癸仲還眉州又十日總管馮興以制置大使司之命部西兵三百至州賊不復出黎州舊有㨂丁二千義勇二百德彥至乃核實丁籍擇其少壯者千四百四十為揀丁餘四千二十九為衍丁又增招義勇二百人月增支米三斗醬菜錢一千通舊為錢八引西南極邉六寨薑地相嶺新舊安靜聖婆城艮溪舊以飛山及州禁軍更戍地多煙瘴戍者憚之德彥因命所增二百人將家分戍六寨罷飛山義勇之更戍者三百人減中右軍更戌者之糧而以其錢為增兵之費報可是年八月癸酉也時沉黎賦入至薄總領所嵗以蒲井鹽千八百桶贍之軍所需皆仰給於卭雅乾道癸巳邉隙一開始以州鎮火牌戶及沿路居民遞運四千石上邉謂之短運慶元乙卯吐蕃入寇郡始稅户人夫徑行三百里謂之長運至是蓄卜連年入寇夫運益頻逺近之民俱罹其擾矣丁卯配籍贓吏前知崑山縣徐提之縣丞范大雅犯贓刺面配英德府賔州仍籍其家壬午命王居安督捕洞寇三月己亥又命曹彥約知潭州協力督捕先是去年十二月壬申徙煥章閣待制知隆興府趙希懌為龍圖閣待制知平江府至是又遷寶謨閣待制知潭州史彌堅為寶文閣待制提舉江州太平興國宫而權工部侍郎王居安為集英殿修撰知隆興府兼節制兩路軍馬三月己亥又以朝請郎湖南轉運判官曹彥約為直祕閣知潭州兼權轉運司事居安字簡卿黃巖人進士髙第韓托胄死之日自館職擢為諌官俄以事改起居郎又坐它纍奪一官罷去江淮盜起復官知太平州除直龍圖提點浙西刑獄公事甚有風采乃召為工部侍郎使之平賊彥約字簡夫南康人知名士也開禧末除知澧州未上會金入淮漢簡夫攝守漢陽堅守不動用是遷兩官提舉湖北常平公事又遷提刑簡卿至江西賊方四出廣帥廖俁遏其入嶺之路賊遂出沒洪潭間頃之又移梅嶺摧鋒軍擊賊者殱焉三月丁酉蠲逋負都城及荒歉諸州民間逋負悉蠲之庚子賜彭龜年諡曰忠肅甲寅捕殺楚州賊首胡海久雨丙辰釋兩浙州縣繫囚四月乙丑決行在繫囚釋杖以下是春四川制置大使司收錢引陳咸逢孺既收錢引半界而引直僅為鐵錢五百有竒若關外用銅錢則每引止直百七十錢而已制置大使安觀文丙患之是春議欲復收半界提舉茶馬張震首出馬價寬剩錢三百萬緡為助大使司益以二百萬緡既而遂欲盡收九十一界錢引二千九百萬緡其千二百萬緡合諸司之力餘千七百萬緡令民間每百引貼納三十引收兑逢孺謂三年三兑失信於民且貼頭太多民有折閲之患不如量力止毁九十三界新引千二百萬緡如此止餘兩界通行公私皆受其利安公怒即榜諭軍民以為九十一界錢引係前宣撫程松增印五百萬道所以錢引價低軍民皆受其弊使司今措置與茶馬兩司收鑿五百萬外餘二千四百餘萬合係總領所以新引收兑自七月十七日以去如支軍人折估並合以新引支遣如欲支舊引即合支貼頭錢所有九十一界錢引自十月以去斷不行使檄至逢孺堅持不行安公益怒六月辛酉逢孺未視事有御前軍四人直入吏舍縳都副吏三人以去逢孺愠即以印付屬官稱疾申大制司乞致仕先是誅曦之嵗副宣司遣官剗刷四路錢物得五百萬緡以助總所贍軍既三年矣至是或言自講和罷兵減汰之後用度日省總所嵗計已是有餘當還制司前日所寄五百萬緡以備對鑿其參議官毛璞等調護久之卒兊九十一界二千九百餘萬緡其千二百萬緡以茶馬司羡餘大使司空名官告總所樁管度牒金銀對鑿餘以九十三界收兑又創造九十四界錢引五百萬緡以收程松所增之數應民間輸納者每引百貼納八千蓋二司之説並行然總領所收兊舊引皆以金銀品搭率用新引七分金銀三分銀色下而稱虧官吏因以為利其實每舊引百貼納二十引乃得之應民間已用舊引輸官者總領所復却還令兑新引卒不能守其初約也所謂大制司二百萬緡者其半以三路鹽井戶月額每三萬斤科賣不理選限將仕郎一道計直千緡三路十七州共賣一千道計直者萬緡其半則以給賣沒官鹽井舊民戶沒官之井自建炎以來依坊場法召人投買除引息土産稅錢外量增課息嘉定元年逢孺始從總領所榜賣給為永業得錢數十萬緡至是大制司以為計司速於求售酬未當直再召入實封投買又得錢近百萬緡初下令悉輸舊引于官以充對鑿之數後潼川劉師文申明復令自十二月以後盡輸新引蓋自元年三年兩收舊引凡二千五百萬緡有竒而引直遂復如故向使計司非有樁積金銀之富又安能收此泛濫不行之劵乎今四川諸郡嵗輸黃金千五百兩銀十六萬餘兩而總所大率有收無支掌計者謹視而善藏之則子母相權引法終不壞矣故詳志之夏四月癸亥李元礪犯南雄州遊騎至韶石會江湖諸司言元礪請降而王簡卿未有所白乃少俟之既而簡卿言元礪降書侮嫚有甘罰錢之語賊既不能入廣復犯江西起復奉議郎知吉州史定之彌堅兄子也當未至官時賊已大作及是詔定之量易內地一等州郡差遣而命簡卿兼知吉州時池州副都統制許俊江州副都統制劉元鼎皆在江西頻戰不捷簡夫親與賊戰亦失利案夲紀許俊劉元鼎曹彥約之敗俱在六月丙寅詔恤殘破州縣民經賊蹂踐者監司守臣安集之五月淮賊悉平詔寬恤淮東殘破州縣戊辰賑行在軍民出內庫錢二十三萬緡五月甲辰詔看詳封事去年旱蝗百官應詔封事兩省擇可行者以聞乙巳命督捕海寇行下沿海諸州戊申經理兩淮屯田庚戌以江陵忠勇軍𨽻御前久雨癸丑發豐儲倉米賑貧民六月壬戌命有司舉行寬恤之政十有九條是月追贈朱熹官中大夫寶謨閣直學士寶慶三年贈太師追封信國公紹定三年改徽國公淳祐元年帝幸學以熹列于從祀贈處士蔡元定官案宋元通鑑在二年贈迪功郎制曰士之遇不遇天也其或擯斥於生前而獲伸於死後天理昭昭未有久而不定者爾學問有源操履無玷杜門著書初無與於世者不幸見誣亦遭逺謫今是非已定爾則殂矣朕甚愍之其贈以官慰爾泉下死雖莫贖尚知享哉元定二子曰淵號節齋先生曰沉文公之髙弟也號九峰先生沉有子曰抗號九軒能世其學擢第厯清顯終于參預天之昌蔡氏也至矣六月丁巳朔日有食之己卯詔核實軍籍三衙江上四川諸軍主帥核實欺冒者以贓論王釜之總計也制置大使司奏乞減三路兵籍以八萬一千人為額有闕乞招填然兵籍舊為八萬九千人吳曦亂後僅存七萬餘人雖云減額八千若盡招填實增萬人矣會朝廷泛行下三衙江上及四川諸軍核實詭填虛額遂止三路官井舊法令人承煎自軍興總領所已依官田法召人投買得錢數十萬緡大使司以為未及價復賣之又得錢百萬緡入制司激賞庫王釜以為失信檄止之大使司乃以計所負制司廣惠倉米三十萬石言於朝釜之議遂格秋七月辛卯禁增廣圍田癸卯定南班宗室員為三十員八月乙亥大風拔木是月臨安府蝗九月丙戌朔嚴升差將校法詔三衙江上諸軍升差將校必以才藝年勞其徇私者臺諫及制置總領劾之冬十月乙丑詔四川總領所毋受宣制案四川捴領舊屬宣撫節制壬申雷十一月癸巳賞楚州平賊功乙巳議收浮鹽遣朝士二人往兩浙路與提舉官議是月李元礪迫贛州南安軍朝廷以重賞募人擒捕之十二月丙辰詔安集流民江淮諸司嚴飭守令安集戊午婁機罷丙寅趙師􅋷罷師􅋷免兼知臨安府軍器少監兼國子監司業陳武免兼司業先是十一月間府民有因訟行賕者事連武學生柯子沖盧德宣案師􅋷傳作盧宣德府命付理院械繫之案上當贖銅七斤師􅋷為府尹書判各決竹篦二十押出府城仍申國子監照會士論譁然以為不可諸生乃陳詞于學官時曽凖為武學博士劉靖之為武學諭二學官為備申監監以申尚書省及御史臺諌院府尹伺知之乃委罪於司理參軍趙師夔對移錢塘丞兩推吏皆勘斷而臺省無所施行右學之士遂詣都省投牒會史右相以所生母大祥給不入堂假一月執政出語頗抑士士愈不平復羣稟司業及學官學官往見二參預白之其詞皆支離而有忿意雷孝友有豈應為兩士人罷一尚書之語乃見右相右相亦謂不善平章激而至此於是監學以狀申都省乞施行既而纍日不報武學生周源等遂空學赴監投牒繳納綾紙不肯歸齋其詞云竊聞韓魏公三朝之元老不押班朝儀之小節當時臺諌論之直以為跋扈不臣楊和王再造勳臣為國招軍誤刺輦官當時臺諌論之猶以為當與齒路馬者同誅今來趙帥不經本監不申朝廷輒取天子之學生撻之公庭之下斥之國門之外其蔑視學校不有君父較之不押班刺輦官之事輕重為何如况趙帥本權臣之死黨奴事蘇周賄結貪相姦回駔儈暴虐貪殘實小人之渠魁其視善類不啻氷炭當時譏之者曰姦邪誰不附韓王師􅋷於中最不臧手拾骰錢諛寵婢身當傳酒舞齋郎叩頭雅拜尊師旦畫膝為書薦自強更有一般人不齒也曽學狗吠村莊此皆小人之不屑為在彼乃甘心為之更化之後前日黨韓之人誅斥殆盡而斯人蹤迹詭祕獨能漏網朝廷所以抆拭而用之者特以小人有材或能辦事今既經年徒聞貪酷之聲殊失期待之意尚書天子之喉舌京兆四方之觀瞻彼方借叨非據偃然自大謂秦無人前此肆無忌憚特為天子結怨於民今兩生之辱是為天子結怨於士孟子曰無罪而殺士則大夫可以去源等嘗具狀申監乞備申臺省又嘗訴于朝省訴于臺諌待命數日杳不聞報源等竊恐朝廷以常程公事視之竊惟祖宗二三百年養士之澤一旦掃地此豈小故而趙帥不有朝廷不存學校履霜堅氷漸不可長紹聖報復之禍尤可寒心源等不肯上負聖天子教育之恩為國逺慮義激辭憤誓不茍生而鬱勃之氣竟無所伸諸生見幾而作多已告假所存無幾源等亦何面目復為天子學生所有敕給綾紙隨狀繳納其有未及將到者别狀申繳於是監學以諸生狀詞繳申臺省且併乞罷黜武學二學官又偕國子監丞孫礿博士林瑑簿俞建正張方録虞萬太學博士姚師臯臧辛伯正宣繒録林坰俱詣宰執白之退即家居待命其月十四日乙酉也是日府尹稱疾乞告詔豫五日丙戌太學之士亦詣監投牒其詞云竊惟祖宗建立學校幾三百年所以崇奬士類靡所不至中興以來髙宗孝宗尤切加意今有事關國體傳之四方殊駭觀聼如武士柯子沖盧德宣初無罪纍而臨安府守臣以私意羅織煆錬令自誣服而又撻之公庭逐之國門之外始聞而疑之以為守臣雖橫宜不至此已而信然乃求其説而不可得相與言曰撻辱一節曾申監乎曰無之斥逐一事亦嘗奏聞乎曰無之始為之大駭以為朝廷猶有紀綱臺諫猶有公論學校猶有師儒而守臣敢輒為此何也在學法生員有過自有五等之規甚者乃始奏而行之然在祖宗盛時天涵地育護養廉耻士不幸罹于咎者蓋鮮惟曩嵗權臣得志之初始斥逐忤己者五六人雖然猶未敢加以鞭撻也猶有待於畫旨也今守臣乃為權臣之所不敢為是可忍也孰不可忍也右學諸生已訴之臺省且復相率而去矣竊謂文武雖分而道則同學校雖二而體則一是用不避誅責冒犯申稟伏乞備申朝廷敷奏施行無使異日天下誦之國史書之曰守臣撻逐天子生員自今日始幸甚幸甚陳武得之復為備申都省府尹聞乃上章待罪其自辨訴甚悉而理終屈先是諸生既訟于御史臺而殿中侍御林琰監察御史徐宏鄭昭先共議牒府苐云請照會士人所陳逐一行遣無為具文招惹詞訴而已及事益激乃始奏劾獄官趙師夔以為不分眀指定雷列具呈遂致一等遭辱有傷學校事體乞將師夔罷黜獄吏決配執政知士論不可遏丁亥畫旨府尹放罷戊子詔獄官放罷二吏送浙漕司從杖一百斷勒永不收敘而二人無所處分武再與二學官連銜申乞罷黜己丑尚書省劄下令學官安職士人歸學庚寅陳武曾凖皆供職辛卯省劄令更切曉諭諸生歸齋壬辰靖之乃趨學與武凖面諭諸生而諸生之意未已監丞孫礿博士臧辛伯皆稱疾不入詔豫告一日十二月丁巳尚書省劄下令學官各安職守又劄臨安府今後兩學士人或因公事合行追會先當申國子監候報乃施行而太學之士復詣檢鼓院進狀庚申學官連銜再乞罷黜武又面見執政求去後六日乃有是命於是曽從龍以權禮部侍郎兼中書舍人暫兼國子監祭酒劉爚自浙西提刑召為國子司業王柟自吏部郎中兼右司郎官除將作監兼知臨安府丁卯凖與太府寺主簿金式兩易靖之與太社令陳貴誼兩易趙書復引疾求去章再上不許而礿出知漢陽軍辛伯添差通判鎮江府凡紛紛踰月乃定既而博士林瑑亦求去四年正月乙未除知興化軍二月丙子復有旨趙書兼詳定敕令官閠月甲申朔陳武兼祕書少監武聞二士被撻以足頓地曰辱我同舍又語人曰趙書可罪武諭乃劉左史之子宜有家法趙書既為諸生所攻眀年竟以事奉祠而去不復再入矣御史臺奏臣等近據武學生周源等狀訴柯子沖盧德宣為臨安府夏楚庭辱事本臺繼牒本府照會士人所陳事理逐一行遣無致具文引惹詞訴據本府申因鍾眀違法立約倚當張沂田産內得錢經營關節案內追到元經營人府學生梁子垕武學生柯子沖盧德宣等已據各人供招委有交涉本府照條定斷一時書判從輕闊略其推吏戴安禮等鹵莽不照體例分别致將柯子沖盧德宣與府學生梁子垕同行夏楚繼而本府舉覺係司理趙師夔對移錢塘縣丞戴安禮斷勒沈謙勘斷照得上件事趙師夔身為勘官自合分眀指定武學各有所屬今乃雷列具陳遂致一等遭辱有傷學校事體况士子所陳非係重囚司理院却用第一等枷戴一囚帽可見獄官縱吏違法故將士類凌蔑特將司理趙師夔罷黜人吏戴安禮沈謙決配施行伏候敕旨是日李元礪就擒元礪欲圖羅世傳而先為世傳所縛其徒就執者二十有八人於是江南湖南二帥司皆言十二月十一日大戰於秋平野當日已時生擒元礪而湖南又言本司不敢爭奪已解赴江西安撫司矣奏未至會鎮江都統制畢再遇朝歸以是月壬申內引朝論欲遣再遇討之未決眀年正月江西奏呈乃命王簡卿同許俊召募土人識認元礪正身訖照條盡法施行辛巳黎州青羌曵失索降努兒結以乾道九年之春盜邊淳熙十一年之秋歸漢十二年之春被縳努兒結之弟三開以十四年之秋復讐三開之弟失落盤以十五年之夏納欵努兒結之子曵失索以慶元元年之春再為報復之事至是冬納欵始終凡三十六年云是嵗賑諸州大水臨安紹興府嚴衢州大水賑之仍免其賦
