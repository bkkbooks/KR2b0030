body:
  text: 兩朝綱目備要卷十六寧宗嘉定十二年己邜春正月戊辰朔召董居誼自四川制置召赴行在奏事聶子述為四川制置使以新利州路安撫使除代董居誼也庚辰金人攻湫池堡守將石宣拒退之甲申攻白環堡守將董照拒退之戊子攻成州沔州都統張威自西和州退守仙人原辛邜焚成州庚寅破隨州棗陽軍又破信陽軍之二寨京西諸將引兵拒之辛邜逼西和州守臣趙彥呐設伏待之敵人殱而還攻安豐軍建康都統許俊遣將拒之癸巳金兵圍之攻河池守將張斌遁去癸巳攻光化軍破鄖山縣進逼均州甲午陷鳯州守臣雷雲棄城去金人屠其城乙未吳政戰死於黃牛堡金乘勝攻武休關二月癸卯破之興元都統李貴遁還利路提刑權興元府事趙希昔棄城去案本紀作趙希皆二月戊戍朔金兵破光山縣太白晝見壬寅圍棗陽軍京湖制置使趙方遣統制扈再興救之不能進而還戊申攻其城甲子始去丁未陷興元府己酉遣殿前司軍防捍江西凡八千人庚戍曾從龍兼江淮宣撫使除同知樞密院事任希夷簽書樞密院事辛亥金兵陷大安軍守臣李文子棄城去分略洋州守臣蔡晉卿遣兵拒之不克洋州陷丙辰金兵始去三月癸酉復入焚其城而去壬子董居誼遁自利州遁去石宣破金兵於大安軍沔州都統張威遣統制石宣邀擊金兵大破之金將巴圖魯安棄軍走為我師所獲敵聞之遂去丁巳我師攻唐鄧州京湖制置使趙方遣統制扈再興等引兵三萬餘人分三道出攻唐鄧州隨州忠義軍劉世興等引兵攻唐州三月乙亥鄂州都統劉世榮會兵攻唐州甲子罷董居誼召命以其遁去故也四月癸巳落職奪三官七月丙申復奪二官永州居住乙丑夏人來議夾攻利路安撫丁焴許之三月己巳鄭昭先知樞密院事曾從龍參知政事乙亥興元軍士權興等作亂犯巴州守臣秦季槱棄城去丁亥太白晝見權興等降甲午金兵退自旴眙退師閏三月己未竄雷雲以其棄鳯州也追三官送梅州安置辛酉贈吳政官旌其死節也贈右武大夫忠州刺史壬戍詔撫諭四川官軍忠義人癸亥興元軍士張福莫簡等作亂以紅巾為號是春金兵圍安豐軍及滁濠光州江淮制置使李珏命池州都統制武師道忠義軍都統制陳孝忠救之皆不能進金分兵略邉自光州趨黃州之麻城自濠州趨和州之玉磧案本紀作石磧自盱眙至滁州之全椒來安揚州之天長真州之六合淮南流民渡江避亂諸城皆閉敵逰騎數百至東采石楊林渡建康大震京東總管李全自楚州忠義總轄李先案李先當作季先自漣水軍各引兵來援敵乃解去全追擊敗之于曹家莊獲其貴將或以為金主子壻云夏四月庚午張福入利州四川制置使聶子述遁去總領財賦楊九鼎為所殺丁丑掠閬州丁亥掠果州癸巳曾從龍罷鄭昭先兼參知政事安丙為四川宣撫使五月乙未朔召聶子述赴行在張福迫遂寧府潼川路轉運判官權府事程遇孫棄城去己亥入之焚其城丁酉降德音降兩淮荆襄湖北利州路沿邉諸州雜犯罪囚釋流以下仍蠲今年租稅己亥太學生伏闕上書何處恬等論工部尚書胡矩欲和金人請誅之以謝天下戊午張福入普州守臣張已之棄城去六月戊辰屯於普州之石山癸亥詔舉文武才侍從兩省臺諫各舉文武可用之才二三人六月丙子太白晝見辛巳又見辛巳西川地震乙酉張福就擒先是五月甲寅四川宣撫司命沔州都統張威引兵捕張福庚午威引兵至茗山癸未福請降威執之以歸于宣撫司丁亥金人招諭李全等全不聼辛巳太白經天癸巳丁焴以書約夏夾攻秋七月丙申張福伏誅庚子張威生擒賊衆一千三百餘人誅之以莫簡自殺言于宣撫司紅巾賊悉平癸亥李全至齊州金知州王贇以城降八月戊辰復合利州東西為一路九月丙午罷江淮制置司置沿江淮東西制置司寶文閣待制李大東為沿江制置使淮南轉運判官趙善湘為主管淮西制置司公事淮東提刑賈涉為主管淮東制置司公事兼節制京東河北路軍馬十二月克復州縣壬申京東路帥司言克復京東河北二府九州四十縣乙亥築興元府城丁丑雅州蠻入盧山縣辛巳焚碉門寨邉丁大敗己卯議取洮州不克四川宣撫司遣兵取洮州詔諸將議出師招諭中原豪傑官民勸以歸附乙酉會金人攻鳯州之長橋丁亥宣撫司命罷洮州之師己丑京湖制置司出師遣統制扈再興等引兵六萬人分三道出境案本紀作二道庚寅賞茗山捕賊功嘉定十三年庚辰春正月我師攻鄧州唐州案是日為丁酉扈再興引兵攻鄧州鄂州都統許因攻唐州不克而還金追之遂冦樊城趙方督諸將拒之己亥雅州蠻復掠盧山縣遣兵討捕之至五月庚寅蠻乃降戊午夏國復以書來四川議夾攻三月辛邜雨土丁巳黎州土丁叛遣兵討捕之至七月丙辰四川宣撫司招降之夏四月庚申朔招諭豪傑淮東制置賈涉招諭山東兩河豪傑勸以來歸戊戌玉牒成史彌逺等上三祖下第七世宗藩慶系録皇帝玉牒刋正憲聖慈烈皇后聖德事迹光宗皇帝玉牒六月癸酉親試舉人賜禮部奏名進士劉渭以下四百七十有五人及第出身安丙為少保丙子加李全等官全為左武衛大將軍殺季先除果州團練使漣水軍忠義副都統命赴樞密院奏事未至殺之秋七月戊戌以守臣空名告付邉郡以京東河北諸州守臣空名告身付京東河北節制司以待豪傑之來歸者丙午任希夷兼參知政事癸亥皇太子薨諡曰景憲八月壬申安丙遺夏人書定議夾攻癸未宣撫司命利州統制王仕信引所部兵赴熙鞏州會夏人遂傳檄招諭陜西五路官吏軍民勸以歸附九月辛邜夏人引兵圍鞏且來趣師王仕信引兵發宕昌乙未四川宣撫司統制質俊李實引兵發下城戊戌四川宣撫司命諸將分道進兵沔州都統張威出天水利州副都統程信出長道興元副都統陳力案宋史作陳立出大散關興元統制田胃為宣撫司帳前都統出子午谷金州副都統陳昱出上津己亥張威下令所部諸將毋得擅進兵庚子質俊等克來逺鎮辛丑王仕信克鹽川鎮壬寅質俊自來逺鎮進攻定邉城金人來救俊等擊破之乙巳程信王仕信引兵與夏人會于鞏州城下丁巳攻城不克案本紀作丁未甲申復海州以將作監丞徐希稷知州事盱眙將石圭叛入漣水軍詔即以石圭為漣水軍忠義統轄九月甲午太白晝見庚戌金人掠皂郊堡我師失利沔州統制董照等與戰官軍大敗壬子我師攻鞏州秦州不克遂退師程信及夏人攻鞏州不能下信引兵趨秦州丙辰夏人自安逺寨退師十月丁巳朔程信邀夏人共攻秦州夏人不從信遂自伏羌城引軍還諸將皆罷兵冬十月戊寅誅王仕信程信以宣撫司之命斬仕信于西和州罷張威軍職宣撫司怒其不進兵故十一月甲午詔刋正皇帝日歷從紹熙五年後刋正以削韓托胄之矯誣也庚戍大風十二月戊午亦如之壬子臨安火十二月壬申石圭叛以漣水忠義統轄叛歸于塔坦癸未得寶璽鎮江副都統翟興宗案宋史作翟朝宗以皇帝恭膺天命之寶來獻嘉定十四年辛巳春正月丙戍朔雪釋杖以下囚乙未雷地震犒李全以全自山東還出緡錢六萬為犒賜費庚子立四川運米賞格二月戊辰金兵圍光州己巳克五關壬申治舟於團風弗克濟圍黃州分兵破諸縣攻漢陽軍自黃州分遣别將來丁丑李全棄泗州遁還甲申詔淮東京湖諸路應援淮西沿江制置司防守江面權殿前司職事馮榯將兵救蘄黃榯不果行三月丙戍朔我師再攻唐州鄂州副都統扈再興引兵攻唐州不克再興尋引所部移蘄州丁亥金人陷黃州淮西提刑知州事何大節棄城遁而死案宋元通鑑何大節誓以死守及城陷衆擁之登車自沉于江以死時議以大節等于棄城不加褒贈此直以棄城遁走之罪歸之似未的實庚寅李全自楚州引兵救淮西癸巳扈再興趨蘄州乙未詔荆湖制置司趣援蘄黃州庚寅長星見甲午太白晝見己亥金人陷蘄州知州事李誠之及其家人官屬皆死之癸丑金師退我師追而敗之扈再興邀擊敗之于天長鎮甲寅晦又敗之四月戊辰金渡淮而北李全遣兵擊敗之扈再興亦以捷聞夏四月乙邜復置諸王宫大小學教授乙丑命任子簾試於御史臺十五年二月庚子罷之五月甲申朔日有食之壬辰上孝宗寶訓史彌逺等上孝宗皇帝寶訓皇帝會要乙巳上慶元寬恤詔令詔頒之丙申西川地震六月甲寅朔沿江制置置副使於鄂州丙寅立貴和為皇子貴和即濟王也詔曰朕以眇躬嗣臨大統夙夜祇懼不敢荒寧荷天之休海內用乂而國嗣未建非所以嚴社稷奉宗廟朕深念焉皇姪福州觀察使貴和沂靖惠王之子猶朕之子也重厚英敏天稟夙成屬近且賢聞于中外蔽自朕志爰舉恩徽以昭立愛之義夫計安天下強本為先親親賢賢厥有古始非朕所得私也其立以為皇子改賜名竑是日以竑為寧武軍節度使進封祁國公丁邜以立皇子告于天地宗廟社稷丙子降京畿囚罪一等釋杖以下乙亥與莒補秉義郎即理宗皇帝也辛巳大風秋七月丁亥討論受寶禮京東河北節制司言蒙國大將獻本朝皇帝恭膺天命之寶詔禮官討論受寶禮儀以聞辛丑趙方為京湖制置大使賈涉為淮東制置使兼京東河北路節制使丁未修光宗寶訓八月癸丑趙方卒乙邜賜史彌逺家廟乙丑追封史浩為越王丙寅改諡忠定配享孝宗廟庭任希夷罷壬戌宣繒同知樞密院事甲子秉義郎與莒賜名為右監門衛大將軍賜名貴誠戊寅除果州團練使九月癸未立為沂靖惠王後明年五月己未遷邵州防禦使九月辛邜合祭天地于明堂赦天下冬十月癸丑復滄州京東河北節制司言收復詔以趙澤為河北東路鈐轄知州事甲寅復以齊州為濟南府兖州為襲慶府丙寅夏人復趣會兵以書來四川庚午雷十一月癸未詔左翼軍受泉州節制左翼軍元𨽻殿司故先是知泉州真德秀以劄子請于廟堂曰竊見左翼一軍屯駐泉南垂七十載官兵月糧衣賜大禮賞給及將校折酒等錢間遇出戍借請悉倚辦於本州招刺效用軍兵亦例從本州審驗若無一事不與州縣相關其實未嘗略有統攝故於軍政全不與聞兵籍之虛實舟楫之有無器械之利鈍教閲之勤惰升差之當否本州悉不之知夫以一軍數千人付之一統制官殿司既在行都本路帥司相去亦數百里軍政修廢無由考察故自十數年來為統制者得以肆意掊克斂怨行伍教閲盡廢紀律蕩然州郡雖知其詳然不敢問蓋緣彼此素無統攝平居無事未覩其害一旦有急如丁丑春尼院之災守臣親出救撲將士偃然不肯用命必邀重賞而後肯前今夏海寇陸梁本州措置收捕幸統戎得人軍律粗整且與州郡同心叶力故能俘獲羣醜向使如前任賀清臣之愚愎其取敗也久矣竊見比年以來海盜不時出沒米商舶賈間遭劫掠今夏一警尤為猖獗憑藉朝廷威德幸遂肅清近淮帥憲司牒明台海界復有強冦正是整飭軍政之時某見具措置事宜申取朝廷指揮若本州與左翼軍不相統攝終恐别生矛盾無由集事伏望鈞慈俯賜詳酌照殿步司出戍淮上體例令左翼軍聼本州守臣節制庶幾彼此一家平日有所施行可相評議緩急或有調發不至乖違實悠久之計尋降指揮如遇海道盜賊竊發許從本州調遣追捕續又申樞密院云昨嘗具申乞降指揮令左翼軍聼本州節制尋準省劄如遇海道盜賊竊發許本州守臣調遣收捕某敬已遵稟但有更合申明事節本軍兼控水陸若海道有警方許調遣萬一陸道或有緩急本州既難坐視若欲調兵追捕又恐本軍以所降指揮止及海道為詞其合申明一也又軍政修飭全在乎今若遇警急始許調發而平居不考察有所未便某前所申利害竊已詳盡國家施行若使軍無掊克朘削之害雖不俟州郡節制固無不可其如亷介公勤之將未易多得殿司邈在行都帥憲亦相去數百里近而可以考察者莫如州郡又以元無統屬不敢過而問焉則軍政之廢壞將有不可勝言者是以數十年來士卒不復如向時之精鋭舟船器械不復如向時之整備正以主將多非其人而又無從旁督察之者遂得以肆其貪叨掊克之私士卒平時未嘗有一日溫飽之適怨氣滿腹無所告訴設有緩急欲其捐軀效命難矣故為一戍將之私計則以受節制於本州為非便為一軍數千人之公計則以聼節制於本州為至便朝廷之上將為一戍將之私計乎為一軍數千人之公計乎况戍將之公亷無私者亦自以本州節制為便如今統制楊武翼俊是也某昨申請之時俊嘗與聞頗以為喜蓋其置軍于此事力寡弱凡百非州郡之扶助有所不可若或受本州之節制則用度之窘缺可以借兌出師之糧餉教閲之犒賞可以仰給其有勞效可藉本州之保明其有利病可望本州之申述蓋州郡與本軍合為一體凡事相為援助則在本軍為力也易州郡本軍各為一家凡事不相左右則在本軍為力也難且如去嵗海冦之警用力追捕雖將士之力然非本州一一應副則本軍雖欲進前討捕有不可得方其出軍之時本州給以糧餉犒以酒肉日接于道而又合民船以助其勢雇水手以助其用調度百出郡之老吏竊遂私議以為捕冦之事本州從來只是移文督責何須枉費官錢蓋其習熟見聞如此今若仍前不相繫屬自今或有緩急彼雖聼州郡調遣然初無節制之柄必不督之向前州郡既無節制亦必具文行移必不肯資以費用借使統戎得人猶恐未能獨辦其事况一有庸謬之人濫居其選既無州郡督責又無州郡應副豈復肯盡心竭力以收捕盜賊為已責乎其合申明二也聞昨來議者以殿司大軍不應聼外郡節制是致朝廷未蒙聼許竊照殿司官兵之戍淮上者雖小小軍壘皆許節制借曰淮上係是邉面捍禦北敵不得不然本軍控扼海道捍禦海冦亦非間慢去處又許浦係御前水軍置副都統制近因浙西提刑申請尚許提刑司節制况左翼止差統制官其海道利害又與浙西無異某自準回降即欲再陳慮涉招權之嫌是以不敢今受代在數日間竊念朝廷置此一軍關係甚重若欲軍政常常修舉非付州郡以節制之權終有所不可且將去而言尤無所嫌用敢再申前請伏望朝廷檢照某去年八月內劄子所申事理早賜施行實悠久之利伏候指揮小貼云某今來所請係欲扶助軍政非欲侵撓事權如蒙朝廷以為可行即乞明降約束不許干預軍中錢物差借人兵及率意擅自升差將佐其統制官與州郡往來素用賔主之禮亦合並仍其舊不得輒有改更庶幾彼此相安可以協濟國事併候指揮公既離任乃得旨左翼軍聼泉州守臣節制己亥安丙薨己酉詔以來年元日受寶詔曰朕以付託之重顧瞻中土怛然于懷惟知修德勝威夙夜黽勉乃者山東河北連城慕義殊方效順肅奉玉寶來獻于京質理溫純篆刻精古文曰皇帝恭膺天命之寶稽之圖册登載燦然實惟我祖宗之舊繼獲玉檢其文亦同今殘敵浸微羣心丕應先朝之寶復還非皇穹之眷方隆列聖之靈有屬豈伊涼德乃克臻此書不云乎以昭受上帝天其申命用休朕曷敢不承其以來年元日受寶于大慶殿閏月丙午奉安寶璽于天章閣命近臣告于天地宗廟社稷是月京東安撫張林叛以京東諸郡降于塔坦塔坦使來遣格根齊遜等來計事十二月庚申鄭昭先罷閏十二月辛巳朔宣繒兼參知政事俞應符兼權參知政事戊申殺華嶽嶽為殿前司同正將以謀為變殺之是嵗賑諸州水旱浙東江西福建諸州旱沔成階利水詔賑之嘉定十五年壬午春正月庚戍朔御大慶殿受寶十月命有司裒集受寶本末為書藏于祕閣癸丑立李誠之廟於蘄州旌死節也甲寅褒贈蘄州死事官吏官其子孫有差四月丙午詔蘄州毋納今年租賦丁巳詔撫諭山東河北軍民將帥官吏赦天下以受寶故也監司郡守上表稱賀文武官各進秩一等大犒諸軍甲戌升鄂州武昌縣為軍名夀昌軍三月丁巳賑江西旱傷詔本路提舉司賑恤旱傷州縣夏五月庚戌太白晝見甲寅禁州縣匿囚先是監司至所部慮囚州縣多以罪囚移徙他所至是有詔令劾之丁巳加封皇子祁國公竑進封濟國公己未皇姪貴誠遷邵州防禦使壬戍叛將張林遁知濟南府种贇等攻林於青州林遁去己巳修孝宗經武要略六月辛卯俞應符薨秋七月甲子詔條畫營田江淮荆襄四川制置監司條畫來上八月己卯議義役命户部詳議辛卯詔文武官毋得歸宗著為令甲午彗出氐九月辛亥宣繒參知政事程卓同知樞密院事薛極賜出身簽書樞密院事癸丑雷大雨雹壬戍彗見辛未太白晝見冬十月丙子犒忠義人以收復京東州軍犒賞有差十一月戊午降德音于京東河北路罪無輕重皆除之十二月乙亥朔賑臨安民出米五萬石賑濟臨安府貧民丙子以雪寒釋京畿及兩浙諸州杖以下囚丁亥李全建節為京東鎮撫副使除保寧軍節度使右金吾衛上將軍是嵗諸路户一千二百六十六萬九千三百一十口二千八百三十二萬五千七十嘉定十六年癸未春正月戊申嚴贓吏法詔命官犯贓毋免約法己酉皇子坻生二月戊戍薨追封邳王諡曰沖美丁巳雷辛酉賑山東流民命淮東制置司賑濟二月戊子雨土三月戊申張林所部邢德來歸京東河北路鎮撫節制大使司以為言詔邢德進二官復以為京東東路副總管丁卯賑道州飢詔以五萬二千五百石賑之夏五月戊申親試舉人賜禮部奏名進士蔣重珍等五百四十有九人及第出身有差六月壬午賈涉卒丁酉程卓薨秋八月辛巳詔州縣經界毋增紹興稅額癸未申嚴舶船銅錢禁九月庚子朔日有食之乙巳賑江淮水災詔江淮諸司賑恤被水貧民乙卯雷冬十一月辛亥賑太平州水災州言大水詔賑恤之十二月辛巳募民入米補官命淮東西總領及沼江被水州募江西湖南民入米補官壬辰雷嘉定十七年甲申春正月戊戌朔録程頥後癸亥命提督營屯田命淮東西湖北路轉運司提督二月癸巳蠲台州逋賦十萬緡有竒甲午賑貧民命臨安府賑糶三月癸丑雪是月金來侵迫西和州尋引兵還夏四月辛卯賑廬州飢詔本州賑糶乙未犒李全等軍賜李全彭義斌錢三十萬緡為犒賞戰士費五月戊戌核兵籍詔核實兩淮京湖四川江上諸軍之數六月丁卯朔太白晝見經天辛未皇孫銓生八月癸未為左千牛衛大將軍尋薨癸酉貶尚震午震午知西和州坐冦至謀遁奪三官送嶽州居住案宋史五行志是年四月丁卯西和州火焚軍壘及民居二千餘家守臣尚震午誤以為金人至而遁則前所謂金人迫西和州者蓋即震午掩飾之詞史官承而書之未經刋削耳壬辰蘇椿等來歸京東河北鎮撫節制大使司言大名府蘇椿等舉城來歸詔悉補官即以其州授之丁酉賑福建水災案丁酉為七月朔命本路監司賑恤被水貧民八月乙亥罷通州天賜鹽場丙戍上不豫閏八月乙未朔嚴輸苗過取禁申嚴兩浙諸州丙申詔立皇姪貴誠為皇子更今名濟國公竑立為皇子既四年儲位尚虛皇姪邵州防禦使貴誠德譽日聞上屬意久之壬辰召宰執入禁中趣定大議至是降詔曰朕以涼菲獲承休緒念國嗣之未建嘗以皇弟沂靖惠王之子為子矣審觀熟慮猶以本支未強為憂皇姪邵州防禦使貴誠亦沂靖惠王之子亦朕之猶子也聰明天賦學問日新既親且賢朕意所屬俾併立焉深長之思蓋欲為異日無窮之計也其以貴誠改賜名昀又詔皇子檢校少保武寧軍節度使濟國公竑開府儀同三司判寧國府進封濟陽郡王皇子邵州防禦使昀為武泰軍節度使封成國公赦天下以帝服藥故丁酉帝崩于福寧殿年五十七明年改元寶慶正月己丑諡曰仁文哲武恭孝皇帝廟號寧宗三月癸酉權攢于會稽之永茂陵三年九月加今諡按宋史寶慶二年追上寧宗徽號曰法天備道純德茂功仁文哲武聖睿恭孝皇帝此作三年誤又此書卷首疑本冠以全諡故此文略而不書今本無之已為後人剛節耳帝慈仁恭儉出於自然蚤親師儒留意問學黃裳在王府五年輔導尤為有力自天文地理人事之紀以及三代漢唐治亂得失之數本朝制度典章人才議論之要莫不為帝言隨事獻規率多補益帝嘗曰黃翊善之言亦難堪惟我則能受之彭龜年性鯁直有聞必告帝亦未嘗不從也即位之日首召朱熹于長沙以備勸講因議置講讀官十員各専一書不以雙隻日必二講又復坐講之制皆前所未有也趙汝愚當國方欲引裳共政未兩月而裳卒帝始無所親倚韓托胄以導逹中外之言浸用事熹龜年既以論托胄而退貴戚吳琚謂人曰上初無堅留托胄之意有一人繼言之去之易爾而一時臺諫皆其支黨執政大臣又有與之表裏者卒稔其惡以底大僇開禧用兵帝心弗善也托胄死諭大臣曰恢復豈非美事但不量力聖意可知矣在位三十年池臺苑囿無所增置府庫之財未嘗妄費袴屣雖弊或加補濯愛民之心始終弗替一遇水旱憂見顔色御衆臨下率從寬簡故吳曦以世將據蜀不勞斧鉞而授首江淮湖嶺之區冦盜或作旋即底定皆履信思順之所致也升遐之日逺邇哀慕昔先民邵雍言本朝之盛前代不及者有五而百年四葉居其一焉中興四葉享國九十有八年上視先朝同一軌轍深仁厚澤浹于海隅垂裕後昆有衍無極嗚呼美矣皇子成國公昀以遺詔即皇帝位尊皇后為皇太后垂簾聼政
