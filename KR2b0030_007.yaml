body:
  text: 兩朝綱目備要卷七寧宗嘉泰元年辛酉春正月戊午申嚴福建科鹽之禁壬戍謝深甫等薦士三十有五人詔籍記中書以待選擇丁卯禁路鈐按閲受餽及擅招軍違者置諸法戊辰雪乙亥又雪按乙亥在庚午後此文因戊辰雪而附書故在前庚午以葛邲配饗光宗廟廷賜諡文定光宗既祔廟當議配饗而一朝三相中周必大留正在其時皆嘗以學黨得罪故論者欲用葛邲及黨禁解嘉定元年五月必大之子新知筠州論案必大子名綸作論誤乞以其父配享廟庭詔兩制禮官詳議明年正之孫祕閣校理元剛復言其祖首侍崇陵講讀後在相位始終六年而必大之相才三閲月葛邲之相亦不踰年當以其祖配時章頴權禮部尚書乃乞並用二公配饗後亦不果行焉蓋必大雖賢相而被罪於授受之初正雖舊臣而去國於阽危之際是以論者有所不叶也然前朝如富公司馬公皆嘗被罪於熙寧紹聖之間而不害其配饗則亦未可以此而致疑云二月壬辰開資善堂癸巳周必大降官制少傅觀文殿大學士致仕益國公周必大降充少保依舊職致仕先是進士呂祖泰以上書得罪至是監察御史林采言僞習之成造端自必大宜加黜削施康年亦言必大首倡僞徒私植黨與又言僞學之徒餘孽未能盡革願於聼言用人之際防微杜漸故有是命自朱熹獲罪黨禁益譁稍稱善類斥逐無遺至薦舉考校皆為厲禁姦貪狼籍暴慢恣肆之徒紛紜並起填塞要塗士知務修飭守廉隅者例取姍侮或及於禍一時從逰特立不顧者屏伏邱壑依阿選懦者更名他師過門不入甚至變易衣冠狎逰市肆以自别其非黨熹講道於竹林精舍不為輟時多勸熹以謝絶生徒儉德避難者熹笑而不答與學者黃幹書曰前此常患來學之徒真僞難辨今却得朝廷如此大開爐鞴煆煉一畨一等渾淆夾雜之流不須大假比磨勘辨而自無所遁其情矣先是有新某州教授余嘉者案慶元黨禁作新州教授余嚞朱子傳作余嘉上書政府乞斬熹右丞相謝深甫語人曰彼何罪暨熹既殁言者猶不能已蓋托胄用事以來一等小人知素不齒於名教懼一旦善類復用而已斥於是橫身以任其責京鏜何淡劉德秀胡紘四人實専主僞學之禁為韓托胄斥逐異已者羣小附之牢不可破天下目此四人為魁憸云周必大與楊萬里居同州二人論不合必大得政萬里獨不得登從班慶元間諸公皆竄斥余端禮與萬里善京鏜又敬之欲援以升萬里力辭乃下詔以萬里嘗為上皇宫僚未經擢用特除煥章閣待制宫祠如故未幾萬里力祈引年遂以寶文閣待制致仕士大夫益髙之誠齊致仕不得其年月姑附於此詔修光宗實録二年十一月乙卯詔再修日歷乙未續修吏部七司法二年十一月乙巳詔重修己亥四川初試教官試教官者自熙豐間始程伊川嘗非之今不廢其法凡有出身人願試者先具所業經義三道詩賦各三首赴禮部陳乞若文理堪試則送試院不限人數取文理優長之人為合格初任除諸州教官自是為兩學之選及是言者請四川制置司遇類省試年分倣禮部附試學官許有出身人具所業赴制置司陳乞委有出身通判或教授看詳是嵗就試者四人而取二人蜀人試教官自此始辛丑雨土三月丙寅雨雹戊辰又雨戊寅臨安大火是夜臨安府寶蓮山下御史臺吏楊浩家火延燒御史臺司農寺將作軍器監進奏文思御輦院太史局軍頭皇城司諸物庫四月庚辰朔詔被火之家願於貢院及寺觀寓止者聽之辛巳火乃滅詔兩浙轉運司臨安府上所焚民居之數于朝厚加賑恤死者給錢瘞之有司奏延燒軍民五萬二千四百二十九家凡十八萬六千八百三十一口死而可知者五十有九人詔出內府錢十六萬三千五百七十一緡米六萬五千一百九十二斛四斗付浙漕司臨安府分賜被火之民人錢一千米四斗小兒半之死者人豫十千而軍士各家錢二千米一斛浩坐降二官吉陽軍編管言者以為罰不當罪遂除名黥𨽻萬安軍而其子從政郎御史臺引贊官椿諫院守當官樞皆杖脊刺面配千里外火之始作也祕書郎葉挺之外親有據屋縱火者挺亦坐免壬午詔臨安府內外不被火之家有遷徙之勞並放僦錢五日時朝士皆借官船以居其屬太府寺丞黃何艤舟翔鸞寺前是夜賊登舟執何掠其金帛婦女而去何訴於朝事下大理火之未滅也工部令史薛基家婢邱安喜者持炬燔其主之屋知臨安府趙善堅執之梟其首以令且待罪詔釋之善堅尋罷去其冬十一月都城又火明年七月故將張忠烈家又火所燔凡數千家焉蓋自渡江以來都城火災未有及辛酉嵗者謝深甫等以輔政無狀致天譴請罪不許甲申命臨安府察姦民縱火者以軍法治之是春姜特立建節以和州防禦使為寧逺軍節度使夏四月辛巳下詔自責案本紀及宋元通鑑下詔在壬午詔曰朕以眇躬獲奉宗廟不明不敏無以上承天心下育萬姓乃者釁咎之延閔凶洊集嬛嬛在疚夙夜震皇今者謫見天地京城大火百萬生聚顛踣號呼無所歸命夫天生蒸民付于司牧顧朕德薄言動差失刑政繆盩赫然威怒宜譴朕躬元元何辜害至此極朕方戰栗齊精哀籲于上帝二三大臣視吾百姓艱厄有可以全活之者公上之須廪庾之積捐以與民一無所愛庶幾安集慰朕􅉃怛之意癸巳避殿減膳案本紀避殿在癸未此云癸巳誤辛卯龍州蕃部冦邊遣官軍討之先是龍州蕃人常至濁水寨互市寨有土豪受而儲之及蘇肅之知龍州以土豪擅利乃罪而移之自是戎人鹽糧米茶之屬皆不可得有李蒙大者本漢人以作過竄入龍州蕃部結誘蕃人至是冦邊四川制置司以聞嘉泰三年十月李蒙大納欵四年正月得㫖許之自是蕃部稍息詔戒風俗詔曰風俗侈靡日甚一日服食器用無復差等今被焚之餘其令官民營造室屋一遵制度務從簡朴銷金鋪翠無得服用今以宫中所有焚之通衢中外士庶令有司嚴立禁防貴近之家尤當遵奉茍違斯令必罰無赦丁酉御殿復膳戊戌以潜邸為開元宫五月旱戊辰禱於天地宗廟社稷案本紀作戊午詔大理三衙臨安府兩浙州縣决繫囚釋諸路杖以下囚除茶鹽賞錢命有司舉行寬恤之政十有六條韓托胄請致仕不許時有監太平惠民局夏允中者嘗建言當令托胄平章軍國重事如文彥博案宋史托胄傳允中上書在三年拜太師後而此載托胄之為太師則又在二年之冬托胄聞之上疏曰臣家本業儒遭逢聖世繇臣曽祖先臣琦伯祖先臣忠彥踵登科第接武丞輔暨于臣先大父先臣嘉彥蒙神宗皇帝録先世舊勳俾之尚主自兹派流右列逮至臣不能自奮濫叨世賞雖無足以踰人每念效忠之義不敢遺墜誤蒙孝宗皇帝特逹之知擢置賔閣光宗皇帝嗣登大寶亦蒙眷遇每獲欽奉清閒之燕甲寅之秋國家多故臣屬在肺腑往來兩宫預聞內禪陛下龍飛之日面奉憲聖慈烈皇后聖㫖俾臣朝夕仰禆初政臣深惟綿薄不足以副使令是嵗之冬即求間退得請奉祠相繼乞骸之章亦已屢上俞音既祕黽勉至今正以聖恩深厚訓㫖再三臣未敢復申前請五月二十六日臣因見宰執忽聞局務官有劄子納廟堂及臺諫乃引文彥博故事肆為狂妄之說臣聞之駭汗如雨臣之本心天實臨之陛下實知之豈謂百執事間猶有不諒臣之丹曲妄有擬議斯人固不足責而臣之出處豈容不明不惟自速顛隮竊恐上玷先訓况臣近於霅川營一小室今將二歲猶未就緒非臣親往終不能辦於是昧死陳請伏望聖慈特降睿㫖許臣守本官致仕以遂其私以全愚分疏入上批其奏曰卿輔翊初政纍歲于兹忠誠備殫勳績益茂朕方得所倚賴豈容逺嫌力求休佚其體至懷勿復固請於是允中遂坐免令臨安府押出國門而李孝友孝純皆奪節丙子雨丁丑雨雹七月癸亥又雨六月丙午太白經天秋七月乙卯何淡罷先是淡以弟滌市私鹽殺傷邏卒事所纍至是丐免罷為資政殿學士知太平州翊日改大學士淡再為中執法以至罷政前後踰六年専主僞學之禁云淡始以留正薦自權兵部侍郎除右諫議大夫首擊周必大罷之未幾遷中執法一時名士排擊殆盡大為清議所薄㑹有本生繼母之喪徘徊不肯去太學生喬嚞等移書切責之語在紹熙二年淡乃去位四年免喪時趙汝愚已執政止除煥章閣學士知明州淡愈怨恨祈哀韓托胄慶元初遂除御史中丞自是力主僞學之禁以至執政甲子陳自強參知政事兼同知樞密院事張釜簽書樞密院事乙丑賜龔頥正出身頥正和州歷陽人本名敦頥少舉進士不第用洪丞相門客恩為不理選限登仕郎嘗著符祐本末三十卷又撰元祐黨籍三百九人列傳所佚者六人而已洪內翰領史院薦于朝初授下州文學旋補迪功郎潭州南嶽廟光宗受禪改今名用薦者主管吏部架閣文字遷太社令宗正寺主簿頥正著續稽古録盛言韓托胄定策之勳由是擢兼資善堂小學教授遷樞密院編修官至是詔以頥正學問該博賜進士出身兼實録院檢討官付以三朝史事是冬遷祕書丞未踰月卒及托胄死有詔毁其續稽古録云己巳吳曦入蜀為興州都統制兼知興州此開邊之始也吳氏世職西陲威行四蜀列聖皆留其子孫於中朝所以為慮者甚逺紹熙五年夏吳挺死邱崈楊輔在蜀不欲吳氏世襲議以張詔代之趙汝愚在樞管從其議人服其逺識曦久蓄歸蜀之志朝廷不許韓托胄欲握兵權遂遣曦入蜀吳曦自殿巖出帥武興其身由襄漢之軍中而輜重泝嘉陵而上大舟十七艘多珍異之物所至人爭觀之護舟小校每得金乃許入季原缺在益昌與諸幕客就觀其物見孔雀四華亭鶴數十魚十許甕內有比目魚五色魚者二魚相依而行以杖分之立死合之悠洋如故云又有二崑崙藏之艎中不可得見蓋崑崙見大江則投身而逸是以閟之郭杲在武興多刻剝軍士時王寧方行核實之令士滋不堪黑谷戍卒二十有七人由是去為盜有張威者亦在其數杲死王大節攝帥事語諸將曰是迫於寒餓非有他揭榜招還之斬為首者以令流配其餘而已威配隆慶府後軍時號張紅眼者是也自杲死吳曦除西帥三軍之士望之如慈父母焉曦至軍首為璘建廟大殿費十萬緡他不計也又命士卒負土築江濵地際山為園廣袤數里日役數千人士始失望八月己卯减奏薦恩言者以官冗恩濫請因娶宗女授官者仍舊法終身止任一子兩府使相不得以郊恩奏門客文學歸正官不許添差極邊初官不許求辟大使臣丁憂解官遇覃恩不得遷秩著為令從之甲申張釡罷陳自強兼知樞密院事張巖參知政事程松同知樞密院事政和初林攄自翰苑擢為執政其父邵以寶文閣待制遷直學士蓋異數也近歲松為諫長其父九萬以子在臺省日久自直敷文閣除祕閣修撰至是松執政再除華文閣待制提舉醴泉觀奉朝請視政和恩數為優云松知錢塘縣韓托胄有愛姬小故而出松聞之亟召女儈以八百千市之既至則盛供張舍之中堂夫婦上食事之甚謹姬皇恐莫知所為居數日托胄意稍解召之則知為所取矣托胄大怒松聞之亟上謁曰頃聞有郡守赴闕者欲得斯人懼逺方小吏不識事體他日有誤鈞顔某忝為赤縣職所當知故為王取之耳托胄意稍解姬既再入托胄尚未平姬具言松所以謹待之禮托胄大喜即日躐除太府寺丞後兩旬遷監察御史踰年擢右正言數月遷右諫議大夫既而滿歲未遷殊怏怏乃市一妾獻之名松夀托胄遣問之曰奈何與大諫同名答曰欲使疵賤姓名常逹鈞聽耳托胄憐之遂除同知樞密院事距留妾恰三年其後帥蜀貶官責詞有處汙穢而不羞莫汝為甚之句蓋謂是也丙戌復議鐵錢利害詔侍從兩省臺諫集議九月辛亥决浙西圍田遣朝臣二人往己卯雨土十二月辛丑亦如之甲戌纂集孝宗朝典禮以命禮官冬十月甲申詔免瑞慶節入貢以光宗憂故丙戌以韓托胄定䇿事迹付史館從起居郎王容之請也托胄敗乃削之丙寅太白晝見後月己卯太白經天十一月始命刑部得薦舉外任人禮部國子監長二得舉諸州教授改京官舊制也至是言者以為大理評事止用舉主三員又評事中亦有已改官者舉削常是有餘乞倣此例令刑部長二大理卿少得通舉諸路提刑司檢法官從之十二月庚寅復免臨安府身丁錢三年是歲諸路旱賑之浙西江東兩淮利州路仍蠲其賦真里賦國入貢獻馴象二嘉泰二年壬戍春正月癸亥蘇師旦兼樞密院都承㫖師旦本平江府書佐韓托胄頃為本府兵馬鈐轄從府假筆吏吏以其冷局俾師旦行韓滿歸蘇復還府下邱崈為守嘗以事怒師旦編管秀州久之韓知閣門事師旦困甚往依之韓憐而置之門下未久上登極韓以師旦竄名藩邸吏士內遂用隨龍恩得官韓以其辨慧愛之每朝廷有議論或使之傳言于大臣大臣亦與之立語而已當時侍從官則或與之接坐矣陳自強在禁林事師旦尤甚有愛妾曰蠟梅以秀慧聞于東南師旦至其家則三人參坐縱飲未幾師旦除帶御器械遷知閣門事樞密院都承㫖幹辦皇城司師旦權日盛乃自名蘇氏之出子陳曄總蜀計案慶元黨禁作陳韡紹熙初修蜀鹽法條下與此同為建景蘇樓于眉州市以悅之嘉泰三年陳自強正揆席首除師旦定江軍節度使師旦用事時近臣皆因之以進鄧友龍為給事中差與抗禮餘人至僕𨽻事之師旦每㑹其召從官不復折簡苐遣人傳諭或值宴集賔客滿坐聞命即委之而去始師旦為小吏邱崈屢笞之洎帥江東過辭師旦自朝至日中􅉴不得見翊日再來逮暮始能一面雖忿不敢校也內翰左史傅伯夀尤與之親厚伯夀老病不能拜尚除執政請外除集英殿修撰知䕫州及死又除寶謨閣待制盡得從官恩數云趙大全為學官一日得堂帖除樞密院編修官大全即稱疾杜門不拜時蘇師旦為都承㫖故也後數日師旦建節罷去李壁權副都承㫖大全乃受命由此不容遂請知眉州以出未上托胄死詔召還大全貧不能出有㫖潼川具舟津遣乃克行既至除太常丞未幾㑹其從者乘舟與參政婁機家人遇於閘中爭道機不樂遂為言者所論以為大禮樂章承用舊本復得眉州而去未行卒于北關外人皆憐之大全潼川人淳熙十三年舉進士為四川類省試第一自簡州學官召察遂官行都其卒蓋嘉定二年十月癸亥云丁卯髙宗實録成陳自強等上時史館無專官未知果誰筆也二月丁卯詔修正史寶訓案本紀及通鑑修寶訓在丁亥己巳雷二月弛學禁初學禁之行也京鏜何淡劉德秀胡紘四人者實橫身以任其責為韓托胄斥逐異已者羣小附之牢不可破慶元五年二月紘罷吏部侍郎七月德秀自吏部尚書出知婺州六年八月鏜以左相死于位去年七月淡罷知樞密院事魁憸盡去托胄亦厭前事欲稍示更改以消中外意時亦有勸其開黨禁以杜他日報復之禍者托胄以為然案宋史托胄傳係張孝伯正月癸亥言者論近嵗習僞之徒唱為攻僞之說今隂陽已分真僞已别人之趨向已定望播告中外專事忠恪奏可案宋元通鑑係施康年是春趙汝愚追復資政於是黨人之見在者徐誼劉光祖陳傅良章穎薛叔似葉適曽三聘項安世范仲黼黃灝詹體仁遊仲鴻諸人咸先後復官自便或典州宫觀又削薦牘中不係僞學一節俾勿復有言時朱熹殁已踰年而周必大留正各已貶秩還政十月詔朱熹以待制致仕閏月制復周必大少傅留正少保嗣後僞禁稍弛然宗師既亡義禮日喪風俗自是大壞托胄以專擅為當然而恣其所為小人以無耻為常事而恬不之愧舉朝之臣知有托胄而不復知有人主雖往時坐黨被斥之人亦有趦趄於托胄之門者矣其禍極於開邊而後已侯貫卿曰嗚呼慶元黨禍小人之罪不容於誅矣而善類出處有可得而言乎學禁之弛嘉泰之初元也何淡罷兩府而魁憸盡托胄圖恢復而意向移學禁自是懈矣然學禁雖衰權焰方熾君子之脉既削小人之勢遂成不極於曦叛托誅不止于時為君子謀守儉德之初心安固窮之晚節聽小人之自為闔闢吾惟益堅其理義之壁以待他日之復可也其或憤於久鬱樂於乍伸輒動其彈冠經世之念則其思猶未熟也復讎天下之大義也張忠獻抵死切齒而不得伸阜陵二十八年長太息而不得遂者一旦舉而行之誰曰不可抑開禧之事開邊也非復讎也圖不軌也非為社稷也而羽之而翼之可不可也文公夢奠語蔡沈曰道理只是恁地但須做些堅苦工夫夫能甘其苦於禁盛行之日而不少堅忍於禁已懈之日豈不甚可惜也嘗謂慶元黨禍不幸如大愚西山身死于謪雖曰天不憗遺然全其節以立千萬世守道者之標凖未為無所賴也文公卒於慶元之庚申學禁弛於嘉泰之辛酉天也文公在天下出處惟公是視而士節益光明矣西山臨終别文公書有曰天下不患無人材但師道不立為可憂噫師道之立非必人人扶植之也大堤屹然衆流歸順無復東奔西决之憂善人之多良以此也至此益信善類真足為天下福師道真足為善類主而慶元之學禁為人心禍真酷且深也甲申趙汝愚復職詔責授寧逺軍節度副使永州安置趙汝愚曩因衆論嘗掛深文朕以其屬籍之聨纍經赦宥可復資政殿學士戊子頒治縣十二事以風厲縣令癸巳禁行私史初秦檜既成和議始有私史之禁時李光嘗以此重得罪檜死遂弛語言律近嵗私史益多郡國皆鋟本人競傳之至是言者因奏禁私史且請取李燾續通鑑長編王稱東都事略熊克九朝通略李丙丁未録及語録家傳等書下史官考訂或有禆於公議即乞存留不許刋行自餘悉皆禁絶違者坐之燾所著長編凡九千餘卷案李燾傳長編凡九百七十八卷總目五卷九千字誤孝宗甚重之稱與克皆嘗上其書除職遷官仍付史館丙以父任監行在都鹽倉乾道八年夏上其所編丁未録二百卷自治平四年至靖康元年詔特改京官付國史院然紀載無法學者弗稱焉其秋商人戴十六者私持克所著中興小歷及通略事略等欲渡淮盱眙軍以聞遂命諸道帥憲司察郡邑書坊所鬻書凡事干國體者悉令毁棄中興小歷者自建炎初元至紹興之季年雖已成未嘗進御其書多避就之辭不為精博非長編比也三月辛亥詔舉邊郡守宰執各舉可守邊郡者二三人尋又詔諸路帥臣總領監司舉可為將帥者與本軍主帥列上之己未初命提刑以五月按部理囚命諸路舉行如四川二廣之制罷泛舉是月詔薦舉除升改自代十科外悉罷自今如特㫖令內外薦舉者並具實迹以聞夏四月庚寅雨雹六月庚子又雨辛卯禁經營留闕者渡江以來員多闕少中外久患之紹興末寺監丞簿學官大理司直樞密院編修官始皆有待次者乾道五年秋孝宗遂命皆與添差一次自今須見闕乃得除然近嵗東南郡守率待闕五六年蜀中亦三四年由是朝士罕肯丐外而勢要之人多攘闕者淳熙十三年詔自今存留州郡十五闕止差一政令中書籍記以待職事官外補慶元元年又增為三十闕非職事官補外毋得陳乞然廟堂牽於丐請率多借用嘉泰二年夏言者請以嘉興府處台衢嚴信池袁撫江潮漳泰溫徽州十五闕令中書再行注籍專待職事官請外如有經營留闕之人令給舍繳駁臺諫論奏從之今監司帥臣亦有待闕者而侍左選人用六年闕侍右小使臣用五年半闕云是月復太學混補試太學補弟子員故例每三嵗科舉後朝廷差官鎖院凡四方舉人皆得就試取合格者補入之謂之混補淳熙後朝議以就試者多欲為之限制乃立待補之法諸路漕司及州軍皆以解試終場人數為凖每百人取六人許赴補試率以開院後十日揭榜然逺方士人多不就試則為他人取其公據代之冒濫滋甚慶元中遂罷之嘉泰二年復行混補就試者至三萬七千餘人分六場十八日引試云五月甲辰朔日有食之已已賜舉人第禮部奏名進士傅行簡等四百九十有七人及第出身有差六月己卯臨安府火辛卯禁都民以火訛相驚者壬午淡浙西運河己亥禁冒姓充軍舊者悉令諸州改正秋七月不雨癸亥釋諸路杖以下囚己未命有司舉行寬恤之政七條禱於天地宗廟社稷復行寬恤四事八月丙子袁說友同知樞密院事癸未建寶謨閣奉藏光宗御集己丑詔作夀慈宫請太皇太后還內初夀皇升遐憲聖夀成二太后當還內而夀康宫已在南內矣乃改重華宫為慈福宫以舊慈福宫為重夀殿二太后皆徙居此憲聖終喪又改慈福宫為夀慈以奉太母是嵗九月光宗撤几筵上復請太母還內而太母以為久居此宫凡百安便况以年髙不欲遷移上乃以慈訓諭中外百官宜敬悉焉十月上尊號曰夀成惠聖慈祐太皇太后以十二月甲戌奉上冊寶甲午慶元條法事類成謝深甫等上之明年七月詔頒于天下九月乙酉上朝夀慈宫甲寅修皇帝會要明年八月書成陳自強等上進丙寅嗣秀王伯圭薨本末具紹熙三年尋追封崇王諡曰憲靖故事同姓秉旄者非親弟愛子無得兼兩鎮熙寧初惟相孝定王允弼定榮易王允良以屬近行尊乃得之慶元初伯圭既辭中書令詔有司别議優崇之禮始命兼兩鎮焉國朝二百五十年宗室秉雙旄者僅二人爾庚午野蠶成繭臨安府奏聞是秋詔監司帥臣就送還人之官蓋以省將迎之費也時黃人傑自隆守除䕫路提刑已解官久矣得此㫖遂檄隆州再索送還人而䕫之迓吏已至遂兩用之其失本㫖如此人傑盱江人有能詩聲自號魯齊居士冬十月壬申以通判主管總所財賦詔諸州起發總領所財賦以通判為主管官是月追復朱熹職名案宋元通鑑在九月誤以煥章閣待制致仕案慶元黨禁除華文閣待制與一子恩澤與此稍異十一月庚戌陳自強知樞密院事許及之參知政事丁卯皇帝日歷成謝深甫等上奉安于祕閣庚午命贓吏毋便豫祠言者論臣僚贓纍巨萬具載章疏投閒數月便得祠祿請自今皆須二年雖有是言然臺諫所論或得於風聞朝廷察其誣未嘗不抆拭也若究實懲治則賄者無以幸免而枉者可以復直矣舊以絹計贓者千三百為一匹後增至二千紹興三年髙宗以絹直髙特下詔增一千乾道六年復詔權以四千為一匹迄今遂為定制十二月甲戌日中有黑子甲申立貴妃楊氏為皇后后遂安人也少入慈福宫性婉淑憲聖慈烈皇后甚愛之初封郡夫人慶元三年進婕妤又進貴妃至是立為皇后學士傅伯夀草制有曰洪惟文母念我神孫美其冠於後庭俾之見於內殿蓋紀其實也后知書史通古今兄次山本右學生慶元間為帶御器械纍遷太尉嶽陽軍節度使韓托胄死按此因類紀楊次山事故有言及托胄死後者蓋亦承用舊文未加刋正耳拜開府儀同三司嘉定三年夏拜少保封永陽郡王次山能避逺權勢而不與人事論者以為得外戚之體子谷石皆為承宣使韓托胄為太師案本傳為太師在三年與此異庚辰大閲案本紀大閲在庚寅講官之詔在丁未閏十二月乙未詔講官開陳經義有當開釋者許依讀官例隨事開陳乙卯宗室曮加恩曮即與願也慶元四年育於宫中六年除福州觀察使至是拜威武軍節度使封衛國公聼讀資善堂以右內率府副率與詵充伴讀尋進開府儀同三司封榮王是月復周必大官職少傅觀文殿大學士是冬皇子坰生未踰月薨追封華王諡曰冲穆是歲詔修孝宗光宗實録詔寶文閣學士傅伯夀直華文閣陸遊同修蓋専以委之先是和州布衣龔敦頥者元祐黨人原之曽孫也嘗著符祐本末黨籍列傳等書數百卷淳熙末洪邁領史院奏之後避光宗名改頥正朝廷以其有史學賜出身除實録院檢討官蓋付以史事未幾而頥正卒乃外召傅陸還朝孝録比它書尤踈駁傅陸既以京祠專領史事已而傅除簽書樞密院事老病不能拜力辭乃以為資政殿學士出守陸年且八十復引年遂以次對領祕書監俄復致仕朝廷命二公舉可代者陸薦京西轉運判官李大異傅薦新除䕫州路提㸃刑獄李壁遂召大異為祕書監遷中書舍人右諫議大夫而壁為祕書少監遷宗正少卿直舍人院以至執政不復領史事矣明年五月癸未命有司搜訪舊聞修三朝正史以書來上者賞之韓托胄扼塞言路自紹興末年以來臺諫每月必一請對察官每月必一言事從官兩月必一求見否則謂之失職自托胄扼塞言路從官既不言事而臺諫亦多牽掣顧望凡所論列若位望稍髙之人蓋皆有所受此外則每月將終必舉按小吏一二人謂之月課始者猶及釐務官與郡守之屬已而浸及屬官曹椽最後則簿尉監當皆在月課之列矣又有泛論君德時事之類皆取其陳熟緩慢略無攖拂者言之以至百官轉對監司帥守奏事亦然或問之則愧謝曰聊以藉手臺諌官則曰聊以塞責有監察御史當應課乃言都城貨炒栗者皆以黃紙包之非便乞禁止聞者哂之賑諸州水旱建寧府福汀南劔瀘州水邵州旱命賑之
