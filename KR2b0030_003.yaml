body:
  text: 兩朝綱目備要卷三光宗紹熈五年甲寅春三月夀皇不豫夏四月朱熹始拜命赴潭州五月至鎮五月夀皇疾寖棘上不能視疾人情益懼戊寅赦天下以夀皇服藥故甲申皇子嘉王過重華宮王府賛讀黄由乞令王過宫問疾辛巳上奏未報講官彭龜年沈有開繼有請甲申省劄下許之内侍都監王徳謙堅請覆奏王斥其説遂行至重華宫夀皇為之感動六月丁酉夜夀皇崩于重華宫上猶未能出嘉王數入禁中泣請未遂中外訛言靡所不至戊戌宰執奏事退太皇太后御劄付宰執日下昃宰執率百官詣重華宫發䘮辛丑左丞相留正知樞宻院事趙汝愚參知政事陳騤同知樞宻院事余端禮率百官詣文徳殿拜表畢退聚重華殿廬議成服典故端禮引唐肅宗朝羣臣發哀太極殿故事附中使王公昌入奏是日太皇太后有㫖皇帝以疾聼就内中成服壬寅正汝愚請太后垂簾奏事不許丁未留正等請立太子是日宰執劄子奏皇子嘉王仁孝夙成學問日進宜早正儲位以安人心癸丑再入劄子御批云甚好乙卯再擬指揮進入乞付學士院是晚批出八字云歴事嵗久念欲退閑留正得之始懼丙辰再擬入御批可只今施行己未宰執再奏乞面奉處分晚付出封題稍異正不唘封付之内降房七月庚申朔汝愚輙唘封正視牘尾色憂始宻為去計是夏利州西路帥吴挺卒虞允文丞相既沒朝廷復命挺為興州御前諸軍都統制兼知興州充利西安撫使凡十九年矣是夏卒于軍于是楊輔以總領財賦先事白朝廷乞擇重臣鎮蜀乃以邱崈為制置使崈未入蜀而聞挺病甚恐其軍五六萬人緩急無所屬乃見大臣籌之故事帥臣闕以轉運使權至是楊虞仲為利漕崈欲重其事乃乞令輔往興州攝帥上許焉輔以為朝臣出使非制閫所當令不欲行而崈以聖㫖移文輔重傷其意即請虞仲權州事而已遥領安撫事未㡬并以印送虞仲就權人以為得體先是吴之季嵗闗外群盜縱横皆縱而不治虞仲至未久遂捕其尤者悉誅之邊人讋服挺之死也上已属疾不之信趙汝愚在樞筦用邱楊之議更遣張詔代之人服其逺識革兩川牒試弊牒試者舊制以守倅及考試官同異姓有服親大功已上婚姻之家與守倅門客皆引嫌赴本路轉運司别試若帥臣部使者親属門客則赴隣路率七人而取一人紹興後牒試猥多東西兩川尤甚議者以為濫于是成都路以八十三人潼川路以八十人為額然此弊特兩川為然若䕫利路與東南諸漕司則觧額不過三數人而已是夏王溉自成都轉運判官召還入見極言兩路冒親詭貫之弊乞各存十人外均與本路諸州從之仍各以二十人為額邱崈時為制置使復請每路止存十二人若就試者少則以二十人而取一人奏可舊例命官鎻印赴漕試者與避親舉人同試王巽澤為益漕始令分場以革假手之弊于是四蜀皆然秋七月壬戌左丞相留正逃歸是日大祥正以五更入奏致其仕易肩輿出城去人情益懼正之未逹也有善軌革者推其行年至甲寅年乃為兔伏草鷄自焚之象殆莫可曉及是曰主上卯生吾酉生伏草自焚矣遂定逃歸之計甲子皇子嘉王即帝位是月辛酉留正朝臨仆于地案上條留正已逃歸此目内復書正朝臨仆地者盖此條因總叙寜宗即位始末故復追記辛酉日事而及之也都人大駭工部尚書趙彦逾見汝愚白事汝愚微告以翊戴之議遣中郎将范仲壬案宋史彦逾傳作范任告殿帥郭杲仲壬初以時事艱難告之不應又以忠義動之又不應仲壬不得已屏人具以西府意逹之又不應仲壬乃還汝愚知不可遂請彦逾徃見杲諭㫖彦逾謂杲曰彦逾與樞宻苐能謀之耳太尉為國虎臣此事専在太尉杲未及言彦逾變色責之曰太尉所慮者百口之家耳彦逾盡誠以相告而太尉了不見答即西府有問何以復之耶杲徐曰致意樞宻領鈞㫖事然後定汝愚知太皇太后深以宗社為憂将白事焉而難其人有知閤門事韓侂胄者太皇女弟之子也素善慈福宫内侍張宗尹而與溫人蔡必勝同在閤門必勝因其里人左司郎官徐誼吏部員外郎葉適言於汝愚遂令侂胄以内禪事附宗尹入奏太皇素簡嚴無他語令諭汝愚耐煩而已癸亥侂胄再往不獲命逡廵欲退重華宫内侍闗禮問知其謀入白太皇言與淚俱太皇蹙頞久之曰事順則可更切仔細禮遂簡侂胄以来日夀皇梓宮前垂簾引執政時日已過午矣汝愚乃以諭参政陳騤同知余端禮關禮又使所親閤門宣賛舍人傅昌期案趙汝愚傳傅昌期作傅昌朝宻製黄袍時王在嘉邸殊不知且方以疾在告汝愚簡宫寮彭龜年云禫祭重事王不可不入甲子禫祭杲與步帥王仲先案趙汝愚傳作步帥閻仲夜分兵衛南北内太皇太后垂簾命闗禮引王先入次執政奏事太皇曰皇帝已有成命相公當奉行汝愚出所擬太皇太后聖㫖云皇帝以疾至今未能執䘮曽有親筆欲自退閒皇子嘉王可即皇帝位尊皇帝為太上皇帝皇后為太上皇后太皇覽畢云甚善太皇勸上即位上固辭且顧汝愚曰某無罪恐負不孝之名闗禮等以黄袍被上上拒却不受汝愚等固以請端禮之言尤力上揮涕勉受遂即皇帝位于東楹之素幄次行禫祭禮都人聞之始奠枕矣先是京口諸軍訛言洶洶襄陽歸正人陳應祥亦謀為變舉事前一日登極赦書至遂敗是晚沈有開彭龜年乞奏事上惨然久之曰前日聞大臣有建儲之議此亦可以息浮言安人心今忽遽乃爾早泣告慈福不允至今悸動後二日以即位告于天地宗廟社稷詔建泰安宮以奉太上皇帝太上皇后命泰安官提舉楊舜卿往南内請八寶尋詔五日一朝百官月兩朝後又詔以時方秋暑宜用唐武徳貞觀故事太上皇帝未湏移御其即以寢殿為泰安宫是嵗改泰安宫為夀康宫乙丑立崇國夫人韓氏為皇后太皇太后降㫖丙寅赦天下常赦所不原者皆除之百官進秩一等賞諸軍赦文有曰冲懐每念于退閑親翰嘗頒于近輔盖用上皇御批八字意也眀年用李壁奏命繳御劄八字付史館丁卯侍御史張叔椿劾留正擅去相位上既立趙汝愚奏遣中使禮請之上遣内侍二員分水陸路宣押赴都堂治事叔椿請議其棄國之罰乃徙叔椿吏部侍郎而正復相或以留趙二公處變不同問于范仲黼郎中者仲黼曰趙丞相同姓之卿也留丞相異姓之卿也反復之而不聼則去問者不能詰戊辰詔求言略曰朕猥以沖人嗣膺大寳涉道尚淺何以周知羣下之情燭理未眀何以裁决萬機之務思欲圖乂莫先求言惟祖宗二百年之基既艱於負荷矧中外億兆人之衆尤重於撫綏聿懐置器之安深切履氷之懼固當咨詢故老夢想幽人罔間邇遐咸伸播告胷臆隠約爾其無愛於肆言利害罷行朕欲深求於成效事闗朝政慮及邊防應天之實何先安民之務何急毋憚大吏毋諱𦕈躬儻有補於國家當優加於賞賚𨗳人使諫方傾聼於嘉謀事君以忠宜大伸於直道咨爾多士體予至懐以章頴為侍御史黄艾為左司諫鄭湜使金范仲壬副之告登位也己巳趙汝愚兼參知政事仍知樞宻院事庚午召朱熹自湖南安撫知潭州召赴行在奏事上在藩邸聞熹眀徳每恨不得為本宫講官至是首加召用熹辭孝宗之上僊也光宗以疾不能執䘮中外洶洶熹益懼遂申省乞歸田里不允又草封事極言父子天性不應以小嫌廢彞倫其言切直會寜宗立不果上先是黄裳為嘉王府翊善講説開𨗳上學頓進一日光宗宣諭曰嘉王進學皆卿之功裳謝因進曰若欲進徳修業追蹤古先哲王則湏尋天下第一等人乃可光宗問為誰以熹對彭龜年繼為官僚因講魯荘公不能制其母云母不可制當制其侍御僕從嘉王問此誰之説對曰朱熹之説自後每講必問熹之説如何盖傾心已久故即位首加迅召皆出上意也辛未以黄裳為給事中陳傅良彭龜年並為中書舍人黄由為起居郎沈有開為起居舍人乙亥以趙汝愚為右丞相辭不拜陳騤知樞宻院事余端禮參知政事仍兼同知樞宻院事賜前宰執侍從詔訪以得失丙子大風戊寅以郭杲為武康軍節度使録定䇿之功也上之立也知閤門事韓侂胄有力焉侂胄魏王琦曽孫神宗女齊國長公主孫也自孝宗時已知閤門事趙汝愚将定䇿侂胄往来慈福與其謀及即位推恩定䇿臣汝愚曰我與趙尚書皆宗臣而韓知閤乃右戚各不言功惟爪牙之臣所當推賞乃先拜殿副郭杲為節度使庚辰上率羣臣拜表于泰安宫辛巳趙汝愚為樞宻使以力辭右丞相故也壬午貶内侍林億年陳源楊舜卿從侍御史章頴之劾也詔林億年陳源與在外宫觀楊舜卿與在京宫觀尋罷之億年常州源撫州並居住孝宗朝陳源嘗被罪斥逐光宗即位源復召還紹熙四年除内侍省押班時光宗已病不能時過宫源數離間上即位貶撫州慶元元年五月移處州二年上始得子七月源以恩許自便不得入國門給事中汪義端駁之乃移源婺州而義端亦出知鎮江府二年夏始聼自便云韓侂胄為汝州防禦使録定䇿功也癸未余端禮辭兼同知樞宻院事甲申羅㸃簽書樞宻院事㸔詳封事詔兩省官看詳具要切者以聞戊子詔百官輪對日輪一員面對己丑朔安定郡王子濤薨八月辛夘初御行宮便殿聼政癸巳除朱熹煥章閤待制侍講疾速前来供職告詞朕初承大統未暇他圖首闢經幃詳延學士眷儒臣之在外湏召節以趣歸徑登從班以重吾道爾發六經之藴窮百氏之源其在兩朝未為不用至今四海猶謂多竒擢之次對之班處以邇英之命若程頥之在元祐若尹焞之於紹興副吾尊徳樂義之誠究爾正心誠意之説豈惟慰滿於士論直且増益於朕躬非不知政化方行帥垣有賴試望之于馮翊不如寘之本朝召賈傅於長沙自當接以前席黄由行熹發長沙且行且辭大略云陛下嗣位之初方将一新庶政所宜愛惜名器若使倖門一開其弊不可復塞至於博延儒臣専意講學盖将求所以深得親懽者為建極𨗳民之本思所以大振朝綱者為防微慮逺之圖盖熹在道聞泰安朝禮尚缺近習已有用事者故有是言熹行至信州聞以内批逐留正按正時猶在相位至是月丙辰方以内批罷此盖亦以朱子被召事而先及之耳有憂色學者問故曰大臣進退亦當存其體貎或曰此盖廟堂之意熹曰何不風其請去而後許之上新立豈可𨗳之輕逐大臣耶至六和塔永嘉諸賢各陳所欲施行之䇿熹曰彼方為几我方為肉何暇議及此㢤時近習用事御筆指揮皆有其漸故熹憂之甲午増置講讀官以黄裳陳傅良彭龜年等為之丁酉詔以生日為天佑節尋又改為瑞慶節辛丑詔諸道舉㢘吏糾汚吏詔曰朕惟㢘吏民之表而為國之蠧民之病者莫汚吏若也不有誅賞疇示勸懲繼自今諸道司刺舉之官于都邑文武任職之臣㢘必聞汚必糾毋憚大吏毋縱私昵賞不爾靳罰不爾私其令吏稱民安副朕意焉己亥上率羣臣朝泰安宮壬寅賜講讀官詔戒其開陳經㫖救正闕失皇弟抦進封徐國公抦孝宗之孫也孝宗凡三子五孫莊文太子下曰豫國公挻魏恵憲王下曰左千牛衛大将軍攄次即抦也光宗下曰保寧軍節度使挺次即寧宗也挻攄挺皆早卒抦慶元初封吴興郡王乙巳詔晚講官坐講尋罷之初議祧宣祖廟禮部侍郎許及之等請祧宣祖廟祔大行至尊夀皇聖帝詔侍從禮官集議是年趙汝愚秉政遂併祧僖宣二廟而正太祖東嚮之位朱熹力爭不聼丁未議賑諸路水旱命三省條畫賑恤乙卯加封安南國王李龍􅧪加思忠功臣減廣南鹽額嵗十萬緡章頴黄艾罷言職謝深甫為御史中丞深甫韓侂胄之黨也先是侂胄恃功意望建節恨趙汝愚抑之有怨言簽書羅㸃慰觧之徐誼為京尹勸汝愚以節度使授之汝愚悔遣人諭侂胄侂胄答語不遜遂日夜謀引其黨為臺諫以擯汝愚汝愚為人疎直不虞其姦㑹汝愚奏除劉光祖侍御史方進呈知樞宻院陳騤忽奏曰劉光祖與臣有嫌今光祖入臺願先避位汝愚愕然而止侂胄遂以内批除深甫御史中丞盖侂胄與騤合謀已久汝愚未之覺爾黄度為右正言自監察御史遷度在言路未㡬欲論韓侂胄之姦侂胄知之以内批斥去丙辰留正罷以内批罷之于是朱熹赴召至信州聞之有憂色未㡬諫議張叔椿再劾留正擅去相位詔落正觀文大學士復命趙汝愚為右丞相詔近臣舉才侍從兩省臺諫各舉通亮公清不植黨與曽任知縣者二人九月辛酉劉光祖為起居舍人丁夘劉徳秀為監察御史時趙汝愚奏乞令近臣舉御史許之始議除兩人諸公舉吴獵者最多名在其首游仲鴻次之徳秀為大理寺主簿與侂胄深交侂胄乃諭中司令薦徳秀因以内批令兼用中司舉者一人徳秀遂與吴獵並除其黨以次而進言路遂皆侂胄之人一時善類排斥無餘盖十餘年而後定云庚午羅㸃卒辛未合祭天地于眀堂上以孝宗之䘮命趙汝愚朝獻景靈宫命嗣秀王伯圭朝享太廟而親祀眀堂赦天下趙汝愚為政首裁抑僥倖以故人多怨者自祖宗以来人主登極凡列郡守臣率得任子恩間有闕守臣而以幕職班行攝之者亦官之如例英宗即位司馬公時知諫院嘗以為言不聼上受禪肆眚汝愚因進熟始命監司郡守許上表進貢推恩内守臣係權官者免進貢其表聼附遞是嵗五月以孝宗大漸嘗肆赦七月上登極九月宗祀明堂尚書省契勘一嵗之間三行赦放恐有凶惡累犯之人指恩作過内曽犯徒流罪已經登極赦恩免罪後再犯徒流以上情理深重者未得斷遣别聼朝廷指揮其指揮與赦文同降但以白紙連書于黄牒前云二事皆前所未有也壬申京鏜簽書樞宻院事鏜亦韓侂胄之黨故擢用之于是陳傅良吴獵劉光祖等咸先後斥去羣憸附和視正士如仇讎衣冠之禍自此始矣壬午黄裳卒裳與羅㸃相繼徂謝而趙汝愚之勢益孤甲申韓侂胄為宜州觀察使詔侂胄歴仕三朝備宣忠力可特遷二官盖将以為承宣使也侂胄自負有定䇿功覬覦節鉞意不滿上疏力辭乃止遷一官于是怨趙汝愚益深矣冬十月辛卯銓量四川諸州守臣故事諸道守臣皆臨遣淳熙末孝宗以嶺蜀道逺始詔川廣知州軍見居川廣合闕到半年前奏事人及係見闕去處並令詣本路轉運司禀事仰漕臣精加銓量人才委堪任使非昏繆老病之人結罪保眀申尚書省然諸道罕嘗舉行至是言者論漕司之權比制司為輕而其責亦不若制司之重權輕則不敢多有所廢黜責輕則不暇詳于顧計州縣不治職此之由請一付之制司權重則雖廢黜之多而有所不憚責重則顧計利害之深而不敢茍且如此則昏老病疾之人不得冒居而州縣無不治矣趙汝愚為政遂白行之其後數年議者不以為當嘉泰元年五月復有㫖並赴闕朝辭㑹知合州郭公爕等數人代者皆過滿帥臣劉徳秀因請于朝乃復令制司銓量免奏事焉大抵川峽道逺守臣奏事者多以為勞若帥臣公心一意而無請託喜怒予奪之私則銓量為得矣是日朱熹奏事行宫便殿其一曰天下之事有常有變而其所以處事之術有經有權君臣父子定位不易事之常也君令臣行父傳子繼道之經也事有不幸而至于不得盡如其常則謂之變而所以處之之術不得全出于經矣是則所謂權也當事之常而守其經雖聖賢不外乎此而衆人亦可能焉至于遭事之變而處之以權則惟大聖大賢為能不失其正而非衆人之所及也乃者天運艱難國有大咎天變為之見於上地變為之作于下人情為之哀恫怫欎而皆有離叛散亂之心是則所謂天下之大變而不可以常理處焉者也是以太皇太后躬定大䇿皇帝陛下寅紹丕圖而鄉之危者安離者合天下大勢屹然而大定亦可謂處之以權而不失其正矣然至今三月而天變未盡消地變未盡弭君親之心未盡懽學士大夫羣黎百姓或反不能無疑于逆順名實之際猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之懐而已此則所謂道心微妙之全體天理發用之本然所以行權而不失其正之根本也誠能充吾未嘗求位之心則可以盡吾負罪引慝之誠充吾未嘗忘親之心則可以致吾温清定省之理始終不越乎此而大經可正大本可立矣至于問安視膳之行十日一至而不得見則繼以五日五日一至而不得見則繼以三日三日而不得見則二日而一至以至于無一日而不至焉俯伏寢門怨慕號泣雖勞且辱有所不憚然而親心猶未底豫慈愛猶未復初逆順名實之際不渙然而氷釋則臣不信也其二畧曰為學之道莫先于窮理窮理之要必在於讀書讀書之法莫貴于循序而致精而致精之本則又在于盡敬而持志帝王之學殆亦無以易之特以近年以来風俗薄陋士大夫間聞此等語例皆目為道學必排去之而後已是以食芹之羙無路自通每抱遺經徒切慨嘆其三略曰臣前任備位潭州竊見本路土瘠民貧無他生理而州縣嵗計入少出多例于常賦之外多収加耗重折價錢尚且入不支出公私俱困臣嘗與漕臣何異備奏全州守臣韓邈所申乞減添差員數可見一端其他州縣往往類此乞詔本路帥臣監司以前日所申事理通之諸郡並行均節将大叚闕乏去處特與痛加裁減其四曰去冬湖北猺人侵擾邵州界分據守臣潘燾條畫到移置寨柵増撥戍兵利害數條已具奏乞賜施行欲乞眀詔大臣早賜處分其五言修潭州城壁事乙未以雷雨詔求言詔曰朕以不徳嗣承大寶夙夜祇懼不遑寧處乃者隂陽繆盭雷震非時滛雨為災朕心甚懼推尋厥咎未知其繇凡朕躬有過失朝政有闕遺其令侍從䑓諫各條疏以聞庚子以久雨命大理三衙臨安府兩浙州縣决繫囚釋杖以下辛丑蠲減苛征減兩浙江東西路和買折帛錢蠲兩浙路丁絹身丁錢一年雅州蠻㓂邊沙平者雅州嚴道縣徼外蠻也與碉門寨纔隔一水而寨在州西八十里沙平凡六族其地有胡盧里嵗輸税米百二十斛于碉門乾道間蠻人髙奴吉作亂焚碉門宣撫使王公明出榜碉門撫諭蕃人聼命自是捐胡盧里之税與之而沙平為蠻人有矣至是兀嶺蠻人因沙平以叛土兵以神臂弓射退之制置司命閉禁門者月餘蠻人糧盡乃就降是嵗黎州蠻曵失索畜卜亦入冦先是淳熙中吐蕃芎齊青羗欲結連努兒結冦邊努兒結不從遂從白水兩村老穉渡河意欲歸漢官司慮努兒結情偽未定不聼于是招集努兒結族黨犒賞醉以毒酒生縛努兒結蒙丹足都揑三人檻送制司努兒結至雙流絶食而死蒙丹足都揑遂留成都努兒結之弟三開者得諸羗歡心銜兄之死聚深蕃諸族入冦時趙汝愚被命帥蜀措置有方三開前後三次為官軍所敗制司又立五千緡賞欲生縳之三開憂患嘔血而死其弟失落盤出降許之孝宗謂汝愚有文武威風而知大體益重之然三開雖死而努兒結之子曵失索猶在至是有彌羗人悶笆至三衝寨與土丁趙阿閏相毆邂逅殺之買馬官趙鼎懼生事以骨價錢償之悶笆之兄畜卜曵失索聞之遂以努兒結等向来不得一錢為詞聚衆入冦諸司調兵往援一方騷然盖努兒結以癸巳之春盗邊甲辰之秋歸漢乙巳之春被縳而三開以丁未之秋復讎失落盤以戊申之夏納欵曵失索以乙夘之春再為報復之舉至戊午冬始降始終凡三十六年云曵失索初入冦在此年而不得其月日姑附見于此是日命朱熹講大學除待制兼侍講辭不允熹尋奏云臣伏見近制每遇隻日早晚進講及至兩日或值假故即行權罷又按故事将来大寒大暑亦係罷降月分陛下天性好學晨夕孜孜雖處深宫必不暇逸欲乞今後除朔望旬休及過宮日外不以寒暑雙隻月日諸色假故並令逐日早晚進講内有朝殿日分恐聖躬久坐不無少勞却乞權住當日早講一次從之閏月朔日進講至盤銘日新因論成湯有盤銘武王有丹書皆人主憂勤警戒之意丹書出自大戴禮武王踐阼篇上曰近有人進入此書因命小黄門取示盖黄庭堅所書墨跡也越三日晩講因奏曰臣所進講大學口義不審曽經聖覽否上曰宫中無事常㸔又奏陛下于臣妄説有所疑否上曰説得甚好無可疑又奏萬㡬事煩恐講義卷軸大難于披覽欲寫成冊子進入以便反覆觀考上欣然曰正欲與卿說作冊子来可速進入久之未敢上因入講上忽宣諭曰向日令卿寫講議冊子何久不進入奏曰未奉進止未敢遽上上曰速進来初熹既寫成冊子欲㸃句讀而未敢唘上忽曰可一就㸃成句来奏曰容遵禀進入既進上一日講畢奏曰臣所進講義冊子必經聖覽上頷之又奏不知于聖意如何上欣然曰㸔来𦂳要處只在求放心耳熹頓首曰聖學髙明宣諭極是老師宿儒窮日竟月不曽見得此意説得此語陛下天縱生知拈出此求放心語正是聖學要領願推之以見于實行不患不為堯舜之君也他日熹又奏疏言願陛下日用之間語黙動静必求放心以為之本而于玩經觀史已用力處益用力焉數召大臣如仁宗開天章閣故事至于羣臣進對亦賜温顔反復詢訪以求政事之得失民情之休戚而又因以察其人才之邪正短長庶㡬于天下之事各當其理矣熹每進講務積誠意以感動上心以平日所論著者敷陳開析坦然眀白可舉而行講畢有可以開益上徳者罄竭無隠上亦虛心嘉納焉命朱熹入史院除兼實錄院同修撰辭不允閏月十一日初入院時院中略無統紀修撰官三員檢討官四員各欲著撰不相統攝熹議欲以事目分之湏依次序編排各具首末然後類聚成書方有條理檢討官不肯從甲辰趣後省㸔詳封事翌日朱熹上奏云臣前日面奏恭奉詔㫖以雷雨之異許陳闕失仰見陛下畏天省已之意竊見陛下登極之初已下眀詔来獻言者甚衆未聞一有施行今復求言殆成虛語乞令後省官鎻宿㸔詳擇其善者條上取㫖以次施行庶㡬聞者知勸直言日聞詔差沈有開劉光祖㸔詳限十日聞奏乙巳上大行至尊夀皇聖帝諡曰哲文神武成孝皇帝廟號孝宗尋詔廟樂名曰大倫之舞詔建欑宫於永思陵之東南以十一月乙卯權欑孝宗欑宫于永阜陵紹興初六飛駐越昭慈聖獻皇后上賔因卜地權欑于㑹稽上皇村盖便于修奉也及卜祐陵遂就其側併舉顯肅憲節二后祔焉顯仁髙后繼從其兆則廹隘已甚矣髙宗之葬也趙汝愚時守蜀手疏論㑹稽欑宫淺薄可為深憂宜復祖宗山陵之制朝論不從于是自昭慈之西連用五穴山勢漸逺其地愈卑矣孝宗将攅汝愚為樞宻使建議以欑宫本非永制實居淺土蔽以三宮初期克復神京奉遷神駕雖其志實羙而其事實難且死者無終極國家有廢興豈宜徒徇虛名以基實禍識者深以為然時日官荆大聲已卜地思陵之傍開深五尺下有泉石按行使趙彦逾以為土肉淺薄不可用汝愚乞改卜意欲以中軍寨為之而宰相留正以為不然于是彦逾與覆按使謝深甫附其説乃命大聲改卜于新穴之東視新穴纔髙一尺一寸五分而已孫逢吉為覆按使還言當少寛時日别求吉兆而内廷左右以久居䘮次内外不便皆主速葬之説乃詔侍從臺諫限三日集議議者皆言神穴未安自合展期改卜况朝廷禮文何嘗盡循古制豈必拘七月之期奏劉光祖所草也朱熹時在經筵復上議状云竊惟至尊夀皇聖帝聖徳神功覆冒寰宇深仁厚澤浸潤生民厭世上賓率土哀慕宜得吉土以奉衣冠之蔵垂裕後昆永永無極而議論紛紜迄無定説皆縁専信臺史而不廣求術士必取國音坐丙向壬之説而不博求名山以禮而言則記曰死者北首生者南向皆從其朔又曰葬于北方北首三代之逹禮也則是古之葬者必坐北而向南孝子之心不忍死其親雖葬于墓猶欲其負隂而抱陽也豈有坐南向北反背陽而向隂乎若以術言則凡擇地必先論其主勢之强弱風氣之聚散水土之淺深穴道之偏正力量之全否政使實有國音之説亦必先此五者然後其術可得而推今乃信其庸妄之偏説但以五音盡類羣姓而謂冡宅向背各有所宜乃不經之甚者不惟先儒已力辨之而近世民間亦多不用今以為祖宗以来世守此法順之則吉逆之則凶然自永安遷奉以来遵用此法而九世之間國統再絶靖康之變宗社為墟若曰其法果驗則洛越諸陵無不坐南而向北固已合于國音矣又何吉之少而凶之多耶臺使之言進退無據類皆如此又言今穴視前穴髙一尺一寸五分則是開至六尺一寸五分即與舊穴五尺之下有水石處髙低齊等如何却可開至九尺而其下二尺八寸五分者無水石邪臣自南来經由嚴州及富陽縣其江山之勝雄偉非常説者又言臨安縣乃錢氏故鄉山川形勢寛平邃宻此必有佳處可用而臣未之見也竊見近年地理出於江西福建為尤盛望下兩路帥臣監司疾速搜訪量給路費多差人兵轎馬津遣赴闕令于近甸廣行相視擇一最吉之處以奉神靈萬世之安子孫逢吉所謂少寛日月别求吉兆為上此十字者實為至論臣非敢妄以滛巫瞽史之言眩惑聖聼誠不忍以夀皇聖體之重委之水泉沙礫之中殘破浮淺之地是以痛憤激切一為陛下言之疏入不報其後卒定永阜攅陵于㑹稽汝愚請如故事建靈臺同列又以後䘮踰前䘮而止故崇陵亦因之若成穆成恭二后則先葬于赤山慈懿皇后則攅于南山浄慈寺丙午郤瑞慶節賀表從朱熹之請也前一日晩闕報来日百官上表稱賀熹欲不出不可乃草劄子明日立班投進略云夀皇梓宫在殯陛下追慕方新乃以此時講行賀禮覩此闕失心實未安欲望聖慈速賜傳㫖便令權免其表亦不収接庶㡬上廣孝治益隆聖徳風示四方垂法萬世有㫖郤賀表不受熹尋奏前日賀表雖蒙降出而未降指揮令後合稱賀三年之内並與權免其節序變遷並合進名奉慰壬子曽三復使金賀金國正旦也是後賀正旦使不復錄是月詔建福寧殿以舊東宫為之備移御也朱熹彭龜年等請罷之閏十月癸亥集議廟制國朝自太祖追王僖順翼宣四祖以来每遇禘祫祖宗以昭穆相對而虛東嚮之位王安石用事以為僖祖以上世次不可知則僖祖之有廟與后稷無以異當時諸儒韓絳軰辯之不從時程頥為布衣為人言亦以安石之言為是熈寧八年夏禘于太廟以僖祖東嚮自是無敢議者紹興後董弅王普尤袤俱請正太祖東嚮之位未克行先是英宗祔廟已祧順祖至欽宗祔廟又祧翼祖及髙宗升祔遂為九世十二室至是孝宗将升祔趙汝愚當國欲併祧僖宣二祖事下侍從臺諫禮官議于是吏部尚書鄭僑等請祧二祖而正太祖東嚮之位諸儒如樓鑰陳傅良軰皆以為可詔從之僑等尋又奏請立僖祖别廟以順翼宣三祖祔蔵時朱熹在講筵獨入議状條其不可者四大略云准尚書吏部牒集議四祖祧主宜有所歸者今詳羣議雖多而皆有可疑若曰藏之夾室則是以祖宗之主下藏于子孫之夾室至于祫祭設幄于夾室之前則亦不得為之祫欲别立一廟則䘮事即逺有毁無立欲藏之天興殿則宗廟原廟不可相雜議者皆知其不安特以其心急欲尊奉太祖三年一祫時暫東嚮之故不知其實無益于太祖之尊而徒使僖祖太祖兩朝威靈相與爭校强弱于㝠㝠之中併使四祖之神疑于受擯徬徨躑躅莫知所歸令人痛傷不能自已今但以太祖當日追尊帝號之令而黙推之則知今日太祖在天之靈必有所不忍而不敢當矣又况僖祖祧主遷于治平不過數年神宗皇帝復奉以為始祖已為得禮之正而合于人心所謂有其舉之莫敢廢者乎又言當以僖祖為始祖如周之后稷太祖如周之文王太宗如周之武王與仁祖之廟皆萬世不祧仁宗為昭英宗為穆與真宗主並藏西夾室神宗為昭哲宗為穆徽宗為昭欽宗為穆髙宗為昭孝宗為穆而髙宗之廟亦萬世不祧若未能然則奉僖祖居第一室太祖居第二室太宗居第三室太祖太宗仍共為一世自真宗以下至于孝宗凡九世十二室貼黄云續蒐訪得元祐大儒程頥之説以為太祖以上有僖順翼宣先嘗以僖祧之矣介甫議以為不當祧順以下祧可也或難以僖祖無功業或謂靈芝無根醴泉無源物豈有無本而生者今日天下基本盖出于此人安得為無功業故朝廷復立僖祖廟為得禮安石所見終是髙于世俗之儒熹竊詳頥之議論素與王安石不同至論此事則深伏之足以見義理人心之所同固有不約而合者又司馬光韓維之徒皆是大賢人所敬信其議偶不出此而安石乃以變亂穿鑿得罪于公議故欲堅守二賢之説并安石所當取者而盡廢之今以程頥之説攷之則是非可判矣議既上召對上於榻後取文書一卷曰此卿所奏廟議也可細陳其説熹先以所論畫為圖本貼説詳盡至是出以奏陳久之上再三稱善且曰僖祖自不當祧髙宗即位時不曽祧夀皇即位亦不曽祧太上即位時又不曽祧今日豈可容易可于榻前撰數語俟徑批出施行熹方懲内批之弊因乞降出劄子再令臣僚集議上亦然之既退即進擬詔意以上意諭廟堂則聞已毁四祖廟而遷之矣時汝愚既以王安石之論為非異議之徒懼其軋已藉以求勝事竟不行熹時已得罪遺汝愚書曰相公以宗支入輔王室而無故輕納鄙人之妄議毁拆祖宗之廟以快其私其不祥亦甚矣欲望神靈降歆垂休錫羙以永國祚于無窮其可得乎時太廟殿已為十二室故孝宗既升祔而東室尚虛熹以為非所以祝延夀康之意深不然之因自劾不堪言語侍從之選乞追奪待制章再上詔次對之職除授已久與廟議初不相闗不許及髙宗案髙宗已祔此當云光宗盖併記後事也原夲有誤祔廟遂復為九世十二室云盖自昌陵祔廟踰二百年而後正太祖之位自是年冬始而别建一殿以奉祧主于大殿之西隅嵗命禮官薦獻焉今謂四祖殿者是也辛未核實樁管錢遣職事官二員核實鎮江建康府池鄂江州樁管錢乙亥趙彦逾知建康府除端眀殿學士恩數視執政趙汝愚謀立上時遣彦逾逹意于殿帥郭杲事定亦冀汝愚引已同升已而止除端明殿知建康彦逾怨之遂與韓侂胄合未㡬改除四川制置彦逾愈恨入辭疏廷臣姓名于上指為汝愚之黨曰老奴今去不惜為陛下言之于是上亦疑汝愚矣是月復提舉太史局官舊以近臣兼之熈豐以後不復置至是以命薛叔似眀年何澹以非舊典為言遂罷盖務反趙汝愚之政而不詳考也詔舉宗室兩省臺諫侍從各舉有文學器識者二人詔改眀年元賜史浩諡曰文恵十一月戊子朔朱熹罷御批朕憫卿耆艾方此隆冬恐難立講已除卿官觀可知悉趙汝愚獨袖内批還上且諫且拜韓侂胄必欲出之汝愚退求去不許侂胄使中使王徳謙封内批以授熹熹即附奏謝遂行給事中樓鑰封還録黄舍人鄧馹面奏乞留熹上許除京祠已而不下起居郎劉光祖又言之中書舍人陳傅良再封還録黄有㫖除熹寶文閣待制與郡劉光祖再上疏留行不報樓鑰再封還録黄有㫖依已降指揮案慶元黨禁御批之降在閏十月十九日甲戌趙汝愚䄂批還上至此皆閏月事也與此異傅良疏中有朱熹論事頻繁迂濶之語盖侂胄嘗言陛下千乘萬騎而熹乃欲令一日一朝豈非迂濶故時人謂傅良因廟議不合隂肆中傷云工侍兼侍講黄艾因講問逐熹之驟上曰始除熹經筵耳今乃事事欲與艾懇請再三不已吏侍兼侍講孫逢吉上疏留熹又因講權輿之詩反覆以諷上曰朱熹所言多不可用時侂胄欲用優人王喜按原本作熹今依慶元黨禁改為閤門祇候先是侂胄嘗令喜于禁中效熹容止為戲熒惑上聼于是逢吉誦言将入諫乃止監察御史吴獵入劄子乞留熹不報登聞鼓院游仲鴻亦上言朱熹海内名儒首蒙収召四方傳誦以為天下大老歸之纔四十餘日復有宫祠之命逺近相弔以為天下大老去之則人誰不欲去者若正人盡去陛下何以為國願亟還朱熹無使小人得志養成亂階時侂胄勢方盛人皆為仲鴻危之熹以十月辛夘入見中間進講者七内引留身奏事者再面對賜食各一在朝甫四十有六日云初熹之被召也對于行宫便殿首奏陳之有曰發號施令無一不出乎朝廷進退人才無一不合乎公論不為偏聼以唘私門則釁孽之萌不得作矣今日之計莫大于此又再三而言之又約吏部侍郎彭龜年同請對白發侂胄之奸適龜年出䕶使客侂胄益得為計熹累白汝愚當以厚賞酬其勞勿使得預朝政且有分界限立紀綱防微杜漸謹不可忽之語汝愚方謂其易制不之虞仲鴻亦力諫汝愚不聼而所倚為腹心謀事者又皆持禄茍安無復逺慮右正言黄度欲論侂胄謀泄以内批斥去熹不勝憤遂因講畢奏疏極言凡四事其略曰聞有㫖修葺舊日東宫為屋三數百間外議皆謂陛下意欲速成早遂移蹕以為便安之計臣不知此果出于陛下之心大臣之議軍民之願邪抑亦左右近習倡為此説以誤陛下而欲因以遂其姦心也臣恐不惟上帝震怒災異數出正當恐懼修省之時不宜興此大役以咈譴告警動之意亦恐畿甸百姓饑餓流離阽于死亡之際忽見陛下正用此時大興土木修造宫室但以適已自奉為事而無矜惻憫憐之心或能怨望忿切以生他變不惟無以感格太上皇帝之心以致未有進見之期亦恐夀皇在殯因山陵未卜几筵之奉不容少弛太皇太后皇太后晨昏之養尤不可缺而四方之人但見陛下大治官室速得成就一旦翩然委而去之六軍萬民之心有扼腕而不平者矣此臣之所大懼也至于夀康定省之禮則臣嘗言之矣今聞邇日一再過宫亦未得見而不亟為慮泛然而往泛然而歸太上皇帝聞之必以為此徒備禮而来實無必求見我之意其深閉固拒而不肯見固亦宜矣又聞太上皇后懼忤太上皇帝之意不欲其聞太上之稱又不欲其聞内禪之説殊不知若但一向如此而不為宛轉方便使太上皇帝灼知陛下所以不得已而即位者但欲上安宗社下慰軍民而非敢遽享至尊之奉則父子之間上怨怒而下憂懼将何時而已乎此又臣之大懼也至于朝廷紀綱尤所當嚴今陛下即位未能旬月而進退宰執移易臺諫皆出于陛下之獨斷大臣不與謀給舍不及議正使實出於陛下之獨斷其事悉當于理亦非為治之體况中外傳聞皆謂左右或竊其柄而其所行又未能盡允于公議此弊不革誠恐名為獨斷而主威不免于下移欲以求治而反不免于致亂盖自隆興以来已有此失臣嘗再三深為夀皇論之尚賴夀皇聖性聰眀更練世事故於此軰雖以驅使之故稍有假借實亦隂有以制之未至全墮其計然積習成風貽患於後其害已有不可勝言者如陳源袁佐之流皆陛下所親見奈何又欲襲其跡而蹈之乎此又臣之所大懼也至於欑宮之卜偏信臺使之言而不復廣詢術人以求吉地既不為夀皇體魄安寧之慮又不為宗社血食久逺之圖夫以夀皇之豐功偉績百世不忘而所以葬之如此其草草也豈不大咈天人之心以致變異之頻仍而貽患于無窮乎此又臣之所大懼也臣老病之餘寒齋獨宿終夜不寐憂慮萬端至于孤危之蹤不敢自保竊恐自今以往不獲久侍清閑之燕矣疏入侂胄大怒隂與其黨謀去其為首者則其餘去之易爾所謂首者盖指熹也熹時急於致君知無不言言無不切亦頗見嚴憚于是侂胄之計遂行及熹講筵留身再乞施行前疏退則内批徑下乃有宫觀之命未㡬除知江陵府湖北安撫熹辭不拜乃除提舉南京鴻慶宫熹既去彭龜年遂徑論侂胄竊弄威柄為中外所附不去必貽患讀劄子畢又奏只縁陛下近日逐得朱熹太暴故欲陛下亦亟去此小人無使天下人謂陛下去君子如此之易去小人如此之難上初欲兩罷之汝愚開陳欲兩留之既而内批彭龜年與郡節度使吴琚嘗言時上無堅留侂胄意使有一人繼之則去之必矣侂胄既留勢益張因欲併逐汝愚而難其名或教之曰彼宗姓誣以謀危社稷則一網盡矣侂胄然之甲午復加封安南國王濟羙功臣丙午韓侂胄兼樞宻都承㫖侂胄固辭明年趙汝愚罷侂胄乃建節鉞戊申詔均内外任汝愚當國言者以為今賢士大夫往往不樂為外官盖外權太輕雖欲有所施設而不得騁故也今日之勢莫若稍重外重外之術必使帥漕總領可以馴致于從官而後可久任可久任而後可以責事功詔可未㡬汝愚去位亦不克行辛亥雨木氷是日詔遵用三年之制詔曰三年之䘮古有彛制朕勉承慈訓寅紹邦圖孝宗之家法具存𦕈躬惟古道是復以盡厚終之義以昭尊祖之誠朕當遵用三年之制其令禮官條具典禮以聞髙宗之䘮孝宗為三年服及孝宗之䘮有司請于易月之外用漆紗淺黄之制盖循紹興以前之舊朱熹之在講筵也不以為然奏言今已往之失不及追改惟有将来啟欑發引禮當復用初䘮之制則其變除之節尚有可議望眀詔禮官稽考禮律豫行指定其官吏軍民方䘮之服亦宜稍為之制勿使肆為華靡其後詔中外百官皆以凉衫視事盖用此也初熹上議時門人有疑者熹未有以折之後讀禮記正義䘮服小記為祖後者條見其所引鄭志有諸侯父有廢疾不任國政不任䘮事之問而鄭答以天子諸侯之服皆斬之文乃知經文有所未備而待於傳注者如此因自識于本議之後云陞潜藩名以眀州為慶元府十二月丁巳朔禁民間妄言官禁事乙丑陳傅良罷坐留朱熹為謝深甫所劾戊辰以陳康伯配饗孝宗廟廷光堯之祔廟也祕書少監楊萬里獨謂張浚有復辟功不得與配食為非宜與洪邁爭之不能得因乞補外洎孝宗祔廟議者復推陳康伯而浚終不得預盖但以富平淮西苻離三敗之故而不考曹彬岐溝之役其䘮師蹙國亦不下於富平與苻離今以一𤯝掩其大徳盖洪邁兄弟皆湯思退舊客夙有憾于浚故以復辟之勲歸之吕頥浩也吴總再上疏請以其父璘配食不報己巳陳騤罷庚午以余端禮知樞宻院事京鏜參知政事鄭僑同知樞密院事皆韓侂胄之黨彭龜年罷坐上疏攻侂胄也侂胄進一官與在京宫觀趙汝愚請留彭龜年不聼劉光祖罷坐留朱熹為劉徳秀所劾是嵗詔賑諸路水旱兩浙淮南江東西路水旱詔蠲其賦仍賑之築紹熙堰兩淮土沃而多曠土人且耕且種不待耘耔而其収十倍浙民每于秋熟以小舟載其家之淮上為淮民穫田主僅収什伍他皆為浙人得之以歸是嵗陳損之提舉淮東常平以淮田多沮洳因築堤數百里捍之得良田數百萬頃事聞錫名紹熈堰朝廷念淮民至今損其税
