body:
  text: 兩朝綱目備要卷十寧宗開禧三年丁邜春正月丁丑朔邱崈罷案是年凡托胄事本傳俱作四年誤以張巖代之初小使既為金人所却還崈復乞朝廷移書金帳以續前議又謂金人指太師平章為元謀若移書乞暫免繫銜韓托胄大怒故崈遽罷崈道遇所遣使臣皇甫恭自汴京回言行省完顔弼右副元帥赫舍哩子寧皆有和意邱崈之罷江淮督視也命由中出執政不知之李壁諫托胄不納壁曰凡舉大事未論行事之是非先觀人心之向背邱崈鄉有人望奈何去之托胄變色曰方今天下只有一邱崈耶因拂衣而起己邜吳曦下白榜于四路僞四川都轉運使徐景望入利州總領官劉智夫為所逐後二日曦遣摧鋒軍統制祿禧以兵千五百戌萬州曦僭位二月丁巳自重慶引兵入䕫州命張巖督視江淮軍馬代邱崈也開府維楊癸未金人陷階州三月壬辰興州將劉昌國引所部兵至州金人始去丁亥皇子圻生二月己未詔禮官討論合行典禮禮官請用熙寧九年故事奏告天地宗廟社稷髙禖諸陵攢宫太師宰臣率百寮拜表稱賀從之癸亥薨追封順王諡曰冲懷庚寅遣淮民歸業詔建康府給裝錢後四日命兩淮帥守監司招集流民辛邜楊震仲飲藥死震仲以通判興元府權大安軍事吳曦以僞命招之震仲不屈而死甲午吳曦僭位於興州下黃榜於四路以安丙為丞相權行都省事丙稱疾不出戊戌利路轉運判官陳咸不受僞命削髮於利州之石𨫼案咸傳作后𨫼庚子彭輅奔襄陽先是輅以全州副都統進屯上津癸邜嚴進引兵入成都甲辰陳孝慶罷奪三官二月戊申雪楊輔大書開禧年號輔時為成都府路安撫使下令稱提錢引大書開禧之號以揭之墨榜凡數千計曦之遺諸貴人書也輔獨深止之曦不悅再與費士寅書略云成都侍郎獨不相察使曦不從權濟難就其和議北人深入何以為計相公可為問之蓋費公所答曦書其詞猶婉而楊公之書其語甚切故也是時四路行移獨成都安撫一司不去開禧之號其後董鎮誅啓篋成都得遺曦書藁有云楊侍郎未肯通情云壬申金人退始御正殿復膳甲寅竄商榮削奪官爵桞州安置己未吳曦反書聞程松罷以四川宣撫遁歸故也楊輔為四川制置使自成都府路安撫除以蠟書逹之葉適兼江淮制置使自㳂江制置除韓托胄與吳曦書許以茅土之封書與御札同發托胄書云伏自正月十九日辱調雲二字號鈞翰之後此月旦日嘗附庚牌遞上狀諒以呈逹多日不聞動止之詳正切瞻仰忽傳聞不一深以為疑有如先世勳德之盛中興之功居第一契丈平日忠誠許國托胄所深知度必無是理鈞意或以權宜割地與之連和姑為保全蜀之計此非排難解紛之舉程樞既凡事背馳已為敷陳與之祠祿矣萬一虛傳果或有之更望深入鈞慮敵情難測前事可鑒若恩自上出增光前烈子孫之傳可與蜀山同其永久豈不偉歟托胄平昔荷知愛之厚非他人之比故冒昧言之倘蒙開諾望以首尾曲折來上當即奏聞繼頒茅土之封顒俟寵報托胄不任至望吳曦誅兩日而托胄之書始至按吳曦誅在後乙亥日此目因托胄寄書事而終言之當事之初托胄已置坤維於度外而捷書奄至都人大喜至今誦之不忘此安觀文之大功所以不可掩也不雨詔大理三衙臨安府决繫囚甲子賑給旱傷州縣貧民命諸路提刑司從宜斷疑獄辛未禱於天地宗廟社稷命有司舉行寬恤之政八條蠲兩淮被兵諸州今年租賦乙亥釋兩浙路杖以下囚三月戊子蠲兩淮被兵州郡役錢庚申罷諸路添差冗員丁邜罷江浙荆湖福建路招軍甲子董鎮以僞命至成都鎮鄱陽人曦之客也戊辰皇子墌生四月戊申薨追封申王諡曰冲懿庚午金人去襄陽乙亥安丙等誅吳曦四川平先是正月辛丑李好義與其徒謀舉義二月壬戌楊巨源至興州見安丙謀之丙喜眀日始出視事辛未鳯州進士楊君玉引楊巨源以見李好義二十六日壬申巨源介好義以謁安公議遂定君玉退與其鄉人白子申共草密詔而安公潤色之二十八日甲戌巨源書密詔以納安公二十九日乙亥未眀好義以所結官軍殺曦于僞宫軍士李貴斬曦首巨源尋以義士至君玉宣密詔安丙權宣撫使巨源為參贊軍事淳熙末安丙為文州曹官有薦于吳挺者檄兼利西安撫司簽㕔時彭人蘇熙之為安撫司幹辦公事以文墨自許視旁人無如也挺之館客有李姓者挺子旰之外姻也德夀宮慶典李為之草表以賀表文中有揚命二字既行矣熙之一日挾尚書以進謂挺曰導揚末命此顧命中語李何用之挺大驚追之不及由是李與旰皆恨之未幾趙彥逾來蜀總計舊例西帥遣蜀官一員往迓則計使舉以京秩熙之既為旰李所憾乃共薦安公代之彥逾見之甚喜他日從容謂曰太尉統衆六萬得毋例有虛籍者乎安公不敢盡言則曰某所若干某所若干以實論之可五萬三四千人耳居數月彥逾以書來曰太尉忠誠如此盍若損六千人之虛籍寬四川之重賦不亦可乎挺得書謂人曰趙少卿入蜀尚新安得知吾虛實此必安丙告之耳乃大怒旰李共為解遂己未幾丙秩滿入都因為蘇代挺記其前事欲拒之旰李乃言曰使其果有是勢當自疑今調此官以來可亮其無它也安公為人警敏凡事盡力挺更喜之為延譽於諸司改秩而去及曦為殿帥安通判隆慶府又遷知大安軍比軍興首辟隨軍轉運旋以救荒有緒復遷一官為朝奉大夫逮其稱王即除丞相長史都省事俄楊李之議合安公遂决䇿誅之蓋居不疑之地操可致之資其勢順也天之祐宋夫豈偶然哉武興之變立功者安觀文為之主楊巨源李好義倡率忠義次之李貴手斬逆賊又次之若李好古安癸仲楊君玉李坤辰張林朱邦寧之徒協謀舉事又其次也立節者陳待制咸為之首史次秦薰目避僞次之李國博興宗棄郡而去又次之若王釡李道𫝊皆不受逆儔之招又其次也楊泰之鄧性善程遇孫宋之源文俱家子欽劉端友劉靖之楊汝眀張方家大酉楊修年梁梓詹久中朝子儀錢元儒龎坤載張權鄧諫從袁桂楊鼎年李莊程公說避僞去官又其次也死節者一人權大安軍楊震仲始終不奉行僞命者一人成都帥臣楊輔也其餘拒僞歸朝如劉侍郎甲李校書􅐉稱疾不視事如李侍郎寅仲等尚多有之誅曦及復四川功將士共轉三十萬官資犒賜共用金七十兩金盤盞一副金𢃄五條金束𢃄一條銀六十一萬七千七百七十三兩絹六十一萬六千九百二十四匹錢八萬二百五十引自昔亂蜀者非蜀人如張魯李特劉闢王建孟知祥之類皆北人也本朝王均張信東京人王孝忠蔡州人中間惟饑民王小波以嵗荒盜食耳非本有反意也近者吳曦兄弟與其謀主姚淮源米修之皆德順軍人董鎮饒州人方是時東人有為元帥者為奉使者擢牧者護漕者詳刑者皆方舟而去而糾合忠義克清大憝挈六十州之地以還天子者又西人也曦既死凡前日東人之任悉西人為之自是井絡清夷四方之士稍稍而至漸復承平之觀矣三月丁丑誅徐景望以受僞命入利州逐總領官也己邜利東帥劉師文帛書至行在復賜帛書令從長處置辛巳費士寅誅董鎮於廣都鎮曦之客傳僞命於成都者也時士寅新知潼川府未上鎮至廣都為士寅所殺鎮有遺曦書言楊侍郎未肯通情蓋指楊輔云丙戌賜安丙帛書諭以能殺曦報國當不次推賞雖二府之崇亦所不吝於是曦已誅而朝廷未知也丁亥趙彥呐誅祿禧於夔州禧曦之將也避曦嫌名更名祁引兵入夔州為新潼川府觀察推官趙彥呐所殺己丑瀘帥李君亮遣間使至行在就賜費士寅帛書令叶心經理癸巳復西和州興州中軍統制李好義復之丙申命吳獵兼總西事庚子誅吳曦露布至行在朝廷大喜四月丁邜曦函首至行在詔赴都堂審驗戊辰獻於廟社梟三日先是露布既聞詔侍從兩省臺諌集議吳曦刑名命四川宣撫司籍曦産尋詔吳曦妻子論死外其男年十五以下送二廣州軍編管吳璘子孫移出蜀吳玠子孫免連坐尋詔存吳璘廟祀追奪曦父吳挺官爵安丙知興州兼四川宣撫副使除端明殿學士楊輔為宣撫制置使兼知成都府許奕為四川宣諭使以起居舍人充竄程松落資政大學士奪六官筠州居住尋責授順昌軍節度副使澧州安置復鳯州忠義統領張翼復之辛丑曲赦四川降雜犯死罪囚釋杖以下乙巳復黃牛堡忠義人劉信復之夏四月戊申吳獵兼四川宣諭使自湖北京西宣撫使改命命四川宣撫司察守節官吏及從僞者具以名聞吳獵德夫之為四川宣諭也時僞命者尚在州縣而士大夫往往持脅從罔治之說務為闊略僉謂德夫素有聲且舊從張敬夫游於義利善惡之間講之熟矣是宜翕然以旌别淑慝望之李道傳時在益昌德夫語之曰獵欲捐此曹暗昧之過隱而弗章俾之悔悟因而釋之今但以揚善為先則此曹當愧死矣始德夫及䕫門而有制帥之命旋又中格遲留沔州樂飲旬日遂如漢中先以輜重浮嘉陵而下至望雲舟敗凡通犀美玉粟金杯斚之屬往往飄沒焉漢中留餘月復還益昌蓋托胄許以蜀帥命之故遣人往湖外挈其孥而遲留以俟命耳宣諭月俸如宣撫德夫以丁邜夏初入峽戊辰春末還䕫州首尾一年自德夫至賔客吏士共費大軍庫錢近二十萬緡而諸司聘幣不在其數於是陳和甫劾從僞者八人得㫖除名編管而副宣撫司奏駮之事下德夫核實初德夫為湖南管庫宋若水子淵郎中提㸃刑獄率諸司共以京秩薦之子淵之子龍游令之源時權宣司凖備差遣馳至益昌營救其事德夫謂之源吾當檄君往諸州究實君其為諸人道地事可無它之源曰之源但能𨗳逹此意於公若受檄而行即當以實告耳德夫罔措㑹朝廷用制置司奏免馮光弼等三人編管但除名事乃已德夫早為劉文濳司業幕客又受丞相趙溫叔雄所知文濳死於謫籍常欲厚報之㑹溫叔之子昱除知廣安軍久病不及赴而死文潛之長子坊以病廢其中子塈通判漢州遇寒疾數日卒德夫欲率宣制二司為奏言昱暨以逆曦僭叛憂憤至死乞褒贈之源持不可德夫笑曰君迂濶乃爾不藉是何以報二先生之恩耶楊輔嗣勳得書亦不從德夫乃與宣撫司同奏追復文潛集撰職名諡溫叔曰文定德夫留益昌久之不得命㑹朝㫖召德夫還至䕫門居數月托胄誅死錢象祖伯同為相力薦嗣勳可大用遂召入卒以德夫代之按韓托胄誅死及吳獵代楊輔帥蜀皆是年十一月以後事此蓋因叙吳獵事蹟而終言之德夫始上淑慝之章其所薦以劉光祖舍人為首青城山道人安世通次之又薦郡守至選人五十餘人凡四川科目之士及執政侍從監司帥臣子弟親朋莫有遺者章上得㫖人數猥多難以行遣令核實具奏後卒不行而所慝者脅從餘黨九人己巳春末朝廷始下其章首尾凡二年諭司所行止此而已及為蜀帥辟幕客近三十人皆親舊及要勢所薦之士日燕飲賔客為樂始嗣勳在蜀嵗餘激賞庫所積錢至七十餘萬德夫盡費之有合州人杜源者為蓬州守坐上逆曦表為御史中丞所劾竄賀州報至德夫適受謁即摘前知利州某前知重慶府某語之曰二君頃在郡得毋例為此乎儻有之幸密以告獵當類奏可無他慮不爾懼為人所持二客謝無之聞者傳以為笑德夫有外姻厚載以入蜀成都稅官丹稜史某征其稅八百緡德夫大怒欲按之史懼而不取德夫怒未已賔客重為謝乃止有趙綱者為利路漕以婦死擅歸所居遂寧之長江德夫素惡其人幕客以綱擅出境請詰之德夫以綱嘗為宣司所薦不敢問其幕客之輕鋭者共逼之德夫不得已初問不報再問以宣檄為解又持不可德夫曰已問矣恐傷宣司太甚可止也德夫守蜀嵗餘㑹宣撫司罷乃以安子文為制置大使而德夫召去然其為人樂易臨民寬待士有禮故蜀人安之惟識者以不能旌别淑慝為恨李仲衍為成都提刑嘗面折德夫曰侍郎為南軒門人今日所行視南軒豈不有愧德夫笑不答仲衍嘗為人言德夫事輒曰焉得剛云嘉定四年七月詔四川官吏嘗受僞命者毋得叙用五年四月詔自今告人從僞者並指事實誣告者坐之癸丑降德音於兩淮湖北京西被兵諸州降雜犯死罪囚釋流以下湖北京西諸郡仍毋納今年租賦尋又降德音於西和階成鳯州復大散關四川忠義人收復後二十日復為金人所取己未方信孺使金以奉使金國通謝國信所參議往金國議和是日發行在庚申宇文紹節權京湖宣撫使知江陵府自兵部尚書除丁邜召楊輔赴行在奏事托胄既殛死按托胄死在仲冬距此時尚七月目內因楊輔劉師文追赴行在為托胄死後事遂先著于此而不為標明年月蓋此書體例前後錯出往往如是楊公輔劉公師文皆奉詔追楊公力辭劉公先至赤岸草奏言蜀中盜賊羣聚皆有其故軍旅之內物情日益猜阻惟早召安丙一日則有一日之安邉頭諸事權付利東安撫劉甲足得商量循理而行峴首之除章不及上而安公遂除制置大使又六年而後罷焉吳獵為四川制置使代楊輔也戊辰錢象祖參知政事己巳改興州為沔州先是詔吳獵與宣撫司共議分興州都統司軍之半屯於利州五月庚子復置沔州副都統制以好義為之仍分沔州都統司十軍𨽻兩都統節制庚午贈楊震仲官嘉其死節不受僞命也仍官其子一人五月丁丑賞誅吳曦功轉資犒賜之數略見二月乙亥誅吳曦下注戊寅竄受僞命人張伸之等用四川宣撫司奏特貸命除名編配二廣湖南諸州不雨己丑禱於天地宗廟社稷辛卯楊巨源敗於長橋與金兵戰為所敗案宋元通鑑安丙誣巨源謀亂長橋之役巨源方戰丙密遣彭輅收送閬州獄未至殺之以自殪聞此但以自敗為文巨源傳亦然赦天下以太皇太后服藥故太皇太后崩諡曰成肅權攢於永阜陵后母儀三世正位凡三十有二年弟淵官至少傅保順軍節度使賜玉𢃄后崩遺命賜淵錢十萬緡金二千兩田十頃僦緡日十千焉戊戌楊輔依舊四川制置使召吳獵喝犒畢赴行在奏事辛丑李好義敗於秦州案本傳好義欲乘勝徑取秦隴而安丙令但守故疆不得侵越不言好義之敗好義襲秦州敗而還六月甲寅賞守襄陽功己未李好義遇毒死癸亥林拱辰使金林仲虎副以通書官方信孺自軍前歸言金有和意也張巖之督視江淮軍馬也遣信孺往河南行省求和北帥布薩揆許納南使且禮遣之信孺既行揆復使人諭之曰已奏朝廷更得安宣撫與西元帥一書乃善托胄以書遺安丙諭指安公難之久之乃作書如所云且餉以藥物縑幣西帥啓緘却餽而令鳯翔府路都統使完顔昱作書以來大略言當聼命於行省而已時朝廷遣三使入北一通謝二告哀三賀生辰通謝使者拱辰是也案告哀使為富琯生辰使為劉彌正金已遣迓使來已過泗州矣復却回之曰皇帝聖㫖南使中惟李壁吳琚朱致知李大性四人言語可信當遣來議事今所遣小使且還琚隆慈之弟子位至少師節度使致知嘗以右司郎中出賀庚申正旦未還道除司農少卿俄引年除直龍圖閣主管雲臺觀大性字伯和南昌人嘗為户部侍郎琚與致知時皆已死金又欲朝廷割地損禮由是不諧云癸酉安丙殺其參議官楊巨源先是巨源擅殺孫忠鋭於鳯州案史安丙素惡忠鋭令巨源殺之遂以忠鋭附僞聞於朝蓋以附僞誣忠鋭又以擅殺忠鋭誣巨源也既而有長橋之敗前一日執巨源以屬吏是夜遣將官樊世顯殺於大安之舟中吳禮部題鄧平仲小傳後隆山牟君成父之父祖仕宋皆有列於朝君早侍左右凡典章故實具能言之號稱博洽此其書鄧平仲及濟邸事以遺曹士宏者蓋士宏以史事自任故屬之如此吳曦之誅實楊巨源結李好義舉義之功為丙輩媢忌掩沒今監丞衆仲跋語舉以為言當矣前代記曦之事詳者惟李心傳嘗讀其朝野雜記亦略于巨源近有續陳均宋編年者頗載巨源事而多舛錯雖能書安丙殺其參議官楊巨源而復以擅殺孫忠鋭之罪歸之大概當時歸功于丙故其事不白惟俞文豹吹劍録具載巨源本末併所撰詔書及丙與彭輅謀奪巨源兵令樊世顯殺之于大安城下又言其妻子流離困苦狀使人憤惋蜀多義士編年亦並載平仲之志壯矣使牟君不記世未必知也余疇昔好聼遺老談說見稗官野史有可備記述者輒不忍棄如俞氏所云皆録藏于家今不能悉記姑誦其略以附焉吁牟君豫不及識今不可復作矣吾儕晚出者亦且老後來尚復有談此者乎良可慨也案此跋非本書文蓋永樂大典採取附入曦之誅楊李二人功也安丙本曦黨其奏功抑二人而反以曦將王喜居首使王喜鴆好義誣巨源以謀亂宋史巨源𫝊雖言丙奏巨源功苐一而奬諭詔書並不及巨源但補承事郎而王喜授節度其非事實可知史于二人傳不明著其寃但微及丙之媢疾殘賊至丙傳更無貶詞此書于丙亦微其詞是跋頗得安楊之曲直故仍附于此吳禮部名師道元人秋七月乙酉下罪已詔以大水及飛蝗為灾也詔曰朕德非類致天之灾比者郡邑間被大水加以飛蝗為孽永惟咎徴震悼于衷二三大臣其助朕思正厥事以迪百工俾內無誕謾私詖之風外無貪墨暴刻之政其有灾傷當行賑恤者具狀以聞毋得蒙蔽矧今兵戍久勞瘡痍未息一念及此痛如朕躬疆埸之吏尤當極力綏輯稱朕閔恤元元之意焉八月壬戌劉師文為四川宣撫使以密劄除之命隨所在置司事訖奏九月丁丑詔警邉備詔以和議未可就令諸大帥申警邊備時通書官方信孺自濠州歸白事于朝信孺言金人所欲五事韓托胄問其目信孺言一割兩淮二增嵗幣三犒軍金帛四索陷沒及歸正人五不敢言托胄再三問之信孺惟稱不敢托胄厲聲曰若不言朝廷當有行遣信孺徐曰欲太師首級耳托胄大怒以穢語詈之于是信孺坐擅以私覿物作大臣遺金人降三官臨江軍居住尋詔通謝使還行在命淮西漕臣章頴措置雄淮軍己邜召辛棄疾托胄復有用兵意遂除棄疾樞密院都承㫖疾速赴行在奏事會棄疾病死乃已辛巳召張巖日下前來奏事以督視久無功故也後十三日甲午罷之壬午貶方信孺注見上甲申減極邊官吏舉員丁亥葉適罷辛邜趙淳兼江淮制置使以殿前副都指揮使兼代葉適也辛丑王柟使金自主管臨安府城南左廂公事差監登聞鼓院出使冬十月乙巳蠲臨安紹興賦降囚罪一等民緣攢宫役者蠲其賦丙辰以邊事詔諭軍民詔曰朕寅奉基圖遹遵祖武憂勤弗怠敢忘繼志之誠寡昧自量尤謹交鄰之道屬邊臣之妄奏致兵隙之遂開重困生靈久勤征役省躬自咎攬涕何言苐惟敵人隂誘曦賊計其納叛之日乃在交鋒之前是則造端豈専在我況先捐泗上已得之地亟諭諸將斂戍而還蓋為修好之階所謂不逺之復適傳來欵自我元戎庸告九廟之靈併嚴三使之選束裝于境待報即行凡所要求率多聼許彌縫既至悃愊備殫無非曲為于斯民詎意復乖于所約議稱謂而不度彼已索壤地而擬越封陲規取貨財數踰千萬雖盟好之當續念膏血之難朘兹敷露于腹心用申警于中外深惟暴露重痛死傷疆埸耗于流離郡縣煩于供億致汝于此皆朕之愆當知今日之師愧非得已而應豈無忠義共振艱虞思祖宗三百年涵濡之恩拯南北億萬衆創殘之苦上下同力遐邇一心鑒既往之莫追幸方來之有濟嗚呼事雖過舉蓋猶繫于綱常理貴反求況已形于悔艾凡我和戰視敵去來各肩衛上之忠茂建保邦之績繄爾有衆體豫至懷自用兵以來蜀口江漢之民死于兵火者不可勝計公私之力為之大屈而托胄歸罪金人佳兵之意未已國人憂之遂有去凶之議焉十一月甲戌韓托胄陳自强罷御筆韓托胄久任國柄粗罄勤勞但輕信妄為輒啓兵端使南北生靈枉罹凶害今敵勢叵測専以首謀為言不令退避無以繼好息民可罷平章軍國事與在外宫觀陳自强阿附充位不恤國事可罷右丞相日下出國門乙亥韓托胄伏誅先是金人既有縳送首議用兵賊臣之請托胄怒復欲用兵中外皆懼禮部侍郎史彌逺時兼資善堂翊善乃建去凶之䇿其議甚祕人無知者久之得密㫖乃以告參政錢象祖李壁至是皇子榮王入奏遂有此㫖仍命殿前司中軍統制權主管本司公事夏震選兵三百防護托胄别選兵二百守其府門錢參政欲奏審史侍郎夜往其府趣之李參政亦言恐事留或泄乃已三日乙亥托胄入朝至太廟前震呵止之其從者皆散護聖步軍凖備將夏挺以帳下親隨三十四人擁托胄輿以出中軍正將鄭發王斌引所部三百執弓鎗刀斧護送至玉津園側殛殺之是日新除右諌議林行可方請對宰執至漏舍自强語同列曰大坡案托胄傳作大成今日上殿俄而托胄前驅至錢參政倣徨不知所為既而震報托胄已押出權吏書兼給事陸峻工侍兼京尹趙善堅失色相與耳語同列叱之錢參政探懷中堂帖授自强曰有㫖丞相罷政自强即上馬顧曰望二參政保全二參政赴延和殿奏事遂以竄殛托胄事牒報對境又令殿前司遣素隊五百人赴省前彈壓丙子制罷托胄為醴泉觀使丁丑責為和州團練副使郴州安置行中丞衛涇章疏也給事中雷孝友封還録黃戊寅詔托胄改送英德府安置是日又詔托胄除名勒停送吉陽軍安置仍籍沒家財行司諌王居安章疏也已邜臨安府申托胄已身故案托胄以乙亥殛死然未眀正典刑故丙子後尚遞行責降而終以身故為文蓋當時諱之也史丞相之請除托胄也惟一二執政近臣知之前數日托胄在都堂忽謂參政李壁曰聞永嘉人欲變此局面相公知否李疑事泄徐答之曰那有此托胄默然前一夕托胄與其愛姬號滿頭花者方飲酒周筠自外至曰事欲不善托胄笑曰誰敢爾筠再言不應懼而去詰朝遂坐殛夏震者本壁所薦托胄命攝殿巖後以擊托胄之勞終于節度使托胄之妻吳夫人者憲聖后姪女也蚤死無子托胄既貴四婢張王談陳皆有寵纍封至郡國夫人所謂四夫人也每內宴往往宣押與妃嬪雜坐恃勢驕倨掖庭皆惡之其下又有封恭人或安人者甚衆托胄殛死四人皆知不免盡取其珍寶瑰異之物擊碎曰無為它人有也後二日言者論之乃詔四夫人以下悉追毁告命放令自便既復以四人屬吏又二十有二日獄成詔張福兒王美憐各徒一年談陳各杖一百餘六十人令臨安府縱歸其家托胄用事十四年威行宫省權震天下初以預聞內禪為已功竊取大權中則大行竄逐以張其勢始則朝廷施設悉令禀命後則託以臺諌大臣之薦盡取軍國之權决之于已褒引奸邪分布要路陵悖聖傳以正學為僞學橫誣元老以大忠為大逆私意既行凶焰日熾交通賂遺奔走四方童奴濫授以節鉞嬖妾倨肆于掖庭創鑿亭園震驚太廟之山燕樂語笑徹聞神御之所窮奢極侈僣擬宫闈凡除擢要臣選用兵帥皆取决于厮役蘇師旦之口已所欲為不復奏禀徑作御筆批出軍事既興又置機速房于私第應御前金字牌悉留其家凡所遣發未嘗關白方其出入禁庭了無顧忌雖孝宗皇帝疇昔燕坐思政之所亦偃然冒居老宫人見之為之感涕嵗時錫燕內庭親王戚里預焉可也師旦刑餘賤人乃邀至其間更相酬酢䙝瀆名分一至于此勢焰熏灼視公卿如奴僕宰相以下匍匐趨走一則恩王二則恩王甚者尊之以聖呼以我王除太師麻詞有聖之清聖之和等語除平章麻詞有超羣倫洞聖域等語髙文虎之子似孫為祕書郎因其誕日獻詩九章每章用一錫字托胄當之不辭辛棄疾因夀詞贊其用兵則用司馬昭假黃鉞異姓真王故事由是人疑其有異圖自知積失人心中外皆怨乃為始禍之計蓄無君之心謀動干戈圖危宗社盛夏出師㳂邊赤子骨肉流離肝腦塗地死于非命不知其幾千萬人與逆曦結為死黨假之節鉞授以全蜀兵權曦之叛逆誰實使之方曦之叛蜀人盛傳金封托胄為吳王又謂托胄欲與曦分吳蜀之地而王之有司簿録其家多有乘輿服御如居用木圍寢用龍衾坐用升龍牙床飾以真紅絛結如此等類意欲何為稽其稔惡雖寸斬之亦不足以謝天下殛死之日京都士女歌舞於市方其盛時鋤害善類不遺餘力及其敗也黨錮諸賢無不録用褒賚九原哀榮千古雖暫為所抑要之以久公論未嘗不伸也而識者以中間葉適吳獵之出為恨云參政錢象祖兼知樞密院事李壁兼同知樞密院事上欲擢史侍郎樞密固辭乃命錢參政兼知院李參政兼同知是日禮部尚書衛涇除御史中丞吏部侍郎雷孝友除給事中著作王居安除左司諫晚召直院章良能鎖學士院丙子托胄自强並罷為醴泉觀使按時隱托胄之誅故既死而猶行斥逐之命此條已見前目內此亦復出李參政進呈改自强提舉洞霄宫特進在外無充觀使者丁丑殿司三將各進五官賜銀百兩士卒官賞有差而夏震再遷福州觀察使主管殿前司公事以罷逐托胄意詔天下詔曰朕德不明信任非人韓托胄懷奸擅朝威福自己劫制天下首開兵端以致兩國生靈肝腦塗地興言及此痛切於𠂻矧復怙惡罔悛負國彌甚踈忌忠讜廢公狥私氣焰所加道路以目今邉戌未解怨毒孔滋凡百縉紳洎於將士當念前日過舉皆托胄専恣欺罔非朕本心今既遷逐一正權綱各思勉旃為國宣力飭兵謹備以圖休息稱朕意焉丁丑貶竄陳自强追三官永州居住行衛涇章疏也雷孝友封還録黃戊寅詔自强責授武泰軍節度副使依舊永州居住是日又詔送韶州安置行王居安章疏也四月丁巳自强責詞過門下給事倪思不書黃戊午自强再責復州團練副使雷州安置仍籍沒家財六月癸酉陳自强卒於廣州詔許歸葬己邜蘇師旦伏誅前一日丁丑師旦杖脊刺配吉陽軍行衛涇章疏也己邜給事又論師旦當正典刑詔處斬令廣東憲臣蒞其刑妻子編置有司簿録托胄家得師旦所與書云步軍司人少殿前司人多今欲殿前司人只與步軍司相等却撥殿前司所多之人别立一軍使信臣掌之信臣師旦自謂也故處以極典配周筠决眷刺配嶺外詔求言詔曰奸臣擅朝畏人議已専事壅蔽下情不通政理多闕今既竄殛當首開言路以來忠讜中外百僚其各條具所見以聞史彌逺除禮部尚書辛已竄鄧友龍再奪五官南雄州安置尋又除名勒停循州安置以邱崈知建康府自通奉大夫提舉臨安府洞霄宫除資政殿學士留守乙酉置御前忠鋭軍丙戌衛涇簽書樞密院事兼參知政事丁亥詔立皇太子詔曰古先哲后丕建元良祖宗以來厥有彝典朕獲承至尊休德十有四載而主鬯尚虛非所以重大器正大本也皇子曮天姿英粹學問日充望足繫於人心言有禆於治道蔽自朕志處以儲闈用衍萬世無疆之緒立為皇太子改名懤李壁罷初命除職與郡後二日又復降兩官送撫州居住行殿中侍御史章疏也戊子竄郭倬郭僎案本紀梅州安置乃郭倪郭倬開禧二年已誅于鎮江此本疑有誤治喪師之罪也倬梅州僎連州並除名安置籍其家癸巳貶張巖奪二官徽州居住己亥赦天下以立皇太子也十二月乙巳邱崈為江淮制置大使案本紀在癸邜時趙淳已為江淮制置使故加大字以别之罷山東京東安撫司尋又罷京西北路招撫司許奕使金吳衡副之乙巳太白晝見庚戌貶許及之薛叔似及之奪二官泉州居住叔似奪三官福州居住案本紀叔似亦奪二官竄皇甫斌再奪五官英德府安置癸丑金人陷隨州辛酉錢象祖為右丞相兼樞密使衛涇雷孝友並參知政事林大中簽書樞密院事甲子楊次山除使相次山后之兄也以太尉除開府儀同三司賜玉𢃄乙丑史彌逺同知樞密院事丙寅贈吕祖儉官朝奉郎直祕閣官其子一人丁邜詔改明年元是月四川宣撫司科對糴米時宣撫副使安丙也檄東西路漕各糴米二十萬斛䕫路漕司十萬斛制置司抱認於成都府糴十萬斛並遣官運送沔州制司屬官見之皆忿曰我比司也乃為若市米邪端明楊輔曰理不可拒苐徐為之圖可耳時宣撫司方科民戶對糴米乃報以抱認六萬斛其半本府坐倉其半九縣對糴既而楊公召歸事亦遂已對糴米者紹興初有之休兵後罷去蓋每民戶稅産一石則科糴一石故謂之對糴焉是嵗以建康鎮江三務場徑𨽻提領官四提轄謂𣙜貨務都茶場雜買務雜賣場文思院左藏東西庫是也𣙜貨務場掌鹺茗香礬鈔引之政令紹興初㳂宣政舊例置提領官率以故省吏為之後乃改用士人行在建康鎮江三務場嵗入凡二千四百萬緡建康一千二百萬行在八百萬鎮江四百萬皆以都司提領不係户部之經費而在建康鎮江者分屬總領所焉開禧末以總所侵用儲積錢始令徑𨽻提領官不屬總所四川初行小㑹子尋廢不用東南㑹子有四品自一貫至二百蓋便於轉用也川錢引則分一貫及五百而已丁邜嵗陳咸以用不足始創小㑹子楊輔為制帥深不樂之故西州皆不用吳獵代鎮蜀與陳咸厚下令官民悉許流轉然州縣務場賦輸悉不肯受由是不能行後但以其五萬緡收兑舊引於劍外諸州已而亦廢是時宣撫司又為金銀㑹子後亦不行
