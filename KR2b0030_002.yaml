body:
  text: 兩朝綱目備要卷二光宗紹熙二年辛亥春正月詔修紹熙會計録辛未丁丑兩次降㫖先是祕書郎鄭湜轉對為上言今黃老之宫衛卒動以百數外戚家廟防護之兵多於太廟額外將校之俸錢半於正額外庭百執之費不足當閣門醫職近侍之半請明詔大臣裁定經費上自乘輿下至庶府除奉宗廟事兩宫給兵費之外一切量事裁酌罷其不急損其太過趙彥逾為户部侍郎因請稽考內外財賦置紹熙㑹計録俟見大概之後命户部宰屬同共詳議而一二大臣公心協意為之斟酌以其所減捐以豫民遂命户書葉翥中執法何淡等與彥逾同為之未幾淡丁內艱去官後亦未聞有所減也詔稽考裁節浮費合同慿由司者宫禁所由取索也嵗取金銀錢帛率以百萬計版曹但照數除破耳雖有嵗終比部驅磨之令然郎官第赴內東門司終日危坐而數璫與數㜮自為會計郎官不得預畢事則卷牘尾示之俾書名而已是年春議者以為濫豫橫賜無以撙節請自今內諸司所給賜所營造所取索悉從有司定為中制惟正之供濫恩橫例皆釐正之詔葉翥趙彥逾何淡同稽考其後亦不果裁節焉夏四月初命任子簾試銓試者舊有之凡任子若同進士出身之人皆赴建炎兵火後權停紹興三年始復舊去年八月司業計衡又奏乞中選人就吏部長二廳前簾試試中然後許參選至是吏部條具如所奏內同進士出身并恩科人便不簾試仍下四川制置司一體施行從之黃由時為考功郎官建言今已增試律義自不須更簾試大臣進呈上曰簾試以革代筆之弊正當加嚴豈可廢也明年八月謝深甫又言銓試不中四十以上注殘零闕人乞令郎官就長二㕔寫律一條俾之解釋如或不通未得參注從之復置詳定敕令局工部侍郎潘景圭言法令一書久不刪潤乃復置詳定敕令局差詳定官一員刪修官三員然未有所進也慶元四年後次第修進五月屏太學生余古淳熙末復置補闕拾遺以薛叔似許及之充上即位薛許遷將作軍器監併其官罷之謝諤為御史中丞言其不可旋亦罷自是近臣罕進言者至是古上書曰恭惟皇帝陛下春秋鼎盛自即位以來星見再周當思付託之重朝夕勉維求治之道為急間者側聞宴遊無度聲樂不絶晝之不足繼之以夜宫女進獻不時伶人出入無節宦官侵奪權政隨加寵賜或至超遷內中宫殿已歷三朝何陋之有奚用更建樓臺接於雲漢月榭風亭不輟興作深為陛下不取也甚者奏雜戲樂習齊郎舞乃使幸臣嬖妾雜以優人聚之數十飾以怪巾拖之異服偹極醜惡以致戲笑至亡謂也詩云靡不有初鮮克有終况不能謹厥初哉自古宦官敗國備載方冊臣觀宦者之盛莫如方今上而三省下而百司皆在此曹號令之下蓋自副將而至殿步帥各為髙價不問勞績過犯驍勇怯弱但如價納賄則特㫖専除故將帥率皆貪刻軍士無不饑寒兵器朽鈍士馬羸瘠未嘗過而問焉設有緩急計將安出此為害之大者良由公卿持祿保位偹員全身如漢之石慶唐之蘇味道滿朝皆小人也求海內不盜賊民生不塗炭日月不食水旱不作可得乎臣不望陛下如舜之茅茨禹之菲惡但願陛下無池其酒而林其肉玉其臺而瓊其室無聼亡國之音無視傾城之色陛下誠能以漢文帝為法唐莊宗為戒即乞昭示詔㫖嚴下約束除太常樂工立定員數凡俳優抵戲皆放而為民美女麗人自今日而無獻宴開以時酒進以數宦官不得干預朝㫖惟侍膳羞奉湯藥備灑掃之外有以文武官姓名賢否聞者坐以重罪有直以差遣遷除奏聞者戮於市朝必罰無赦佞幸悉去忠良並進陛下求不垂拱以髙揖羲黃亦不可得也問安侍膳之餘宫庭燕閒講讀經史無為南面或鼓琴投壺習射以頤飬神性享名教不窮之樂固嵩嶽無涯之夀豈不休哉帝覽書震怒始議特㫖編管言者救之乃送秀州聼讀古錢塘人云是夏右丞相留正復請建儲案本傳正改元即進左相此尚稱右與史異上曰俟過宫與夀皇議之既而諭正夀皇聖意亦欲少緩六院官復入雜壓六院官者登聞檢鼓院監官各一員諸司諸軍糧料院幹辦官各一員諸軍諸司審計司幹辦官各二員官告院主管官二員都進奏院監官二員例以京官知縣有政績者為之亦有自郡守除者則繼即除員外郎故恩數略視職事官而不入雜壓然自紹興已來六院彌重號為察官之儲矣淳熙初龔茂良秉政其內弟林宓幹辦審計司遇郊恩而林尚京秩茂良乃白上以六院官班寺監丞之上林用是得封贈父母茂良後為謝廓然所攻此其一事也至是始復入雜壓其班在五寺主簿之下太學博士之上六院官皆得轉對但不入品耳秋九月寬四川改官法制帥京鏜以京官知縣闕人為詞奏乞增放散員數朝廷難之然自後或非時覃恩或制司奏請則必遞䟎一年開禧三年吳獵為宣諭使又請侍班人不俟改官一面注擬從之後三年議者以為不然乃復舊制是秋中丞何淡以憂罷淡有所生繼母之喪請解官持服既又上疏言不逮事請下臺諫給舍議之太學生喬嚞朱九成黃㑹卿移書責淡曰竊謂人之大倫莫重於父母禮有出繼其服雖異而鍾於天性者未嘗不同也故所承父母則三年終喪而所生父母則心喪三年閣下自長成均而更長臺諫此三綱五常之所繫者也若夫進退去就亦自有義存焉此閣下之所素講豈一介小生得以進說於其間今聞閣下有所生繼母之喪初請於朝欲解官持喪太學諸生莫不義之繼聞上疏稱解逮事不逮事之異中外閧然雖愚者亦以為駭夫禮經所謂逮事父母則諱王父母不逮事父母則不諱王父母非謂無恩於先祖也蓋逮事父母則親聞父母之言所嘗諱其祖不逮事父母則不聞父母之言所嘗諱其祖是以子莫知其所諱也故本朝方慤解此一節以謂特庶人之禮耳若學士大夫則知尊祖矣何逮事之拘乎今聞閣下引此以附逮事不逮事欲不持喪恐與禮經相反何者禮經謂逮事父母則從父母之言今閣下所生之父果以繼室為正乎若所生之父果以繼室為正則閣下亦當從而為正不得黜之也今四十餘年以所生繼母事之及其終也反以為生不逮事而不持心喪可乎夫閣下之志必謂所生繼母無生我之恩則不當為所生之繼母服抑不思黜其所生之繼母是賤其所生之父也為人子者尚忍言哉不然必以生我者為正而繼之者為不正是閭巷小人知有母而不知有父者也非天理之公也非人倫之正也閣下為天子耳目之官將以厚人倫正風俗正宜致辨於此又聞再入奏疏欲下給舍臺諫議之夫朝廷専設奉常此儀禮之所由出也今不從儀禮所由出之地以定禮文不公諸侍從朝列以集議獨以臺諫同列之官給舍表裏之班而議之識者有以窺之矣且閣下今居要路去政府為咫尺或者將逄迎希合以為禮之不當去欲為它日進身之階則誤閣下之事大矣閣下平時所行所為亦無玷者獨為大節有所未明此尤愚之所未信也又恐或者必有汨亂聰明妄引邪說使閣下遲疑不决以取謗於天下此愚所以惓惓忘其僣越欲閣下一聼之也雖然使閣下流涕感泣以所生之父為念特為所生繼母持喪以義起禮扶持三綱慨然辭位於朝以歸而他日朝寧之間徐以國家為念起復召還以副所望此豈非閣下之盛德事乎時淡方待命六和塔得書遂去官四年冬以終喪召未至除煥章閣直學士知明州慶元初趙汝愚既免相復召為御史中丞明年春遂執政矣冬十一月壬申冬至郊風雨大至上震懼始感疾云上不豫紹熙三年壬子春正月御內朝以疾未盡去故也議朝重華宫不克行上昉御內朝而疾未盡去於是重華溫凊之禮與夫誕辰節序屢以夀皇傳㫖而免其後上神思浸清宰輔百官至於韋布之士以過宫為請者甚衆往往叩額引裾號泣而諫近臣黃裳尤袤羅㸃陳傅良孫逄吉諸生汪安仁程肖說林略鄭大年許諤陸景仁鄭萬其首也聖情開悟屢有翻然夙駕之意既而不果都人始憂三月定雜藝不許任子法伶人胡永年者積官至武功大夫遇郊乞任子吏部尚書趙汝愚奏永年樂藝出身難以任子望立為定法今後似此雜藝補授之人不許奏補從之李心傳曰此等事非遇子直則他人必且倣行遂為弊法矣但永年本伶倫而官正使前後遷補乃無論列之人亦未可曉夏四月補童子吳綱官案通考作吳剛光宗一朝童子求試者十七人無補官者惟從事郎吳綱年九嵗能誦六經語孟以夀聖親姪孫特改承務郎仍依初補法是夏皇伯嗣秀王伯圭拜太師秀安僖王者髙宗兄行也名子稱太祖皇帝少子秦康惠王之五世孫王之第二子普安郡王是為孝宗紹興十三年王薨於秀州贈太子太師普安為皇太子加贈王太師追封秀王隆興元年始詔即園立廟如濮王例伯圭其長子也初以門䕃官歷任淳熙慶夀禮成拜安德軍節度使九年遷少保封滎陽郡王十五年遷少傅十六年上受禪遷少師始稱皇伯紹熙元年遷太保封嗣秀王至是乃拜太師本朝親王生拜太師者五人真宗朝楚王元佐仁宗朝燕王元儼哲宗朝吳王皓欽宗朝燕王俁越王偲皆以父兄行乃得之伯圭以宗室特拜太師蓋王於上為親伯父用優禮也寧宗朝除兩鎮節度使慶元中薨封崇王諡憲靖復修蜀鹽舊法自祖宗以來皆民間自煮之嵗輸課利錢銀絹總為八十萬緡紹興二年秋趙開總計始變鹽法盡𣙜之倣蔡京東南東北鈔鹽條約置合同場以譏其出入凡四川二十州四千九百餘井嵗産鹽約六十餘萬斤案食貨志作千餘萬斤通考作六千餘萬斤引法初行每百斤為一擔又許增十斤勿算以優之始趙開之立𣙜法也令商人入錢請引井户但如額煮鹽赴官輸土産稅而已然鹽脉盈縮不常久之井户月額不敷則官但以虛鈔付之而收其算引法由是壞井户既為商人所約因增其斤重以豫之每擔有增百六十斤者又逃廢絶沒之井許增其額以承認小民利於得井每界遞增鹽課既益多遂不可售而引息土産之輸無所從出由是刎縊相尋公私交病是夏趙汝愚為吏部尚書奏言趙開鹽法最為精密今井户多鑿私井務以斤重多寡相髙故鹽日多價日賤而其法大壞乞下總領所參照舊法施行從之時楊輔總計因是遣官核其虛額棧閉助筒二千有竒案食貨志云成都路素仰東川鹽神宗時轉運司止東鹽及閉卓筒井失業者衆逮楊輔為總計去虛額閉廢井申嚴合同場舊法文獻通考亦云輔殘閉廢井又云蜀鹽如仙井蒲江皆大井也若隆榮等十七州皆卓筒小井而已助字似誤申嚴合同場舊法禁斤重之踰格者而重私販之罰鹽直由是頓昂嘉泰二年陳曄總計又盡除官井所增之額焉自慶元後州縣及井户稍舒而民始食貴鹽矣增印兩淮㑹子兩淮會子者乾道二年夏初令户部印給三百萬緡謂之交子不得過江南八年秋以交子易壞始出行在會子收兊至是議者以淮上鐡錢多欲革其弊趙汝愚為吏部尚書與從官陳騤羅㸃謝深甫合奏乞印造兩淮會子三百萬貫付兩路每貫准鐡錢七百七十淮東三分淮西一分依湖北例三年一兊更不申展事下兩省臺諫議議者尤袤等以為可遂施行之其會子仍分一貫五百二百者凡三等許流轉至江池太常州建康鎮江府興國江隂軍界內行用應兩淮上供及户部錢物並權發見錢三年令淮南漕司樁管而沿江八州軍合發上供一半會子則許用交子通融起發於江淮東西總領所樁管焉蓋自紹興辛巳二月以後至紹熙壬子八月以前行在湖北兩淮創行交會總為四千九百六十餘萬緡已敵蜀中之數矣秋七月瀘州軍亂瀘州饒雄等八指揮本都禁兵也宣和末朝廷遣戍其地號東土軍又有騎射營則州禁兵也淳熙末起居舍人王卿月知瀘州賜豫甚厚每出近郊諸兵皆給例物軍士浸驕紹熙張孝芳代為帥欲矯其弊訓練無日又多役使之廪賜或有不時給者是月壬午騎射卒張信等作亂晨入帥府殺孝芳及其家又殺節度推官杜羑駐泊兵馬監押安彥斌訓練官雷世明案世明後又作世忠必有一誤軍校張明是日信擐甲坐閲武堂召通判州事張恂安撫司屬官郭仲溥使作奏言孝芳罪狀於是信自稱第一將衣金紫出諭城中以術人黃叔豹為計議官分其兵為五十二隊同謀者五十二人為隊將皆有爵秩叔豹又為黃旗大書其上曰不叛聖主不殺良民時張明之子昌勇藝為諸軍冠與軍士卞進隂謀討之癸未夜密以告恂甲申信即毬場大饗諸軍恂等皆與酒初行昌進擊殺信於坐會者皆駭散進大呼曰不叛者從我諸軍唯唯從之因執殺造逆者二十餘人餘黨皆捕獲沉其妻子於江制置使京鏜聞變議調西兵千人討之未行而信已誅乃遣鈐轄司屬官陳纘往瀘州措置纘故以武舉入官已而鎖㕔及進士第纘距瀘州未十里留不行既則械逆黨孫成凌遲於午門之外黃叔豹等三十三人皆就戮聚其首以為京觀設孝芳位於午門之右割孫成心腑以祭之而已先是提㸃刑獄王齊輿當攝帥事至果州疑不進及逆徒盡死齊輿始來盡屏瀘人悉以潼川兵自衛事聞有㫖制置司隨宜區處潼川䕫州兩路監帥司趙鞏張激毋邱恪王齊輿劉光祖上連下接密作關防毋致走透時事已平鏜奏孝芳死狀且上恂等功未報鏜赴召煥章閣直學士邱崈奏言孝芳被禍至此雖亦有以自取若不稍加贈恤則於事體有關欲望量賜贈官或官其子若孫一人足彰恩閔又得名正體順詔贈孝芳官三等録子孫二人令總領所制置司應辦葬事崈又言軍士嘗訴於提刑司王齊輿謾不省及攝帥畏避不行張恂及郭仲溥兵未亂前月餘已歃血神祠結約仲溥不能知且與恂為叛黨所脅作奏又縱其餘黨不誅時齊輿已徙江東提刑有㫖與恂等皆罷仲溥仍降三資羑贈二官與一子文學彥斌贈三官世忠贈一官各官其一子張明贈承信郎昌補秉義郎與監押差遣進補保義郎同謀者二十二人皆校副尉其年十一月也即金州起前殿前副都指揮使郭棣知州事棣至瀘與制置司論不合乞祠去明年夏詔棣與外祠命未至州六月會病卒乃命寶文閣直學士章森代為帥又下鏜奏命制置監司議移提刑司於瀘以鎮之既而皆不行命寶文閣待制吳總知州事慶元初鏜為右相乃奏恂調護功除祕閣知石泉軍召齊輿為倉部員外郎仲溥後亦改京官知綿州而卒治擅興罪張信之亂京鏜帥蜀調瀘川所屯御前後軍數百往討之興元都統制吳挺劾制司擅發兵密院葛邲陳騤胡紘進呈得㫖令制司具析命下而鏜已去邱崈入蜀即奏以為三屯逺在西北兵權節制必寄之宣制司朝廷事計當然今軍帥狃於陵夷反謂制司擅興違戾至此豈不大失本意乞下戎司具析仍責令遵守舊制三屯頗嚴憚焉崈所謂狃於陵夷蓋専指挺也是嵗蠲减蜀中重額錢四川經總制錢額理五百四十餘萬緡其一百三十一萬緡贍軍一百三十四萬緡應副湖廣總領所一百六十九緡上供六萬餘緡諸郡支用上初受禪因少監劉光祖之請損湖廣三年錢四百六萬八千緡對减鹽酒重額錢即此錢也然四路憲司嵗嵗撥湖廣錢實止六十萬緡而已又以買物價計之折閲中半僅為三十萬緡楊輔時總蜀計又撙節三十萬緡以益之自紹熙癸丑以後對减九十萬緡之數遂以為常訖開禧丙寅凡十有四年蜀人霑减放之恩無慮一千二百六十餘萬緡上之施博矣紹熙四年癸丑春正月更升差將校法詔江上諸軍升差統制至准備將者令主帥解發三人赴總領所選擇一名事既行諸將皆不以為便慶元三年二月詔今升差並委主帥選擇令總領或屯軍處守臣審核保明申密院紹熙指揮勿行按此附記慶元三年事蓋因升差法終言之原本直標年月編次殊未明晰書中似此甚多今一切姑仍其舊云三月趙汝愚同知樞密院事紹興中髙宗嘗諭趙鼎曰唐用宗室為宰相本朝雖有賢才不過侍從而止乃所以安全之也久之因執政進擬又諭秦檜曰宗室賢者如寺監祕書省皆可以處之祖宗不用宗室為宰相其慮甚逺可用至侍從而止然是時宗室侍從亦未有卓然可稱者逮乾道初汝愚以廷策冠天下已而趙彥中復舉博學宏詞中選一時皇族尤號得人至是樞府有闕夀皇欲用汝愚既出命矣察院汪義端有言髙宗聖訓不用宗室以為宰執疏留中不出汝愚家居力辭疏至十上上為徙義端軍器監給事中黃黼案黃黼汝愚傳作黃裳裳傳亦載此語黃黼未嘗為給事中也言汝愚事親孝事君忠居官亷憂國愛民至誠懇懇出於天性所謂青天白日奴𨽻亦知其清明者義端識見奴𨽻之不如不可以傋朝列義端由此補郡汝愚猶不拜上謀於夀皇遂命宰執召當筆學士申諭聖意謂髙宗聖訓本以折秦檜之姦謀故答詔有云若乃紹興之故實蓋有為而言况我夀皇之疇咨欲播告於衆蓋為是也汝愚乃受命是時大臣恭謝者多不得對夀皇欲見汝愚乃因葛邲等入謝相繼宣引後二十餘日汝愚始入謝夀皇曰卿以宗室之賢為執政乃國家盛事卿在蜀時所進奏議甚善朕嘗觀此書可與資治通鑑並行踰年以定策功拜集賢相汝愚援髙宗聖訓力丐免上許焉未幾留正奉祠汝愚卒為相才數月而為正言李沐所擊去位復召義端為中書舍人吳宗旦為詞有曰烏府彈文副墨行於蠻貊蓋謂此也汝愚之再相也御札賜詞臣樓鑰有度越拘牽不膠者卓之語及汝愚貶永義端適當制首引劉屈氂李林甫事以為言蓋申前日之論而俾來者不敢復拜焉時趙彥逾守蜀衆因以定策之功歸之然但纍遷資政殿學士奉祠而已不復除執政矣汝愚之未召也楊王休為成都路提刑時張縯守漢州甚失士民之譽王休按治之汝愚素與縯厚格其章不下王休言不已乃除縯直祕閣奉祠縯聞命久不去王休怒坐邸吏印書狀報之縯答以未受堂帖為詞卒不去王休不勝其憤明年明堂王休應任子汝愚已得政謂其按發不當格不行慶元初王休入朝自訴有㫖給還王休後纍遷禮部侍郎定薦舉改官法趙汝愚之帥蜀也嘗建言舊法聼三考薦舉改官者皆以三考為一任舉其成數而言今於三考之外未罷竒零日內輒敢依傍干請已非法意今又該遇覃恩盡行補轉若一併許於二考之外聼舉改官竊恐干進之徒與夫勢要皆預得為他日計而孤寒安分亷恥自將者欲脫選調愈不可得欲望將選人一例許與第二任方得薦舉改官庶幾仕進公平不妨寒畯之路不報上即位汝愚入政府乃舉行之又詔未成考人不以罪去者於後任輳成三考聼舉改官初任未成考者勿聼著為令夏五月左丞相留正以論姜特立侍罪上在儲邸武臣姜特立主春坊及即位除知閣門事特立麗水人以父死事得官頗能詩士大夫或稱之淳熙中趙汝愚為閩帥特立為福建路兵馬副都監海賊犯閩中特立以一舟先進遂獲之孝宗以為才召為閣門舍人未幾同春坊事紹熙初留正為右相論其招權納賄之狀詔與外祠時周原缺廷策有云陛下近逐一讒諂招權納賄之小人而天文卷舌之星為之不明者纍月若積其實德每事如此何求而不得者謂特立也至是除特立浙東馬步軍副總管又召赴闕賜裝錢二千緡正復上疏言唐憲宗將用李絳先出吐突承璀為淮南監軍及召承璀還先罷絳相本朝名臣范祖禹作唐鑑言二人不可並立於朝此書屢經聖覽今特立召用臣合罷相與李絳一同不報給事中謝深甫復劾之上批朕閔其舊臣無辜而去特與贐行汝愚在樞管亦以為言上不許六月己巳正又言臣與特立理難並立於朝乞早賜處分上批成命已行朕無反汗卿宜自處時正已待罪六和塔上亦不復宣召也久之正復繳還上前後所賜賚及出身以來告敕且上奏自敘嘗陪侍儲邸及翊輔初政乞保終始詞指甚哀不報正纍不得命乃復待罪於范村之佛寺奏乞歸田里不許又請住給廪祿詔權行住支頃之百官啓建重明節於明慶寺正請就范村詔從其請九月丁卯百官上夀紫宸殿詔以右相葛邲為班首而正自立少保班上夀班退復還范村待罪始正之出國門也諫官章頴以劄子留之陳傅良為起居郎請直前奏事上諭閣門止勿進時上以疾不過重華宫已數月從官數以為言十一月上既朝重華宫庚辰特遣右司郎官徐誼召正於城外辛巳正始入朝復赴都堂視事是行也正待罪凡百四十餘日云命特立仍為浙東總管於是竟不召寧宗登極遷和州防禦使慶元元年冬復引疾奉祠嘉泰元年春拜寧逺軍節度使時年七十七矣特立有詩數千篇楊廷秀序之號梅山集親試舉人賜陳亮以下三百九十六人及第出身有差聼新進士致仕李僑年五十四調成都府司户參軍自以祿不及飬乞以一官回贈父母上嘉其志特詔以本官致仕父母皆豫初品官封蓋異數也是秋録先聖後衍聖公孔子後也歷代皆有封元祐中加賜田百畞紹興中衍聖公孔玠避難渡江髙宗以林廟隔絶八年夏以衢州田五頃賜之二十四年玠卒復以其子搢為右承務郎襲爵奉祠事淳熙中入侍擢建昌守久之坐妄用庫金貶秩遂不復用焉紹熙初搢纍遷至朝散大夫未幾卒至是詔以子文逺為承奉郎封衍聖公今其族人間有登進士第者冬十一月戊寅上朝重華宫左丞相留正復視事按據前留正待罪目內此事在十一月辛巳今併繫之戊寅下蓋原本誤脫日也十二月甲午朔詔測驗天文布衣人王孝禮言今年冬至日景表當在十九日壬午而會元歷乃在二十日癸未係差一日蓋陳得一劉孝榮所造四歷皆未嘗測影止是寫擬分數所以後天乞將修內司所掌銅表圭降付太史局測驗從之時朝廷多事未暇治歷也以朱熹為湖南安撫知潭州是冬使人自金回金人問朱先生安在答以見已擢用回白廟堂遂有是除先是朝廷除熹帥廣西不就於是以辭逺就近不為無嫌力辭踰年乃拜命是冬更獨員薦士法紹熙初命帥守監司薦所部人才既而濫薦者多言者謂今被薦者猥衆朝廷疑其私而不信病其衆而難從其間縱有賢才不免與僥幸者併棄請條約之乃詔帥守監司自今毋得獨員薦士兩朝綱目備要卷二
