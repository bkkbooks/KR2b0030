body:
  text: 兩朝綱目備要卷十五寧宗嘉定八年乙亥春正月辛未估籍贓吏家故淮南轉運判官施宿犯贓追奪官爵仍籍其家詔舉將材侍從兩省臺諫各舉三人戊子申嚴金翠禁二月丙午雷孝友罷壬子蠲逋負米平江等五郡凡蠲萬三千石有竒貸其繫囚己未雨土三月辛酉詔舉亷吏大郡嵗舉二人小郡一人旱乙亥命諸路州縣禱雨丙子蠲臨安府茶鹽賞錢釋兩浙諸州繫囚丙戌釋江淮闕雨州縣杖以下囚四月乙未幸太乙宫明慶寺禱雨辛丑避殿减膳壬寅禱雨于天地宗廟社稷癸卯詔中外臣民直言時政得失甲辰史彌逺等請罷政不許乙巳德音降行在及諸路雜犯死罪囚釋杖以下辛巳配何致致于開禧元年應賢良方正直言極諫科兩為言者所攻罷歸本貫至是坐妄造事端熒惑衆聽配廣州牢城五月辛酉塔坦破燕京去年塔坦圍燕京是春金國東平之援兵五萬至安次遇塔軍不戰而潰大名之兵八千至固安亦潰散惟真定之兵四萬合保涿援兵一萬至旋風寨與塔兵戰凡二日糧絶而敗自是內外不通至是燕京破都元帥完顔福興自剄死山東羣盜大起楊安兒者本淄州皮匠也金主璟泰和間殺人亡命為盜於太行有衆千餘璟招降之貸死流于上京及塔坦入寇金人命為副統軍令招必勝軍三千人迎敵軍敗而竄往山東聚衆金人討之安兒與其徒數人入海為舟師所殺又有郝八者名儀以貞祐二年春本朝嘉定七年據山東叛僣號大齊改元順天金人遣花帽軍生擒之磔于開封又有劉二祖者亦名盜也其女名劉小姐亦聚衆數萬皆為花帽軍所破花帽軍者金户部令史蔚州人郭忠率山後軍民擊塔坦逐之金人後名其軍為花帽軍云辛未雨辛巳避殿减膳癸未復命有司禱雨乙酉出米六萬石賑糶臨安府貧民六月丙辰詔兩浙江淮路諭民雜種粟麥麻豆有司毋收其賦田主毋責其租丙子出米三十萬石賑糶江東饑民己卯命利路招刺忠義人甲申詔贓吏毋减年參選著為令秋七月庚申置三省樞密院架閣官六部架閣者崇寧間始置迄宣和再置三省紹興三年立六部架閣庫十五年復置官四人主管官號掌故例為刪修學官之選至是又置于三省密院焉辛酉鄭昭先參知政事曾從龍簽書樞密院事壬戌立楊巨源廟旌誅吳曦之勞也命四川立廟賜名褒忠戊辰蠲民賦兩淮諸州毋納今年秋稅其極邉五州併明年夏稅悉蠲之癸酉蠲臨安紹興府貧民夏稅甲申詔職田蠲放如民違者坐之丁亥權罷旱傷州縣比較賞罰八月己丑賜張栻諡曰宣庚子申嚴宗子訓名法己酉禁州縣遏糴是月蘭州盜程彥暉求內附四川制置使董居誼却之九月辛未合祭天地于明堂赦天下乙未命六部類赦書寬恤事乙亥申嚴浙西圍田禁甲申罷四川試法科是秋塔坦破潼關初塔坦自河東渡河攻潼關不能下乃由嵩山小路趨汝州遇山澗輒以鐡槍相鎖連接為橋以渡于是潼關失守金主急召花帽軍于山東冬十月塔坦至杏花營距汴京二十里花帽軍擊敗之塔坦復取潼關自三門析津乘河氷合布灰引兵而渡自是不復出金主乃命平章政事胥鼎為大帥専守關輔然陕西諸州間亦有為所破者惟燕南雄霸數州乃三關舊地塘濼深阻塔兵不能入金將張甫張進二人據信安軍以守之北距燕山百八十里又有遼東宣撫使蕭萬努者本遼人乘女真之亂自立為帝據遼東七路欲引兵併燕代魏晉而有之塔坦不能破也然其人貪婪初無逺略既破兩河赤地千里人煙斷絶燕京宫室雄麗為古今之冠亦為亂兵所焚火月餘不滅其所積貨財初無所用至以銀為馬槽金為酒甕大者重數千兩薩木哈所居至用金飾龍床足踏金杌子奢僣如此而徴督不已燕人患之金主珣南遷之後纍遣使詣塔坦求和雖未聽從而賂遺不輟特穆津憐其意欲許之而薩木哈耻於無功堅持不可特穆津謂曰譬如圍場中獐鹿吾已取之矣獨餘一兔汝纍年不能取盍遂捨之薩木哈不從遣人諭金主曰汝欲議和可去帝號稱臣當封汝為王而金之羣臣亦不從有言於珣願以死雪國耻者珣亦為之感憤也金人自阿古達稱帝至是九十有八年而失國西河既為塔坦所擾山東畔之金東阻河西阻潼關地勢益蹙遂有南窺淮漢之謀兵端復起矣冬十二月詔楊巨源李好義子孫各進一官是嵗兩浙江東西路旱蝗嘉定九年丙子春正月乙丑賜呂祖謙諡曰成置馬軍司水軍丙子命諸州招填軍籍辛巳免和糴科糴罷諸路旱蝗州縣和糴及四川關外科糴二月甲申朔日有食之丙申雪辛亥東西兩川地大震三月乙卯又震甲子又震馬湖夷界山崩八十里江水不通丁卯又震壬申又震六月辛卯西川地震壬辰又震乙未又震黎州山崩十月癸亥又震甲子又震三月丁丑詔舉監司侍從臺諌兩省舉可為監司者各二人夏四月戊戌秦州人唐進內附進與其徒何進等引衆十萬來歸四川制置使董居誼却之五月癸酉太白晝見六月戊申賑浙西水災賑恤被水州縣寬其租稅秋七月詔邊縣官許起復邊縣擇材不拘常法其餘並遵三年之制九月甲申核實水災詔兩浙江東監司核州縣被水最甚者蠲其租冬十一月癸亥命利路備邊以程彥暉攻圍鞏州迫近州界命利州副都統劉昌祖移駐西河州以備之十二月癸丑以宗學𨽻宗正寺詳見七年八月癸卯丁巳雪再給諸軍雪寒錢乙丑遷天水軍于舊天水縣置知軍以下官是月真德秀論邊事德秀為江東計度轉運副使附奏論邉事云臣至愚極陋蒙陛下選擢將漕江東朝夕之所盡心不過州縣間常事未足仰報大恩今事有關於宗社之安危國家之休戚職有常守在臣雖不當言而其義則有可言者昔歐陽修以知制誥出為河北轉運使嘗請與聞兵事仁宗許之臣雖於修無能為役然臣亦由詞臣出使且以轉餉為職則邉陲利害臣敢避越職之罪畏縮不言臣竊見金人自失國南遷其勢日蹙比者塔坦與西夏并兵東出潼關深入許鄭金人危迫之狀見於其詔所云近復傳聞敵兵攻圍都邑游騎布滿山東雖探報之辭不無同異要其大勢以河南數州僅有之地而抗西北二國方張之師加以羣盜縱橫叛者四起土傾魚爛厥徵具形括馬搜糧公私並竭交鈔數萬僅博一餐危急如此不亡何待臣謹按國史女真叛遼在政和之四年甲午嵗其滅遼也在宣和之七年乙巳嵗是冬即入中原臣竊謂今日天下之勢無以異政宣之時陛下所以自治其國與外禦強敵者亦宜以政宣為鑒夫以皇皇巨宋八葉重光至於政宣蓋太平極盛之日使朝廷之上知守成之惟艱無難之可畏惕焉戒懼以祈天永命為心親信仁賢修舉德政則國勢屹然有泰山磐石之固雖百女真其何能為不幸燕安湛溺之餘紀綱蕩然無一足恃本根既撥枝葉從之於是女真得以逞其凶殘攻陷我都城傾覆我社稷劫遷我二聖荼毒我蒸民自開闢以來禍未有若是之酷也今將戒前車之覆永神器之安其道非他願以政宣為鑒而已臣嘗妄論政宣致禍之由其目有十失君臣相敕唯是宴安股肱不良萬事隳壞其在虞廷猶以為戒自蔡京倡豐亨豫大之說王黼開應奉享上之門專以淫侈蠱上心奢靡蠧國用土木之功窮極盛麗花石之貢毒遍江南甚至內廷曲宴出女樂以娛羣臣大臣入侍飾朱粉以供戲笑於是荒嬉無度而朝政大壞矣其失一也易曰師貞丈人吉又曰師出以律否臧凶自古總師必得老成重厚之人用師必有節制訓齊之律反是則凶也自童貫髙俅迭主兵柄教閲訓練之事盡廢上下階級之法不行潰敗者不誅而招以金帛死敵者不恤而誣以逃亡於是賞罰無章而軍政大壞矣其失二也詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅自昔未聞簡忽天變而無禍者政宣之世灾異數見大星如月徐徐南行日黯無光洶洶欲動赤氣犯斗水冒都城當時羣臣恬不知警方且以怪孽為嘉祥變異為休徵此上不畏天戒其失三也大舜之聖舍已從人成湯之德從諌弗咈自昔未聞飾非遂過而不亡者政宣之際以言為諱張根論征斂之煩散官安置李綱論大水之變逺謫監征於是薦紳不敢言矣鄧肅以進詩諷諌屏出太學朱夢說以直言宦寺竄斥偏州於是布衣不敢言矣鉗結成風馴致禍敗此下不恤人言其失四也夫君子在內其卦為泰濟濟多士文王以寧政宣用事之臣専以毁忠忌賢為事凡纍朝老成之望當代鴻碩之材不以姦黨廢則以邪倿斥不以曲學貶則以異論逐排沮挫揠之餘舉國無君子矣雖欲久安得乎其失五也開國承家小人勿用而難任人蠻夷率服政宣之世京黼繼尸宰柄貫攸濫厠樞庭其翺翔臺省布列館殿非歌頌書生即膏粱子弟非奴事閹尹即翼附權臣更引迭援在廷皆小人矣雖欲勿危得乎其失六也記曰四方有敗必先知之此之謂民之父母政宣小人顓為䝉蔽以欺上聽劉法敗死西陲而童貫乃以捷聞方臘破東南六郡而王黼匿不以告郭藥師反形已露而邉臣掩覆於外女真尅期大舉而大臣諱忌於中上下相蒙稔成大患至敵兵濟河而朝廷猶未之覺其失七也書曰民惟邦本本固邦寧政宣小人専務聚斂以搖根本朱勔以貢奉擾浙右李彥以括田困京東蔡京改鹽鈔法而比屋嘆愁王黼創免夫錢而諸路騷動人不聊生散為盜賊雖無外患亦必有蕭墻之憂其失八也詩曰無竸惟人四方其訓之古者以一士寢敵謀片言折外侮政和初遣使覘國而童貫實行遼之君臣相顧竊笑已有南朝無人之譏北事既興遂付戎律以僕𨽻之材當元戎之任節制不明諸將無所禀畏庸懦不武敵師得以憑陵未幾副之以蔡攸易之以談稹其為懦怯又益甚焉於是女真知中國之無人而異志興矣此授任非材其失九也昔子産以蕞爾之鄭﨑嶇強國間區區一環宜無愛於晉而子産則曰大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有卒不與秦求地於趙趙欲與之虞卿曰王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙用其計而秦不能加蓋有國者不幸與強敵為鄰當有以服其心而不當徇其欲方女真與遼國交兵雖能每戰輒克然視吾中國如髙山大海未易測其雄深何敢遽有它志不幸姦臣腐夫希功寡謀唯恐無以順適其意彼方邀吾嵗幣則豫以契丹舊數而不辭邀吾燕地稅賦則豫以銀絹百萬而不靳至於索犒師則許以犒師欲貸糧則許以貸糧一事方酬而一事已生前請未塞而後請復起一切順承無敢或戾而南牧之師已侵尋於境土矣徒知狥其欲而無以服其心其禍固應爾也或者惟以納張㲄結余覩為造釁之由而不知召侮取輕其漸非一雖微結納之事其能保盟約之不寒乎此處置乖冝其失十也今陛下聖德清明萬無此失然臣獨怪一人憂勤恭儉無愧仁祖之風而羣臣盤樂怠傲乃有宣和之習東南民力耗於軍餉者十八而士卒窮悴常有不飽之嗟灾異頻仍修省之實未覩言路壅塞讜直之士弗容君子非不參用而正論未嘗獲伸小人非不欲逺而讒諂猶或得志蒙蔽之風日熾聚斂之政日滋此失未除臣恐後之視今猶今之視昔也雖然臣外有司也其於內事不敢盡言猶請為陛下深陳所以待敵者臣觀塔坦之在今日無異昔者女真方興之時一旦與吾為鄰亦必祖述女真已行之故智蓋女真嘗以燕城歸我矣今獨不能還吾河南之地以觀吾之所處乎受之則享虛名而召實患不受則彼得以陵寢為詞假大義以見攻女真嘗與吾通好矣今獨不能卑辭遣使以觀吾之所答乎從之則要索亡饜豈能滿其溪壑之欲不從則彼得藉口以開釁端敵人之情必出於此不可不豫圖所以應之也自三數年來謀國不深惟長算而一切幸安曩者敵在幽燕吾以嵗時䀻問已非獲已彼既播越而南獨不可遷延其辭俟復燕山然後玉帛往來如故乃使大宋臣子拜敵讐於祖宗殿庭之下其誤一也嵗幣之弗遣是矣然不以還燕為詞而諉曰漕渠乾涸使得以移文督責中原豪傑聞之寧不以寡謀見哂乎其誤二也並邉遺民皆吾赤子窮而歸我當示綏懷疆吏非人惟知拒郤固已絶中原之望甚者視為盜賊戮之焚之上流制閫之臣明揭大榜來者即行勦殺西州總戎之師殺程彥暉一家骨肉於黑谷山秦隴之人莫不切齒召鄰國之侮開邉鄙之隙結遺黎之怨逆上帝之心孰甚於此其誤三也積此三誤而吾國之威靈氣焰索然矣漢昭烈有言事㑹之來寧有終極夫誤於前者不可悔而應於後者猶可為所願朝廷毋再誤而已厥今庸人之論有二不曰敵未遽亡猶可倚為屏蔽則曰中原方擾未暇窺我江淮凡此皆誤國之言不可不察也敵之必亡無愚智俱知之臣不復重陳若昔五胡之亂江左粗安者蓋以羣醜並爭莫能相一故吾江表得以偷旦夕之安及苻堅既滅慕容旋起吞晉之謀元魏已併諸胡遂萌飲江之志今塔坦鴟張盡有河朔而楊劉羣盜又皆往往服從臣恐與五胡角立之勢殊未可為江左茍安之計也或又以為安邉置所儲峙日豐以此餌敵何患不濟臣竊謂不然夫金繒遺敵雖後世偃兵息民之權宜然用之於國勢委靡之時則適以召侮而不足示恩宣和之事是也倘不思自強其國而倚賂遺以幸一日之安臣知其非䇿矣昔孫氏以區區之吳而當強大之魏若未易為力者然其君臣相與䇿勵遂能挫曹公虎狼之敵晉氏東遷至岌岌也徒以將相有人處分得所卒能破苻秦傾國之師今國家幅貟萬里貢賦雲集帶甲百萬江漢為池豈下於吳晉者而中外有司忠誠憤激者少委靡頽惰者多一聞赤白囊至則相顧失色不知所為少定則又帖然矣國家平時不愛名器爵祿以寵士大夫一旦有急未見有毅然以戮力王室自任者此臣之所以大懼也夫天下之勢猶長江大河上流决潰下流必無獨寧之理今荆淮以北數百里間干戈搶攘戎馬雜㳫正如熊咆虎鬭僅在藩垣之外而或者乃曰無與吾事彼其中心實不謂然姑欲架漏目前攫取名器爵祿而去至於宗社生靈之憂則使陛下獨當之耳彼羣臣為一身計可也陛下為人子孫任九廟之託奈何付安危於度外乎陛下誠欲尊國勢以弭外虞則政宣之十失必當懲近日之三誤必當戒庸人之論必當破自強之計必當立至誠一心對越上帝廣謀兼聼曲盡下情以收天人之心以合中外之助庶天下事猶有可為者若或上下悠悠養成深患機㑹浸失事變日殊臣實未知其所終也嘉定十年丁丑春正月辛巳雷癸巳雨土乙未大風拔木二月庚申地震壬戌雪夏四月丁未朔金人來侵攻光州中渡鎮執𣙜場官盛允升殺之分兵略樊城翌日鄂州江陵府副都統王守中引兵拒之金遂分兵圍棗陽光化戊申圍棗陽軍光化軍丙辰許李珏趙方便宜行事珏江淮制置使方京湖制置使詔措置調遣仍聼便宜丁巳許董居誼便宜行事居誼為四川制置使命酌量緩急便宜行事辛酉王辛捷于安昌寨辛為廬州鈐轄敗敵于光山縣之安昌寨殺其統軍完顔掩隨州光化軍皆以捷聞壬戌金人退久雨辛巳釋大理三衙臨安府杖以下囚蠲茶鹽賞錢五月甲申親試舉人賜吳潜以下五百二十有三人及第出身有差癸卯趙方請下詔北伐遂傳檄招諭中原官吏軍民六月庚戌太白晝見戊午詔厲將士詔曰朕厲精更化一意息民豈不知機㑹可乘讎耻未復念甫伸於信誓實重起於兵端故寧咈廷紳進取之謀不忍絶使傳往來之好每示固存之義初無幸釁之心豈謂敵人遽忘大德皇華之轡朝遣赤白之囊夕聞叛卒鴟張率作如林之旅饑氓烏合驅為取麥之師貪婪無厭僥幸嘗試冝神人之共憤亦覆載所不容守將效忠開門而决戰兵民賈勇陷陳以爭先羣雄既殱殘黨自潰允賴蕩攘之力迄成綏靜之功然除戎當戒於不虞縱敵必貽於後患咨爾有衆永肩厥心毋忽其既退而懷茍安毋狃於屢勝而忘逺略屬炎蒸之在候念戎役之方勞雖摧枯拉朽之非難而執鋭被堅之不易視爾暴露如已焚惔一朝背好誰實為之六月飭戎豫非得已諒深明曲直逆順之理其孰無激昂奮發之思師出無名彼既自貽於顛沛兵應者勝爾宜共赴於事功若能立非常之勳則亦有不次之賞尚其聼命朕不食言以黃榜募京西忠義人進討辛未東川大水癸酉太白經天秋七月丙子朔日有食之不雨戊辰釋諸路杖以下囚甲申雅州蠻復冦邉焚碉門寨遣官軍討之庚子罷軍士淫刑詔諸軍將佐有罪送屯駐州軍鞫之罷軍士淫刑八月乙丑詔舉將帥監司郡守各舉威勇才略可任將帥者二人冬十月久雨乙巳朔釋大理三衙臨安府及兩浙諸州杖以下囚癸酉蠲三衙江上諸軍公私逋負錢十一月丁丑大風庚辰太白晝見甲申賑貧民詔浙東提舉司出米十萬石賑給貧民戊戌太白經天十二月戊申募民納粟補官以軍興故乙卯詔武舉人毋應文舉癸亥金人侵四川鳯翔副統軍完顔贇以步騎萬人侵四川戊辰迫湫池堡己巳陷天水軍守臣黃炎孫遁去攻白環堡破之庚午迫黃牛堡據大散關統制劉雄棄關遁金人據之嘉定十一年戊寅春正月壬午李全率衆來歸全即李鐡槍也本漣水縣弓手後充京東路忠義人開禧邉事興戚拱嘗結之以焚漣水縣至是來歸詔以為京東路總管戊子金人圍皂郊堡壬辰利州麻仲率忠義人焚秦州永寧寨丁酉詔四川忠義人立功其賞視官軍乙未出度牒給軍費以一千下四川金兵攻隔茅關興元都統李貴遁去官軍大潰二月甲辰焚大散關乙巳王大才馬蹶死于河池丙午金兵陷皂郊死者五萬人丁未陷湫池堡三月丁丑焚之戊申圍隨州棗陽軍遊騎至漢上均州守臣應謙之棄城走丙辰白虹貫日梁昭祖焚金糧舟昭祖為楚州鈐轄焚舟於大清河京東忠義副都統沈鐸遣兵助之三月戊子復皂郊先是二月辛亥四川制置司招忠義人復皂郊至是利州統制王逸等率官軍及忠義人收復己丑沔州都統劉昌祖至皂郊郭雄斬金將完顔贇金副都統制完顔贇包長夀遁去沔州軍士郭雄追斬贇首而還長夀僅以身免辛卯官軍大潰於赤谷口忠義十餘萬人出攻秦州官軍繼進至赤谷口王逸傳劉昌祖之命退師且放散忠義人軍大潰癸巳金復攻皂郊包長夀合長安鳯翔之衆復攻皂郊遂趨西河州丙申劉昌祖焚西河州而遁守臣楊克家棄城去昌祖又焚成州守臣羅仲甲亦棄城去四月戊申金人去成州彭惟城等敗於泗州惟城鎮江忠義統制戊戌金兵陷西和州四月甲辰退去夏四月戊申命四川增印錢引五百萬以給軍費侯頥棄階州頥本州守戊午金兵復至大散關守將王立遁去興元都統吳政至大散關執立斬之己未逼黃牛堡吳政拒退之軍聲大振五月乙亥招集忠義人命四川制置司癸未蚩尤旗見其長竟天丁亥集議邉事詔侍從兩省臺諌官集議平戎禦戎和戎三䇿壬辰嚴試法官七等之制六月湖州水辛酉詔賑恤被水貧民秋七月乙酉修孝宗寶訓辛卯蠲稅役蠲四川關外諸州稅役甲午蠲光州民兵戰死之家稅役九月辛巳合祭天地于明堂赦天下冬十月丙申進吳政等官政與利州副都統張威各進三官貶劉昌祖等昌祖以焚城退遁罪奪五官韶州安置丙午羅仲甲以棄城罪奪三官常德府居住楊克家以棄城罪奪二官撫州居住戊午大風壬申金人攻黃口灘屬安豐軍是月陜西人張羽來歸是嵗諸路戶一千二百六十六萬九千六百八十四口二千八百三十七萬七千四百四十一
