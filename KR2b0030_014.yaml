body:
  text: 兩朝綱目備要卷十四寧宗嘉定七年甲戌春正月丁邜朔何九齡襲秦州大敗先是元年冬金主璟卒衛王允濟立允濟嘗使塔坦因不為特穆津所禮憤之及允濟立特穆津始叛四年秋朝廷遣余嶸北使賀所謂萬秋節者而燕京已為塔坦所逼不暇延使者嶸至涿州而還去秋允濟為其臣赫舍哩執中所弒璟之庶兄豐王珣代立董居誼為賀生辰使至沃州而還繼而賀登位使真德秀正旦使李􅌫繼抵盱眙皆不克迓諜者言方有內難議論紛然朝廷聞之以御札賜大使安丙及王大才令益謹守備毋啓邉釁有迪功郎提舉皂郊博易鋪務兼大使司簽廳何九齡者廣安鬻爵人也遽結忠義人謀取秦州未發前八日金人先知以檄至秦州詰問丙寅除夕九齡遂率沔州中軍統制强德等以所部夜襲秦州是月朔旦敗焉甲戌塔坦遣人至邉是夜三鼓濠州鍾離縣北岸吳團鋪有三騎渡淮而南水陸巡檢梁實問所由三人者出文書一囊絹畫地圖一册云是塔坦王子青吉斯遣來納地請兵翌日守臣效用統領李興等以本州不奉朝㫖不敢受諭遣之又翌日遇諸廟缸即以筏送之而去先是有楊安兒者李全之婦翁也案安兒乃李全之婦兄見金人政亂起兵叛之踐蹂山東數郡依山負海時出時入塔坦既圍燕京不能下乃分兵徇山東地諸盜往往應之塔兵至濟南遣三十七騎護三人者以來又以三百兵送之過邳州奪舟渡河而西既為濠州所却路絶不得歸匿虹縣之白鹿湖中後三日縣遣人捕送泗州或謂三人者其一則塔坦通事其一則所掠金人莫州同知其一則漢兒也因戒邉吏後有似此者即驅去之違者從軍法且上其事于朝時特穆津實已强大然但居其故地而於燕雲置行省命其大臣薩木哈領之所謂太師國王者也其大將曰哈布爾云丁丑雷章良能薨壬午王大才斬何九齡大才為沔州都統制以九齡啓邉釁斬之梟首境上大才初為利州統領劉德秀薦之升差額外統制其兄大節為副帥以嫌移金州未上大節免金州都統制彭輅即檄大才還任吳曦以其既去却之大才懇吳之賓客為言曦曰是人固才然升差自制司是侵軍政也卒不許嘉泰四年春宇文紹節言其堪充將帥遂擢知安豐軍以至大將安丙之為大使也大才以嘗權招撫使不欲講階墀之禮大使不從大才以為憾會九齡以襲秦州喪師大才執九齡及諸將等七人斬之以其事聞于朝且檄報鳯翔都統使仍關牒川陜四路監帥司又遣人往廣安捕九齡之子世昌亦斬之㑹大使司奏大才圖為宣撫使設意傾陷今邉報不一或有緩急必致誤事二月甲寅詔大才特降一官乙未黎州蠻卜籠十二骨降卜籠者青羌部族也性殘忍多器械專仰劫掠為生所謂十二骨者乃十二種也三月丁卯安丙同知樞密院事令日下起發赴院治事四川制置大使司結局董居誼為四川制置使以成都路安撫使除令疾速前去之任以知潼川府劉甲除利路安撫使時暫權制置司職事限一日起發皆未受命也㑹大使司遣使臣李大亨王頥往皂郊逮大才所遣秦州打話人赴興元問狀己巳過沔州市大才執大亨斬之縱頥歸報後二日辛未乃以悖語至大使司云武功大夫福州觀察使充沔州駐劄御前諸軍都統制兼知沔州王大才今具相公不顧法令非理劄下大才事目開具下頃一入謀大才與金人同謀不軌一入謀大才與金人私通書信一入謀大才於廣安軍殺何九齡之子世昌一入謀大才將兵劫掠到銀七十三鋌金一百五兩已納在大才宅庫一興元都統李太尉密與大才下書虞候孫儀言說稱相公已刷差下二三百人要得親來沔州將大才殺害一相公日來不時遣使强橫小人以追人為名前來門首厲聲呌閙呼來庭下將大才百端䙝瀆靡所不言此何理耶未有敗壞朝廷紀綱法令端自相公為始伏乞鈞照右大才照得禮樂征伐自天子出非人臣可得而專不謂相公同何九齡擅開兵端引惹邉事關繫國家利害至重而又不遵宸翰約束其所賜御札詔墨未乾輒敢反亂朝廷何所不為所有何九齡已從條法誅斬了當獨相公未蒙朝廷施行如何反將忠臣義士入謀以不赦之罪公然形於紙筆以快私意天下恐無此理可見相公包藏禍心欺罔君父蔑視朝廷不恤人言略無忌憚未審相公端用幾日前來沔州作亂乞賜明文行下容大才道左祇候公驂謹具申制置相公敢望鈞慈憫念朝廷勿以天日萬里以為可欺况惡業貫盈恐造物不與善後特未可保伏乞鈞照開正識眼曲賜看詳癸酉大使得之即疏辨申朝廷且檄四路帥臣監司委官究實丙子董居誼至石首縣被制置使之命辛卯借用潼川府觀察使印交割制置司職事徑之興元四月癸丑安同知發興元申乞以剗賣鹽井錢三十萬緡充公路喝犒諸軍之用不待報遂行至近畿乃有潭州之命大才貪庸凶悖制置使既不得其柄反倚重焉失朝廷臨遣之意矣庚辰金人來督二年歲幣戊子來止賀正旦使壬辰詔利路安撫節制本路軍馬如兩淮安撫之制夏四月癸卯蠲福建納鹽恤㳂海諸州貧民也癸丑馬槱襲殺虛恨蠻庫崖等甲戌春正月卭部川蠻人速臼至羅忽寨言虛恨蠻人有歸順之意提刑司遣從政郎權本司簽廳封壽源巴西縣主簿李時開往中鎮寨隨宜應接於是虛恨都王遣其徒庫崖來打話庫崖以馬槱嘗殺北二也疑之欲得其子弟為質槱難之已而大渡河監渡官劉如真遣其子與親屬共三人入蠻為質庫崖乃來四月辛亥渡河至北岸庫崖欲得十二年嵗犒凡為絹二千四百匹鹽茶四千七百斤銀百兩鐵釡二百牲酒之屬不與焉又欲得都王每三年轉官告命金帶紫袍銅印之屬及北二等三十一人骨價先是槱之上世有田在寨之南北岸嵗收租四千餘石後有㫖以其田贍邉世選馬氏一人為寨將佃戶為土丁防守邉面所謂嵗犒者例以邉租七百石市之自北二死蠻人不出租稅悉為槱所私至是度無以償乃好詞紿蠻人歸諭都王因其出塞遣土丁二百襲之癸丑旦至牛渡遇諸蠻即縱兵掩殺庫崖與其徒三十六人皆死土兵被殺者七人傷者又數十人蠻人大怒取質子三人刳裂之議者因欲以殺蠻為功伯昌不可五月丙子以槱屬吏槱令其家丁百數詣提刑司訟寃僚吏多請釋之伯昌不從卒正其罪獄成槱坐私用邉租及他罪計贓當死伯昌上于朝有㫖制置司酌情行遣制置司尋奏奪槱官羈管大寧監其年十月也於是籍土丁之壯健者二千人月廪之俾守諸寨嵗費錢二萬四千緡蠻人聞槱以罪去怨怒稍解既又知邉頭有備憚之自是不復輕抄掠矣辛酉核軍實詔三衙江上四川諸軍具士馬實數以聞五月丁丑太白經天乙酉親試舉人賜禮部進士奏名袁甫等五百四人及第出身有差壬辰命修祿令有司考課祿之制裒類成書以為法式六月旱辛丑命諸路州軍禱雨甲辰詔諸路監司守令速决滯訟丙午蠲兩浙路諸州贓賞錢壬子釋大理三衙及兩浙路杖以下囚丁巳置嘉定府邉丁二千人以備蠻命制置安撫諸司給其費秋七月甲子朔鄭昭先簽書樞密院事兼權參知政事乙亥金人告遷于南京自貞祐元年冬本朝嘉定六年十一月至二年春正月塔坦凡破金九十餘郡所破無不殘滅兩河山東數千里人民殺戮幾盡金帛子女牛馬羊畜皆席卷而去屋廬焚燬城郭邱墟矣惟大名真定青鄆邳海沃順通州有兵堅守未能破二月塔坦復還燕京糧乏軍民餓死者十四五金主珣遣人議和特穆津欲得其公主及護駕將軍十人細軍百人從公主童男女各五百綵繡衣三千裁御馬三千匹金銀珠玊等甚衆又請左丞相完顔福興為質珣皆從之特穆津遣人來選女時公主見在者七人惟允濟少女小姐姐最秀惠遂以豫之又令珣鄉其國遙拜珣不敢拒又以薩木哈圍燕之久未嘗虜掠欲得犒軍金帛珣亦從之塔坦遂歸居庸關在燕京之北百一十里路狹隘守兵數萬欲俟金兵歸而擊之而完顔福興在軍中傳金主命已與塔坦議和不許擅出兵於是無敢動者塔坦過關取所掠山東兩河少壯男女數十萬皆殺之遂引歸是年三月也河南路統軍布薩竒勤者奏乞徙都開封珣從之命參知政事胥鼎為㳂路排頓使其姪霍王從彞者諌曰祖宗山陵宗廟社稷百司庶府皆在燕京豈宜棄之而去珣曰燕京乏糧不能應辦朝廷百官諸軍今暫往南京俟一二年間糧儲豐足復歸未晚也從彞乞自督運珣不從從彝憂憤成疾而死五月甲戌也壬午金主發燕京出麗澤門自涿保州中山府而南至真定留幾月復自大名路由新衛州渡河以至開封肆赦境內塔坦聞之怒曰既和而遷是有疑心而不釋憾特以講和為欵我之計耳秋八月復引兵攻中原燕京之糾軍叛與塔坦共圍燕京分兵下中原州郡又遣使至開封索犒軍金銀等珣皆豫之庚寅真德秀請絶金人嵗幣略云竊聞女真以塔坦侵陵徙都于汴此吾國之至憂也蓋塔坦之圖滅女真猶獵師之志在得鹿鹿之所走獵必從之既能越三關之阻以攻燕豈不能絶黃河一帶之水以趨汴臣恐秋風一生梁宋之郊已為戰場矣使塔坦遂能如劉聰石勒之盜有中原則疆埸相望便為鄰國固非我之利也或如耶律德光之不能即安中土則奸雄必將投隙而取之尤非我之福也今當乘敵之將亡而亟圖自立之䇿乎抑幸敵之未亡而姑為自安之計乎夫用忠賢修政事詢羣䇿收衆心者自立之本也訓兵戎擇將帥繕城池飭戍守者自立之具也以忍恥和戎為福以息兵忘戰為常積安邉之金繒飾行人之玉帛女真尚存則用之於女真强敵更生則施之於强敵此茍安之計也陛下以自立為規模則國勢日張人心日奮雖强敵驟興不能為我患陛下以茍安為志嚮則國勢日削人心日偷雖弱敵僅存不能無外憂昔者孔子誦鴟梟之詩以為知道聞滄浪之歌則使小子聼之蓋安危存亡皆所自取若夫當事變方興之日而示人以可侮之形是堂上召兵户內延敵也微臣區區竊所深慮敢僣為陛下陳之古者一士止百萬之師一賢制千里之難季梁在而隨不可伐宫竒存而虞不可欺今濟濟周行號為多士然漢儒所謂骨鯁耆艾論議動衆心憂國如饑渴者既難其人間者意見小異則已成枘鑿論議小激則日以譸張豈以朝廷之上所少者非此耶夫平居攻文墨便刀筆名儒宿望或所不能至於正色而沮奸萌立談以斷大事不以利害為遷就不以招麾為去來則又非小有才者所能辦惟陛下以尊君重朝為心合天下正人以自助毋間同異毋徇愛憎則鼎吕之勢成金湯之守固折衝厭難孰大於斯臣固曰用忠賢為自立之本也昔勾踐之棲于㑹稽也飲食不致味聼樂不盡聲內則修令寬刑賑貧弔死折節下士而厚禮賓客外則修車馬兵甲而與三軍共饑勞之殃凡可以報吳者無不為而非可以報吳者不暇為也國家南渡駐蹕海隅何異越棲㑹稽之日宗廟宫室本不應過飾禮樂文物本不應告備也惟當飬民撫士一意復讎而秦檜乃以議和移奪上心粉飾太平沮鑠士氣今日行某典禮明日賀某祥瑞士馬銷亡而不問干戈頓敝而不修士大夫豢錢塘湖山歌舞之娛無復故都黍離麥秀之歎此檜之罪所為上通於天而不可贖也今兵馬踐於中原烽烟接於境上危機交急不同常時臣願削去虛文顓行實政百司庶府輪奐一新矣繼自今繕營不急之役姑輟焉可也簿書期㑹之士整理有緒矣繼自今常程瑣細之務付之有司可也陛下日旰視朝惟大政是議輔臣夙宵盡瘁惟大計是圖則勾踐之功可尋而中興之烈可兾矣臣故曰修政事為自立之本也昔漢有邉鄙大疑必使羣臣雜議季布得以中郎將而折列侯噲狄山得以博士而詰御史大夫湯北胸奴來求和親光武既從皇太子言卻其使矣而班彪乃以不宜絶北為言是一司徒掾而敢與太子異議也豈非國家大事臣子皆當盡言故耶我朝熙寧中契丹來議地界時王安石當國神宗乃以問韓琦富弼元祐初夏人遣使納欵時司馬光為相哲宗乃以問大防純仁高宗中興內外尤為倥偬然無一事不采人言建炎四年嘗議防秋矣紹興初年嘗議便民弭盜矣五年則令前宰執各陳禦兵之䇿矣八年則令侍從臺諫各上講和利害矣夫祖宗之明非不知獨運専斷為神顧以廣謀從衆為得者凡以盡天下之心而建久長之䇿也今事會之來日新未已臣願頒明詔以敵徙而南寖迫吾國凡厥有位其各盡言然後博采衆長按為定論書曰好問則裕自用則小命諸大夫各以情告無阿孤者勾踐之所以霸諸侯有忠慮於國但勤攻己之闕者諸葛亮之所以賢惟陛下以勾踐為心大臣以武侯為法則事無不集矣臣故曰集羣䇿為自立之本也國之元氣在人心元氣充則外邪却人心固則外患銷天地常經斷斷不易陛下亦常察近日人心之舒戚乎向者弊法新改令出加嚴雖大為防禁以示民非欲峻刑名而繩下而刺舉之官承迎過當奏劾來上類多中以深文使追褫者未聞牽復之期貶竄者尚隔惟新之望縉紳之論疇不嗟咨臣願明敕有司原情差次稍從釋免以收士大夫之心厥今州郡監司莫非才選然平易中和之政少而操切擊斷之意多以理財自詭則征利密於秋毫以行令自媒則用刑深於刺骨夫我朝立國本尚寬仁以此毒民懼者衆矣臣願選用循良退斥貪暴布宣德意洗滌瘡痍以收百姓之心君人之柄惟器與名當靳而豫則僥幸者生心宜豫而靳則勞能者觖望頃緣軍賞多濫一切難以微文雖懲僞所以别真而矯枉亦虞過正今邉候孔棘正牢籠武勇之秋臣謂荆襄兩淮之人嘗以功績著見為衆所推者宜命帥守監司搜揚來上擇其尤異者數人不次擢用自餘悉下銓曹審其來歷茍非妄冒者悉與隨次注擬以收豪傑之心往者兩淮募兵雖數萬計有如諸軍闕額自可撥𨽻分填而議者以廪給為憂急於汰遣方其例豫緡錢資之使去小人寡慮偷快一時資用既空束手無䇿强者遁藏山澤伺時而為奸懦者丐乞道塗偷生而就盡夫急則望其效死緩則委棄弗圖後復使人疇肯用命今宜擇其壯健收置戎行非惟增壯軍容潜弭奸慝亦以收忠義之心自丙寅之役淮民流離有司賑恤失時死亡略盡雖展上供貸常賦而凋殘未復生聚絶稀比聞州縣科役頗繁田賦雖蠲雜課仍重民兵團結衣裝弓弩責其自備教閲資糧令其自齎呻吟之餘何以堪此臣願朝廷深念保障之重多方優恤俾獲蘇醒以收邉氓之心北境遺黎本吾赤子日夕南望如慕慈親彼既襁負而來焉有可拒之理竊聞疆吏便文塞責至以鋒鏑驅之既絶其向生之塗是激其等死之忿又聞秦隴之間有相率內附者自涅其面示無還心視昔八字之軍何異而入南不受歸北不可獸窮則搏勢有必然臣恐欲以此靖邉祗以擾邉將以無事適為多事也臣聞古之有國者患民之不附而不患民之加多孟子曰為湯武驅民者桀與紂也今天下之君有好仁者諸侯皆為之驅矣今中華之民窮而歸我是女真為吾之鸇獺也其忍不為茂林深淵以受之邪羊祜祖逖之事淺矣然能務修德信撫納新附故吳人悅服晉土復歸况堂堂巨宋豈無能任二子之事者誠能謹擇其人分鎮三邉務以恩信懷柔而使逺人欣慕民既我附士將焉歸恢拓之基實在於此臣願朝廷亟加之意以收中原赤子之心夫得天下有道得其民斯得天下矣得其民有道得其心斯得民矣陛下誠能內有以保吾國之民外有以懷鄰國之民則以守則固以戰則克矣臣故曰收衆心為自立之本也抑臣又聞有自立之本有自立之具今連營列戍虛籍不填老弱溷殽教閲廢弛衣廩朘削憔悴無聊荆淮所恃者義勇民丁而團結什伍反成繹騷無以作其超距翹關之勇東南所長者舟師戰艦而繪畫圖册徒事美觀而未嘗習以凌波破浪之技儻非痛掃弊端一新戎政則緩急將無可用之兵掊斂成風而士卒之怨弗恤忌刻成習而偏禆之長莫伸或挑於奔北而威望不足服人或相與水火而用心莫能叶一公朝苞苴之路絶而别通交結之塗田宅子女之欲盈而外竊亷潔之譽儻非博采衆言精加搜擇則緩急必無可用之將昔李綱建議以為欲保江當葺理荆襄以為家計夫荆襄形勝臣固習聞而兩淮利病則尤所深悉蓋軍國所資莫如鹽策而淮有鬻海之饒兵食所仰莫如屯田而淮有沃野之利其齊民則天性健鬭每易視敵兵其豪民則氣槩相先能鳩集壯勇使范蠡諸葛亮輩得而用之力本以務農教民以習戰雖方行天下可也其肯委之為不足守之地哉中興之初志在進取故不暇修營泰和之後束於要盟又不克經理然孝宗皇帝所以設捍防闢空曠者未嘗不留聖心竊惟今日實南渡以來所未有之時政當乘機自立繼孝宗所欲為之志夫高城深池徑兵重戍邉之大命也今淮東要害在清河之口敵之糧道實出于茲而淮隂無尋丈之城無尺寸之兵徒以山陽可恃而已然山陽雖大前無淮隂之蔽後無寶應之援若敵以重兵遮前而竒兵斷後則髙郵維揚之路絶而山陽之形孤山陽不守則通泰危而江浙震矣淮西要害在渦潁之口敵之糧道亦自此出而濠梁安豐城則庳薄池則堙狹兵則單虛徒以廬和可恃而已然有安豐之屏捍則敵始不得以犯合淝有濠梁之遮蔽則敵始不得以走歷陽藉有他徑可由而吾以廬和當前濠壽斷後彼有腹背之虞我有犄角之助其能長驅深入蕩無所限乎故欲固兩淮先防三口此非臣之臆說也昔孫氏之保江左邾城雖小猶屯三萬人今維揚合淝兩淮之根本而兵數單弱不及孫氏一邾城故李綱嘗謂大將擁重兵於江南官吏守空城於江北以為非䇿臣謂今日當議徙江上之屯以壯淮甸之勢或謂果爾如江面何夫兩淮藩籬也大江門戶也藩籬壯則盜賊無闖門之慮兩淮固則戎馬無飲江之憂第當精閲舟師布列津要則表裏相應屹如金湯其與區區坐守江壖而使賀若弼之徒得以經營飛渡者利害何翅什百哉雖然此不足煩聖慮也古之為國者必有重臣以當閫外之寄故蜀以孔明駐漢中吳以陸遜守荆渚皆付以事權不從中御故二人者得以乘機制變而收成功今江陵建鄴雖有制閫之名而實處內地邉陲機事多不即知至於小有措置必皆聽命于朝有請輒從尚云可也請而弗獲抑又多焉藉有異材何由展布因循誤事可為深憂臣願於近臣中擇其更事任熟軍情威望素孚文武兼備者二人一於襄漢一於兩淮之中建立幕府財許移用宮許辟置其他悉如吳蜀任二臣故事則淮襄之家計可成而朝廷之憂顧可釋此陛下所當亟圖而不可忽也或曰彼方紛拏我幸無事但求鎮靜焉用張皇臣竊以為不然夫自古未嘗無勍敵惟有以待之則不敢窺未嘗無奸雄惟有以折之則不敢肆今不於斯時大有所振立萬一更生虎狼之敵知吾易與潛啓桀心當是時也不知安邉金繒行人玉帛可以窒其無厭之欲乎夫古今之患非一而蒙蔽為甚昔范仲淹嘗謂時方用兵不當諱言邉事今朝廷若以張皇為戒臣下希㫖雖有警急不敢上聞本惡張皇乃成蒙蔽昔雲南喪師反以捷告原其積漸不過如斯盛明之朝可不鑒此是月夏人來議夾攻不報夏國左樞密使吐蕃路都招討使萬慶義勇者令蕃僧戩巴本布賫蠟書二丸至西和州之宕昌寨欲與本朝合從犄角恢復故疆蕃兵總管傅翊得而上之時董居誼初入蜀不之報由是敵訊中絶八月癸巳朔罷關外四州所增方田稅癸卯復建宗學改教授為博士又置宗學諭一員九年十二月詔並𨽻宗正寺博士在太常博士之下諭在國子正之上俸給人從賞典依國子博士及正體例生員以百人為額於是宗室疏逺者皆得就學彬彬可觀矣旋有㫖復存諸王宫大小學教授一員金人復來督嵗幣乙巳太白經天禁州縣沮壞義役戊申以安丙知潭州先是六月癸丑安同知自廣安順水赴行在至近畿除觀文殿學士知潭州癸丑安同知行至廣德軍得邸報丁巳還次黃池鎮被新除之命上疏力辭優詔不允乃遣官賫結局進册赴行在蓋自開禧三年二月乙亥晦曦誅安公權宣撫使至今年四月癸丑制置大使司結罷凡二千六百有一旬有八日云於是制置使還成都而興元帥臣兼節制御前軍馬九月壬戌朔日有食之太白書見癸亥雷乙亥高宗經武要略成史彌逺等上進久雨丙戌釋大理三衙臨安府杖以下囚庚寅釋兩浙路杖以下囚除茶鹽賞錢十月朔出內帑錢賑臨安府貧民冬十月戊戌廢卭州嘉定監十二月復罷同安監鑄錢丁巳復四川辭見制命四川監司及大郡知州辭見如舊制十一月辛酉朔聶子述使金賀正旦也刑部侍郎劉爚等及太學諸生上章言其不可不報丙戌賑浙東灾傷命監司核灾傷州縣蠲放之數發常平米賑之是月真德秀言五事德秀除祕閣修撰江南東路計度轉運副使朝辭奏事其一有曰宗社之耻不可忘臣嘗觀古之人主於仇讎怨敵之國有勢未能報而姑事之者有勢雖不敵而不事之者有勢可以勝而遂報之者有勢可以報而反助之者昔太王之於狄也事之以皮幣事之以犬馬事之以珠玉凡其所欲悉以畀之蓋是時狄强而周弱畏天保國其道當然故孟子曰惟智者為能以小事大然狄之於周特一時之怨非百世之讎含垢包荒義未為失此所謂勢未能報而姑事之者也西晉懷愍二帝俱沒於劉聰元帝間關南渡立國日淺外寇方熾內難復興故終其身未遑北討然一介行李未嘗往聘北廷成帝時石勒來修好詔焚其幣此所謂勢雖不敵而不事之者也勾踐㑹稽之辱舉國以臣妾於吳而能苦身焦思折節下士與百姓共其勞人事既修天應亦至吳之稻蟹不遺種矣而夫差方觀兵中土與晉會于黃池勾踐得以乘間舉兵遂墟其國此所謂勢可以勝而遂報之者也晉孝武時苻堅聚百萬之師志吞吳㑹賴謝𤣥等大破之淮淝堅既狼狽西歸其子丕復與慕容埀相持于鄴使晉之君臣有志經略乘機席卷殆不其難而謝𤣥方且從丕之請遣兵以救其窮餽米以濟其饑舍苻氏之深讎與慕容而為敵未幾劉牢之等為垂所敗秦既不祀晉亦以衰此所謂勢可以報而反助之者也臣竊惟國家之於金蓋萬世必報之讎高宗孝宗值其方强不得已以太王自處而以勾踐望人今天亡敵人近在朝夕旱蝗頻年赤地千里甚於夫差之時塔坦羣盜四靣交攻無異苻秦之季天其或者付陛下以有為之會乎臣常熟思待敵之䇿其别有三練兵選將直搗巢穴若勾踐襲吳之師此上策也按兵堅壘內固吾圉止使留幣外絶敵交若晉氏之不與敵和而鍳其宴安江左之失此中䇿也以救灾恤鄰之常禮施之於茹肝涉血之深仇若謝𤣥之助苻丕此下䇿也用上策則大義明混一之機也用中策則大計立安强之兆也用下策則大勢去阽危之漸也臣不知今日之廟謨其將安出乎顧更化以來生聚教訓未有勾踐十年之功固未可遽圖一戰之勝於傳有之攻不足者守有餘夫以堂堂大邦方地千里誠能以待敵之禮而遇天下之豪傑以遺敵之費而勵天下之甲兵人心奮張士氣自倍何憚於彼而猶事之哉若乃輕信奸臣迎合之言援餘孽於將亡置世讎而不念非惟忠臣義士沮氣解體而邊徼羌蠻亦將有輕中國之心萬一貽書誚侮我將何詞以應之夫重於絶敵者畏召怨而啓釁也然能不召怨於金人而不能不啓釁於新敵權其利害孰重孰輕故臣願陛下勉勾踐之良圖懲謝𤣥之失䇿則王業興隆可兾矣其二曰比鄰之盜不可輕今之論塔坦者類曰非有囊括并吞之志其論山東之盜亦曰不過鼠竊狗偷之謀抑不思劉石苻姚之興大抵皆出荒裔全齊十二之險昔人用之嘗以霸强况今中原士民倀倀無主使盜亦有道則衆將從之茍得志而鄰於吾莫大之憂也乃者僞使之來輕舟浮海不十日而抵邉城舍舟登岸人無知者安知不以是覘吾之虛實乎臣願朝廷毋輕二賊日夜講求攻守之策以逆杜窺覦之心自治之方無急於此其三曰幸安之謀不可恃今之議者大抵以敵之存亡為我欣戚聞危蹙之報則冀其非實得安靜之耗則幸其必然重以邉臣喜為迎合或曰塔坦許和矣或曰羣盜聼命矣或曰還燕有日矣誠使敵命少延吾得以因時修備豈非至願政恐奔竄敗亡之餘勢必不久皇皇巨宋初非小弱顧乃藉彼以為安是猶以朽壤為垣而望其能鄣盜賊也臣願陛下勵自强之志恢立武之經毋以金存為喜毋以金亡為畏則大勢舉矣其四曰導諛之言不可聽臣聞天難諶命靡常者伊尹所以訓太甲惟不敬厥德乃早墜厥命者召公所以戒成王聖賢言天不過如此未嘗曰某星躔某舍則其業昌某神居某地則其福應也自嘉定更化以來兵偃嵗豐民稍蘇息此誠聖德格天之效而溺於數術者猥曰天福太乙實臨吳分審如其言則治亂興衰皆有天數無關君德豈不悖哉今邉事方殷正君臣戒懼之日而薦紳大夫工為諛說或以天福足恃為言夫漢之肇造以寬仁得民而不在五星之聚井晉之卻敵以將相有人而不在嵗星之臨吳矧乾象告愆邇日尤甚其可恃䜟緯不經之說而忽昭昭之警戒乎惟陛下鑒天人之相因察諛佞之有害益修其本以格天休宗社之慶也其五曰至公之論不可忽臣聞公論國之元氣也元氣痞隔不可以為人公論堙欎不可以為國祖宗盛時用人立政一揆之衆論而行之以至公故人心悅服天下順治熙寧之世以新法為不可行者公論也王安石違而咈之終以誤國紹興之際以和議為不可恃者公論也秦檜讎而嫉之遺患至今夫朝廷之舉措是而衆亦是之者治世也朝廷之舉措非而衆亦非之者亦治世也朝廷舉措自以為是而衆莫敢議其非此子思所以憂衛之君臣也往者托胄弄權以威罰箝天下之口浸淫既久附和成風北伐一事中外共知其非而無敢言其效蓋可覩矣使托胄能虛心平聼不以先入為主而惟公論是從則國無用兵之禍已無戮辱之殃豈不美哉間者使命之出外議譁然從臣爭之館學爭之庠序之士又爭之或者未必不以為紛紛多事臣獨曰此數十年來所無之氣象聖君賢相優容涵養致此盛事豈易得哉夫天下之大本同一家人主者父也大臣者宗子也大夫士者家之衆子弟也至於庶人之賤一家之陪𨽻父兄有過子弟爭之子弟有過陪𨽻言之蓋一家之事休戚實同凡其次第相規政欲共成門戶之美耳君臣之義何以異此而自昔惡聞正論者往往加以歸過賣直之名夫欲使士大夫畏避此名務為緘默直易易耳不知臣子至情本為國計何負於君父而顧嫉之邪深惟今日實公論伸屈之機朝廷之上若以言者為愛君為報國無猜忌之意而有聼用之誠則公論自今而愈伸若以言者為沮事為邀名無聼用之誠而有猜忌之意則公論自今而復屈夫公論伸屈乃治亂存亡之所繇分故臣於奏篇之終反復極言忘其重煩天聼之罪詩曰心乎愛矣遐不謂矣惟陛下亮臣愚忠是嵗黎州蠻蓄卜始降青羌卜籠既降守臣袁柟知蓄卜勢孤乃令安靜寨總轄杜軫諭之出漢蓄卜疑漢人殺之有卭部川都王之弟部勒者與之謀遣漢人入蕃為質蓄卜乃來從者凡三百餘人柟與通判州事周塤聚㕔受其降蓄卜膝行而前抱柟之足柟以錢帛厚犒之蓄卜留州城十日將渡河乃送還漢人十一而去柟言于朝得報下制置司利東安撫司各常切措置鎮撫務令邉界安靜毋或引惹生事自蓄卜犯邉至此更七年而後定云
