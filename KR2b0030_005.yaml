body:
  text: 兩朝綱目備要卷五寜宗慶元三年丁巳春正月壬寅鄭僑罷癸卯謝深甫兼知樞宻院事二月己酉神宗玉牒髙宗實録成京鏜等上之丁巳邵褎然請不除偽黨在内差遣案慶元黨禁作邵褎褎然為大理司直請詔大臣自今權臣之黨偽學之徒不得除在内差遣詔下其章戊午復陞差将校法紹熈中葛邲在樞筦奏請江上諸軍陞差統制官至凖備将者自主帥觧三人赴緫領官選擇一名申樞宻院至是有㫖並委主帥選擇令緫領或屯駐處守臣審覈保明申樞宻院紹熈指揮勿行三月乙未建東華門丙申竄内侍王徳謙上在藩邸徳謙為府都監孝宗大漸黄由請上過宫問疾既得㫖矣徳謙堅請覆奏由斥其不可上從之卒徃視疾及即位徳謙驟遷昭慶軍承宣使内侍省押班是春徳謙求建節有定議矣時呉宗旦為中書舍人事徳謙甚謹夜輙易服謁之以家僮執燈自導徳謙既有秉旄之耗乃薦宗旦為刑部侍郎直學士院使草麻二月甲子徳謙遣幹吏諭指宗旦厚待之使其子與飲且自捧勸者三翊日遂鎻宿禁中宗旦将入先出制草以示人且引天寳同光故事為比徳謙喜置酒髙㑹丙寅制出參知政事何澹不押制書右諌議大夫劉徳秀聞之率臺諌交章言其不可丁卯宰相京鏜復以為言上遂寢其命於是徳謙除在外宫觀吏部尚書兼給事中許及之奏駮之臺諌因請竄斥徳謙以慰中外之望上未許姚愈時為殿中侍御史首奏宗旦交結徳謙以進為之草詞請加貶黜已詔降宗旦三官罷之權中書舍人髙文虎論其責輕辛未宗旦坐追三官癸酉復送南康軍居住或曰有貴戚與徳謙爭用事于中而徳謙以計勝戚憾焉故因事擠之也宗旦既出臺諌遂急攻徳謙詔以本官奉祠居廣徳軍未㡬日者陳舜道自言頃如門司徐考叔家賣卜考叔為言徳謙多受張宜金錢引為閤長令舜道為臺諌言之徳謙伺知之考叔坐送郴州安置至是考叔已貶吉州三月庚寅有㫖考叔許自便㑹臨安府劾徳謙為人求官贓以鉅萬計嘗以導駕燈籠自奉服食擬乗輿獄未成丁酉特㫖降徳謙團練使居撫州他勿治翊日髙文虎請改為安置上從之然獄卒不竟也徳謙先賜第遂改以賜故嗣濮王士歆家五年二月詔移徳謙徽州宗旦池州並居住甲申右諌議大夫張釡言徳謙奸詭宗旦阿囬請自今不以赦移雖有特㫖亦許執奏四月以竄逐徳謙本末付史舘十二月復用察院孟必先言移徳謙汀州嘉泰元年五月丁卯始許宗旦奉祠便居而宗旦死矣訃聞贈正奉大夫官其子孫如故事時徐誼劉光祖貶久矣於是亦許便居焉庚子禁浙西圍田壬寅定奏讞不當罪紹興初陳去非在黄門始申嚴奏讞不當之令其後寖寛慶元中東南有因詈人被毆死者而行兇之人作可憫奏裁姚愈為御史上言如此是詈人之罪重於殺人乃詔自今有司奏讞死罪不當者論如律夏四月丙午雨土旱壬子禱于天地宗廟社稷乙丑雨雹閏六月甲戍申嚴銅噐之禁内出銅噐付尚書省毁之民間舊有者限兩月赴官投賣每兩以三十錢酬之民間多不盡輸再限兩月不復酬以錢違者許人告湖州舊鬻鏡行於天下至是官自鑄之因復置神泉監以所括民間銅噐鑄當三大錢仍權𨽻工部惟嚴錢直輸行在而建韶饒贛州皆自提㸃所泛湖由江入漕渠輸之京帑焉然祖宗時内帑雖嵗収新錢一百五萬而毎年退却六十萬三年一郊又支一百萬赴三司是内帑毎年得一十一萬六千餘緡而左藏得九十三萬三千餘緡也今嵗額止十五萬而𨽻封樁者半内藏者半左藏咸無焉宜版曹之日困也按復置神泉監事在八月戊子綱内此因禁銅而詳及之甲午貶留正分司西京邵州居住先是六月癸卯言者論三十年來偽學顯行場屋之權盡歸二三温人所謂狀元省元兩優釋褐若非其私徒即是其親故望詔大臣審察其所學而後除授時有宣教郎錢文子者以太學兩優釋褐一任囬當召試徑就部注潭州醴陵知縣而去時人稱之是月戊寅朝散大夫劉珏案慶元黨禁作劉三傑薛應旂宋元通鑑亦作三傑并繫其入見上言于甲午日以故御史免䘮入見上言前日之偽黨今又變而為逆黨防之不可不至且獻消之之䇿及論留正共引偽學之罪韓侂胄大喜即日降㫖除右正言正坐貶邵州是夏大溪山島民作亂案本紀及宋元通鑑俱作大奚山大奚山者在廣東海島中是夏廣東提舉茶鹽徐安國遣人入島捕私鹽島民不安即嘯聚千餘人入海為盗劫副彈壓髙登為首揭牓䟽安國之罪掠商旅殺平民百三十餘人經畧使雷潨與安國素有隙及是安國乞遣兵討之而潨則用錢酒醪以犒勞且以安國生事聞於朝是月戊子詔安國别與差遣㑹安國上疏自辨癸巳詔提㸃刑獄唐弼究實以聞於是給事中許及之言統領林墉彈壓林通造謀以傾安國詔二人皆罷七月甲寅下詔召潨還既而右諌議姚愈又以為言乃併安國罷之而弼與宫觀八月庚辰以軍噐監錢之望為秘閣修撰知廣州丁亥以刑部郎中陳研為提刑知潮州陳宏規為提舉言者復奏島民擅殺平民之罪辛卯命之望究治之之望盡執島民戮之無噍類議者或以為過云秋八月戊子復置嚴州神泉監甲午均諸路職田九月壬寅蠲四川民賦以旱詔制置總領諸司蠲放民賦乙丑申嚴臧否之令令帥臣監司臧否郡守是月禁偽黨改官丁卯言者又論偽學之禍望申飭大臣監元祐調停之説杜其根源時有詔監司帥臣薦舉改官並於奏牘前聲説非偽學之人且結朝典之罪秋當大比漕司前期取家狀必欲書委不是偽學五字於後時有柴中行者為撫州推官獨申漕司云自㓜習易讀程氏易傳未委是與不是偽學如以為偽不願考校士論壮之是秋太學生削何澹題名治其罪案慶元黨禁太學生削澹題名事在六年吕祖泰决配事後太學生某人者於齋生題名中削去何澹名字以其嘗排道學也澹時已顯貴大怒於是京尹因其出使不逞者與之閧遂捕治之時太學生敖陶孫為文案據下文所載陶孫詩則此文字應作詩字以弔趙汝愚而侂胄未得其名俾士人併承之辭不伏乃移送大理寺獄丞劾其事掠治無完膚獄竟不就猶坐不應削澹名送嶺南編管陶孫詩云左手旋乾右轉坤諸公相顧尚流言狼胡䟦疐傷姬旦漁父沉淪弔屈原一死固知公所欠孤忠頼有史長存九原若遇韓忠獻休説如今㡬世孫陶孫福州人後數年登進士第獄丞用此除工部郎官云冬十月癸酉雷丙申赦以夀聖隆慈備福光祐太皇太后違豫故也十一月辛丑上孝宗徽號加紹統同道冠徳昭功八字是日太皇太后崩于慈福宫詔服期明年加謚憲聖慈烈皇后攢於永思陵癸卯日南至祀天地于圜丘紹興中國學初建内出鎮圭以奉文宣王至是上将行大禮而内府無圭乃下國子監借文宣王玉圭用之赦天下壬子車駕還大内自慈福宫十二月丙子始御正殿丁丑蠲紹興府身丁錢以太后攢宫故蠲貧民身丁折帛絹綿錢甲申雨土丁酉籍偽學知綿州王沇乞置偽學之籍仍自今曽受偽學舉薦闗陞及刑法亷吏自代之人並令省部籍記姓名與閑慢差遣從之於是自慶元至今以偽學逆黨得罪者凡五十有九人宰執四人趙汝愚右丞相留正少保觀文殿大學士王藺觀文殿學士知潭州周必大少傅觀文殿大學士待制以上十三人朱熹煥章閣待制兼侍講徐誼權工部侍郎兼知臨安府彭龜年吏部侍郎陳傅良中書舍人兼侍講案慶元黨禁陳傅良舍人兼侍讀兼直學士院薛叔似權户部侍郎兼樞宻都承㫖提舉太史局章潁權兵部侍郎兼侍講鄭湜權刑部侍郎樓鑰權吏部尚書林大中吏部侍郎黄由權禮部尚書黄黼權兵部侍郎何異權禮部侍郎孫逢吉權吏部侍郎餘官三十一人劉光祖起居郎兼侍讀吕祖儉太府寺丞葉適太府少卿總領淮東財賦楊方案續通鑑作芳祕書郎項安世祕書省校書郎沈有開起居郎曽三聘知郢州㳺仲鴻軍噐監主簿呉獵監察御史李祥國子祭酒楊簡國子博士趙汝讜添差監左藏西庫趙汝談前淮西安撫司幹官陳峴祕書省校書郎范仲黼著作郎兼權禮部郎官汪逵國子司業孫元卿國子博士袁燮太學博士陳武國子正田澹宗正丞兼權工部郎官黄度右正言張體仁太府卿案慶元黨禁作詹體仁此及嘉泰二年趙汝愚復官黨人見在者皆先後復職詹亦與其列詹本傳建寜浦城人以太府卿直龍圖閣罷後復直閣除司農卿則為詹無疑宋元通鑑作張考紹熈初羅㸃薦士八人有張體仁見本紀蔡㓜學福建提舉常平茶事黄灝浙西提舉常平茶鹽公事案慶元黨禁無黄灝係脱誤宋元通鑑有之周南池州州學教授呉柔勝新嘉興府府學教授李􅌫校書郎王厚之直寳謨閣案慶元黨禁作顯謨閣江東提㸃刑獄孟浩知湖州趙鞏祕閣修撰知揚州白炎震新通判成都府武臣三人皇甫斌池州都統制范仲壬案續通鑑作危仲壬誤知金州張致逺江西兵馬鈐轄以上並見於臺諌章䟽者士人八人楊宏中周端朝張衟林仲麟蒋傅徐範蔡元定吕祖泰事既行黄由為吏部侍郎建言人主不當待天下以黨與不必置籍以示不廣沇故資政殿學士詔曽孫也未㡬擢沇利路轉運判官時由權禮部尚書㝷出帥蜀張巖為殿中侍御史奏由阿附權臣植立黨與遂降由雜學士奉祠焉是嵗復銓試取人數依舊制二人而取一故事春秋再試十人而取七乾道二年後止春試二人而取一紹熈末議者病其寡學乃請三人而取一是嵗謝源明為吏部侍郎上言今世禄之家已留意學問請復舊制詔從焉今蜀中銓試甚寛凡假手者率費七百緡又勢要子孫鮮不與選或謂宜悉赴吏部然吏部亦不免此要當如祖宗時先試而後命可也革宻白補授弊舊制樞宻院事並過門下省乾道元年十二月癸卯言者請自今樞宻院已被㫖文書並闗中書門下依三省式畫黄書牘以示欽重出命之意從之然宻院機速事則不由中書直闗門下省謂之宻白是年樞宻院以宻白遷補潜邸醫官二人給事中許及之以非舊典爭之遂寢其命慶元四年戊午春正月丙辰趙師􅋷除工部侍郎案宋元通鑑師􅋷之除在八月誤此目内有都市行燈之語則為正月無疑慶元黨禁謂除命在正月十八日者是也韓侂胄妻早死有四妾皆得郡封所謂四夫人也其次又十人亦有名位去嵗秋冬之間有獻北珠冠四枚者侂胄喜以遺四夫人其十人皆愠曰等人耳我軰不堪戴耶侂胄患之師􅋷時以列卿守臨安㣲聞其事亟出十萬緡市北珠甚急是月辛亥侂胄入朝未歸京尹忽遣人致饋啟之十珠冠也十人者大喜分持以去侂胄歸左右以告侂胄未及有言十人者咸來致謝遂已翼日都市行燈羣婢皆頂珠冠而出又明日語侂胄曰我曹夜来過朝天門都人聚觀真是喝采郡王奈何不與趙大卿轉官耶翼日又言之故有是命侂胄嘗與衆客飲南園過山荘指其竹籬茅舍而謂曰此真田舍間氣象所惜者欠雞鳴犬吠耳少焉有犬嘷于叢薄之下亟遣視之京尹趙侍郎也侂胄大笑其後京尹坐他事罷諸生為詩誚之有也曽學犬吠村荘之句即指此也丙寅葉翥同知樞宻院事丁卯詔恤流民以兩浙江淮荆湖四川民流詔有司舉行寛恤之政二月辛未詔近臣舉才兩省侍從臺諌各舉所知一二人毋舉宰執子弟親黨三月己丑降徳音以憲聖攢宫之役蠲臨安紹興賦租税有差是月經筵進讀寳訓臣寮劄子恭聞詔㫖已擇今月十一日開講望陛下遵用仁宗髙宗故事令侍講之臣仰稽三朝寳訓如李淑所舉外治數條詳悉講明以備觀覧凡武備之設何者為先軍旅之制何者為重邉圉治守孰為要害敵國情偽孰得要領考古驗今有至計商畧而施行之足以為思患預防之䇿上從之夏五月己亥韓侂胄為少傅賜玉𢃄以朝以憲聖攢宫復土遷也己酉詔禁偽學先是右諌議姚愈上言近世行險僥倖之徒倡為道學之名權臣力主其説結為死黨願下明詔播告天下諌議張釡亦以為言從之遂命直學士院兼中書舍人髙文虎草詔曰向者權臣擅朝偽邪朋附協肆奸宄包藏禍心頼天之靈宗廟之福朕獲承慈訓膺受内禅隂謀壊散國勢復安嘉與士大夫厲精更始凡曰滛朋比徳㡬其自新而歴載臻兹弗廸厥化締交合盟窺伺間隙毁譽舛忤流言間發将以傾國是而惑衆心甚至竊附於元祐之衆賢而不思實類乎紹聖之奸黨國家秉徳康寜不汝瑕殄今惟自作弗靖意者漸于流俗之失弗可復反歟将狃于國之寛恩而罰有弗及歟何其未能洗濯以稱朕意也朕既深詔一二大臣與夫侍從言路之官益維持正論以明示天下矣諭告所抵宜改視囬聼毋復借疑似之説以惑亂世俗若其遂非不悔怙終不悛邦有常刑必罰無赦布告天下無忽愈上此奏韓侂胄大善之未㡬遂遷兵部尚書御史中丞是月禁女冠毋入大内及三宫先是江州僧道隆者自言能知人休咎徃徃或中豪民貴戚競施之號風和尚道隆飲酒食肉多蓄美婦俗又以散聖目之慶元中徃來都下有倡婦馬換師夀康宫幕士詹恩妻也號馬部頭既入夀康宫以病歸外舍道隆因之使求賜金于北内以為建塔費陳淑妃亦使其母徃拜之安康郡主適羅氏者舘諸其家予金錢以萬計府尹趙師􅋷聞之執以屬吏録其槖得金錢三萬緡有竒獄成有㫖杖黥𨽻英徳府土牢収管仍以獄詞徧示諸路是嵗四月壬申也道隆既斥故有是詔其後興國軍有女巫又以符水出入貴勢之家所謂九宫山是也秋七月己未丁逄請勿用偽黨逄以都大川秦茶馬入見極論元祐建中調停之害且引蘇轍任伯雨之言為證時薛叔似葉適坐汝愚黨久斥皆起家為郡故逄有是言宰執京鏜何澹大然之翌日遂除軍噐監辛酉葉翥罷八月久雨丁卯命决繫囚丙子謝深甫知樞宻院事兼參知政事許及之同知樞宻院事淳熈末及之與薛叔似同擢補遺皆為善類所予黨事既起叔似累斥逐及之乃更遷給事中吏部尚書既而踰二年不遷乃間見侂胄叙其知遇之意及衰遲之狀不覺涕零繼以屈膝侂胄惻然語之曰尚書才望簡在上心行且進拜矣不數日遂有是除侂胄嘗值生辰羣公上夀既畢集許及之為吏部尚書適後至閽人掩闗拒之及之大窘㑹門閘未及閉遂俯僂而入當時有由竇尚書屈膝執政之語傳以為笑庚辰白氣亘天丙戍詔詣夀康宫上夀以太上皇帝聖躬清復率羣臣上夀後不果行九月壬寅太白晝見癸卯太白經天丁未慶元重修敕令成京鏜上重修敕令格式申明詔頒天下國朝法令大抵從寛政和後始有御筆特斷刑名是蓋多出於三尺之外矣靖康元年九月議者請參用嘉祐元豐舊法以竢新書之成奏可㝷詔律令依嘉祐斷刑依元豐明年四月復詔政和海行法非御筆修立者許引用建炎三年復辟赦舉行仁宗法度即嘉祐元豐法有不同者賞格聼從重條約聼從輕時吕頥浩張浚始為政也明年六月范宗尹相乃奏命有司以嘉祐政和勅對修成書紹興元年八月上之其後乾道淳熈慶元之際率十餘嵗一修然大概以紹興重修勅令格式為凖是月詔造新歴太史言月食於晝而草澤言食於夜驗視如草澤言有㫖改作仍命祕書省正字馮履參定明年五月壬辰朔歴成賜名統天蓋自建隆迄慶元二百五十年之間歴十四變上距黄帝之歴凡五十變矣而知歴者謂統天新歴尤復疎謬昔洛下閎太初歴成自言八百年當差一度其後未及八十年固已差一度矣李淳風曰一氣差三度九日差一刻又曰自太初下至麟徳差四日自太初上及僖公差三日一行亦曰劉洪歴四十五年差一度梁武帝歴百八十六年差一度以前人歴術之精猶不免此况賤工之草創者乎大抵唐末以後律歴之法不傳士大夫無所從受而星翁歴人類多鄙淺是以不足以推明其學也冬十二月丙戍再蠲臨安府身丁錢三年是嵗育宗室與愿于宫中藝祖皇帝十世孫燕懿王後也時年六嵗後賜名曮又更名幬立為皇太子後又更名詢云慶元五年己未春正月庚子蔡璉誣告趙汝愚異謀璉初為樞宻院直省官趙汝愚定䇿時璉從旁竊聼欲行漏泄汝愚覺而囚之上即位遂從輕决配去年冬竄歸輦下用事者聞之以為竒貨乃使璉排日供具汝愚當定䇿時有異謀凡徃來賓客所言共七十餘紙文書既就乃議送大理五年正月七日中書舍人范仲藝案韓侂胄傳作張仲藝方下直忽工部尚書兼給事中謝源明過之問曰聞蔡璉之事否曰未也源明具以告且曰儀同之意欲呼近上者三數人問之以實此事近上三數人謂彭龜年徐誼沈有開曽三聘葉適項安世軰也仲藝曰當如何源明曰公必為繳章如此建請但畧令源明與其事公繳録黄留録白付門下可也仲藝姑應之曰諾明日詞頭果下張孝伯為吏部侍郎過仲藝曰蔡璉之事儀同意毋它第欲呼近上三數人一問之以實此事舍人盍分别言之仲藝力言其不可孝伯曰見無禮於君者如鷹鸇之逐鳥雀使數人之事成置主上於何地舍人奈何欲庇之耶仲藝曰不然自頃嵗已來朝廷行遣諸人不為不盡今無故捕從官朝士數十人付之有司豈不駭四方之觀聼孝伯唯否而去其後乃知孝伯已見侂胄力爭之而姑以見試耳夜仲藝直後省遂草駮奏翼日䄂録黄以謁侂胄語之曰相公今日得君凡所施為當一以魏公為法章蔡之權不為不盛然至今得罪於清議者以同文之獄故耳相公勲業如此胡為蹈之侂胄曰某初無此心以諸公見廹不容但已問其人乃知京鏜諸人與吏部尚書劉徳秀實主此議仲藝具以告孝伯之説告之侂胄釋然曰録黄何在仲藝曰在此侂胄取而藏之事遂格既而諌官張釡陳自強御史劉三傑張巖程松連䟽有請詔以累經赦宥於是彭龜年追三官勒停曽三聘追兩官而蔡璉補進義副尉云嘉定元年汝愚子崇憲訟於朝乃配璉贛州牢城乙卯果州學官王莘罷坐考昌州春試舉人而以尚書斷章為問題也先是去年三月莘與西充縣丞任逄俱被檄考春試莘昌州逄濾州逄當發䇿問今日内外輕重之弊其末云漢唐之際亦有當王鳯輔政雖為所舉非鳯專權不親附鳯者亦有因重梨園樂工請觧官出外潔介自守不詣牛仙客者今欲居班列者各知所以砥節厲行銷去私意無入而不知出之病無愧於不附鳯不詣仙客之人何術可以臻此䇿題申至禮部侍郎胡應期摘其語為韓侂胄言之侂胄怒先是發䇿相類者三人一在蜀一在廣一在閩其二人則陳一新林復之也執政欲併治之張巖為監察御史即奏䟽論去年諸路觧試舉人有義題斷章及䇿題紕繆援引失當中有㴠蓄不盡者意不在莘也中書舍人范仲藝初聞其事以告禮部尚書黄由由詣宰執京鏜謝深甫何澹許及之諸公爭之皆不納由不得已作書具陳利害為侂胄言之侂胄雖勉從而猶未平也然逄坐是得免而莘所出問題自夏暑雨至文王謨當時實惡暑雨祁寒之語而但以斷章為名故有是命於是執政怒逄未巳又移書蜀帥袁説友欲料理之賓客諸公多為之請時部使者欲舉逄改京秩者數人皆懼而止然事竟釋矣是秋巖遷起居舍人又餘月復為殿中侍御史始何同叔代應期為禮部侍郎具知其事謂巖曰黄尚書年來可謂大有定力如去年置籍事今年䇿題事皆能囬用事者之聼㑹由除蜀帥冬初陛辭因上奏論治蜀當以安靜和平為先而治天下兼同此道上下其奏巖即擊之由坐奉祠者此也辛酉初命漕臣無出身者勿差官考試王莘既黜時漕臣汪徳輔故相伯彦孫大府卿召嗣子也議者謂汪以祖任入官故擇考官不善張巖為監察御史因請自今漕臣不由科第進者更委它監司一員選官校試仍擇有文學士望者一人為㸃檢官専掌命題去取之事即有不稱加以重罰從之蓋自嘉泰元年始壬戍建玉堂二月乙丑胡紘罷紹熈末紘為進奏院未為人所知㑹趙汝愚奪職居餘干韓侂胄意未快有薦紘可備鷹犬者遂遷司農寺簿除祕書郎監察御史汝愚永州之貶用絃章䟽也時侂胄欲論朱熹無敢先發者紘鋭然任責物色無所得經年醖釀章疏乃成㑹建方䘮之議遷太常少卿紘遂以藁授沈繼祖云庚午雪癸酉白氣亘天乙酉貶劉光祖去嵗光祖撰涪城學記案慶元黨禁光祖撰涪城學記即在本年有世方以道為偽而以學為棄物夫好惡出於一時是非定於萬世學者盍謹所先入以待豪傑之興之語至是諌議張釡劾光祖佐逆不臣蓄憤懐姦欺世慢上五罪詔光祖落職房州居住八月壬戍察院朱元之言國是已定要當堅執毋事紛更以底安靜之治三月甲午罷監司臧否郡守之制孝宗淳熈中始嚴監司臧否郡守之令既申牧伯部使者數人稽緩之罰時趙雄守荆林栗守潭為上所禮特下詔趣之然行之十餘年其後士大夫徃徃以人情之厚薄為臧否論者頗患其不公去年十一月庚申新知漢陽軍蒋用之朝辭上疏稍論其偽朝廷是之至是陳自強復以為言於是臧否遂罷戊申四川行對補錢引法自天聖立川交子法毎再嵗一易令人户輸紙墨費三十錢紹興十一年詔増為六十四毎界無慮一百七十萬緡其更易不盡者號水火不到錢亦二十餘萬緡悉令計司取之以備邉用然錢引屬總所而鈔紙場錢引務𨽻成都漕司故更易不盡者總漕屢爭之其後卒歸總所焉紹熈二年上念蜀民之勞詔權展一界乃易慶元四年冬丁逄自四川茶馬代還入見案逄入見在四年秋七月此云冬疑誤言川交子二年一兑毎引納貫頭錢八十文足民甚苦之今計所多羡財請毎界展一年永為定制章下制置司袁説友為帥上言今民間毎兑錢引一千貼納錢引六十四文足毎界總領所収貼頭錢凡百八十萬緡今欲展年當求對補之䇿其一紹熈初増印百七十萬緡今凡八年則兑界兩三次間暗増貼頭錢已三四十萬其一去嵗増印百萬緡異時毎界増貼頭錢亦近七萬此二者畧可相當兼總所每界撥還漕司工墨錢十九萬緡今既展年不復對撥而又每界水火不到之緡㡬十萬皆總所得之若展一年所不到者又倍凡此皆可以對補展年所虧之數至是有㫖許之然六年冬兑界水火不到錢纔七萬五千四百四十八緡嘉泰二年陳曄為總領謝源明為帥請諸朝復以二年一兑蓋軍餉所仰不可復展矣夏四月定理官歴縣法初改官人必作令謂之須入紹興中數申嚴之後亦或廢孝宗在位持之甚嚴慶元初復詔除殿試上三名南省元外並作邑至是又用察院程松言詔大理評事已改官未歴縣人並令親民一次著為令舊捕盗改官人並試邑是月正言陳自強請初任未終之人先注簽判一任方許親民從之自後雖宰相子殿試甲科人無有不宰邑者矣朱熹致仕去冬十二月有請至是得命熹初疑猶在罪籍不敢有請繼以尚𢃄階官義當納禄朝廷許熹始用野服見客五月壬辰朔新歴成賜名統天新歴京鏜為丞相時所上也初㑹元歴既成而布衣王孝禮言劉孝榮未嘗以銅表圭面測影故冬至後天一辰朝廷然之未暇改作去年九月太史言月蝕於夜而草澤言蝕在晝驗視如草澤言案慶元四年九月造新歴目云太史言月食於晝而草澤言食於夜騐視如草澤言與此互異宋志不載乃改造歴以祕書省正字馮履為參定官履字叔常臨卭人嘗從故直徽猷閣張行成為數學故以命焉歴未成是年正月癸卯監察御史張巖言履倡為詖辭摇撼國是遂罷去三月庚戍乃詔諸道有通曉天文歴算者所在具名來上至是歴成歴經凡三卷㳂歴他書十七種凡二十九卷又上臨安進士侯望重校萬年歴十七卷綱目二卷嘉㤗二年日食五月朔太史以為午正而草澤趙大猷言午初三刻半日食三分案宋志是日太陽午初一刻起虧未初刻復滿統天歴後天一辰有半與此時刻頗異詔著作郎張嗣古監視渾儀秘書丞朱欽則著作郎王容測驗起居舍人俞徴覆驗卒如大猷所言史官乃抵罪焉蓋自渡江後歴差者多矣戊戍親試舉人賜曽從龍等四百十有二人及第出身有差舊例廷試舉人暮者許賜燭然殿深易黒日昃則殿上燭出矣是年上初䇿士江西正奏名進士黄實嚴州特奏名進士皇甫鑑納卷最後亷州特奏名進士劉嘉猷賜燭至一更四㸃御藥院言故事賜燭正奏名降一甲如在第五甲降充本甲末名特奏名降一等如在第五等與攝助教詔如故事世傳張子韶嘗扣殿陛賜燭納卷最後上取其䇿觀之歎其鯁亮遂擢為榜首其實不然都城疫丁酉以久雨民多疾疫命臨安府賑恤之案本紀命臨安賑恤在戊申壬子命諸州學置武齋武學自祖宗以來京師有之乾道七年七月庚寅詔武學該赴觧試人以五十人為額然郡國未之建也至是言者請即諸州州學置武士齋舍選官按其武藝且籍在官荒田以備餼廪從之然後亦不克行六月丁逄罷何澹為參知政事其弟滌新除通判臨安府自行在舟行歸處州舟人江乙市私鹽萬餘斤以徃東梓廵檢司邏卒林廣等捕之滌仗劒傷廣事至臨安司農卿丁逄知府事當乙杖罪而廣以受賄杖脊編管時慶元五年六月也程松為監察御史上䟽劾之戊辰詔逄與宫觀而以工部侍郎朱晞顔知府事且命大理劾江乙以聞毋得觀望生事辛未澹乃丐免上批其奏畧云遽以小嫌力求引去卿初無預朕亦何心澹乃即起視事上㝷批付大理以伏暑恐致淹延命有司據見追到人結絶秋七月獄成甲午滌降一官為朝奉郎罷通判逄降一官罷祠乙未澹上䟽言臣頃為中丞首論樞宻使王藺不能鈐束其弟藺遂去國今訓飭無素罪何所逃望賜黜責詔不許明年閏二月澹知樞宻院事七月逄遂奉祠十一月復逄直寳文閣知婺州嘉泰元年四月以滌通判建寜府是夏盗竊太廟金寳自休兵後太廟創冊寳殿凡帝后寳冊洎郊廟金玉禮噐皆藏焉始時令太常寺官一員季㸃然第省閲文歴而已乾道五年春因有盗竊禮噐者中書門下始奏令毎季取索赤歴㸃檢足備用印封鎻具有無損失申省是夏太常寺奏太廟遺失皇后金寳二命大理寺治之六月庚寅降㫖既而廟之衛卒赴有司自言坐獄死蓋故事冊寳以中人領其工作及盗去鑿而售之中乃鐵胎也繇是事敗自後朝廷益謹其事月以察官禮官中官各一員檢視謂之㸃寳禮噐中瑶爵玉瓚二事絶佳人間所未有其它圭璧大抵多水漿色也冊寳中惟昭慈聖憲皇后謚冊以象牙餘皆珉玉又有徽宗皇帝謚寳玉色尤温粹嘉泰四年九月得四圭有邸玉一詔藏於太常秋七月癸丑劉徳秀罷徳秀初以重慶守入朝不為時相留正所知著作佐郎范仲黼正客也請為之地仲黼見正言之正曰此人若留之班行朝廷無安靜之理時京鏜已為刑部尚書正不得已下除徳秀大理寺簿徳秀怨仲黼薦已不力併憾之㑹上登極鏜與韓侂胄深交不數月侂胄擢徳秀監察御史而鏜繼為執政正是時甫去位也又數月遷徳秀右正言仲黼時為䕫路提刑徳秀遂建言諸路憲臣非嘗歴守令及他司官者請皆與郡從之仲黼坐是左遷知漢州二年春徳秀遷諌長首劾留正四大罪又奏仲黼附和偽學奴事陳傅良自入仕為䕫州教授年餘即入舘學俸入無㡬為䕫路憲僅三四月乃於郫縣雙流之間大殖良田皆平日受賂所致仲黼遂坐免甲寅嚴銅錢滲泄禁禁髙麗日本商旅博易銅錢八月癸亥白氣亘天辛巳太廟太祖夾室柱生芝壬午京鏜率百官赴太廟觀芝上過夀康宫上夀始得見太上皇帝成禮而還上以重明節前十日詣夀康宫進香徳音降諸道流罪以下囚釋杖以下百官及庶人推恩有差諸道贓賞錢悉蠲之加賜行在諸軍如雪寒錢例宰輔皆進官一等右丞相京鏜為少保封鄭國公韓侂胄為少保封平原郡王保信軍節度使李孝純為保大軍節度使昭信軍承宣使李孝友為奉寜軍節度使保順軍節度使謝淵為太尉入内内侍省押班甘昺以兩宫宣力備竭忠勤特遷二官其餘次第行賞初上之未見夀康也御史胡紘因劾趙汝愚請以行遣汝愚之事奏之太上庶㡬太上懽然盡釋前憾怡愉如初汝愚遂有永州之貶及是過宫禮成百官監司郡守皆上表稱賀焉中興外戚封王者自信安孟王忠厚始其後平樂韋王淵大寜呉王益新興呉王蓋永寜郭王師禹皆以元舅之貴乃得之韓侂胄以中宫從曽祖案侂胄為韓琦曽孫琦為韓后六世祖則侂胄乃中宫從祖非從曽祖也封平原郡王蓋殊命也甘昺昪之弟也上過夀康昺與有力焉頗貴寵戊子立沿邉諸州武舉取士法冬十月丙子金使來金遣兵部尚書布薩琦吏部郎中張汝猷來賀瑞慶節詔金使見辭並令韓侂胄隨班侍立是月陳自強上𦂳要政目三十事人才財用軍旅風俗蓄積學校爵禄教化命令賞罰法禁諌諍薦舉科舉禮制祭祀銓選獄訟税賦農田邉備奉天奉祖宗任相任将任官監司守令禦外患荒政馬政請令侍從兩省講讀官進故事日於前項政事條目内選擇一事為題先叙前代帝王施行得失而證以祖宗故事然後論今日事體所宜斷以己意俟其進入編為一書如一旬而講一事則一嵗之間便有三四十事不過二年朝廷之大政講究畢矣疏奏從之已而翰林學士髙文虎又以二十事上之如前請稽古勤政威斷䘏刑恵民久任考課選吏捄弊宗廟宗室兵制文章歴法錢弊漕運奉親茶鹽常平義倉十一月己丑詔復右司一員十二月庚午建安仁宅恵濟倉庫於廣東水土惡弱諸州以給士大夫之死而不能歸者是冬編慶元寛恤詔令明年五月書成併役法撮要上之始紹興二十二年八月王瞻叔知荆門軍代還入見請命有司編集中興以來寛恤詔令而知恵州鄭康佐者亦言守令奉行詔書不䖍請編類成書以賜從之二十五年九月乃成凡二百卷號紹興寛恤詔令其後淳熈慶元皆仿此為之是嵗賑諸州水灾信饒江撫嚴衢台州建昌興國軍及廣東諸州大水命賑之
