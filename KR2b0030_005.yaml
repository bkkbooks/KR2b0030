body:
  text: 兩朝綱目備要卷五寧宗慶元三年丁巳春正月壬寅鄭僑罷癸卯謝深甫兼知樞密院事二月己酉神宗玉牒髙宗實録成京鏜等上之丁巳邵褎然請不除偽黨在內差遣案慶元黨禁作邵褎褎然為大理司直請詔大臣自今權臣之黨偽學之徒不得除在內差遣詔下其章戊午復升差將校法紹熙中葛邲在樞管奏請江上諸軍升差統制官至凖備將者自主帥解三人赴總領官選擇一名申樞密院至是有旨並委主帥選擇令總領或屯駐處守臣審核保明申樞密院紹熙指揮勿行三月乙未建東華門丙申竄內侍王德謙上在藩邸德謙為府都監孝宗大漸黃由請上過宫問疾既得旨矣德謙堅請覆奏由斥其不可上從之卒往視疾及即位德謙驟遷昭慶軍承宣使內侍省押班是春德謙求建節有定議矣時吳宗旦為中書舍人事德謙甚謹夜輒易服謁之以家僮執燈自導德謙既有秉旄之耗乃薦宗旦為刑部侍郎直學士院使草麻二月甲子德謙遣幹吏諭指宗旦厚待之使其子與飲且自捧勸者三翊日遂鎖宿禁中宗旦將入先出制草以示人且引天寶同光故事為比德謙喜置酒髙會丙寅制出參知政事何淡不押制書右諌議大夫劉德秀聞之率臺諌交章言其不可丁卯宰相京鏜復以為言上遂寢其命於是德謙除在外宫觀吏部尚書兼給事中許及之奏駮之臺諌因請竄斥德謙以慰中外之望上未許姚愈時為殿中侍御史首奏宗旦交結德謙以進為之草詞請加貶黜已詔降宗旦三官罷之權中書舍人髙文虎論其責輕辛未宗旦坐追三官癸酉復送南康軍居住或曰有貴戚與德謙爭用事于中而德謙以計勝戚憾焉故因事擠之也宗旦既出臺諌遂急攻德謙詔以本官奉祠居廣德軍未幾日者陳舜道自言頃如門司徐考叔家賣卜考叔為言德謙多受張宜金錢引為閣長令舜道為臺諌言之德謙伺知之考叔坐送郴州安置至是考叔已貶吉州三月庚寅有旨考叔許自便會臨安府劾德謙為人求官贓以巨萬計嘗以導駕燈籠自奉服食擬乘輿獄未成丁酉特旨降德謙團練使居撫州他勿治翊日髙文虎請改為安置上從之然獄卒不竟也德謙先賜第遂改以賜故嗣濮王士歆家五年二月詔移德謙徽州宗旦池州並居住甲申右諌議大夫張釡言德謙姦詭宗旦阿回請自今不以赦移雖有特旨亦許執奏四月以竄逐德謙本末付史館十二月復用察院孟必先言移德謙汀州嘉泰元年五月丁卯始許宗旦奉祠便居而宗旦死矣訃聞贈正奉大夫官其子孫如故事時徐誼劉光祖貶久矣於是亦許便居焉庚子禁浙西圍田壬寅定奏讞不當罪紹興初陳去非在黃門始申嚴奏讞不當之令其後寖寬慶元中東南有因詈人被毆死者而行凶之人作可憫奏裁姚愈為御史上言如此是詈人之罪重於殺人乃詔自今有司奏讞死罪不當者論如律夏四月丙午雨土旱壬子禱于天地宗廟社稷乙丑雨雹閏六月甲戍申嚴銅器之禁內出銅器付尚書省毁之民間舊有者限兩月赴官投賣每兩以三十錢酬之民間多不盡輸再限兩月不復酬以錢違者許人告湖州舊鬻鏡行於天下至是官自鑄之因復置神泉監以所括民間銅器鑄當三大錢仍權𨽻工部惟嚴錢直輸行在而建韶饒贛州皆自提點所泛湖由江入漕渠輸之京帑焉然祖宗時內帑雖嵗收新錢一百五萬而每年退却六十萬三年一郊又支一百萬赴三司是內帑每年得一十一萬六千餘緡而左藏得九十三萬三千餘緡也今嵗額止十五萬而𨽻封樁者半內藏者半左藏咸無焉宜版曹之日困也按復置神泉監事在八月戊子綱內此因禁銅而詳及之甲午貶留正分司西京邵州居住先是六月癸卯言者論三十年來偽學顯行場屋之權盡歸二三溫人所謂狀元省元兩優釋褐若非其私徒即是其親故望詔大臣審察其所學而後除授時有宣教郎錢文子者以太學兩優釋褐一任回當召試徑就部注潭州醴陵知縣而去時人稱之是月戊寅朝散大夫劉珏案慶元黨禁作劉三傑薛應旗宋元通鑑亦作三傑并繫其入見上言于甲午日以故御史免喪入見上言前日之偽黨今又變而為逆黨防之不可不至且獻消之之䇿及論留正共引偽學之罪韓托胄大喜即日降旨除右正言正坐貶邵州是夏大溪山島民作亂案本紀及宋元通鑑俱作大奚山大奚山者在廣東海島中是夏廣東提舉茶鹽徐安國遣人入島捕私鹽島民不安即嘯聚千餘人入海為盜劫副彈壓髙登為首揭榜疏安國之罪掠商旅殺平民百三十餘人經略使雷潨與安國素有隙及是安國乞遣兵討之而潨則用錢酒醪以犒勞且以安國生事聞於朝是月戊子詔安國别與差遣會安國上疏自辨癸巳詔提點刑獄唐弼究實以聞於是給事中許及之言統領林墉彈壓林通造謀以傾安國詔二人皆罷七月甲寅下詔召潨還既而右諌議姚愈又以為言乃併安國罷之而弼與宫觀八月庚辰以軍器監錢之望為祕閣修撰知廣州丁亥以刑部郎中陳研為提刑知潮州陳宏規為提舉言者復奏島民擅殺平民之罪辛卯命之望究治之之望盡執島民戮之無噍類議者或以為過云秋八月戊子復置嚴州神泉監甲午均諸路職田九月壬寅蠲四川民賦以旱詔制置總領諸司蠲放民賦乙丑申嚴臧否之令令帥臣監司臧否郡守是月禁偽黨改官丁卯言者又論偽學之禍望申飭大臣監元祐調停之説杜其根源時有詔監司帥臣薦舉改官並於奏牘前聲説非偽學之人且結朝典之罪秋當大比漕司前期取家狀必欲書委不是偽學五字於後時有柴中行者為撫州推官獨申漕司云自幼習易讀程氏易傳未委是與不是偽學如以為偽不願考校士論壯之是秋太學生削何淡題名治其罪案慶元黨禁太學生削淡題名事在六年吕祖泰決配事後太學生某人者於齋生題名中削去何淡名字以其嘗排道學也淡時已顯貴大怒於是京尹因其出使不逞者與之閧遂捕治之時太學生敖陶孫為文案據下文所載陶孫詩則此文字應作詩字以弔趙汝愚而托胄未得其名俾士人併承之辭不伏乃移送大理寺獄丞劾其事掠治無完膚獄竟不就猶坐不應削淡名送嶺南編管陶孫詩云左手旋乾右轉坤諸公相顧尚流言狼胡跋疐傷姬旦漁父沉淪弔屈原一死固知公所欠孤忠賴有史長存九原若遇韓忠獻休説如今幾世孫陶孫福州人後數年登進士第獄丞用此除工部郎官云冬十月癸酉雷丙申赦以夀聖隆慈備福光祐太皇太后違豫故也十一月辛丑上孝宗徽號加紹統同道冠德昭功八字是日太皇太后崩于慈福宫詔服期明年加諡憲聖慈烈皇后攢於永思陵癸卯日南至祀天地于圜丘紹興中國學初建內出鎮圭以奉文宣王至是上將行大禮而內府無圭乃下國子監借文宣王玉圭用之赦天下壬子車駕還大內自慈福宫十二月丙子始御正殿丁丑蠲紹興府身丁錢以太后攢宫故蠲貧民身丁折帛絹綿錢甲申雨土丁酉籍偽學知綿州王沇乞置偽學之籍仍自今曽受偽學舉薦關升及刑法亷吏自代之人並令省部籍記姓名與間慢差遣從之於是自慶元至今以偽學逆黨得罪者凡五十有九人宰執四人趙汝愚右丞相留正少保觀文殿大學士王藺觀文殿學士知潭州周必大少傅觀文殿大學士待制以上十三人朱熹煥章閣待制兼侍講徐誼權工部侍郎兼知臨安府彭龜年吏部侍郎陳傅良中書舍人兼侍講案慶元黨禁陳傅良舍人兼侍讀兼直學士院薛叔似權户部侍郎兼樞密都承旨提舉太史局章潁權兵部侍郎兼侍講鄭湜權刑部侍郎樓鑰權吏部尚書林大中吏部侍郎黃由權禮部尚書黃黼權兵部侍郎何異權禮部侍郎孫逢吉權吏部侍郎餘官三十一人劉光祖起居郎兼侍讀吕祖儉太府寺丞葉適太府少卿總領淮東財賦楊方案續通鑑作芳祕書郎項安世祕書省校書郎沈有開起居郎曽三聘知郢州遊仲鴻軍器監主簿吳獵監察御史李祥國子祭酒楊簡國子博士趙汝讜添差監左藏西庫趙汝談前淮西安撫司幹官陳峴祕書省校書郎范仲黼著作郎兼權禮部郎官汪逵國子司業孫元卿國子博士袁燮太學博士陳武國子正田淡宗正丞兼權工部郎官黃度右正言張體仁太府卿案慶元黨禁作詹體仁此及嘉泰二年趙汝愚復官黨人見在者皆先後復職詹亦與其列詹本傳建寧浦城人以太府卿直龍圖閣罷後復直閣除司農卿則為詹無疑宋元通鑑作張考紹熙初羅點薦士八人有張體仁見本紀蔡幼學福建提舉常平茶事黃灝浙西提舉常平茶鹽公事案慶元黨禁無黃灝係脫誤宋元通鑑有之周南池州州學教授吳柔勝新嘉興府府學教授李􅌫校書郎王厚之直寶謨閣案慶元黨禁作顯謨閣江東提點刑獄孟浩知湖州趙鞏祕閣修撰知揚州白炎震新通判成都府武臣三人皇甫斌池州都統制范仲壬案續通鑑作危仲壬誤知金州張致逺江西兵馬鈐轄以上並見於臺諌章疏者士人八人楊宏中周端朝張衟林仲麟蔣傅徐範蔡元定吕祖泰事既行黃由為吏部侍郎建言人主不當待天下以黨與不必置籍以示不廣沇故資政殿學士詔曽孫也未幾擢沇利路轉運判官時由權禮部尚書尋出帥蜀張巖為殿中侍御史奏由阿附權臣植立黨與遂降由雜學士奉祠焉是嵗復銓試取人數依舊制二人而取一故事春秋再試十人而取七乾道二年後止春試二人而取一紹熙末議者病其寡學乃請三人而取一是嵗謝源明為吏部侍郎上言今世祿之家已留意學問請復舊制詔從焉今蜀中銓試甚寬凡假手者率費七百緡又勢要子孫鮮不與選或謂宜悉赴吏部然吏部亦不免此要當如祖宗時先試而後命可也革密白補授弊舊制樞密院事並過門下省乾道元年十二月癸卯言者請自今樞密院已被旨文書並關中書門下依三省式畫黃書牘以示欽重出命之意從之然密院機速事則不由中書直關門下省謂之密白是年樞密院以密白遷補潛邸醫官二人給事中許及之以非舊典爭之遂寢其命慶元四年戊午春正月丙辰趙師􅋷除工部侍郎案宋元通鑑師􅋷之除在八月誤此目內有都市行燈之語則為正月無疑慶元黨禁謂除命在正月十八日者是也韓托胄妻早死有四妾皆得郡封所謂四夫人也其次又十人亦有名位去嵗秋冬之間有獻北珠冠四枚者托胄喜以遺四夫人其十人皆愠曰等人耳我輩不堪戴耶托胄患之師􅋷時以列卿守臨安微聞其事亟出十萬緡市北珠甚急是月辛亥托胄入朝未歸京尹忽遣人致饋啓之十珠冠也十人者大喜分持以去托胄歸左右以告托胄未及有言十人者咸來致謝遂已翼日都市行燈羣婢皆頂珠冠而出又明日語托胄曰我曹夜來過朝天門都人聚觀真是喝采郡王奈何不與趙大卿轉官耶翼日又言之故有是命托胄嘗與衆客飲南園過山莊指其竹籬茅舍而謂曰此真田舍間氣象所惜者欠雞鳴犬吠耳少焉有犬嘷于叢薄之下亟遣視之京尹趙侍郎也托胄大笑其後京尹坐他事罷諸生為詩誚之有也曽學犬吠村莊之句即指此也丙寅葉翥同知樞密院事丁卯詔恤流民以兩浙江淮荆湖四川民流詔有司舉行寬恤之政二月辛未詔近臣舉才兩省侍從臺諌各舉所知一二人毋舉宰執子弟親黨三月己丑降德音以憲聖攢宫之役蠲臨安紹興賦租稅有差是月經筵進讀寶訓臣寮劄子恭聞詔旨已擇今月十一日開講望陛下遵用仁宗髙宗故事令侍講之臣仰稽三朝寶訓如李淑所舉外治數條詳悉講明以備觀覽凡武備之設何者為先軍旅之制何者為重邉圉治守孰為要害敵國情偽孰得要領考古驗今有至計商略而施行之足以為思患預防之䇿上從之夏五月己亥韓托胄為少傅賜玉𢃄以朝以憲聖攢宫復土遷也己酉詔禁偽學先是右諌議姚愈上言近世行險僥幸之徒倡為道學之名權臣力主其説結為死黨願下明詔播告天下諌議張釡亦以為言從之遂命直學士院兼中書舍人髙文虎草詔曰向者權臣擅朝偽邪朋附協肆姦宄包藏禍心賴天之靈宗廟之福朕獲承慈訓膺受內禪隂謀壞散國勢復安嘉與士大夫厲精更始凡曰淫朋比德幾其自新而歷載臻兹弗迪厥化締交合盟窺伺間隙毁譽舛忤流言間發將以傾國是而惑衆心甚至竊附於元祐之衆賢而不思實類乎紹聖之姦黨國家秉德康寧不汝瑕殄今惟自作弗靖意者漸于流俗之失弗可復反歟將狃于國之寬恩而罰有弗及歟何其未能洗濯以稱朕意也朕既深詔一二大臣與夫侍從言路之官益維持正論以明示天下矣諭告所抵宜改視回聼毋復借疑似之説以惑亂世俗若其遂非不悔怙終不悛邦有常刑必罰無赦布告天下無忽愈上此奏韓托胄大善之未幾遂遷兵部尚書御史中丞是月禁女冠毋入大內及三宫先是江州僧道隆者自言能知人休咎往往或中豪民貴戚競施之號風和尚道隆飲酒食肉多蓄美婦俗又以散聖目之慶元中往來都下有倡婦馬換師夀康宫幕士詹恩妻也號馬部頭既入夀康宫以病歸外舍道隆因之使求賜金于北內以為建塔費陳淑妃亦使其母往拜之安康郡主適羅氏者館諸其家豫金錢以萬計府尹趙師􅋷聞之執以屬吏録其槖得金錢三萬緡有竒獄成有旨杖黥𨽻英德府土牢收管仍以獄詞遍示諸路是嵗四月壬申也道隆既斥故有是詔其後興國軍有女巫又以符水出入貴勢之家所謂九宫山是也秋七月己未丁逄請勿用偽黨逄以都大川秦茶馬入見極論元祐建中調停之害且引蘇轍任伯雨之言為證時薛叔似葉適坐汝愚黨久斥皆起家為郡故逄有是言宰執京鏜何淡大然之翌日遂除軍器監辛酉葉翥罷八月久雨丁卯命決繫囚丙子謝深甫知樞密院事兼參知政事許及之同知樞密院事淳熙末及之與薛叔似同擢補遺皆為善類所豫黨事既起叔似纍斥逐及之乃更遷給事中吏部尚書既而踰二年不遷乃間見托胄敘其知遇之意及衰遲之狀不覺涕零繼以屈膝托胄惻然語之曰尚書才望簡在上心行且進拜矣不數日遂有是除托胄嘗值生辰羣公上夀既畢集許及之為吏部尚書適後至閽人掩關拒之及之大窘會門閘未及閉遂俯僂而入當時有由竇尚書屈膝執政之語傳以為笑庚辰白氣亘天丙戍詔詣夀康宫上夀以太上皇帝聖躬清復率羣臣上夀後不果行九月壬寅太白晝見癸卯太白經天丁未慶元重修敕令成京鏜上重修敕令格式申明詔頒天下國朝法令大抵從寬政和後始有御筆特斷刑名是蓋多出於三尺之外矣靖康元年九月議者請參用嘉祐元豐舊法以俟新書之成奏可尋詔律令依嘉祐斷刑依元豐明年四月復詔政和海行法非御筆修立者許引用建炎三年復辟赦舉行仁宗法度即嘉祐元豐法有不同者賞格聼從重條約聼從輕時吕頥浩張浚始為政也明年六月范宗尹相乃奏命有司以嘉祐政和敕對修成書紹興元年八月上之其後乾道淳熙慶元之際率十餘嵗一修然大概以紹興重修敕令格式為凖是月詔造新歷太史言月食於晝而草澤言食於夜驗視如草澤言有旨改作仍命祕書省正字馮履參定明年五月壬辰朔歷成賜名統天蓋自建隆迄慶元二百五十年之間歷十四變上距黃帝之歷凡五十變矣而知歷者謂統天新歷尤復疏謬昔洛下閎太初歷成自言八百年當差一度其後未及八十年固已差一度矣李淳風曰一氣差三度九日差一刻又曰自太初下至麟德差四日自太初上及僖公差三日一行亦曰劉洪歷四十五年差一度梁武帝歷百八十六年差一度以前人歷術之精猶不免此况賤工之草創者乎大抵唐末以後律歷之法不傳士大夫無所從受而星翁歷人類多鄙淺是以不足以推明其學也冬十二月丙戍再蠲臨安府身丁錢三年是嵗育宗室與願于宫中藝祖皇帝十世孫燕懿王後也時年六嵗後賜名曮又更名幬立為皇太子後又更名詢云慶元五年己未春正月庚子蔡璉誣告趙汝愚異謀璉初為樞密院直省官趙汝愚定䇿時璉從旁竊聼欲行漏泄汝愚覺而囚之上即位遂從輕決配去年冬竄歸輦下用事者聞之以為竒貨乃使璉排日供具汝愚當定䇿時有異謀凡往來賓客所言共七十餘紙文書既就乃議送大理五年正月七日中書舍人范仲藝案韓托胄傳作張仲藝方下直忽工部尚書兼給事中謝源明過之問曰聞蔡璉之事否曰未也源明具以告且曰儀同之意欲呼近上者三數人問之以實此事近上三數人謂彭龜年徐誼沈有開曽三聘葉適項安世輩也仲藝曰當如何源明曰公必為繳章如此建請但略令源明與其事公繳録黃留録白付門下可也仲藝姑應之曰諾明日詞頭果下張孝伯為吏部侍郎過仲藝曰蔡璉之事儀同意毋它第欲呼近上三數人一問之以實此事舍人盍分别言之仲藝力言其不可孝伯曰見無禮於君者如鷹鸇之逐鳥雀使數人之事成置主上於何地舍人奈何欲庇之耶仲藝曰不然自頃嵗已來朝廷行遣諸人不為不盡今無故捕從官朝士數十人付之有司豈不駭四方之觀聼孝伯唯否而去其後乃知孝伯已見托胄力爭之而姑以見試耳夜仲藝直後省遂草駮奏翼日袖録黃以謁托胄語之曰相公今日得君凡所施為當一以魏公為法章蔡之權不為不盛然至今得罪於清議者以同文之獄故耳相公勳業如此胡為蹈之托胄曰某初無此心以諸公見迫不容但已問其人乃知京鏜諸人與吏部尚書劉德秀實主此議仲藝具以告孝伯之説告之托胄釋然曰録黃何在仲藝曰在此托胄取而藏之事遂格既而諌官張釡陳自強御史劉三傑張巖程松連疏有請詔以纍經赦宥於是彭龜年追三官勒停曽三聘追兩官而蔡璉補進義副尉云嘉定元年汝愚子崇憲訟於朝乃配璉贛州牢城乙卯果州學官王莘罷坐考昌州春試舉人而以尚書斷章為問題也先是去年三月莘與西充縣丞任逄俱被檄考春試莘昌州逄濾州逄當發䇿問今日內外輕重之弊其末云漢唐之際亦有當王鳯輔政雖為所舉非鳯專權不親附鳯者亦有因重梨園樂工請解官出外潔介自守不詣牛仙客者今欲居班列者各知所以砥節厲行銷去私意無入而不知出之病無愧於不附鳯不詣仙客之人何術可以臻此䇿題申至禮部侍郎胡應期摘其語為韓托胄言之托胄怒先是發䇿相類者三人一在蜀一在廣一在閩其二人則陳一新林復之也執政欲併治之張巖為監察御史即奏疏論去年諸路解試舉人有義題斷章及䇿題紕繆援引失當中有㴠蓄不盡者意不在莘也中書舍人范仲藝初聞其事以告禮部尚書黃由由詣宰執京鏜謝深甫何淡許及之諸公爭之皆不納由不得已作書具陳利害為托胄言之托胄雖勉從而猶未平也然逄坐是得免而莘所出問題自夏暑雨至文王謨當時實惡暑雨祁寒之語而但以斷章為名故有是命於是執政怒逄未巳又移書蜀帥袁説友欲料理之賓客諸公多為之請時部使者欲舉逄改京秩者數人皆懼而止然事竟釋矣是秋巖遷起居舍人又餘月復為殿中侍御史始何同叔代應期為禮部侍郎具知其事謂巖曰黃尚書年來可謂大有定力如去年置籍事今年䇿題事皆能回用事者之聼會由除蜀帥冬初陛辭因上奏論治蜀當以安靜和平為先而治天下兼同此道上下其奏巖即擊之由坐奉祠者此也辛酉初命漕臣無出身者勿差官考試王莘既黜時漕臣汪德輔故相伯彥孫大府卿召嗣子也議者謂汪以祖任入官故擇考官不善張巖為監察御史因請自今漕臣不由科第進者更委它監司一員選官校試仍擇有文學士望者一人為點檢官専掌命題去取之事即有不稱加以重罰從之蓋自嘉泰元年始壬戍建玉堂二月乙丑胡紘罷紹熙末紘為進奏院未為人所知會趙汝愚奪職居餘干韓托胄意未快有薦紘可備鷹犬者遂遷司農寺簿除祕書郎監察御史汝愚永州之貶用絃章疏也時托胄欲論朱熹無敢先發者紘鋭然任責物色無所得經年醖釀章疏乃成會建方喪之議遷太常少卿紘遂以藁授沈繼祖云庚午雪癸酉白氣亘天乙酉貶劉光祖去嵗光祖撰涪城學記案慶元黨禁光祖撰涪城學記即在本年有世方以道為偽而以學為棄物夫好惡出於一時是非定於萬世學者盍謹所先入以待豪傑之興之語至是諌議張釡劾光祖佐逆不臣蓄憤懷姦欺世慢上五罪詔光祖落職房州居住八月壬戍察院朱元之言國是已定要當堅執毋事紛更以底安靜之治三月甲午罷監司臧否郡守之制孝宗淳熙中始嚴監司臧否郡守之令既申牧伯部使者數人稽緩之罰時趙雄守荆林栗守潭為上所禮特下詔趣之然行之十餘年其後士大夫往往以人情之厚薄為臧否論者頗患其不公去年十一月庚申新知漢陽軍蔣用之朝辭上疏稍論其偽朝廷是之至是陳自強復以為言於是臧否遂罷戊申四川行對補錢引法自天聖立川交子法每再嵗一易令人户輸紙墨費三十錢紹興十一年詔增為六十四每界無慮一百七十萬緡其更易不盡者號水火不到錢亦二十餘萬緡悉令計司取之以備邉用然錢引屬總所而鈔紙場錢引務𨽻成都漕司故更易不盡者總漕屢爭之其後卒歸總所焉紹熙二年上念蜀民之勞詔權展一界乃易慶元四年冬丁逄自四川茶馬代還入見案逄入見在四年秋七月此云冬疑誤言川交子二年一兑每引納貫頭錢八十文足民甚苦之今計所多羡財請每界展一年永為定制章下制置司袁説友為帥上言今民間每兑錢引一千貼納錢引六十四文足每界總領所收貼頭錢凡百八十萬緡今欲展年當求對補之䇿其一紹熙初增印百七十萬緡今凡八年則兑界兩三次間暗增貼頭錢已三四十萬其一去嵗增印百萬緡異時每界增貼頭錢亦近七萬此二者略可相當兼總所每界撥還漕司工墨錢十九萬緡今既展年不復對撥而又每界水火不到之緡幾十萬皆總所得之若展一年所不到者又倍凡此皆可以對補展年所虧之數至是有旨許之然六年冬兑界水火不到錢才七萬五千四百四十八緡嘉泰二年陳曄為總領謝源明為帥請諸朝復以二年一兑蓋軍餉所仰不可復展矣夏四月定理官歷縣法初改官人必作令謂之須入紹興中數申嚴之後亦或廢孝宗在位持之甚嚴慶元初復詔除殿試上三名南省元外並作邑至是又用察院程松言詔大理評事已改官未歷縣人並令親民一次著為令舊捕盜改官人並試邑是月正言陳自強請初任未終之人先注簽判一任方許親民從之自後雖宰相子殿試甲科人無有不宰邑者矣朱熹致仕去冬十二月有請至是得命熹初疑猶在罪籍不敢有請繼以尚𢃄階官義當納祿朝廷許熹始用野服見客五月壬辰朔新歷成賜名統天新歷京鏜為丞相時所上也初會元歷既成而布衣王孝禮言劉孝榮未嘗以銅表圭面測影故冬至後天一辰朝廷然之未暇改作去年九月太史言月蝕於夜而草澤言蝕在晝驗視如草澤言案慶元四年九月造新歷目云太史言月食於晝而草澤言食於夜驗視如草澤言與此互異宋志不載乃改造歷以祕書省正字馮履為參定官履字叔常臨卭人嘗從故直徽猷閣張行成為數學故以命焉歷未成是年正月癸卯監察御史張巖言履倡為詖辭搖撼國是遂罷去三月庚戍乃詔諸道有通曉天文歷算者所在具名來上至是歷成歷經凡三卷沿歷他書十七種凡二十九卷又上臨安進士侯望重校萬年歷十七卷綱目二卷嘉泰二年日食五月朔太史以為午正而草澤趙大猷言午初三刻半日食三分案宋志是日太陽午初一刻起虧未初刻復滿統天歷後天一辰有半與此時刻頗異詔著作郎張嗣古監視渾儀祕書丞朱欽則著作郎王容測驗起居舍人俞徴覆驗卒如大猷所言史官乃抵罪焉蓋自渡江後歷差者多矣戊戍親試舉人賜曽從龍等四百十有二人及第出身有差舊例廷試舉人暮者許賜燭然殿深易黑日昃則殿上燭出矣是年上初䇿士江西正奏名進士黃實嚴州特奏名進士皇甫鑑納卷最後亷州特奏名進士劉嘉猷賜燭至一更四點御藥院言故事賜燭正奏名降一甲如在第五甲降充本甲末名特奏名降一等如在第五等與攝助教詔如故事世傳張子韶嘗扣殿陛賜燭納卷最後上取其䇿觀之歎其鯁亮遂擢為榜首其實不然都城疫丁酉以久雨民多疾疫命臨安府賑恤之案本紀命臨安賑恤在戊申壬子命諸州學置武齋武學自祖宗以來京師有之乾道七年七月庚寅詔武學該赴解試人以五十人為額然郡國未之建也至是言者請即諸州州學置武士齋舍選官按其武藝且籍在官荒田以備餼廪從之然後亦不克行六月丁逄罷何淡為參知政事其弟滌新除通判臨安府自行在舟行歸處州舟人江乙市私鹽萬餘斤以往東梓巡檢司邏卒林廣等捕之滌仗劒傷廣事至臨安司農卿丁逄知府事當乙杖罪而廣以受賄杖脊編管時慶元五年六月也程松為監察御史上疏劾之戊辰詔逄與宫觀而以工部侍郎朱晞顔知府事且命大理劾江乙以聞毋得觀望生事辛未淡乃丐免上批其奏略云遽以小嫌力求引去卿初無預朕亦何心淡乃即起視事上尋批付大理以伏暑恐致淹延命有司據見追到人結絶秋七月獄成甲午滌降一官為朝奉郎罷通判逄降一官罷祠乙未淡上疏言臣頃為中丞首論樞密使王藺不能鈐束其弟藺遂去國今訓飭無素罪何所逃望賜黜責詔不許明年閏二月淡知樞密院事七月逄遂奉祠十一月復逄直寶文閣知婺州嘉泰元年四月以滌通判建寧府是夏盜竊太廟金寶自休兵後太廟創册寶殿凡帝后寶册洎郊廟金玉禮器皆藏焉始時令太常寺官一員季點然第省閲文歷而已乾道五年春因有盜竊禮器者中書門下始奏令每季取索赤歷點檢足備用印封鎖具有無損失申省是夏太常寺奏太廟遺失皇后金寶二命大理寺治之六月庚寅降旨既而廟之衛卒赴有司自言坐獄死蓋故事册寶以中人領其工作及盜去鑿而售之中乃鐵胎也繇是事敗自後朝廷益謹其事月以察官禮官中官各一員檢視謂之點寶禮器中瑶爵玉瓚二事絶佳人間所未有其它圭璧大抵多水漿色也册寶中惟昭慈聖憲皇后諡册以象牙餘皆珉玉又有徽宗皇帝諡寶玉色尤溫粹嘉泰四年九月得四圭有邸玉一詔藏於太常秋七月癸丑劉德秀罷德秀初以重慶守入朝不為時相留正所知著作佐郎范仲黼正客也請為之地仲黼見正言之正曰此人若留之班行朝廷無安靜之理時京鏜已為刑部尚書正不得已下除德秀大理寺簿德秀怨仲黼薦已不力併憾之會上登極鏜與韓托胄深交不數月托胄擢德秀監察御史而鏜繼為執政正是時甫去位也又數月遷德秀右正言仲黼時為夔路提刑德秀遂建言諸路憲臣非嘗歷守令及他司官者請皆與郡從之仲黼坐是左遷知漢州二年春德秀遷諌長首劾留正四大罪又奏仲黼附和偽學奴事陳傅良自入仕為夔州教授年餘即入館學俸入無幾為夔路憲僅三四月乃於郫縣雙流之間大殖良田皆平日受賂所致仲黼遂坐免甲寅嚴銅錢滲泄禁禁髙麗日本商旅博易銅錢八月癸亥白氣亘天辛巳太廟太祖夾室柱生芝壬午京鏜率百官赴太廟觀芝上過夀康宫上夀始得見太上皇帝成禮而還上以重明節前十日詣夀康宫進香德音降諸道流罪以下囚釋杖以下百官及庶人推恩有差諸道贓賞錢悉蠲之加賜行在諸軍如雪寒錢例宰輔皆進官一等右丞相京鏜為少保封鄭國公韓托胄為少保封平原郡王保信軍節度使李孝純為保大軍節度使昭信軍承宣使李孝友為奉寧軍節度使保順軍節度使謝淵為太尉入內內侍省押班甘昺以兩宫宣力備竭忠勤特遷二官其餘次第行賞初上之未見夀康也御史胡紘因劾趙汝愚請以行遣汝愚之事奏之太上庶幾太上歡然盡釋前憾怡愈如初汝愚遂有永州之貶及是過宫禮成百官監司郡守皆上表稱賀焉中興外戚封王者自信安孟王忠厚始其後平樂韋王淵大寧吳王益新興吳王蓋永寧郭王師禹皆以元舅之貴乃得之韓托胄以中宫從曽祖案托胄為韓琦曽孫琦為韓后六世祖則托胄乃中宫從祖非從曽祖也封平原郡王蓋殊命也甘昺忭之弟也上過夀康昺與有力焉頗貴寵戊子立沿邉諸州武舉取士法冬十月丙子金使來金遣兵部尚書布薩琦吏部郎中張汝猷來賀瑞慶節詔金使見辭並令韓托胄隨班侍立是月陳自強上緊要政目三十事人才財用軍旅風俗蓄積學校爵祿教化命令賞罰法禁諌諍薦舉科舉禮制祭祀銓選獄訟稅賦農田邉備奉天奉祖宗任相任將任官監司守令禦外患荒政馬政請令侍從兩省講讀官進故事日於前項政事條目內選擇一事為題先敘前代帝王施行得失而證以祖宗故事然後論今日事體所宜斷以己意俟其進入編為一書如一旬而講一事則一嵗之間便有三四十事不過二年朝廷之大政講究畢矣疏奏從之已而翰林學士髙文虎又以二十事上之如前請稽古勤政威斷恤刑惠民久任考課選吏救弊宗廟宗室兵制文章歷法錢弊漕運奉親茶鹽常平義倉十一月己丑詔復右司一員十二月庚午建安仁宅惠濟倉庫於廣東水土惡弱諸州以給士大夫之死而不能歸者是冬編慶元寬恤詔令明年五月書成併役法撮要上之始紹興二十二年八月王瞻叔知荆門軍代還入見請命有司編集中興以來寬恤詔令而知惠州鄭康佐者亦言守令奉行詔書不虔請編類成書以賜從之二十五年九月乃成凡二百卷號紹興寬恤詔令其後淳熙慶元皆仿此為之是嵗賑諸州水災信饒江撫嚴衢台州建昌興國軍及廣東諸州大水命賑之
