body:
  text: 兩朝綱目備要卷十一寧宗嘉定元年戊辰春正月戊寅臺諌請梟韓侂胄右諌議大夫葉時殿中侍御史黄疇若監察御史章爕余崇龜等上言侂胄専政無君僭上不道乞梟其首領置之淮甸積屍叢冡之間以謝天下詔答以已重施行辛巳章再上御筆以未欲輕從荅之詔求言案夲紀求言之詔在辛巳詔曰朕以𦕈躬獲遵洪業所期恭已治可致於無為乃昧知人失浸成於偏信自奸臣之怙勢畏公議之靡容屏蔽聰明排斥忠直利害莫從而上逹威福自得以下移逮兹更化之初亟出求言之令倐再踰於月律猶罕見於奏封豈習俗相仍激昂者寡抑精誠弗至頋忌者多厥今百度未釐二邊未靖人才乏而未究捜羅之術民力困而未明恵養之方救此弊端寧無良䇿乃若箴規主失指摘奸邪人所難言朕皆樂聴儻有禆於事實詎敢吝於褒章其或過差務從寛假凡我縉紳之彦暨于芻蕘之微乆鬱之懐諒欣聞於申命竭誠以告庶共底於丕平乙酉集議韓侂胄函首事先是壬午監登聞鼓院王柟自河南通書囬持金人行省牒赴三省樞宻院求函首詔侍從兩省臺諌集議以聞丙戍臺諌又以為請詔三省樞宻院詳議上壬辰史彌逺知樞宻院事許奕使金以起居郎充通謝使吳衡副之二月戊申追復趙汝愚職名案戊申在二月原夲脱去今添入復觀文殿大學士謚曰忠定詔改正韓侂胄事迹命史官自紹熈以來改正以其冐定䇿功也壬子賑流民詔臨安府賑濟甲寅雪戊午再竄程松責授果州團練副使賔州安置甲子罷劉徳秀遺表贈官是月郴州黒風峒宼為亂黒風峒者在郴吉之間而地屬桂陽縣有羅孟二者名世傳其酋首也至是世傳出掠省地已而受招詔補承節郎世傳之犯省地也郴州舉人李元礪嘗助官軍擊賊元礪曽口人以武斷鄉曲羣盗皆畏之比世傳受招論功行賞而元礪不及遂去為盗盗推為帥時江湖方艱食饑民及汰去之兵多附之遂至數萬三月戊子下戒飭詔詔曰朕臨御以来仰遵累朝恭儉之規菲食卑宫躬行以移風俗而志勤道逺觀感未孚况姦倖㺯權故相同惡上下交利賄賂公行監司郡守並相倣傚貪婪無厭狼籍已甚朕方厲精更始申加訓飭以儆有位繼自今各務精白一心以承至意其有縁公濟私尚為故態必罰無赦尚其戒哉復秦檜王爵贈諡以復議講和故也辛邜詔梟韓侂胄首於兩淮前二日王柟自軍前再還行在議以韓侂胄函首易淮陜侵地翌日詔侍從及兩省臺諌赴都堂詳議限一日聞奏於是議者皆言和議重事待此而决則姦凶已斃之首又何足惜是日有㫖依奏遂詔臨安府遣東南第三副将尹明斵侂胄棺取其首送江淮制置大使司壬辰降黄榜于臨安府兩淮荆襄四川曉諭癸巳宰執咨目諭諸路安撫制置司以函首事丁酉謝奕使金以起居郎充通謝使汰鎮淮軍始淮南兩漕司招輯邊民號鎮淮軍多至十餘萬人日給錢米悉視効用所費甚廣既不黥湼漫無綂紀乆之廪給不繼公肆剽劫嘉定改元邱崈復為江淮大使朝廷慮鎮淮或生它變遣宗正丞常禇叔度奉使措置且就令啇度崈乃先隨雄淮所屯分𨽻逐州守臣節制尋奏以淮東人數少令帥漕任責㨂汰除願歸農外僅存八千餘人刺其半充効用以補鎮江大軍及武鋒軍闕額淮西人頗衆合六萬餘人乃委制司屬官陳師文同漕臣張頴揀刺二萬六千餘人充御前定武軍分為六軍各置統制自是月省錢二十八萬緡米三萬四千餘石而定武亦成軍伍淮西頗頼其力焉此事不得其月日姑附于此是春皇子垍生閏四月癸未薨追封肅王謚曰冲靖先是詔吏部太常寺討論贈官典故吏部引國朝㑹要元豐四年鄆王倜政和三年漢王椿故事贈太師尚書令追封肅王倪思時以禮部尚書兼給事中引治平二年王珪等議皇子以師傅名官於義未安乞止贈尚書令詔從之李心傳曰吏部太常固失之而倪正父所奏亦未盡也乾道中省三省長官易以左右丞相則所謂尚書令者盖無此名矣乾道三年孝宗少子恪贈淮康軍節度使開府儀同三司追封邵王此近事且最為得體而議禮者皆不及之盖弗深考耳三年十一月皇子復有維垣之贈給事鄒應龍言子為父師於理不順然前是諸皇子或已贈太師矣應龍俄以親老求去遂除次對守泉州云利州兵老小喧閧闗外諸軍月糧有支正色者有支估錢者是月王喜為沔州都統制以糴貴糧乏下令正色米每石以二斗坐倉於是總領所乃優潤估錢予之謂如支天字厫則按舊籍収糴之時每石六引即於上加搭二分作七引以二分為優潤其實市直乃十餘千一斛之錢僅能糴其半利州軍士方出戍其家屬在營者皆怒二月七日南倉當支糧未及畢衆共訴于統領官王興祖曰汝自見總領白之於是突入總領所近千人總領陳咸方謁客未還其屬官皆遯去無與酬應者衆益忿適總領所修廨舎衆共取椽桷數百執之其一人陞㕔事取更鼔擊之遂徑趨宅堂咸之家人悉登城以去匿㑹節樓衆又逐之有茶酒卒以瓦石自上擲傷數十人衆乃止咸聞變渡江入西倉興祖隨徃白之然後入城彈壓衆始散去宣撫司聞之遣沔州中軍統制官朱邦寧來究其事既而以其方出戍不敢治但誅撃鼓者一人又有墁匠一人導之以入於寢所得其刀與一屨亦斬之王喜素愛興祖故但降為隊將尋以招成州亂兵復故職事聞朝廷為降詔戒諭諸軍夏四月丙辰詔科别群臣奏䟽詔後省科别可行者以聞贈彭龜年職名寳謨閣直學士落李沐寳謨閣學士戊午真徳秀論和議徳秀時為太學博士上書曰竊惟權臣用事妄開兵端南北生靈均被其毒陛下為之旰食焦勞者二年於茲矣天啟睿謀迄殄兀惡尋盟繼好休息有期豈非天下之福哉而臣區區愚慮竊謂為國者當示人以難犯之意不可示人以易窺之形昔春秋時晉師入齊齊使國佐求盟於晉其勢亟矣一聞齊之封内盡東其畞之言雖僨軍之餘不肯茍從以紓一旦之禍盖敵國之相與有以折其謀則為和也易有以啟其嫚則為和也難况敵人變詐百出又非可以中國常理待之側聞日者小行人之遣也金人欲多嵗幣之數而吾亦曰可增金人欲得奸人之首而吾亦曰可與至於徃來之稱謂犒軍之金帛根括歸朝流徙之民承命惟謹曽無留難竊揆謀國之意不過以樂天保民為心幸和好之亟就耳獨不思金人得以聞吾之情而滋嫚我之意乎雖然此既徃之咎耳所以圖制方來者猶可謹其初也盖古者敵國通和有飬其力以待可為之機者越之事吳是也有聴命於敵以圖茍安之計者六國之事秦是也今日之尋盟於金臣不知姑欲飬其事力而待可為之機乎抑将聴命於敵而圖茍安之計乎勾踐之行成於吳也盖忍耻以志仇讎之復而非倚和以自固也是以二十年間蚤朝晏罷卧薪嘗膽未嘗一日忘㑹稽之耻故雖詘辱一時迄能伸其志於異日若夫六國則不然其求和於秦也盖委國以為仇讎之役而非用權以求濟也故朝割地以賂秦則暮棄謀臣之言夕遣質以入秦則旦絶鄰國之援撤防弛備冀秦之矜已而不加兵奚異委肉虎狼而幸其弗食也夫是以六國之地卒歸於秦豈秦之力能亡是六國哉六國實自亡耳今日而知是則當以越之事為法而以六國之事為戒可也抑臣聞之善謀者不觀敵人之動静而觀吾政之修否元祐初用司馬光為相盡更王安石弊法契丹聞之以勿生事戒其邊吏今日號為更化矣而敵之桀驁亡異前日毋亦我之所為尚有可思者乎故臣妄論今日之事必吾無以取輕於敵而後和可成必有以深服其心而後和可固臣觀昨者竄殛柄臣之始不惟四方萬里咸服英斷而敵國亦竦然易視矣誠使剛健不息之誠愈篤於初振厲有為之志益加於舊則國勢日强敵自退聴奈何朝綱方整而紛紊之漸已萌政事方修而懈弛之形已露正人雖進志未獲伸言路雖開忠罕見用我之更化者僅如此其能使敵情之畏服哉况夫彼之待我者方驕我之恃和者太重一介行李曽未越境而動色相慶若無事然臣恐盟好既成志氣愈惰宴安鴆毒之禍作浮滛冗蠧之事興彼方資吾嵗賂以厚其力乘吾不備以長其謀加之數年聲勢寖盛然後發難從之請挑必争之端而吾徬徨四頋将無以應之此長慮逺識之士所為寒心者也臣願陛下以通和講好為權宜以脩徳行政為實務君臣之間朝夕儆戒于敵情之難保禍亂之無日蒐討軍實申儆邊防凛然若敵師之将至如是而國勢不張外虞不弭者未之有也閏四月壬申雨雹旱癸未詔大理三衙臨安府及諸路闕雨州縣决繫囚釋杖以下辛夘禱于天地宗廟社稷癸巳减常膳乙未蠲兩浙闕雨州縣貧民逋賦復命大理三衙臨安府兩浙州縣决繫囚丙申幸太乙宫明慶寺禱雨甲申詔皇太子侍立朝殿詔曰朕更化厲精祇若古訓為萬世長䇿先圖其大者皇太子温文粹美學問夙成欲使與聞國論通練事㡬以增茂儲徳二三大臣各兼師傅賔僚用伸羽翼之􅂇其相與叶心輔導成朕愛子之義以綿我家無疆之慶是惟休哉自今每遇視事可令皇太子侍立宰執赴資善堂會議乙酉錢象祖兼太子太傅衛涇雷孝友林大中並兼太子賔客是月丁亥皇太子出居東宫丁酉詔求言旱故也詔曰朕惟祖宗傳序之重祗懼靡遑而自去嵗以來蝗蝻為灾冬既無雪春又不雨夏且半矣祈禱不應天灾流行固亦有之在於今兹闗繫實重邊鄙甫定流徙未復漕運不至米價日增茍失嵗事何以保邦傳不云乎屋漏在上知之在下其播告中外凡朕躬不逮朝政闕失田里愁嘆軍民疾苦盡言無𨼆朕将採而用之無小無大惟既乃心稱朕意焉五月辛酉親試舉人賜禮部奏名進士鄭自成等四百二十有六人及第出身有差甲子太白經天蝗乙丑减常膳丁夘詔侍從臺諌條上闕政監司守令條上民間利害以聞六月乙酉禱於天地社稷七月壬戍詔三省條上寛䘏未盡之事八月戊辰出豐儲倉米賑貧民六月庚午金人歸大散闗辛未歸濠州又歸隔芽闗乙亥衛涇罷行御史中丞章䟽也甲申林大中薨以簽書樞宻事薨于位丙戍詔舉邊守詔侍從兩省臺諌舉沿邊守臣辛邜史彌逺兼參知政事秋七月辛丑賜吕祖泰官先是祖泰以上書忤韓侂胄配欽州牢城至是改正過名特補上州文學尋改授廸功郎監潭州南岳廟癸丑邱崈同知樞宻院事甲寅許奕歸自金以通謝使囬是日入國門八月辛未邱崈薨于江隂之里第甲戌議楮幣侍從臺諌兩省詳議㑹子折閲利害自曽從龍為版書欲急見理財之效始與提領㑹子庫官陳彌祚共議依川錢引例立界每界一千萬緡兩界相㳫行之乆矣其後每界増為千八百萬緡至第七界又増為二千三百二十三萬緡開禧用兵又依四川例亦以三界通行而第十三界累增至四千七百五十八萬九百餘緡民間折閲滋甚辛巳婁機同知樞宻院事樓鑰簽書樞宻院事丙戌詔考訂民間利害詔禮部侍郎許奕起居舎人曽從龍考訂監司守令所條民間利害擇可行者以聞其未條上者趣之甲午賑江淮流民出米二十萬石賑糶尋又出安邊所錢一百萬緡命江淮制置大使司糴米賑饑民九月己未和議成先是金遣諭成使完顔侃喬宇來辛丑入見至是以和議成諭天下乙丑大風降徳音于㳂邊諸州是秋背嵬軍謀為變不克沔州背嵬軍謀以九月二十八日安資政生祠落成之日舉事已結連劍利諸軍矣前一夕安公家人夢㕔事下有坐甲者數百是日安公心忽動俄有告變者捕為首八人誅之隆慶府後軍統制官張林知其謀命憲臣宋正仲鞫實獄成當死詔以其有誅叛之勞奪防禦使除名嶺南覊管云冬十月丙子錢象祖為左丞相史彌逺為右丞相雷孝友知樞宻院事兼參知政事婁機參知政事樓鑰同知樞宻院事己夘褒録慶元上書楊宏中等六人宏中徐範張衟各循一資周端朝林仲麟各免文觧􅃽傳已亡詔以束帛賜其家辛巳加配蔡璉吏部尚書兼翰林學士樓鑰等状看詳到朝散郎監都進奏院趙崇憲等奏乞辨雪父汝愚䜛誣等事一疏内直省官蔡璉最為可誅方汝愚與彦逾謀逹意於郭杲是時蔡璉從旁宻聴本欲漏泄㡬害大事在法當誅正以危疑之時不欲盡行姑從决配以從輕典後乃自配所逃入都城投匭誣告㡬致興羅織之獄䧟害忠良當時全臺曽入章疏於是彭龜年追三官勒停曽三聘追兩官蔡璉誣罔尤不可恕欲乞朝廷将蔡璉坐以逃入都城之罪更與加配奉聖㫖依看詳到施行照得蔡璉於紹熈五年八月内准指揮特决脊杖二十刺面配千里外撫州牢城収管於慶元五年二月内放逐便於嘉定元年四月内與降等比換進武副尉吏部供到蔡璉因磨勘現轉承信郎監江隂軍江隂縣令節犒賞酒庫奉聖㫖蔡璉追毁出身文字除名勒停加配贛州牢城十一月戊戌四川収兊九十界錢引先是四川錢引以二年為界每界書放之數止於一百二十五萬崇寧後陜西邊事起泛印増多而引法壊大觀間盡罷之仍詔以天聖書放之數為凖建炎初張魏公浚出使復以便冝增印自後因仍不已至嘉㤗末兩界書放凡五千三百餘萬緡通三界所書放視天聖祖額至六十四倍嘉定初每緡止直鐡錢四百已下議者患之總領財賦陳咸乃與僚屬議出庫筦金銀度牒與民収囬半界金每両直六十緡銀每兩六緡二百度牒每道一千二百緡度庫筦所藏可直一千三百萬議論凢數月至是忽行下諸州聴民間以舊引輸官課及赴利州市金銀期以嵗終官司母得受榜出民間大驚先是總領所嵗受諸州縣金銀例多虧下其補虧之數乃以錢引折納另項収支而庫筦金銀虧下如故民間頗知其事又四川諸州去總領所逺者至千數百里而期限已廹徃來或不及且受給之際吏縁為姦折閱已甚於是單丁弱客皆不敢行一引之直僅售百錢咨嗟怨泣其聲載道後旬日制置使吴獵知之乃掲榜除収兊一千三百萬引外其餘三界依舊通行使用又檄總領所分取金銀就成都置場収兊舊引民心稍定時宣撫司方與總領所比故移書東南以為獵沮壊其事論者亦但謂錢幣専屬計臺制司無所預繇是不直吳獵云庚子四川初行當五錢案夲紀四川行當五錢在十二月庚午時陳咸總領財賦患四川錢引増多乃即利州鑄大錢以權其弊三年夏制置大使司欲盡舊引乃又鑄於卭州焉利州紹興監錢以聖宋重寳為文其背鑄利一二字又篆五字卭州恵民監錢以嘉定重寳四字為文其背鑄西貳二字又篆五字兩監共鑄三十萬貫其料例並同當三錢時議者恐其利厚盗鑄者多而總領所方患引直之低則曰縱有盗鑄錢輕則引重是吾欲也方錢之未行也眉人有里居待次者又欲創一監於眉州論者以為丹稜雖産鐡嵗額不多而夲郡又無薪炭眉山之人亦以為不便上下騷然數月乃罷由是止鑄於利卭二監焉戊午史彌逺去位丁母喪也癸亥皇太子請賜彌逺第于行在令就第持服許之彌逺辭第亦許之明年二月壬辰遣内侍趣彌逺還行在賜第乙丑李大用謀為變不克大用利州忠義人也初大用與其徒結集屯駐諸軍欲以其日舉事先縱火焚倉庫然後殺總領劫掠財賦又殺轉運判官及兩統制據城為變部分已定其徒趙吉懼事不濟詣總領陳咸告之捕得大用十二月戊辰也即教場杖殺之其徒死者八人賞吉錢千緡送蓬州飬老吉行至葭萌縣大用之黨追殺之裂其屍棄之於道取其錢而去始大用之謀變家子欽時為總領所主管文字前一夕本所幹辦公事楊君玉來見坐定屏人探囊中一頭巾示子欽曰軍中有人謀變以此為號知之否子欽問如何曰以巾帶結于頥下者無患不然必不免子欽笑曰安有是事索酒飲之令去翌日子欽以語節制軍馬侯頥頥亦未信子欽曰雖然不可不備苐令人宻察之勿張皇也頥乃遣左右親信者物色其事㑹大用亦疑事泄乃詣總領所自陳總領陳咸詰之大用曰某河池人始破産萬緡從軍程宣撫授以忠義統領官意謂功名可以立致不意朝廷罷軍汰遣某軰某僅得支犒二十緡欲歸則無家欲留則無食自度不免一死計出無聊乃至於是咸復問汝将何為曰欲殺監司守将上閉潭毒嶺下閉劍門闗自立為利王姑逭嵗月耳咸不俟其言畢命引之退及對吏自通所結連之士北自三泉南抵綿劍其數甚衆咸命杖殺之不敢竟也子欽嘗見具獄宜得其詳子欽又言宣撫司初令川路造麵碁子至軍前不果用遣戍卒負之以歸卒多盗食者總領所命以豁見糧士洶洶且為變子欽以白咸盡捐之乃止事在開禧三年六月丙寅錢象祖罷案夲紀錢象祖罷在戊辰以觀文殿大學士判福州行監察御史章疏也貶李沐再奪三官信州居住己夘黎州蠻蓄卜㓂邊沉黎自慶元乙夘以後無邊事者且十年至是彌羌蓄卜忽自惡水渡河入㓂破州之碉子寨邊事自是再起先是蓄卜之弟悶巴至三衝為人所殺部将趙鼎總轄官魏大受懼生事脅寨之土丁以骨價錢三千三百引償之時紹熈五年也有白水村者青羌徃來渡頭也其民舊與青羌交通慶元元年郡徙之安静寨青羌不以為便迄還之白水時開禧已二年矣既而蓄卜又言大受嘗以袍印許之而不獲欲與青羌偕徃卭部川案宋史作卭部州假道女兒城以入㓂寨言于州乞以財帛遺都王母令假道守臣楊伯昌從之案宋史守臣楊子謨以貲遺其都王母俾母假道開禧三年二月六日壬子也今年秋蓄卜遂以兵至三村總轄官董忠顯連告急伯昌命嚴兵待之俄伯昌召去朝奉郎趙公㡯代為守聞羌人且至遣禁兵八十偕土丁徃拒之兵至􅈋坪而蓄卜已渡河軍丁迎敵不勝庚辰攻茒坪寨官軍射退之遂掠三松蠶砂横山三增白羊諸村殺人民掠財貨蓄卜又進據茹山而安静艮溪茒坪谷堆諸寨皆為所隔公㡯亟遣西兵正將黨燾案宋史作黨夀以所部七十人及土丁俱徃䇿應燾輕敵徑進癸未戰于茹山官軍失利義勇隊官二人戰没西兵死者四十人土丁六人郡又盡調西兵禁兵之未發者命興化府後軍統領王光世将之以行是日羌人自茒坪寨下以皮船載生兵渡河寨官李茂引兵至河際射之一舟八人俱溺光世以羌人勢盛惮之留屯三衝不敢進羌人焚掠既盡戊子渡河南歸光世乃偽走㨗旗稱㑹合兵丁趕逐羌賊道路已通時並河諸村生業既無遺矣制置使吳獵纔聞之庚寅遣義勇軍統領張師古以所部二百人赴州捍禦師古至則屯三衝而光世進屯安静寨時邊報不一而在城之兵調發既盡乃募强壮三百人號曰敢勇俾徃邊頭應援命軍事推官程伯雄充軍正統之以行伯雄丹稜人也茒坪寨與邛部川女兒城隔河為境伯昌之在黎也蠻地饑荒女兒城崔太者有請伯昌嵗以米十五斛贍之公㡯至州靳而不予女兒城蠻因以藉口乃借蓄卜路使之入㓂既而諸司聞其事復命予米如故然無及矣是嵗置提領拘𣙜安邊錢物所案夲紀在閏四月辛未又黄疇若傳拘榷作拘催時甫廢國用司而侂胄及諸閹省吏之家貲財皆已簿録黄疇若為殿中侍御史請剏此名遂命與户部侍郎沈詵同領其事即御史臺置局又以宰屬一員同領仍許疇若不拘常例到堂疇若等請卿監一員提領安邊庫朝士二員為拘𣙜官仍掲榜募人言拘𣙜事許之其後㑹其入嵗得七十萬緡専充金人所增嵗幣其田宅契劵皆蔵之御史臺庫命臺官一員典領局罷疇若已下皆進官金主璟卒允濟立璟以淳熈十六年立在位二十年無子而雍之諸子惟允濟在故立之雍即葛王褎也淳熈元年更名雍
