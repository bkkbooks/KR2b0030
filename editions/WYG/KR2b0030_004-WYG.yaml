body:
  text: 兩朝綱目備要卷四寧宗慶元元年乙夘春正月丁亥朔蠲兩淮租稅尋詔蠲台嚴湖州貧民身丁折帛錢一年壬寅黎州蠻㓂邊𦍑人薄安静寨義勇軍正將楊師傑及將佐王全等八人與戰却之於是權制置司公事茶馬楊經申巳行殺退三月己酉詔知黎州王聞禮特轉一官時王宗廉已為興元都統制㑹丞相留正得罪侍御楊大法因劾宗廉滛邪貪黷曩在黎州殺降餘黨皆怨至今為患五月丙戌宗廉降一官放罷六月甲戌詔師傑等九人特轉一官師傑仍充成都府路兵馬都監陣亡者三人録其子軍士千二百有八人賜緡錢有差既而宗廉又坐贓罪追六官卭州安置乙巳詔收養遺棄詔兩浙淮南江東路荒歉諸州收養遺棄小兒辛亥賑京城貧民以陰雨賑濟行在貧民尋詔釋大理三衙臨安府兩浙路杖以下囚丙辰白虹貫日二月丁巳朔詔耕荒田詔兩浙諸州勸民耕墾荒田丁卯申嚴臧否之令詔帥臣監司嵗中考郡守臧否以聞五年三月用陳自强奏罷臧否戊寅右丞相趙汝愚罷先是正月辛亥將作監李沐為右正言是月丁丑沐以本職公事上殿乞罷汝愚政柄以尊安天位塞絶姦原是日汝愚乞罷政出浙江亭待罪詔中使宣押赴都堂治事沐又入劄子乞即賜明斷更不宣押無使之往来道路重失進退之義是晩召權直學士院鄭湜鎻院汝愚遂罷右丞相除觀文殿大學士知福州制辭畧曰頃我家之多難頼碩輔之精忠持危定傾安社稷以為悅任公竭節利國家無不為既隆翊戴之勲尚祈啟沃之助力陳忱悃祈避煩言於是御史中丞謝深甫案慶元黨禁乃御史中丞何澹也殿中侍御史楊大法監察御史劉徳秀劉三傑劄子臣等竊見趙汝愚冐居相位陛下示以諫臣之章汝愚倉皇出門至宣麻罷免在廷之臣猶以為不當加以書殿隆名帥藩重寄伏望因其有請姑寢福唐之命令汝愚且以職名奉祠汝愚狀乞將前件新命盡賜罷免令臣姑守本官奉祠杜門省咎甲申有㫖依所乞依舊觀文殿大學士提舉臨安府洞霄宫鄭湜之草制詞也坐無貶辭免兼學士院未㡬罷去己卯雨土余端禮兼參知政事章頴罷自權兵部侍郎與郡尋與宫觀坐上疏留趙汝愚也庚辰徐誼罷亦坐上疏論救汝愚罷去三月丙戌朔日有食之庚寅太白經天癸丑集議鐵錢利害命侍從䑓諫兩省集議江南沿江諸州行鐵錢利害條具以聞甲寅李祥楊簡並罷皆汝愚之黨也夏四月丁巳竄吕祖儉案祖儉之疏以四月二日上四日始有韶州之命丁巳乃三日與慶元黨禁異書行之詔在五日自太府寺丞安置韶州坐上疏乞留趙汝愚併論朱熹彭龜年等不當逐語侵韓侂胄故也中書舍人鄧馹封還録黄詔祖儉志在無君其罪當誅姑從竄斥以示寛容自合書行敝五月詔祖儉改送吉州安置己未以余端禮為右丞相京鏜知樞密院事庚申流太學生楊宏中等六人宏中與周端朝張衟林仲麟案仲麟慶元黨禁作仲鱗誤蔣傅徐範上書曰臣聞自古國家禍亂之由初非一道而小人中傷君子其禍尤慘君子登庸杜絶邪枉要其處心實在於愛君憂國羣小得志仇視正人必欲盡去其朋類然後可以肆行而無忌於是人主孤立而社稷危矣黨錮敝漢朋黨亂唐大率由此元祐以後邪正交攻卒成靖康之變我宋不競貽禍至今此臣子所不忍言陛下所不忍聞也臣竊見近者諫官李沐論前相趙汝愚所為乖戾隨即罷去若慮陛下父子之際懐不自安故黜汝愚以謝天下亦未為過如沐所言則以為汝愚自居同姓數談夢兆専政擅權欺君植黨殆將不利於陛下以此加詆其實不然汝愚之去中外咨憤而言者以為父老歡呼蒙蔽天聼一至於此章頴發於中激力辨其非即遭斥逐既而祭酒李祥博士楊簡相繼抗論毅然求去以祥之沉静自守簡之耿介不阿决非有所利而言者人心天理不可厚誣善類皇皇莫知所據言者務求已勝沮抑公論窺伺間隙遲回而不敢發一旦祥有補外之命惡其與簡扶植正論㓗身而去極力擠排同日報罷六館之士拂膺憤怨涕泣而相吿曰當異論譸張羣情畏縮之際隨聲雷同固寵緘黙誰肯奮身權要别白是非凛凛不屈使二人者苟有一毫為己之私豈肯自附於已去之宰相而犯虎豹九關之怒哉今李沐自知邪正之不兩立而公論之不直於已乃欲盡覆正人以便其私必託朋黨以罔陛下之聼臣謂二人之去若未足惜殆恐君子小人消長之機於此一判則靖康已然之驗何堪再見於今日耶陛下厲精之初發推剛徳方將正三綱以維人心持公議以定國是遽聼姦回槩疑善類此臣等之所未諭也臣等嘗摭之僉言李沐本以庸才猥厠朝列舉動輕疎而無老成之定慮趨操凡陋而有阿附之邪心驟躐諫垣物論不與况敢誣衊大臣堙塞公道而陛下從之如流略不知察道路譁然以為李沐内結權倖陰有指授率爾肆言全無忌憚廟堂屏息不敢異議天下扼腕氣將奚伸其氣熖已足以熏灼朝路撼摇國勢陛下若不亟悟漸成孤立後雖悔之亦無及矣陛下獨不念去嵗之事乎人情驚疑變在朝夕當是時假非汝愚出死力定大議使陛下得以成夀康皇帝揖遜之志行孝宗皇帝未舉之䘮雖百李沐罔知攸濟當國家多難汝愚方位樞府本兵柄指揮操縱何向不可尚不於此時為利今朝廷清明上下安妥乃有異志乎李沐輙以危言悚脅陛下巧於中傷君子立威取名情狀敗露李祥楊簡職任師儒每以名節激厲學校出位而言實勇於義其學力之充思慮之深舉世搢紳心所愧服士類聞風莫不興起顧以䜛言去之豈不損士氣而失士心乎願陛下鑒漢唐之禍懲靖康之變精加宸慮特奮睿斷念汝愚之忠勤察祥簡之非黨灼李沐之回邪明示好惡旌别淑慝竄李沐以謝天下還祥簡以收士心臣等雖蹈鼎鑊實所不辭情激於中不能自黙惟陛下裁擇庚申詔宏中等妄亂上書扇摇國是各送五百里外編管中書舍人鄧馹言臣仰惟國家開設學校教養士類徳至渥也自建太學以来上書言事者無時無之累朝仁聖相繼天覆海涵不加之罪甚者押歸本貫或它州聼讀而已紹熈間布衣余古上書狂悖若以指斥之罪坐之誠不為過太上皇帝始者震怒降㫖編管已而臣寮論奏竟從寛典陛下今日編管楊宏中等六人若以扇摇國是罪之則未若指斥乘輿之罪大也以六軰言之則一夫為至寡也聖明初政仁厚播聞睿斷過嚴人情震駭若加聖慮裁之以中使為士者知有所懲而不失聖明寛大之意則於治時為得所有録黄臣未敢書行是日有㫖李沐除右諫議大夫劉徳秀除右正言是夜工部侍郎兼知臨安府錢象祖遣人逮捕諸生分遣使臣押送貶所癸亥詔馹依已面諭書行未幾馹請補外罷為集英殿修撰知泉州明年七月皇子生徳音宏中等各押歸本貫聼讀宏中字充甫福州人登開禧二年進士第端朝字子靖温州人嘉定四年南省進士第一衟字周叟福州人後以父任補官二子與端朝同年登第仲麟字景冲案楊宏中傳宏中為開禧元年進士端朝字子静嘉定三年進士第一衟字用叟仲麟字景仲皆與此小異據通考開禧元年嘉定四年放榜作二年三年者誤範字彞父皆福州人範嘉定元年登第仲麟猶未偶也傅字象夫信州人乆居學校忠鯁有聞叩閽之事實其屬藁自處州貶所得還未幾病卒侂胄既死有㫖褒録上書六士宏中衟皆循一資端朝仲麟各免文解一次傅已死以束帛賜其家盖自靖康以来國有大事諸生叩閽伏闕不憚危言累聖優容類多聼納間雖暫為權姦所抑要之以乆公論未嘗不伸云是月都城大疫上出内帑錢為行在貧民醫藥棺斂費仍賜諸軍疾疫死者家五月戊戌詔誡風俗時知名之士罷斥相繼人情洶洶韓侂胄患之侍御史楊大法右正言劉徳秀乃乞降詔以國是尊君中道等事訓飭在廷有不如詔者重寘典憲詔曰朕惟風俗者治忽之樞機士大夫者風俗之權輿昔周文武之隆在位皆節儉正直小大之臣咸懐忠良下至庶民無有滛朋比徳今也不然懐背公死黨之恩蔑尊君親上之義諛佞側媚以奉權强詭僻險傲以釣聲譽倡說横議貪利逞私使毁譽是非混然淆亂於乎朕之所託顧乃如此自今至於後日洒濯厥衷存公去私可否從違各當於理則予汝嘉其有不吉不廸習非怙終邦有常刑朕不敢貸直學士院傅伯夀所草也伯夀自得之子乾道間自得以不受曽覿之招名聞四方至伯夀則奴事侂胄𨽻人蘇師旦致身通顯其弟伯成非其所為毎切責之至是始草詔以詆善類丙午置廣惠倉詔諸路提舉司置修胎養令六月丁巳劉徳秀請考核真偽此論偽學之始也徳秀上言邪正之辨無過於真與偽而已彼口道先王語而行如市人所不為在興王之所必斥也昔孝宗垂意規恢首務核實凡虛偽之徒言行相違者未嘗不深知其姦臣願陛下以孝宗為法考核真偽以辨邪正詔下其章庚午徳秀又劾國子博士孫元卿太學博士袁爕案慶元黨禁作袁奕國子正陳武皆罷去司業汪逵入劄子辨之徳秀以為言逵亦罷己未復置䑓諫言事簿命中書省置庚午詔武臣舉人三衙江上諸軍主帥將佐初除舉自代一人嵗舉所知二人癸酉韓侂胄建節趙汝愚之當國也徐誼言宜以節度使畀侂胄汝愚不聼至是命為樞密都承㫖固辭乃拜保寧軍節度使提舉萬夀宫明年秋以上誕元子拜開府儀同三司充觀使秋七月丁酉何澹請禁偽學澹為御史中丞始上疏論専門之學流而為偽空虛短拙文詐沽名願風厲學者専師孔孟不必自相標榜詔榜朝堂後七日吏部郎官麋師旦亦建言請考核真偽未幾遷左司員外郎時有張貴謨者指論太極圖說之非澹又上疏論在朝之臣大臣既熟知其邪正之迹然不敢白發以招報復之禍望明詔大臣去其所當去者趙汝愚落職罷祠落觀文殿大學士罷宫觀用何澹章疏也己亥太白晝見八月己巳詔修武備詔内外諸軍主帥條將佐士卒噐械船艦可用與否及控扼防守之策以聞己丑倪思請究實贓吏倪思為吏部侍郎建言今之達官貴人贓以萬計監司䑓諫按發不過放罷前之行遣既不究實後之辨雪遂得有辭請自今以貪墨聞者雖未欲送獄根勘亦合差官究實懲治庶幾大贓治而小贓服其後亦不克舉行是月都城水詔蠲水傷貧民賦尋以乆雨决繫囚又詔蠲台嚴湖州水災民丁絹冬十月乙丑陞濳藩府名秀州為嘉興府舒州為安慶府嘉州為嘉定府英州為英徳府開禧元年陞嘉定州為嘉慶軍十一月己丑雨土戊戌加上帝后尊號夀聖隆慈備福太皇太后尊號加光祐二字夀成皇太后尊號加惠慈二字上太上皇帝尊號曰聖安夀仁太上皇后尊號曰夀仁丙午竄趙汝愚責授寧逺軍節度副使永州安置徐誼坐黨汝愚亦責團練副使南安軍安置丁未命宰執大閱庚戌何澹言薦舉弊趙汝愚秉政引用多所知有自外徑除館學者澹為中執法以其廢壊夀皇成法嘗上疏言之已而有㫖除甲科及經擢用人外須歴知縣有政績諸司薦舉乃得除職事官用矯其弊命下澹復言若此用人必有二弊一則其人政事雖有可述而有勢力可宛轉移書遍囑剡奏鼎来二則諸司之中茍有强有力者為之主張則它司莫敢違拒寒畯之士無由可進請詔諸司取實有政績者連銜以聞仍關御史臺照㑹若有不公許本臺覺察從之然終不能革也嘉泰初鄧友龍為察院復奏自慶元三年至六年在外被薦者無慮千餘人其間或乏廉聲而舉充廉吏或素昧平生而舉充所知或不能文而舉可備著述至於廟堂亦無以處之願詔中外臣寮自今有人則薦無人則闕儻所薦非人當擇其尤者覺察以聞疏奏從之是月詔諸司連銜薦舉明年章森帥興元薦知利州蒲叔獻等三人政績有㫖與監司及陞擢差遣胡紘為御史上言叔獻等不聞有過人之才而森以人情之厚獨銜舉薦詔勿行嘉泰二年三月右正言施康年又言近士大夫有持廉吏及科目薦章十餘至廟堂而得學官者又有挾三四薦而得院轄者執政至無以却之請除陞改自代十科外悉行罷去如朝廷間有特㫖令内外舉薦者並具實迹以聞從之自此舉薦之濫少革矣十二月丙子朱熹辭職名詔依舊充祕閣修撰宫觀熹以去年十月去國累奏辭新命併乞追還職名未得請繼而丞相趙汝愚罷太府寺丞吕祖儉以論丞相貶時事為之一變熹已家居自以蒙累朝知遇之恩且尚帶從臣職名義不容黙乃草封事數萬言陳姦邪蔽主之禍因以明丞相之寃子弟諸生更進迭諫以為必且賈禍熹不聼蔡元定入諫請以筮决之遇遯之同人熹黙然取奏藁焚之因更號遯翁遂以疾丐休致其初奏略曰陛下即位之初臣以愚賤疎逺之蹤首蒙眷知召置講席正以庶官無由入侍禁闥故特假以侍從職名臣嘗再三懇辭曲蒙天慈加賜手札俾速祇受因遂不敢力辭供職四旬屢得進講凡所開啟多蒙開納而臣憃愚廹切便欲致君堯舜之上遂觸忌諱以煩譴訶皇慈過恩猶不加罪親御翰墨俾就退閑旬日之間除書繼下所宜即日拜命奔走率職别圖後效以塞前愆而反覆思維前日之罪既以學力未充誠意不至無以仰稱明詔感悟天衷釁咎不容湔洗所有元借職名已是難復冐居豈敢更叨進擢之寵欲望追還新舊職名俾以寄禄元官復奉鴻慶故宫列聖香火其第二奏畧曰伏念臣本是庶官無他勞效元帶秘閣修撰已是兩朝過恩比者秖縁聖意欲令講書遂使暫陪邇列未及兩月果以罪戾譴罷而歸所被誤恩理宜追奪其第三奏自劾議祧廟事畧曰臣之凡愚素號山野入侍經幄僅及四旬意見濶疎言嗣鄙拙固已自知不堪選用之意惟有中間輙議僖祖皇帝皇家始祖不當一旦并行祧毁且使太廟之祀止及八世降於天子九廟之禮尤非所宜獨蒙聖慈特賜宣問親奉玉音以謂僖祖之廟自不當遷至于再三不謂孤論難持竟亦無取退伏循省益愧心顔尚借寵榮許仍舊職非但有乖輿論亦恐上累盛朝其第四奏乞致仕畧曰不意病勢危篤自知難戀聖朝依例合乞致仕又念見係庶官不敢専具奏牘遂申本貫依例陳乞恭奉聖㫖未賜開允惟是區區本以鄉来入侍日淺自知未有毫髮報稱不當仍帶舊職出領祠官所以懇避再三即非過為沽激所有昨来陳乞致仕實縁病勢危廹方敢冐昧今雖茍延殘息終是不堪異日使令不敢更叨廩禄以速滿盈之咎其第五奏自劾妄議山陵事畧曰去歲曽因集議永阜攅宫妄意輙陳管見欲乞少寛逺日改卜神臯庶妥威靈以延運祚今者伏覩進奏院報前日小大之臣曽議此者皆以坐罪次第降黜而臣狂妄又嘗面奏其跡尤不可揜其罪尤不可赦但以所入文字不曽付外是致漏網未抵譴訶若遂隱匿不言更冐榮寵竊慮祇受之後公論不容未及終朝便煩禠奪顧㣲臣進退之義雖不足言而聖朝刑賞之中則為可惜伏望聖明奮發威斷付之司敗以肅邦刑庶免煩言重勞淵聼其第六奏畧曰臣本意止為已罷講官不敢更帶侍從職名而於其間三次奏狀乃因他事忘其前語此其所以屢瀆聖聰而曽不足以少囘天意者也乞照去年申省及後来第一第二次辭免奏狀早賜施行傅伯夀行追還職名制詞云從欲者聖人之仁尚謙者君子之行眷我執經之老辭夫次對之榮既諒忱誠其頒茂命以爾心耽墳素性樂邱樊被累朝之特招稱疾屢矣於十連而趣召肯起幡然既陪東學之遊兼侍西廂之邃見生幾晩方喜桓榮之說書髙論未聞遽若貢生之懐土仍夫華職秩以真祠盖彰優老之風且示隆儒之意逮兹累嵗始復有陳前受之是今受之非誰能無惑大讓如慢小讓如偽夫豈其然顧爾務狥於名髙在我詎輕於爵馭俾解禁嚴之直復居論著之聯雖雅志之勉從在至懐而良咈噫厭承明勞侍從既違持槖之班歸鄉里授生徒往究専門之學初侂胄猶未敢有加罪之意奏牘再三皆有褒詔廟堂寄聲云朝廷欲以此别真偽望先生體此意勿復辭熹不聼辭益力廟堂不樂伯夀故家子弟嘗執子弟禮恨不薦已因行詞以逢迎之是後小人始敢詆熹無復忌憚矣慶元二年丙戌春正月戊子雷庚寅余端禮為左丞相京鏜為右丞相鄭僑知樞宻院事謝深甫參知政事何澹同知樞宻院事庚子趙汝愚卒于永州案慶元黨禁汝愚之卒在二十日丙子汝愚傳又以為正月壬午汝愚既謫道過衡州已病又為守臣錢鍪所窘逐遂服藥而卒天下寃之訃聞有㫖追復元官許歸葬中書舍人汪義端繳還復官之命從之案寧宗本紀趙汝愚復官歸葬之詔在二月辛酉又以中書舍人吳宗旦之言而罷皆與此異時有廸功郎趙師召者上書乞斬汝愚事雖不行然侂胄之黨以汝愚有定策功惟恐其復進故當時謂汝愚不死事固未可知也甲辰留正落職罷祠落觀文殿大學士罷宫觀坐引用偽學之黨為劉徳秀所劾也偽學之稱自此始自熈寧元豐間河南程顥程頥兄弟始以道學為天下倡二程少學於汝南周茂叔其後學者翕然宗之二程死其髙弟門人前有河南朱光庭劉絢伯京兆吕大臨蘇季明上蔡謝良佐延平楊時建安游酢河東侯師聖伊川門人後有河南尹焞張繹東平馬伸福清王信伯涪陵譙天授楊尹遭遇靖康建炎紹興之間致位通顯天授入朝於靖康而不合紹興中再召不起後隱青神山中建安胡安國學春秋於程頥而不及見以楊謝為師友紹興初秦檜為亞相引安國侍經席一時善類多聚于朝俄為吕頥浩朱勝非所逐朱吕罷趙鼎相焞以布衣入勸講經生學士多召用焉鼎既罷張浚獨相司諫陳公輔首上章力排程氏之學以為狂言怪語淫說鄙詞鏤榜下郡國切禁之安國疏言今使學者師孔孟而禁不得從頥是入室而閉其户也其後檜再得政復尚王金陵而洛學廢矣楊時傳郡人羅從彦從彦傳郡人李侗侗傳新安朱熹安國傳其子憲憲傳廣漢張栻乾道淳熈間二人相往来復以道學為己任學者號曰晦庵先生南軒先生東莱吕祖謙其同志也南軒侍經筵不乆而去晦庵屢召不起上賢之乆之丞相王淮當國不善晦庵尚書鄭丙始創為道學之目王淮又擢太府寺丞陳賈為監察御史俾上疏言近日搢紳有所謂道學者大率假其名以濟其偽望明詔中外痛革此習每於除授聼納之際考察其人擯斥勿用晦庵遂得祠又數年周必大為集賢相四方學者稍位於朝㑹朱熹除郎以疾未拜而侍郎林栗劾其欺慢且詆道學之士乃亂臣之首宜加禁絶栗雖罷去而士大夫譏貶道學之說迄不可解甚至以朋黨詆之而邪正幾莫能辨至紹熈末趙汝愚當國遂起朱熹侍經筵而其學者益進矣熹侍經筵數十日而去位汝愚貶永州何澹為中執法復上擊道學之章劉徳秀在諫列又申言之於是始有偽學之禁矣先是光宗登極劉光祖為殿中侍御史上疏極言兩議交攻之禍詔下其章後五年偽學乃禁韓侂胄本武人志在招權納賄除不附己而已不能巧為說以網善類也而士大夫嗜利無恥或素為清議所擯者乃教侂胄言凡相與為異者皆道學人也陰數姓名授之俾以次斥逐或又為言名道學則何罪當名曰偽學盖謂貪黷放肆乃人真情其廉潔好修者皆偽也於是憸壬險狠獧薄無行之徒利其說之便已攘臂奮袂以攻偽干進而學禁之禍酷矣至是劉徳秀劾留正四大罪首論其招引偽學以危社稷云二月丙辰復置勅令所提舉官及同提舉仍以編修勅令所為名遂移牒六曹大理寺及三衙江浙近便州郡監司抄録乾道五年正月至慶元二年十二月終續降指揮得數萬事參酌淳熈舊法五千八百條刪修為四百七十㳫送刑部審詳訖提舉官下三省合屬房分及校正都司審覆為書總七百二冊勅令格式目録各一百二十二卷随勅申明十二卷看詳四百三十五冊四年九月丙申進呈自是已修之書次第修進如撮要總類之屬殆不一名而篇帙浸繁矣禁省闈習偽學知貢舉葉翥倪思劉徳秀奏論文弊上言偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之類盡行除毁是科取士稍渉義理悉見黜落六經語孟中庸大學之書為世大禁矣三月己亥皇弟柄封吳興郡王本末見紹熈五年八月抦早慧孝宗愛之淳熈十二年始就傅以館職黄唐倪思為學官至是加國號制曰孝宗憐早慧以鍾愛太上念特立以垂慈故見貴寵云辛丑集議釋服孝宗之䘮上實以嫡孫行三年服監察御史胡紘言皇帝為孝宗當服期詔侍從臺諫給舍限三日集議釋服史部尚書葉翥等言孝宗升遐之初太上聖體違豫宫中行三年之䘮皇帝受禪止宜倣古方䘮之服以為服昨来有司失於討論今胡紘所奏引古據經别嫌明微委是允當欲從所請參以典故六月六日大祥禮畢皇帝及百官並純吉服七月一日皇帝御正殿饗祖廟以全權制屈伸之義將来禫祭令禮官檢照累朝禮例施行四月庚戌詔羣臣所議雖合禮經然於朕追慕之意有所未安早来奏知太皇太后面奉聖㫖以太上皇帝雖未康愈宫中亦行三年之制宜從所議朕躬奉慈訓敢不遵依議狀可付外施行六月辛亥徙紘太常少卿使草定其禮七月癸未親饗太廟如故事焉丙午上慶元會計録初殿中侍御史姚愈請編㑹計録遂命金部郎中趙師炳户部郎中楊文炳同編集至是書成上之是月更國子試補法時傅伯夀在翰林建言國子生員多偽濫請自今職事官期親釐務官子孫乃得試補從之夏四月甲子余端禮罷壬申何澹參知政事葉翥簽書樞宻院事乙亥增臺諫官員增置監察御史一員五月不雨禱于天地宗廟社稷詔大理三衙臨安府兩浙州縣决繫囚申嚴獄囚瘐死之罰辛卯賜舉人第御後殿賜禮部奏名進士鄒應龍等四百九十有九人及第出身有差進士第一人本莫子純以曾受蔭補降居其次應龍邵武人也上登極四川類省試嘉州舉人當免解趙全叔為守靳之得試者僅有百許人是年登第者纔三人其有故未及試者四年復取三人而止是時英明舒三州舉人並赴南省而慶元府得十有七人安慶府得四人英徳府得一人皆附春榜視嘉州為優云甲午減諸路折帛和買錢三年建華文閣奉藏孝宗皇帝御集甲辰改慈福宫名為夀慈宫案内禪宫名髙宗名德夀孝宗重華光宗泰安後改夀康而髙宗憲聖后所居名慈福即徳夀改築也通考慶元二年遷居重華仍易名曰慈福此云易慈福為夀慈而本年十月暨三年冬仍屢書慈福考嘉泰二年詔作夀慈宫注改重華為慈福時以舊慈福為重夀殿憲聖夀成皆徙居此迨憲聖終䘮改慈福為夀慈今憲聖尚在宫名似未遽改疑即改重夀殿之誤六月乙丑命臧否縣令分三等先是張釜量帥廣西案張釡字君量此誤合名字為一請令監司帥守各於嵗終以所部縣令分臧否上中下三等合平而為七次春上奏頒之考功如臧甲於一路者取㫖陞擢而否之最者亦加黜責其它次第斟酌施行以為懲勸從之然自後未有舉行之者明年釜量入為臺諌以至樞宻卒不能自行其說云張釜請申禁偽學釜新除度支郎中淮西緫領進言邇者偽學盛行頼陛下聖明罷斥姦回登用賢哲天下皆洗心滌慮不敢復為前日之習願明詔在位之臣上下一心堅守勿變毋使偽言偽行乘間以壊既定之規模乃除左司郎中中書舍人汪義端引唐李林甫故事以偽學之黨皆名士欲根株斷除之一時號為君子無不斥逐太皇太后聞而非之遂有毋及舊事之詔甲戌御筆臺諫給舍論奏毋及舊事務在平正以副救偏建中之意御筆既出韓侂胄及其黨皆怒時劉徳秀為諌長與察官張伯垓等案與伯垓同上疏者為姚愈上疏言繼自今舊姦宿惡或滋長不悛臣等不言則誤陛下之進用言之則礙今日之御劄若俟其敗壊國事復如前日而後進言則徒有噬臍之悔三者皆無一而可望下此章播吿中外令舊姦知朝廷紀綱尚在不至放肆從之尋詔改不必更及舊事為不必専及舊事自是侂胄與其黨攻治之志愈急矣御筆之出也黄黼為殿中侍御史獨上言治道在黜其首惡而任其賢使才者不失其職而不才者無所憾故仁宗嘗曰朕不欲留人過失於心此皇極之道也至於前者有合論列事體明證有關國家利害者臣不敢不以正對疏奏黼竟徙它官未幾罷去而姚愈遷殿中侍御史丙子皇子埈生八月薨追封兖王諡曰冲惠秋七月丙戌降徳音以皇子生故也降諸路死罪囚釋杖以下流人吕祖儉等量移内郡戊子考核守臣便民五事自紹興初令諸道守臣到官半年陳便民五事已又命給舍看詳其可行者以聞其後寖廢淳熈末復申行之至是劉徳秀為諫長復請専付檢正都司考覈取其近情合理者以聞三年四月丙辰復令給舍看詳以白執政而檢正左右司檢詳擬行之然今諸路守臣所上其言無甚可行特姑存故事而已戊戌韓侂胄加恩以誕皇子恩加開府儀同三司萬夀觀使八月丙辰胡紘請住進擬偽黨紘為太常少卿建言比年偽學猖獗圖為不軌近元惡殞命羣邪屏迹而或者倡為調停之議取前日偽學之姦黨次第用之望宣諭宰執凡偽學之黨曾經諫臺論列者權住進擬後二日遷起居舍人九月丁亥復分利州為東西路利路自建炎置帥或在益昌或在漢中未嘗分東西也紹興十四年鄭剛中為宣撫副使時吳璘在興州楊政在興元郭浩在漢陰剛中欲令三帥一體乃奏分為東西路東路治興元西路治興州而浩兼金房開達安撫使遥制䕫路及京西三郡乾道初金州併屬東路而守臣但兼管内安撫司元年夏璘改判興元朝廷以其遥制西路軍馬為不便乃權合東西為一路以璘為安撫使而東帥王權改知洋州璘薨不改淳熈元年璘之子挺為興州統帥李原本缺守興州㑹湯邦彦乞分利州東西及金襄廬揚為七路各置文武二帥邦彦得罪事遂寢五年復分為兩路以挺帥西路兼知興州紹熈五年挺卒以張詔代之復合為一路而詔但兼知興州不領安撫使道出興元章森為帥以興州屬郡也欲殺其禮詔知之乃言已辭免兼郡不繫銜但以都統制見森不能折卒郊迎之如戎帥之禮詔甫至軍遂領州事盖趙汝愚邱崈共議本以削吳氏之勢而論者以為關外四郡既屬興元戎司不能令緩急恐失機㑹詔遣間卒出境而知西和州王季明械繫之趙彦逾帥蜀奏罷季明至是復分為東西路後郭杲代為帥而吳曦繼之開禧用兵又以曦兼四川宣撫比曦之反凡所出偽命盡以宣撫司號令行之由是四蜀一切禀承無敢異者至安丙為制置大使乃復合為一路故知汝愚崈削武興之權其慮甚逺如彦逾所見特淺耳冬十月戊申上冊寶于慈福夀康宫辛亥冊皇后韓氏甲戌大閲十一月庚寅上寛恤詔令上詣夀康宫上太上皇帝寛恤詔令壬辰京鏜等上孝宗淳熈寛恤詔令明年四月頒降十二月庚午韓誡賜諡曰忠定誡侂胄之父神宗外孫也娶憲聖皇后女弟積官横行承宣使未嘗更歴事任侂胄既貴欲為父作諡黄唐時為考功郎官見宰相京鏜言必不能奉承因求去乃遷除樞宻院檢詳文字改命館職官一員暫權考功遂諡誡曰忠定於是博士徑除郎官又遷横榻而考功峻遷右史以致執政矣比修孝宗實録又為誡作傳甚美及侂胄誅有詔削去附傳又仆所謂教忠之碑而諡不奪也韓魏公始以兩朝定策之功徽宗朝追封魏郡王而已侂胄既貴又丐以一官推恩為真王去郡字亦許之唐福州人合選髙第既遷樞椽不數月又得江淮提㸃鑄錢而去時人以此稱之是月朱熹落職罷祠案四朝聞見録在三年二月又云蔡本作二年十月為監察御史沈繼祖所劾詔落祕閣修撰罷宫觀竄處士蔡元定編管道州明年卒于貶所時臺諫洶洶爭欲以熹為竒貨門人楊楫聞鄉曲射利者多撰造事跡以投合言者亟以書吿熹熹報曰死生禍福乆已置之度外不煩過慮然羣憸相顧乆之不敢發獨監察御史胡紘草疏將上㑹遷去不果沈繼祖者為小官時嘗採摘熹語孟之說以自售至是以追論程頥得為監察御史紘以藁授之繼祖銳於進取謂可立致富貴遂奏熹剽竊張載程頥之餘論寓以喫菜事魔之妖術以簧鼔後進張浮駕誕私立品題收召四方無行義之徒以益其黨伍相與餐麄食淡衣褒帶博或㑹徒於廣信鵝湖之寺或呈身於長沙敬簡之堂潜形匿迹如鬼如魅及不忠不孝不仁不義不公不廉等十罪乞禠職罷祠其徒蔡元定佐熹為妖乞送别州編管明年正月省劄始至熹方與諸生講論有以小報来言者熹略起視之復坐講論如初詞色更為和平翌旦諸生乃知其有指揮也後竟無告命盖掖垣不敢秉筆云時郡縣捕元定甚急元定色不為變毅然上道熹與諸所遊從百餘人送别蕭寺坐客感歎有泣下者熹微視元定不異平時因曰朋友相愛之情季通不挫之志可謂兩得之矣又曰季通之行無幾微不適意邱子服獨為之涕泣流連而不能已處事變恤窮交亦兩得其道也初元定師事熹而熹顧曰季通吾老友也凡性與天道之妙它弟子不得聞者必與元定商𣙜之嘗輯共講論之辭曰翁季録者盖引以自匹也嘗曰造化微妙惟深於理者能識之吾與季通言而未嘗厭也及其貶也恨無可與晤語嘗有帖云每念逺别不勝悵惘至於讀書窮理欲講無從又不特常人别離之思而已也平日相聚未知其為樂别後乃覺闕事可歎可歎又云每至讀書講學無可吿語無可咨叩尤覺仰徳之深也又云足疾未平血氣日衰前去光景想已不多病中塊坐又未能息心休養纔方繙動冊子便覺前人濶畧欲以吿人而無可告者又不免輙起著述之念亦是閑中一大魔障欲力去之而未能以此極思承晤之樂未知此生能復相從如往時否耳其殁也祭之云以精詣之識卓絶之才不可屈之志不可窮之辯不復可得而見盖深致其哀熹嘗論中庸已發未發之㫖以為人自嬰兒至老死雖語黙動靜之不同然大體莫非已發元定不以為是獨引程氏說以為敬而無失便是喜怒哀樂未發謂之中後十年熹再與元定辨論始悟其說而悉反之由是益竒元定每諸生請疑必令先質之元定而後為之折衷同門寡二以故小人深嫉之故是時有朱熹唱偽學蔡元定實羽翼之之奏也門人董銖曰偽學之說盖掇拾陳賈鄭丙之緒餘始猶未敢誦言姓名是猶有羞惡之心也至是沈繼祖之章無所忌憚則幾于無是非之心矣然先生之學之行卓然在世果何傷於日月乎
