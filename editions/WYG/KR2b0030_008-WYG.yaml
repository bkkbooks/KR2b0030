body:
  text: 兩朝綱目備要卷八寧宗嘉泰三年癸亥春正月庚辰謝深甫罷壬午置湖南谿洞總首戊子龍州蕃部冦邊掠大崖舖二月庚申夜䧟濁水寨執知寨范浩屠其家蓋浩首罪土豪絶其博易故也興州帥吳曦命王鉞李好義討之七月鉞命好義等以選士二百人深入己卯晩渡大魚河庚辰旦蕃人望見官軍即走入箐官軍追之斬八級蕃人走險官軍不能進乃還焚其部帳蕃人怒復糾合以追官軍凡三十餘里日晩好義等僅得濟河翌日辛巳還至濁水寨壬辰蕃人約降制置司不敢决八月丙辰以其事申樞宻院大畧謂不即受降恐失事機誘而縳之又傷大信未報制置司恐蕃人再入九月戊辰以便宜檄都統司納降仍再申宻院大畧謂若更遲延恐蕃部生疑兵連禍結亦未得㫖甲午張巗罷丙申陳自強兼參知政事丁酉雷戊戌幸太學武學謁大成殿御化原堂命國子祭酒李寅仲講尚書周官篇遂幸武學謁武成殿監學官進秩一等諸生推恩賜帛有差袁說友參知政事參知政事自乾徳己未止除二員或一員而已是春謝深甫初免相許及之為參知政事既命陳自強以樞長兼權俄又除說友盖三員也時朝廷未置相故自強以員外兼此亦國朝所未有嘉定初又命雷孝友婁機樓鑰亦三員遂為故事傅伯夀簽書樞宻院事伯夀以老病不能拜辭不拜請外除集英殿修撰知䕫州二月乙巳册皇后楊氏費士寅簽書樞宻院事乙丑再竄王徳謙於新州是歲八月死於貶所三月丙子詔相度鐵錢利害無為軍李運言兩淮鐵錢交子利害詔户部相度以聞尋以有司言宜置官講求㑹子鐵錢利害詔户部併行相度四月丙午出封椿庫兩淮交子一百萬命轉運司収民間鐵錢乆雨丁丑詔大理三衙臨安府决繫囚乙酉幸聚景園夏四月己亥朔日有食之壬寅福州言瑞麥生乙卯徽宗孝宗玉牒光宗實錄成按本紀當為徽宗玉牒孝宗光宗實錄此文有悞陳自強等上進五月戊寅陳自強為右丞相自強既拜首除蘓師旦定江軍承宣使時又有周筠者本韓侂胄家蒼頭亦冐以恭淑皇后姨夫補官為浙西兵馬都監權任在師旦之亞又有李士謹者初為侂胄直省官亦用事侂胄敗師旦處斬筠士謹俱流嶺南李心傳曰在京職事官俸甚薄宰相不滿四百千下至寺監官纔五十餘干都城物貴不足於用嵗時節序浙路諸州皆饋酒率鬻之以資費獨宰執臺諫不敢以壺酒饋由是為臺諫者極貧淳熙中王牧為監察御史月俸六十緡其兄將遣女議月以十緡助之迄不能也外方牧伯一或隂致饋聞於當路則公議騰沸斥罰隨之矣如䕫帥銀黒白鋌淮東總領金注椀之類是也自侂胄用事賄賂盛行四方饋遺公至宰執臺諫之門人亦不以為訝其所用如陳自強之徒尤貪鄙書題無并字者輙不開是時饋酒於宰執臺諫之門率以千計乆以惡其鄭重則又折以錢故一為臺諫者皆致富有某路某司吏余舊使令也一日枉道來拜自言南士持節者俾之入都問之曰某官令押信匣大小五百七十枚求茶馬耳余甚駭之且不信居數月果報𣙜牧之命某年某月也許及之知樞宻院事兼參知政事不雨庚辰詔大理三衙臨安府釋杖以下囚六月己酉降大理三衙臨安府囚罪一等釋杖以下秋七月辛未造戰艦出封樁庫錢十萬緡命殿前司造壬午罷三監鑄錢同安漢陽蘄春白虹貫日癸未禁抑納逃賦降㫖江浙州縣乙未上光宗皇帝徽號循道憲仁明功茂徳温文順武聖哲慈孝皇帝十一月壬申上册寳於太廟八月戊申置四川提舉茶馬二員分治茶馬事吳總者武順之第四子初補京秩乾道中自都官郎易𢃄御器械年三十餘為池州都統制每妄殺人孝宗知之復命易文淳熙中以敷文閣待制提舉茶馬坐黎州變故降為集英殿修撰奉祠乆之復命出守稍遷寳文閣待制知瀘州慶元嘉泰之間總食祠祿居漢中而從子曦為殿副二人不相能總每丐任使曦數隂沮之總無以為䇿時胡大成為茶馬盡核諸場額外之茶且損蕃商中馬之直舊例買馬必四尺四寸以上及大成損馬直而馬至益希所市四尺一寸而已其至軍中斃者復衆朝廷苦之總一日與殿司取馬統制官彭輅謀納賂於蘓師旦且説之曰馬政積弊如此非西人諳其利病者不能更張莫若復委吳次對師旦然之命下後省駁之乃詔總與郡朝論方難其選一日輅與師旦語因及之輅自言世西人今西蕃多善馬特茗司損其直故以駑駘入市誠以善價招之當可得師旦喜曰無踰公者矣翌日召輅至韓府侂胄見之立語少頃又翌日遂有分司之命大畧以為茶馬司所發綱馬全不及格積弊極深宜有更革自今差文武官各一員令二省樞宻院條具來上嘉泰二年八月丁未也後四日遂命直秘閣知瀘州王大過與輅分領之大過置司成都輅置司興元府方總之受堂帖也即日以秦司屬官印視事於其宅又以迓吏稍緩私遣御前軍二人至成都府捕胥長以來自紹熙末茶使視事皆申知制司總以身為從官用故事不復闗白制使謝源明怒㑹得邸吏罷報即追還迓人械所遣二卒還軍中總大沮然猶得知潼川府云時義烈廟初成總身至武興以謁廟為名與曦樂飲結驩而去輅至司所市馬終不及格則以深蕃道梗難猝致為詞焉輅果子後為殿巗十二月丙辰命四川提舉茶馬通治茶馬事甲子詔比較瘐死囚詔刑部嵗終比較其數而殿最之九月庚午袁說友罷壬申立莊文太子後孝宗之長子鄧王愭也立為皇太子而薨無嗣至是立宗子希璂為之後按本紀作希􅀈更名搢授右千牛衛大將軍明年二月丁酉置小學教授癸酉禁毁錢改鑄命坑冶鐵冶司毋得毁私錢為銅冬十月庚子吕祖泰任便居住癸卯費士寅參知政事張孝伯同知樞宻院事丙午命閲民兵命兩淮諸州以仲冬教閲民兵萬弩手丁未大風戊申龍州蕃部降李蒙大者率其徒二百至濁水源榖子隴下守臣楊熹委江油令馬崇謙與王鉞徃受其降蕃人獻六牛為禮庚戌制置司被㫖以蒙大元係漢人竄入蕃界結誘侵犯罪在不赦即與文州蕃部不同甲寅制置司復奏蕃人服罪投降儻於此時沮郤恐獸窮必噬反生後患明年正月壬申得㫖許之制置司先奏蕃人開展封堠約三百里及獻水銀朱砂窟一處既遂言此皆蕃人養生之具恐難遽受又慮别生希覬引惹邊釁猝未寧息乞賜給還蕃部亦許之於是犒蕃人錢引七百銀椀三將士皆受賞而歸留大軍二百五十人屯濁水寨通舊為四百五十又乞籍定寨夫官給軍器五日一閲及於乾坡漁溪濁水三寨之側築小堡三十徙並邊民户口二百四十徃居之乾坡寨在平地中無險阨王鉞又請於其前築水確山寨以為戌守之所朝廷皆行之自是蕃部稍帖息矣十一月甲戌日南至祀天地於圜丘按本紀祀天地在乙亥是嵗詔南郊加祀感生帝太子庶星宋星赦天下癸未大風己丑更定選人改官法言者又請選人曽歴監當獄官令各三考餘官三考無贓私罪犯者不拘有無京削許就磨勘吏部引見以八員四川換給以三員為額於是東南應格者木昇等四人川路應格者蹇似之等二人而已明年言者論其太濫謂使其律己奉公究心職業則歴官十二考所事監司郡守何啻四五十人豈無一為之動心者姑以今嵗之應斯格者觀之大畧可見詔吏部長貳詳議時吏部又得應格者俞圭一員黄由適兼尚書乃奏乞歴上二三任通成十二考止用常員舉主二員若係舉主關陞人更减一員開禧初言者又指其僥倖乞令侍從兩省臺諫官集議議者乃乞堅守孝宗立定八十員之額其嘉泰以後積考减員等指揮更不施行庚寅復置福田居養院命諸路提舉常平司主之十二月辛酉詔戒將帥掊克是冬金國盗起懼朝廷乗其隙沿邊聚糧増戍且禁襄陽府𣙜場朝廷聞其事即起參政張巗帥淮東樞宻程松帥淮西盖以巗揚州人松池州人欲使䕶鄉井也又起侍郎邱崈守四明以防海道起大卿辛棄疾帥浙東時武帥鄭挺在襄陽邊釁開懼不能任力求去乃召還行在既又轉一官知婺州於是文臣無肯行者遂以李奕為荆鄂副都統兼知襄陽奕與其兄弟爽言世將家皆為戎帥時松及䘮未免力辭改命廣帥薛叔似而叔似不行留提舉佑神觀遂命侍郎宇文紹節代之辟置參機皆非常制又徙棄疾以次對守京口起資政趙彦逾守四明出知院許及之守金陵及之不欲行乃命崈以直學士代典留鑰其開邊釁盖自此始是嵗御筆嚴監司互送之禁朝廷雖有指揮然逺方自如明年夏馬使彭輅至成都制使謝源明茶使趙善宣留連踰兩月自入境迎迓以至折爼贈行以楮幣錦綵書籍藥物計之所得㡬萬緡而謝趙所得亦稱也盖諸路互送惟建康成都最厚諸司每㑹集一分計三百八十千成都三司互送則一飲之費計三千四百餘緡建康六司乃倍之而鄰路監帥司尚不與是嵗六月趙漕自成都運除四川茶馬時趙攝事已乆朝廷本以省將迎之費茶漕並置司成都城中而送還迎迓公用水脚之費各司為數千萬緡舊無所謂壓境錢者謝源明始創之趙元不離城中而亦受壓境錢兹又可笑也建康所謂六司者帥漕總賦戎騎二司帥而主管行宫大内鑰匙宦者與焉每嵗時留守按行殿中宦者輙置酒自居主席而坐留守於賔位陳正獻公為留守斥去之其後范致能還復其舊命監司郡守申交割數以見管實數申尚書省是秋王勲以潼川府路轉運判官移本路安撫知瀘州而張演代勲為小漕勲晉原人與演居同郡先是演之子紹曽監利州贍軍酒庫演屡以舉削懇於勲不許㑹勲為其子什邡丞駒干西憲傅伯成舉削伯成荅云此削總卿以嘱利州張監庫業既許之若能舉張則可奉薦勲喜即命吏書紹曽奏牘且急飛書報演已而知伯成所属乃監利州大軍庫張燦非紹曽也遂亟更奏牘演以為狎已大憾之及受命不竢迓者徑行勲亦遽歸遇於近郊相見寒暄而已勲將去以漕司所積羡錢十萬緡入備邊庫言於朝演言自備邊外漕司可支者纔為錢十四萬餘緡而欠川廣兩總司錢甚夥臺諫不直勲四年正月壬辰有㫖成都轉運判官趙善宣究實趙言前知遂寧府於漕司為所部有嫌勲聞之自言所欠兩總司綱運自有列郡未撥窠名非漕司錢也户部以勲為是符演管催撥欠而已趙漕章未報六月勲以病卒於瀘既而趙漕移西路李揆代之按騐以勲為直制帥程松上其事演時已罷又坐削二官焉初以諸司官理通判有㫖諸司属官係京官考理當通判時張孝伯之弟孝仲為京西安撫司幹辦公事即除知成州明年擢提㸃利州路刑獄未㡬虞雍公之孫易簡亦自福建漕幕擢守大寧盖用此例嘉泰四年甲子春正月乙亥大風庚辰貶内侍甘昺以罪貶信州居住昺昇之弟也上過徳夀宫昺與有力焉頗貴寵癸未日中有黑子辛卯雷壬辰雨雹西浮洞逃軍為亂破文昌縣廣西經畧司以為言遣兵討平之是月盤量關上積糧關上積糧八百餘萬斛然陳陳相因庾吏率全其扃鑰以相授至可食者則無㡬嘉泰甲子正月有言北境増戍積糧者朝廷下制置司遣官盤量且令除其腐敗折閲之數所有累界官吏失㸃檢之罪並特免時陳曄總賦遂降度牒貳萬五千道下總所収糴補填焉辛棄疾賛開邊棄疾入見陳用兵之利乞付之元老大臣韓侂胄大喜遂决意開邊二月壬子蠲臨安府逋負酒錢六萬緡己未立試刑法避親法庚辰夜有赤氣亘天三月丁卯臨安府大火其夜二更後行在糧料院後八條巷内右丞相府吏劉慶家失火自太廟南墻外通衢延燒糧料院及右丞相府尚書省樞宻院制敕院檢正房左右司諫院尚書六部惟存門下後省及工部侍郎㕔次燒萬松嶺清平山仁王寺石佛菴樞宻院親兵營修内司㳂燒至學士院内酒庫及内中宫門廊屋殿歩司諸軍官兵連夜救撲火勢未已有㫖宣殿歩司諸軍分撥入内併力救撲諸班直禁衛等内百司百官守局時宰臣執政太師韓侂胄皆在太廟指揮歩帥李郁用心竭力救撲不得燒至太廟侂胄以重賞許諸軍夜漏下三鼔遂撤去太廟廊屋祖宗神主册寳法物皆移寓夀慈宫仍開候潮門宣入殿歩司城外軍兵救撲是夕百官之家皆徃都亭驛避火火及和寧門外焚衩子門戊辰旦和寧門鴟吻上火忽起殿前司中軍第二將搭材隊白身効用張隆用飛梯登門騰上屋脊持短斧撃鴟吻碎之煙遂熄詔以隆為承信郎殿前司凖備將賜金十兩紡絲二疋侂胄又賜隆金七兩時火西至三茅觀大門南至御街北至太廟巷上及七寳山一𢃄所焚居民甚衆至未刻乃㓕有㫖抄劄被火及毁屋之家人賜錢一千米四斗小兒半之許從便暫往城内外寺院居止三省樞宻院及陳丞相家皆寓都亭驛六部寓傳法院己巳御前喝賜諸軍犒賞執政以下欲車駕過夀慈宫不果出是日太皇太后生辰免過宫上夀詔商販竹木令兩浙轉運司免稅兩月已刻用禁衛圍子送祖宗神主再還太廟庚午御筆回祿為災専戒不徳可避正殿令學士院降詔罪己癸酉詔曰朕焦勞庶務宵旰十年臨民懐朽索之危履位凛堅氷之懼皇圖増壮甫還昔日之觀回祿降灾復值季春之月属乖撲㓕驟致延燒亶荷眷於三靈迄鞏安於九廟奈民廬之焚燬暨宫寺之蔓延厥咎何繇繄予不徳退省菲凉之質敢忘戰慄之思書焚室以寛征用廣及民之澤務側身而修行聿嚴避殿之規尚期中外之同寅勉輔眇冲之不逮庶銷譴異式迓休祥於是特進右丞相祁國公陳自強引罪避位䟽三上甲戍御筆回祿為災延及宫寺卿當輔朕講求闕政以答天意卿欲丐去朕何頼焉老成重徳中外具瞻仰體至懐毋復有請自強乃率百官拜表請上御正殿曰沴雖作於鬰攸咎實因於黎獻譆譆出出本微豫告之妖業業兢兢自秉謙光之徳赦百辟瘝官之罪下十行責已之書萬家賜予之有差民無胥怨九廟尊安之如故神罔時恫顧黼座之猶遷在蒼生其何頼願仍舊貫出視外朝詔不許又上表曰灾降於天應從其類燬西都之白鶴盖因貴近之逰爇北寺之黄門乃示極隂之變上帝警具寮之失聖君非逸徳之招與其側席以焦勞孰若宅尊而廢置猶不許自強等三上表曰惟我宋之開基應心星而尚赤閼伯配炎精之祀既主於辰商人閲舊釁之生毎由於火在數難逃於已定弭灾惟取於交修就令入奏於延英曷若㑹朝於北禁許之先是二月庚申夜有赤氣亘於東北隅太史局言應在魯徐分野至是火乃作於都城丙子侍御史陸峻言鬰攸之變起於民居三省六部所存無㡬廹及太廟侵及宫城都民驚駭宗祏震動此豈盛時所當有哉以人事觀之四方刑獄動經年嵗奏案不下京都貪墨之吏雖以罪去不傷毫毛恩賞貴乎平今則惟勢與力是専刑法貴乎當今則惟勢與力是命將帥行一切之政守令求利靡有或遺此皆不當乎天心者望陛下與二三大臣枚舉而更圖之時知臨安府王兩浙轉運副使陳亦待罪詔放罪而歩軍司統制統領官何汝霖等七人以救火之勞各進官一等吴睍等十八人各減二年磨勘已而府尹言劉慶是日他出其女遺火而鄰人張三潘乙不即救䕶詔慶女杖脊鄰州編管慶及妻王與二鄰人皆杖一百而慶與王以老聼贖云嘉泰失火按所紀與上臨安大火之事為一條而復冠以嘉泰失火四字於文為駁盖亦雜引他書所成耳陳自强為右揆火及其府主帑吏請筦鑰於自强自强聞變口呿而不能言由是囊槖無孑遺者自强移居都亭驛平旦百僚徃省之自强大言曰郭殿前可謂號令不肅衆謂救火無策未敢對自强徐言曰昨從渠假五十兵搬擔仗遂失一金注椀衆愕而退事定韓侂胄謂羣公曰丞相生事一委於火可憐須少助之於是侂胄首遺萬緡諸公賂遺踵至不數月得六十萬緡遂倍所失之數火之始作也或為之賦曰公議不明臺遂焚於御史斯文未䘮省僅保於秘書其末句云嗚呼自生民以來未嘗見此一火壬申禁質賣軍器辛巳立添差及祠廟限員夏四月甲午朔命内外諸軍詳度純隊法甲辰許及之罷賑恤江西州縣水旱乙巳費士寅兼知樞宻院事張孝伯參知政事錢象祖賜出身同知樞宻院事丙辰詔革選舉弊詔曰朕惟選舉之法所以公天下而權要之臣狥私撓禁請属旁午奔競日滋寒畯見遺乃者訓勅屡申曽不知畏今當必行以儆中外其有輙遣私書及受私書不以聞者重寘於理毋貸殿前司兵鬨軍士與廵檢司卒鬨擊破民家詔捕之主帥以下論罰有差五月乙亥詔舉將材詔諸軍主帥各舉部内三人不如所舉者坐之追封岳飛為鄂王此寓開邊之意六月丙申置諸軍帳前雄効以軍官子孫補之壬子詔㳂江四川軍帥簡練軍實上其數於樞宻院丁巳増廬州強勇軍為千人十一月庚申令諸州置招軍簿明年三月以淮西安撫司所招軍為強勇軍是日韓侂胄郤生日賀儀先是慶元三年侂胄生辰宰執侍從至四方牧守皆上禮為夀直寳文閣四川茶馬獻紅錦壁衣承塵地衣之属修廣髙下皆與中堂等盖宻量其度而預為之也吏部尚書獻紅牙果桌十位衆已駭之權工部尚書獻真珠搭擋十副光耀奪目盖大長公主奩中故物司農卿兼知臨安府最後至出小合曰寒書生無以為獻有少果核姑侑一觴啟之乃粟金蒲桃小架上有大北珠百枚衆皆慙沮至是韓之書表司凖本使太師郡王鈞㫖十月五日生日所有諸路監司帥臣州郡賀禮書信依年例並不收受如是送到定行退回仰進奏官疾速徧行關報議者謂大臣却四方之饋未有自奏邸行下諸路如此者盖僣也開禧三年侂胄生辰大臣以下皆排列所獻於天慶觀之廡下都人競徃觀之其首列有紅榜大書云門生特進右丞相兼樞宻院使秦國公陳自強恭遇恩主太師平章郡王降誕之辰仰祝鈞筭壬寅集議裁抑濫賞詔侍從臺諌兩省官集議八月癸丑詔自今以恩賞進秩嵗毋過二官壬子核諸州樁積錢米詔諸路監司覈實上其數於尚書省秋七月不雨甲子詔大理三衙臨安府兩浙及諸路决繫囚戊辰禱於天地宗廟社稷己巳命諸路提刑從宜斷疑獄蠲内外諸軍所負營運息錢辛未蠲兩浙闕雨州縣逋租戊子修保伍法命諸路提刑提舉同措置開禧元年七月詔諸路提刑提舉司措置保甲八月己亥皇帝玉牒成陳自強等上進甲辰賜范祖禹諡曰正獻癸丑蠲紹興府民身丁詔攅宫所在民蠲身丁錢絹綿鹽丙辰除靜江府昭州折布錢戊午張孝伯罷九月丁卯更定捕盗改官法有司以為請詔侍從集議明年正月重定選人捕盗賞為二等冬十月庚子張巗參知政事十一月己未朔詔便宜發廪兩淮荆襄諸州遇凶荒奏請不及者聴先發廪即日以聞壬申白氣亘天十二月癸巳詔宰執復兼國用事詔曰朕仰惟祖宗委任三司専總邦計故能周知源委出入有常今之財賦各歸户部而事權散紊不復相通有司出納莫可稽考吏或苛取重困吾民朕嘗有意變通比覧臣僚奏䟽因思區畫其遵孝宗皇帝典故宰相兼國用使參知政事同知國用仍於侍從卿監中擇才識通練奉公愛民者二人為之属俾顓其職參考内外財賦所入經費所出㑹計而總覈之庶㡬名實不欺用度有紀焉遂以陳自強兼國用使費士寅張巗同知國用事明年二月癸丑詔國用司立考覈財賦之法於諸路轉運司開禧元年七月韓侂胄兼國用使己亥詔改明年元壬子禁州縣挾私籍没民産按本紀在壬寅甲辰再蠲臨安身丁錢三年是嵗有㫖六部架閣非闕官勿除六部架閣官者崇寧間始置迄宣和再置再省紹興三年立六部架閣庫十五年復置官四人舊制成案留部二年然後畀而藏之又八年則委之金耀門文書庫今金耀無復曩司則悉藏之架閣矣主管官號掌故擇選人有時望者為之例為編删學官之選近嵗滋益輕至有待次累年者朝廷患之至是有㫖非闕官不除有選人家閩中其父與陳自強有舊至是入都見自強求為掌故自強對衆厲聲曰外間豈不知近者見闕方除此何可得衆為之踧踖後旬日竟除掌故或疑其由他徑而得者問之徐曰丞相耳或曰丞相前日之語甚峻何以回造化耶其人即座側取一幅書示之乃自強答書也略曰珍貺鼎至晃耀老目或問珍貺之名曰書生安得珍貺比所請不遂適從王家肆中見粟金臺盞十具重百星以四千緡得而獻之耳聞者歎息而去嘉定八年七月又置三省樞宻院架閣官總所拘監司算綱運嘉泰四年刑部員外郎劉述提舉江東常平公事坐事免去而湖廣總領吳旰申省云述欠本所綱運甚多請留之打算述舟行已到鄂渚朝㫖下旰移檄追還此亦頃所未有述成都人淳熙七年初改京秩以試中大法趙丞相用為評事蜀人鄙之鄉㑹斥不與未兩月黜知雲安縣通判施州恭州崇慶府慶元末知廣安軍用李鋭事迎合袁說友以此得召說友罷述亦坐黜議者頗指銳事為言云方鋭之敗也先籍其家得法書名畫珍寳之物甚衆其後制司始遣官盡拘其所有吏因為姦隠匿復不少計其貲猶直二百萬緡焉開禧元年乙丑春正月癸酉初置澉浦水軍丁丑詔以𨽻殿前司壬午雨霾賜蘓洵諡曰文二月丙午蠲臨安酒稅錢積欠十八萬緡有竒詔蠲之乙卯雪竄翁㸃坐與察官交章也以朝請大夫江南東路提㸃刑獄公事追三官送新州安置先是楊輔自潼川召歸至䕫門引疾不進上奏乞祠且移書用事者力言兵未可動拂其意乃進職二等為顯謨閣直學士奉祠去年冬十月乙未也於是監察御史徐柟劾輔實不病復奪所進職罷祠公論大不予時劉起晦除秘書省正字甫數月柟又劾起晦頃宰貴溪曲法沽譽有罷相位而過邑者起晦率士人百餘軰襴幞逺迓且為不遜語此十目所知也柟所云指趙忠定也起晦繇是罷去時十一月丙戌也㸃與柟頗厚使人諷之柟不樂十二月壬寅有㫖召㸃赴行在柟遽劾㸃貪黷嗜進民詞則捲官劵數千而獲判臺餽則較肉餅二事而責償言多類此䟽入遂寢其命今年正月己卯也㸃聞之上章自辨首論察官為内臺刑獄之官為外臺察官論事不得其平外臺安得冺没而不與之直次論柟私託不行所以貽怒者數事其末乃云侍郎楊輔秘書劉起晦二人者皆今之望人也方藉以為國家元氣楊輔召來已到䕫府值漲未能出峽起晦與徐柟向來同時作縣相鄰職事相關一旦報怨併及二人皆論罷之中外無不失望臣恃其與柟有平昔之舊遂宛轉以言勸之由是大不相樂韓侂胄見其章大怒陳自強退而批㫖云臺諫乃耳目之寄朝廷紀綱之地翁㸃輙於奏牘妄肆詆訶以泄私忿遂有是責㸃尋卒於貶所人皆傷之二人皆莆田人㸃乾道二年進士乙科起晦復之子淳熈五年進士乙科三月庚申太白晝見辛未申嚴舉子令申嚴生子棄殺之禁仍令諸路主管常平官月給錢米収養之癸未費士寅罷士寅既驟貴及為樞長韓侂胄將用兵士寅心知其難而不敢顯諫㑹興元帥趙介死侂胄欲以士寅鎮興元為宣威之漸以微詞諷之所答不酬侂胄怒先是士寅有䟽属曰費某家貧逺客士寅館之府第其後稍為姦利士寅殊不知㑹蜀人有行錢三百千從堂中干軍壘者命既出費某盡有之同館者分金而不得大喧李大異時在鳯池嘗偕數從官入謁學館與賔次近具聞其言至是大異持此劾之併及餘事侂胄宻示其章士寅乃求去䟽入除資政殿學士知興元府於是眉人朱不棄監三省樞宻院激賞庫為鄧友龍所厚士寅􅋈舟北關外急招之謂曰士寅此出未知何以得罪於師王欲干侍御一詢之庶知過而改耳又慮大諫攻擊未已此職名未可保全望侍御留意不棄去為友龍言之友龍大笑曰知樞宻院事尚失之職名何足較然李伯珍再入文字必與友龍商𣙜可保無他即移簡侂胄言之侂胄答曰亦無它苐前日嘗靣諭令徃興元乃不承當耳明日不棄以告士寅士寅悵然曰此士寅愚暗之罪也前此師王苐言漢中要地須一重臣鎮撫若士寅請徃即豈敢自謂重臣耶幸多謝侍御及師王侂胄聞之意亦觧及兵事起程松為宣撫使乃徙士寅潼川踰年潼川大火因請祠去加大學士俄起知瀘州諫官論其宿負罷之然其自為右史至執政適當偽學之旤徃徃因事救觧侂胄頗從之當曦變時士寅適家居不與其事盖始終全福者夏四月戊子朔錢象祖參知政事兼同知樞宻院事劉徳秀簽書樞宻院事辛卯皇甫斌兼知襄陽府以代李奕也邊事既起初命奕代鄭挺守襄陽至是奕自江陵副都統改鎮江都統而以斌為江陵副都統兼知襄陽府辛丑日中有黑子甲寅流武學生華岳坐上書諫用兵送建寧府編管乙卯大風五月己巳親試舉人賜禮部奏名進士毛自知等四百三十有三人及第出身有差自知對䇿首論宜乗機以定中原因擢為魁嘉定改元三月自知降充殿試第五甲以首論用兵也復淳熙薦舉改官法本末詳見慶元六年十月嘉定三年十一月李心傳曰薦舉改官法未嘗不善也患在乎士大夫以私意汩之耳開禧末李仲衍為益部刑獄使者有舊舉將之子以職司狀為請仲衍厚待之將行語之曰興宗昔以職事受知先公今不敢忘然舉賢王事也非報恩之物有貴人移書以子壻為託者仲衍報之曰令壻奉公守職雖㣲命戒亦將舉之如有不然有所未可嘉定初余弟仲貫甫自著作補郡將行靣白諸公貴人乞勿薦士諸公皆從之真景元繼除江東副漕朝辭入見又以劄子靣論之余謂士大夫人人如仲衍景元則公道少伸而奔競之風庶㡬乎息矣若夫通博易納賕謝又罪之大者故不復論乙亥立皇子詔曰朕惟親親人道之始而尊祖睦族禮所以嚴宗廟重社稷也二帝三王之隆靡不由之威武軍節度使衛國公曮藝祖皇帝十世孫也自㓜鞠於宫中端重聦哲凛如成人日者從㳺資善博親義理之訓益茂温文之徳望實之羙中外聳聞朕承先帝洪業夙夜祗畏懼弗克任歴日彌長而國本未立謂天下何若稽嘉祐之宏模爰暨紹興之令典有司攷禮正名朕將遵而行之其以曮為皇子進封榮王是月金人來責渝盟以邊民侵掠及㳂邊増戍為辭六月罷廣東稅塲八十一所戊戍命教閲禁軍令諸路安撫司任責庚子以程松制置四川辛丑鄭挺罷挺時為淮東安撫坐擅納北人牛真及刼漣水軍事敗奪二官罷壬寅天鳴有聲復同安漢陽蘄春三監乙巳吏部七司法成陳自強等上新修淳熈以後七司法明年三月頒行秋七月庚申韓侂胄平章軍國事六月壬子宰相陳自強及侍御史鄧友龍等請用本朝故事以侂胄平章軍國事故有是命㝷詔侂胄立班丞相上三日一朝赴都堂治事國朝舊相特命平决軍國事者凢四人天禧初王文正公旦以首相告老拜太尉兼侍中五日一朝遇軍國大事不以時入參决公懇辭不拜慶歴初吕文靖公夷簡亦以首相求罷拜司空平章軍國重事許公卒辭之元祐初文忠烈公彦博自太師致仕除平章軍國重事未㡬吕正獻公公著以右揆求去亦除司空同平章軍國事潞公五日一朝申公兩日一朝非朝日不至都堂盖祖宗所以優待元勲重徳之意非他相比也王吕二公所平章重事之日不可得而考潞公所謂重事則大典禮大刑政及進退侍從管軍三京尹三路帥臣已上乃與聞之比申公去重字則政事無所不關苐省其常程細務而已及侂胄將拜平章儀曹蕭景伯討論典禮乃請三日一朝因至都堂議事大率皆用申公故事而損益焉其後邊事起又命一日一朝尚書省印亦納於其第宰相僅比參知政事不復知印矣始時禮官議廣左丞相府以為侂胄第又議仍給節度使俸侂胄引義控辭有詔褒納而止盖侂胄繫衘比申公省同字則其禮尤尊比潞公省重字則其所與者廣此當時討論之本意丙辰蘓師旦建節除安逺軍節度使領閣門事丁卯詔舉將帥邊守侍從兩省臺諫在外待制學士以上及内外諸軍主帥各舉將帥邊守一二人戊辰贈趙汝愚官為少保是月不雨癸未詔大理三衙臨安府兩浙州縣及諸路决繫囚八月丙戌蠲兩浙闕雨州縣贓賞錢置資善堂講臣直講說書各一員直講以命鄒應龍皇子之未王也應龍以著作郎兼小學教授故就用之說書以命張聲道時太子初就傅諫議李大異建請增置講官用嘉祐故事以説書為名從之然嘉祐間英宗止除防禦使故宫僚以皇子位伴讀說書為稱自紹興初已置資善堂賛讀其後王府又置直講官属之名甚備至是乃沿襲故名盖大異失於討論也八月癸巳雨乙巳以郭倪守揚州自殿前副都指揮使為鎮江都統兼知揚州是月封贈劉光世宇文虚中光世鄜王虚中少保開禧用兵韓侂胄欲風厲諸將因光世之孫伯震有請遂封王既又封岳飛為鄂王按飛封鄂王已見上年五月據此文又似在封光世之後必有一悞中興諸將至是畢王矣閏八月戊午編斷例自隆興以來二年八月書成上之名開禧刑名斷例癸酉罷遣應制科何致自李仲信後制科無合格者又三十餘年有何致者字子一永康青城人祖耆仲字子固淳熙初嘗為部使者知名士也致少有才為郡守陳纉館客纉入為司農丞薦致於劉徳秀徳秀亦喜之時李壁為禮部侍郎劉師文為工部侍郎徳秀率二人以制科薦於朝有㫖召試㑹同薦者吳郡滕􅍲東陽杜福遭憂不赴詔須服闋並召致躁急欲先得試屡懇於壁壁以為狂笑不顧致更禱纉纉即以徳秀意為蘓師旦言之韓侂胄不得已於徳秀為降内批如所請後二日權中書舍人易紱繳還致大憾乃以劄子白廟堂謂言詞多取憎疾必觸忤報罷乞寢已降召試指揮且謗紱不已時鄧友龍方得侍御史俄而紱除右司諫友龍先為修注以嘗論謝深甫二子出身紱亦恨致因及之友龍曰司諫始入言路而亟讎一布衣何示人以不廣不若更論二謝如致事友龍得論之明日相繼求對紱論二謝駮放出身友龍論致進卷詆誣伊尹罷歸致亦登侂胄之門友龍無以為罪故摘致進論中言伊尹始負堯舜之道而終為天下開陵犯之端之語以此激之時人謂兩臺諫共彈三秀才盖指此也辛未嵗致以吳獵薦再召正言鄭景紹論之乃勒令歸鄉増修所學焉戊寅欽宗玉牒成韓侂胄等上進併憲聖慈烈皇后聖徳事迹九月丁亥劉徳秀罷庚子詔贓吏追還所受贓如舊法庚戌大風冬十月甲子汀州獻瑞麥圖按本紀作江州時嵗旱守臣陳鑄更圖瑞麥以獻詔奪一官庚午復置和州馬監十一月乙未申嚴告訐之禁十二月癸丑朔修孝宗光宗御集癸酉詔永免二浙身丁前三日詔兩淮京西監司帥守講行寛䘏之政詔曰朕惟方今大計在寛民力二浙承平嵗乆生齒日繁租賦之餘重以身丁之斂吏弗加省民輸益艱中夜以思靡遑安處爰敷曠澤庸示至懐兩浙路身丁錢絹自開禧二年以後其永除之明年正月蠲兩浙路身丁紬綿李心傳曰大抵丁錢多偽國所剏余嘗謂唐之庸錢楊炎已均入二稅而後世差役復不免焉是力役之征既取其二也本朝王安石令民輸錢以免役而紹興以後所謂户長保正雇錢復不給焉是取其三也合丁錢而論之力役之征盖取四矣而一有邊事則免夫之令又不得免焉是取其五也孟子曰有布􅈁之征有力役之征用其一緩其二用其二而民有莩用其三而父子離今布縷之征有折稅有和預買川路有激賞而東南有丁絹是布縷之征三也糓粟之征有税米有義倉有和糴川路謂之勸糴而斗靣加耗之輸不與是穀粟之征亦三也通力役之征而論之盖用其十也民安得不困乎余惡夫世之俗吏不知財賦本末源委顧以趣辦為能而撥其本也故詳錄其事以待上問而出焉戊寅韓侂胄挑金使金主遣禮部尚書趙之傑來賀來年正旦韓侂胄平章軍國事欲開邊釁命鄧友龍以給事中館伴之傑入見容止倨慢持國書逡廵却立若將要上為起者閤門覺其意奪書以進之傑益不平俄賛者唱云躬身立躬字金主父嫌名也金主父顯宗名允恭之傑端立不動侂胄遽前奏請駕還内繼有㫖更以正旦朝見魏了翁時為館職所言如此伹與閤門詔相差誤乃當時諫䟽中略及之偶未詳耳朱質時為著作郎上書乞斬金使侂胄雖不從猶罷其天竺之㳺明年春北使既去友龍坐貶秩而質除諫官及嘉定再和二人踰嶠盖以是也孝宗實錄淳熙六年十一月乙亥樞宻院言盱眙軍申泗州牒金國完顔亶已追謚閔宗皇帝升祔太廟所有廟諱及同音字並合與回避詔下有司照㑹以此例之則躬字亦合與避而不避者侂胄欲以挑金也是嵗厲仲方造戰車中郎將厲仲方者為歴陽守仲方本書生嘗造戰車九牛弩未及用而罷去周虎繼之或謂虎用其戰車敗敵於清水鎮然不知其詳何如也真里賦國來貢獻瑞象賑諸州水旱江浙福建二廣諸州旱兩淮京西湖北諸州水命賑之
