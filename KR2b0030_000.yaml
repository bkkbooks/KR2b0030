body:
  text: 御題南宋兩朝綱目備要二首一韻托胄家奴抵罪宜禁軍何致似興師書載收托胄時命殿前司中軍統制夏震選兵三百防護别選兵二百守其府門夫托胄雖竊權實臣分耳有罪執而誅之不過擒治家奴其事甚易何致多煩禁旅儼如敵國乎深謀爾日出彌逺月落還如星替之除托胄之議建於史彌逺逮彌逺柄政其擅權用事専任僉壬姦惡幾與托胄無異何不鑒其覆轍也孟浪挑金固匪宜幸和可忘詰戎師西山豈啻工章句一疏興衰實繫之真德秀論和議大略云為國者當示人以難犯之意不可示人以易窺之形況彼之待我者方驕我之恃和者太重恐盟好既成志氣愈惰宴安鴆毒之禍作彼乘我不備以長其謀將無以應願以通和講好為權宜以修德行仁為實務搜討軍實申警邊防如是而國勢不張外虞不弭者未之有也德秀此疏于安危盛衰之故實能切中豈徒講學工文已哉欽定四庫全書史部二兩朝綱目備要編年類提要臣等謹案兩朝綱目備要十六卷不著撰人名氏所紀自宋光宗紹熙元年迄寧宗嘉定十七年事迹諸家書目皆不著録考元吳師道禮部集有答陳衆仲問吹劍録云續宋編年於吳曦誅數月後載李好義遇毒死又有題牟成父所作鄧平仲小傳及濟邸事略後云吳曦之誅實楊巨源結李好義之功為安丙輩媢忌掩沒近有續陳均宋編年者頗載巨源事雖能書安丙殺其參議官楊巨源而復以擅殺孫忠銑之罪歸之大抵當時歸功於丙故其事不白云云核其所引與此書所載相合疑此書在元時嘗稱為續宋編年然師道亦未嘗明言撰自何人也觀其載嘉定十四年六月乙亥與莒補秉義郎其目云即理宗皇帝考宋代之制舊名亦諱乃直斥不避似乎元人然其書內宋而外元又敘元代得國緣始多敵國傳聞之詞或宋末山林之士不諳體例者所作歟陳均編年備要因通鑑長編而刪節之此書則本兩朝實録參以李心傳所論中如稱趙鼎為趙丞相安丙為安觀文錢象祖為錢參政李壁為李參政史彌逺為史丞相多仍當時案牘之文未盡刋正紀金元啓釁之事追敘金源創業譜牒秩官具載顛末似單行之書非增續舊史之體然敘次簡明議論亦多平允如蜀中之減重額湖北之行會子范祖禹之補諡何致之罷制科胥足補宋史所未備其紀年互異者宋史韓托胄傳載薛叔似宣諭京湖程松吳曦同赴四川鄧友龍宣諭兩淮徐邦憲罷知處州皆在開禧四年考開禧實無四年此書載於二年丙寅當得其實其姓氏之互異者如宋史趙彥逾傳有中郎將范任此書作范仲壬趙汝愚傳有宣贊舍人傅昌朝此書作昌期步帥閻仲夜此書作王仲先本紀副都統翟朝宗得寶璽此書作興宗俱足以互證異同惟於史彌逺廢立濟王事略而不書或時代尚近衆論不同其事未經論定故闕所疑歟然彌逺之營家廟求起復一一大書于簡知非曲筆隱諱也其書世罕傳本惟見於永樂大典者尚首尾完具謹校正繕録以備參稽原書卷目已不可考今按年編次釐為十有六卷其中間有敘述失次端委相淆者睿鑒指示曠若發蒙謹仰遵聖訓詳為核正各加案語以明之俾首尾秩然不惟久湮陳笈得以表章且數百年未補罅漏一經御覽義例益明尤為是書之幸矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書兩朝綱目備要目録卷一光宗紹熙元年卷二光宗紹熙二年至紹熙四年卷三光宗紹熙五年卷四寧宗慶元元年至慶元二年卷五寧宗慶元三年至慶元五年卷六寧宗慶元六年卷七寧宗嘉泰元年至嘉泰二年卷八寧宗嘉泰三年至開禧元年卷九寧宗開禧二年卷十寧宗開禧三年卷十一寧宗嘉定元年卷十二寧宗嘉定二年至嘉定三年卷十三寧宗嘉定四年至嘉定六年卷十四寧宗嘉定七年卷十五寧宗嘉定八年至嘉定十一年卷十六寧宗嘉定十二年至嘉定十七年
